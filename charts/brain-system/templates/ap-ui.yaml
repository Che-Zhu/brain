{{- if .Values.ui.enabled }}
apiVersion: example.crossplane.io/v1
kind: AP
metadata:
  name: {{ .Values.ui.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brain-system.labels" . | nindent 4 }}
    {{- include "brain-system.regionLabel" . | nindent 4 }}
  {{- with (include "brain-system.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  crossplane:
    compositionRef:
      name: {{ .Values.ui.compositionRef }}
  input:
    image: {{ .Values.ui.image | quote }}
    imagePullPolicy: {{ .Values.ui.imagePullPolicy }}
    env:
      {{- range $key, $_ := .Values.ui.env }}
      {{- include "brain-system.secretEnvRef" (dict "name" $key "secretName" $.Values.secrets.uiName "optional" (has $key $.Values.ui.optionalSecretKeys)) | nindent 6 }}
      {{- end }}
    network:
      privatePort: {{ .Values.ui.port }}
      platformAddresses:
        {{- toYaml .Values.ui.platformAddresses | nindent 8 }}
    probes:
      {{- toYaml .Values.ui.probes | nindent 6 }}
  paused: {{ .Values.ui.paused }}
  restartRequest: {{ .Values.ui.restartRequest }}
  resource:
    replicas: {{ .Values.ui.resources.replicas }}
    requests:
      {{- toYaml .Values.ui.resources.requests | nindent 6 }}
    limits:
      {{- toYaml .Values.ui.resources.limits | nindent 6 }}
{{- end }}
