# Grant Crossplane core permission to create and manage composed resources.
# Uses aggregation — Crossplane picks up ClusterRoles with the label below.
#
# This does NOT extend provider-kubernetes (kubernetes.m.crossplane.io Object controller).
# That controller runs as its own ServiceAccount; for observing custom API groups like
# example.crossplane.io Project, see provider-kubernetes-example-rbac.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-db-composition
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
