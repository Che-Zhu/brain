# Extra RBAC for provider-kubernetes (NOT covered by crossplane-rbac.yaml).
#
# crossplane-rbac.yaml aggregates to Crossplane's core controller only
# (rbac.crossplane.io/aggregate-to-crossplane). Compositions run there, but
# kubernetes.m.crossplane.io Object reconciliation uses the provider-kubernetes
# controller, which runs as its own ServiceAccount in crossplane-system.
#
# Without this, Observe on custom CRDs (e.g. example.crossplane.io Project) fails with:
#   cannot get resource "projects" in API group "example.crossplane.io" ... forbidden
#
# The provider SA name is typically provider-kubernetes-<hash> and may change when the
# Provider package revision changes. Discover yours:
#   kubectl -n crossplane-system get sa -o name | grep provider-kubernetes
# or:
#   kubectl -n crossplane-system get deploy -l pkg.crossplane.io/provider=provider-kubernetes \
#     -o jsonpath='{.items[0].spec.template.spec.serviceAccountName}{"\n"}'
#
# Update subjects[0].name below if it does not match your cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-provider-kubernetes-example-projects
rules:
  - apiGroups: ["example.crossplane.io"]
    resources: ["projects"]
    verbs: ["get", "list", "watch"]
  # Required so aps-deployment-ingress-go-templating can SSA-patch label
  # crossplane.io/project-name and ownerReferences onto the AP composite
  # (Crossplane does not merge composite metadata from composition output).
  - apiGroups: ["example.crossplane.io"]
    resources: ["aps"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # DB / Notif compositions SSA-patch the composite claim with project labels (same pattern as AP).
  - apiGroups: ["example.crossplane.io"]
    resources: ["dbs", "notifs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # AP composition creates EntryPoint resources for public access targets.
  - apiGroups: ["example.crossplane.io"]
    resources: ["entrypoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # DB compositions observe KubeBlocks-created StatefulSets to expose the actual data mountPath.
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-provider-kubernetes-example-projects
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-provider-kubernetes-example-projects
subjects:
  - kind: ServiceAccount
    name: provider-kubernetes-fd54bbc7f877
    namespace: crossplane-system
