# Quota (DB.spec.quota): preset xs|s|m|l maps to CPU/memory (requests + limits) and primary PVC
# storage in the Go template pipeline below. Omitted spec.cpuRequest, spec.memoryRequest,
# spec.cpuLimit, spec.memoryLimit, and spec.storageSize are taken from the chosen quota; any of
# those fields set on the DB claim override only that value. XRD default is quota xs. For this
# engine, quota xs caps the preset data PVC at 3Gi. See packages/crossplane/service/db/db.yaml.
# exposeNodePort: when DB.spec.exposeNodePort is true, composes Service {name}-export (NodePort;
# nodePort omitted so the apiserver allocates a free port).
# KubeBlocks Services: {name}-mongodb, {name}-mongodb-headless, {name}-mongodb-mongodb (primary),
# {name}-mongodb-mongodb-ro (secondary). Conn Secret: {name}-conn-credential (cluster; host/port/user/pass)
# or per-component account secrets (e.g. {name}-mongodb-account-root) on some versions; we observe conn-credential.
# Export: labels component-name=mongodb, role=primary, selector instance + kubeblocks.io/role=primary.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  annotations:
    meta.crossplane.io/description: MongoDB database via KubeBlocks
    meta.crossplane.io/display-name: mongodb
    meta.crossplane.io/icon-url: https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mongodb/mongodb-original.svg
    meta.crossplane.io/template: |
      apiVersion: example.crossplane.io/v1
      kind: DB
      metadata:
        name: {{ name }}
        namespace: {{ namespace }}
        labels:
          region: 192.168.12.53.nip.io
      spec:
        crossplane:
          compositionRef:
            name: dbs-mongodb-kubeblocks-go-templating
        engine: mongodb
        quota: xs
  labels:
    engine: mongodb
  name: dbs-mongodb-kubeblocks-go-templating
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: DB
  mode: Pipeline
  pipeline:
  - step: render-kubeblocks-mongodb
    functionRef:
      name: crossplane-contrib-function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $ns := .observed.composite.resource.metadata.namespace }}
          {{- $name := .observed.composite.resource.metadata.name }}
          {{- $dbUid := .observed.composite.resource.metadata.uid }}
          {{- $kbCluster := getComposedResource . "kubeblocks-cluster" }}
          {{- $mongoConnCredentialObject := getComposedResource . "mongo-conn-credential-object" }}
          {{- $mongoStatefulSetObject := getComposedResource . "mongo-statefulset-object" }}
          {{- $exportSvc := getComposedResource . "db-nodeport-export" }}
          {{- $spec := .observed.composite.resource.spec }}
          {{- $projectName := "" }}
          {{- if hasKey $spec "projectName" }}{{- $projectName = trim (toString $spec.projectName) }}{{- end }}
          {{- $projectObs := getComposedResource . "project-observe" }}
          {{- $projectUid := "" }}
          {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
          {{- $m := $projectObs.status.atProvider.manifest }}
          {{- $meta := index $m "metadata" }}
          {{- if $meta }}
          {{- $uidVal := index $meta "uid" }}
          {{- if $uidVal }}{{- $projectUid = toString $uidVal }}{{- end }}
          {{- end }}
          {{- end }}
          {{- $lastTransition := now | date "2006-01-02T15:04:05Z07:00" }}
          {{- if and $kbCluster $kbCluster.status.conditions }}
          {{- range $kbCluster.status.conditions }}
          {{- if and (eq .type "Ready") .lastTransitionTime }}
          {{- $lastTransition = .lastTransitionTime }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- $mountPath := "/data/db" }}
          {{- if and $mongoStatefulSetObject $mongoStatefulSetObject.status $mongoStatefulSetObject.status.atProvider $mongoStatefulSetObject.status.atProvider.manifest }}
          {{- $containers := dig "spec" "template" "spec" "containers" (list) $mongoStatefulSetObject.status.atProvider.manifest }}
          {{- range $container := $containers }}
          {{- range $mount := (index $container "volumeMounts") }}
          {{- if and (eq (toString (index $mount "name")) "data") (index $mount "mountPath") }}{{- $mountPath = toString (index $mount "mountPath") }}{{- end }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- $quota := .observed.composite.resource.spec.quota | default "xs" | lower }}
          {{- $cpu := "250m" }}{{- $mem := "768Mi" }}{{- $cpuLim := "1000m" }}{{- $memLim := "1024Mi" }}{{- $stor := "3Gi" }}
          {{- if eq $quota "s" }}{{- $cpu = "500m" }}{{- $mem = "1Gi" }}{{- $cpuLim = "1000m" }}{{- $memLim = "2Gi" }}{{- $stor = "20Gi" }}
          {{- else if eq $quota "m" }}{{- $cpu = "1000m" }}{{- $mem = "2Gi" }}{{- $cpuLim = "2000m" }}{{- $memLim = "4Gi" }}{{- $stor = "50Gi" }}
          {{- else if eq $quota "l" }}{{- $cpu = "2000m" }}{{- $mem = "4Gi" }}{{- $cpuLim = "4000m" }}{{- $memLim = "8Gi" }}{{- $stor = "100Gi" }}
          {{- end }}
          {{- if .observed.composite.resource.spec.cpuRequest }}{{- $cpu = .observed.composite.resource.spec.cpuRequest }}{{- end }}
          {{- if .observed.composite.resource.spec.memoryRequest }}{{- $mem = .observed.composite.resource.spec.memoryRequest }}{{- end }}
          {{- if .observed.composite.resource.spec.cpuLimit }}{{- $cpuLim = .observed.composite.resource.spec.cpuLimit }}{{- end }}
          {{- if .observed.composite.resource.spec.memoryLimit }}{{- $memLim = .observed.composite.resource.spec.memoryLimit }}{{- end }}
          {{- if .observed.composite.resource.spec.storageSize }}{{- $stor = .observed.composite.resource.spec.storageSize }}{{- end }}
          {{- $scheduledBackup := index .observed.composite.resource.spec "scheduledBackup" }}
          {{- if not $scheduledBackup }}{{- $scheduledBackup = index .observed.composite.resource.spec "backup" }}{{- end }}
          {{- $restore := index .observed.composite.resource.spec "restoreFromBackup" }}
          {{- $exposeNodePort := false }}
          {{- if hasKey .observed.composite.resource.spec "exposeNodePort" }}{{- $exposeNodePort = .observed.composite.resource.spec.exposeNodePort }}{{- end }}
          {{- $paused := false }}
          {{- if and (hasKey $spec "paused") $spec.paused }}{{- $paused = true }}{{- end }}
          {{- $desiredReplicas := $spec.replicas | default 1 }}
          {{- if $paused }}{{- $desiredReplicas = 0 }}{{- end }}
          {{- $restartRequest := 0 }}
          {{- if hasKey $spec "restartRequest" }}{{- $restartRequest = int ($spec.restartRequest | default 0) }}{{- end }}
          {{ $kbPhase := "Unknown" }}
          {{ if and $kbCluster $kbCluster.status $kbCluster.status.phase }}{{ $kbPhase = toString $kbCluster.status.phase }}{{ end }}
          {{ $observedReplicas := 0 }}
          {{ if and $kbCluster $kbCluster.status $kbCluster.status.observedReplicas }}{{ $observedReplicas = int ($kbCluster.status.observedReplicas | default 0) }}{{ end }}
          {{ $availableReplicas := 0 }}
          {{ if and $kbCluster $kbCluster.status $kbCluster.status.availableReplicas }}{{ $availableReplicas = int ($kbCluster.status.availableReplicas | default 0) }}{{ end }}
          {{ $everReady := false }}
          {{ if and .observed.composite.resource.status .observed.composite.resource.status.lifecycle .observed.composite.resource.status.lifecycle.everReady }}{{ $everReady = true }}{{ end }}
          {{ if eq $kbPhase "Running" }}{{ $everReady = true }}{{ end }}
          {{ $lastReadyTime := "" }}
          {{ if and .observed.composite.resource.status .observed.composite.resource.status.lifecycle .observed.composite.resource.status.lifecycle.lastReadyTime }}{{ $lastReadyTime = toString .observed.composite.resource.status.lifecycle.lastReadyTime }}{{ end }}
          {{ if and (eq $kbPhase "Running") (eq $lastReadyTime "") }}{{ $lastReadyTime = $lastTransition }}{{ end }}
          {{ $restartOps := getComposedResource . "kubeblocks-restart-opsrequest" }}
          {{ $restartOpsName := "" }}
          {{ $restartOpsPhase := "" }}
          {{ $restartOpsType := "" }}
          {{ if and $restartOps $restartOps.metadata $restartOps.metadata.name }}{{ $restartOpsName = toString $restartOps.metadata.name }}{{ end }}
          {{ if and $restartOps $restartOps.status $restartOps.status.phase }}{{ $restartOpsPhase = toString $restartOps.status.phase }}{{ end }}
          {{ $restartOpsDone := or (eq $restartOpsPhase "Succeed") (eq $restartOpsPhase "Succeeded") (eq $restartOpsPhase "Failed") }}
          {{ if and $restartOps $restartOps.spec $restartOps.spec.type (not $restartOpsDone) }}{{ $restartOpsType = toString $restartOps.spec.type }}{{ end }}
          {{ $deleting := false }}
          {{ if .observed.composite.resource.metadata.deletionTimestamp }}{{ $deleting = true }}{{ end }}
          {{ $productPhase := "Unknown" }}
          {{ $reason := $kbPhase | default "Waiting" }}
          {{ if $deleting }}
          {{ $productPhase = "Deleting" }}
          {{ $reason = "Deleting" }}
          {{ else if eq $restartOpsType "Restart" }}
          {{ $productPhase = "Restarting" }}
          {{ if ne $restartOpsPhase "" }}{{ $reason = printf "Restart:%s" $restartOpsPhase }}{{ else }}{{ $reason = "Restart" }}{{ end }}
          {{ else if or (eq $restartOpsPhase "Failed") (eq $kbPhase "Failed") (eq $kbPhase "Abnormal") (eq $kbPhase "Degraded") }}
          {{ $productPhase = "Failed" }}
          {{ else if and $paused (gt $availableReplicas 0) }}
          {{ $productPhase = "Stopping" }}
          {{ $reason = "Stopping" }}
          {{ else if and $paused (gt $observedReplicas 0) }}
          {{ $productPhase = "Stopping" }}
          {{ $reason = "Stopping" }}
          {{ else if $paused }}
          {{ $productPhase = "Paused" }}
          {{ $reason = "Paused" }}
          {{ else if or (eq $kbPhase "Updating") (eq $kbPhase "SpecUpdating") (eq $kbPhase "Upgrade") (eq $kbPhase "VerticalScaling") (eq $kbPhase "VolumeExpanding") }}
          {{ $productPhase = "Updating" }}
          {{ else if eq $kbPhase "Running" }}
          {{ $productPhase = "Running" }}
          {{ else if $everReady }}
          {{ $productPhase = "Starting" }}
          {{ $reason = "Starting" }}
          {{ else }}
          {{ $productPhase = "Creating" }}
          {{ $reason = "Creating" }}
          {{ end }}
          {{- if ne $projectName "" }}
          ---

          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: {{ printf "%s-project-observe" $name }}
            namespace: {{ $ns }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: project-observe
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            managementPolicies:
              - Observe
            providerConfigRef:
              kind: ClusterProviderConfig
              name: default
            forProvider:
              manifest:
                apiVersion: example.crossplane.io/v1
                kind: Project
                metadata:
                  name: {{ $projectName }}
                  namespace: {{ $ns }}
          {{- end }}
          ---

          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: {{ printf "%s-sa" $name }}
            namespace: {{ $ns }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: mongo-serviceaccount
            labels:
              crossplane.io/composite: {{ $name }}
              {{- if ne $projectName "" }}
              crossplane.io/project-name: {{ $projectName | quote }}
              {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              crossplane.io/project-uid: {{ $projectUid | quote }}
              {{- end }}
            ownerReferences:
            - apiVersion: example.crossplane.io/v1
              kind: DB
              name: {{ $name }}
              uid: {{ $dbUid }}

          ---

          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: {{ printf "%s-sa" $name }}
            namespace: {{ $ns }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: mongo-role
            labels:
              crossplane.io/composite: {{ $name }}
              {{- if ne $projectName "" }}
              crossplane.io/project-name: {{ $projectName | quote }}
              {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              crossplane.io/project-uid: {{ $projectUid | quote }}
              {{- end }}
            ownerReferences:
            - apiVersion: example.crossplane.io/v1
              kind: DB
              name: {{ $name }}
              uid: {{ $dbUid }}
          rules:
          - apiGroups:
            - '*'
            resources:
            - '*'
            verbs:
            - '*'

          ---

          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: {{ printf "%s-sa" $name }}
            namespace: {{ $ns }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: mongo-rolebinding
            labels:
              crossplane.io/composite: {{ $name }}
              {{- if ne $projectName "" }}
              crossplane.io/project-name: {{ $projectName | quote }}
              {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              crossplane.io/project-uid: {{ $projectUid | quote }}
              {{- end }}
            ownerReferences:
            - apiVersion: example.crossplane.io/v1
              kind: DB
              name: {{ $name }}
              uid: {{ $dbUid }}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: {{ printf "%s-sa" $name }}
          subjects:
          - kind: ServiceAccount
            name: {{ printf "%s-sa" $name }}
            namespace: {{ $ns }}

          {{- if .observed.composite.resource.spec.secretData }}
          ---

          apiVersion: v1
          kind: Secret
          metadata:
            name: {{ .observed.composite.resource.spec.connectionSecretName | default (printf "%s-connection" $name) }}
            namespace: {{ $ns }}
            labels:
              app.kubernetes.io/instance: {{ $name }}
              app.kubernetes.io/managed-by: crossplane
              app.kubernetes.io/name: mongodb
              crossplane.io/composite: {{ $name }}
              {{- if ne $projectName "" }}
              crossplane.io/project-name: {{ $projectName | quote }}
              {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              crossplane.io/project-uid: {{ $projectUid | quote }}
              {{- end }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: mongo-connection-secret
            ownerReferences:
            - apiVersion: example.crossplane.io/v1
              kind: DB
              name: {{ $name }}
              uid: {{ $dbUid }}
          type: Opaque
          data:
            {{- range $k, $v := .observed.composite.resource.spec.secretData }}
            {{ $k }}: {{ $v | b64enc }}
            {{- end }}
          {{- end }}

          ---

          apiVersion: apps.kubeblocks.io/v1alpha1
          kind: Cluster

          {{- $engine := .observed.composite.resource.spec.engine | default "mongodb" }}
          {{- $clusterVersion := $engine }}
          {{- if eq $clusterVersion "mongodb" }}{{ $clusterVersion = "mongodb-6.0" }}{{ end }}

          metadata:
            namespace: {{ $ns }}
            name: {{ $name }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: kubeblocks-cluster
              {{- if and $restore (index $restore "backupName") }}
              {{- $backupName := index $restore "backupName" }}
              {{- $restoreNS := $ns }}{{- if index $restore "namespace" }}{{- $restoreNS = index $restore "namespace" }}{{- end }}
              {{- $vrp := "Parallel" }}{{- if index $restore "volumeRestorePolicy" }}{{- $vrp = index $restore "volumeRestorePolicy" }}{{- end }}
              kubeblocks.io/restore-from-backup: {{ printf "{\"mongodb\":{\"name\":\"%s\",\"namespace\":\"%s\",\"volumeRestorePolicy\":\"%s\"}}" $backupName $restoreNS $vrp | quote }}
              {{- end }}
              {{- if $kbCluster }}
              {{- if eq $kbCluster.status.phase "Running" }}
              gotemplating.fn.crossplane.io/ready: "True"
              {{- end }}
              {{- end }}
            labels:
              kb.io/database: {{ $clusterVersion }}
              clusterdefinition.kubeblocks.io/name: mongodb
              clusterversion.kubeblocks.io/name: {{ $clusterVersion }}
              crossplane.io/composite: {{ $name }}
              {{- if ne $projectName "" }}
              crossplane.io/project-name: {{ $projectName | quote }}
              {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              crossplane.io/project-uid: {{ $projectUid | quote }}
              {{- end }}
            ownerReferences:
            - apiVersion: example.crossplane.io/v1
              kind: DB
              name: {{ $name }}
              uid: {{ $dbUid }}
          spec:
            affinity:
              nodeLabels: {}
              podAntiAffinity: Preferred
              tenancy: SharedNode
              topologyKeys:
              - kubernetes.io/hostname

            backup:
              cronExpression: {{ if $scheduledBackup }}{{ (index $scheduledBackup "cronExpression") | default "30 07 * * *" | quote }}{{ else }}"30 07 * * *"{{ end }}
              enabled: {{ if $scheduledBackup }}{{ index $scheduledBackup "enabled" | default true }}{{ else }}true{{ end }}
              incrementalBackupEnabled: false
              method: dump
              pitrEnabled: false
              repoName: {{ if $scheduledBackup }}{{ (index $scheduledBackup "repoName") | default "backuprepo-minio" | quote }}{{ else }}"backuprepo-minio"{{ end }}
              retentionPeriod: {{ if $scheduledBackup }}{{ (index $scheduledBackup "retentionPeriod") | default "14d" | quote }}{{ else }}"14d"{{ end }}

            clusterDefinitionRef: mongodb
            clusterVersionRef: {{ $clusterVersion }}

            componentSpecs:
            - name: mongodb
              componentDefRef: mongodb
              monitor: true
              replicas: {{ $desiredReplicas }}

              resources:
                requests:
                  cpu: {{ $cpu }}
                  memory: {{ $mem }}
                limits:
                  cpu: {{ $cpuLim }}
                  memory: {{ $memLim }}

              serviceAccountName: {{ printf "%s-sa" $name }}

              switchPolicy:
                type: Noop

              volumeClaimTemplates:
              - name: data
                spec:
                  accessModes:
                  - ReadWriteOnce
                  resources:
                    requests:
                      storage: {{ $stor }}
                  {{- if .observed.composite.resource.spec.storageClassName }}
                  storageClassName: {{ .observed.composite.resource.spec.storageClassName }}
                  {{- end }}

            terminationPolicy: {{ .observed.composite.resource.spec.terminationPolicy | default "Delete" | replace "Wipeout" "WipeOut" }}
            tolerations: []

          {{- if gt $restartRequest 0 }}
          ---

          apiVersion: apps.kubeblocks.io/v1alpha1
          kind: OpsRequest
          metadata:
            name: {{ printf "%s-restart-%d" $name $restartRequest }}
            namespace: {{ $ns }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: kubeblocks-restart-opsrequest
            labels:
              crossplane.io/composite: {{ $name }}
              {{- if ne $projectName "" }}
              crossplane.io/project-name: {{ $projectName | quote }}
              {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              crossplane.io/project-uid: {{ $projectUid | quote }}
              {{- end }}
            ownerReferences:
            - apiVersion: example.crossplane.io/v1
              kind: DB
              name: {{ $name }}
              uid: {{ $dbUid }}
          spec:
            clusterName: {{ $name }}
            type: Restart
            restart:
            - componentName: mongodb
            ttlSecondsAfterSucceed: 30
          {{- end }}

          {{- if $exposeNodePort }}
          ---

          apiVersion: v1
          kind: Service
          metadata:
            namespace: {{ $ns }}
            name: {{ printf "%s-export" $name }}
            labels:
              app.kubernetes.io/instance: {{ $name }}
              apps.kubeblocks.io/component-name: mongodb
              kubeblocks.io/role: primary
              app.kubernetes.io/managed-by: crossplane
              crossplane.io/composite: {{ $name }}
              {{- if ne $projectName "" }}
              crossplane.io/project-name: {{ $projectName | quote }}
              {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              crossplane.io/project-uid: {{ $projectUid | quote }}
              {{- end }}
            ownerReferences:
            - apiVersion: example.crossplane.io/v1
              kind: DB
              name: {{ $name }}
              uid: {{ $dbUid }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: db-nodeport-export
          spec:
            type: NodePort
            ports:
            - name: tcp
              port: 27017
              targetPort: 27017
              protocol: TCP
            selector:
              app.kubernetes.io/instance: {{ $name }}
              kubeblocks.io/role: primary
          {{- end }}

          ---

          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: {{ printf "%s-conn-credential-observe" $name }}
            namespace: {{ $ns }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: mongo-conn-credential-object
          spec:
            managementPolicies:
              - Observe
            providerConfigRef:
              kind: ClusterProviderConfig
              name: default
            forProvider:
              manifest:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: {{ printf "%s-conn-credential" $name }}
                  namespace: {{ $ns }}

          ---

          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: {{ printf "%s-statefulset-observe" $name }}
            namespace: {{ $ns }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: mongo-statefulset-object
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            managementPolicies:
              - Observe
            providerConfigRef:
              kind: ClusterProviderConfig
              name: default
            forProvider:
              manifest:
                apiVersion: apps/v1
                kind: StatefulSet
                metadata:
                  name: {{ printf "%s-mongodb" $name }}
                  namespace: {{ $ns }}

          ---
          {{- $connPriv := "" }}
          {{- $connPub := "" }}
          {{- if and $mongoConnCredentialObject $mongoConnCredentialObject.status $mongoConnCredentialObject.status.atProvider $mongoConnCredentialObject.status.atProvider.manifest }}
          {{- $d := $mongoConnCredentialObject.status.atProvider.manifest.data }}
          {{- if and $d (index $d "username") (index $d "password") }}
          {{- $u := index $d "username" | b64dec }}
          {{- $pw := index $d "password" | b64dec }}
          {{- $ue := $u | urlquery }}
          {{- $pwe := $pw | urlquery }}
          {{- $svcHost := "" }}
          {{- $port := "27017" }}
          {{- if and (index $d "host") (index $d "port") }}
          {{- $svcHost = index $d "host" | b64dec }}
          {{- $port = index $d "port" | b64dec }}
          {{- else }}
          {{- $svcHost = printf "%s-mongodb" $name }}
          {{- end }}
          {{- $connPriv = printf "mongodb://%s:%s@%s.%s.svc:%s" $ue $pwe $svcHost $ns $port }}
          {{- $regionLabel := "" }}
          {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
          {{- $regionLabel = index .observed.composite.resource.metadata.labels "region" }}
          {{- end }}
          {{- $np := "" }}
          {{- if and $exportSvc $exportSvc.spec $exportSvc.spec.ports (gt (len $exportSvc.spec.ports) 0) }}
          {{- $p0 := index $exportSvc.spec.ports 0 }}
          {{- if and $p0 (index $p0 "nodePort") }}{{ $np = printf "%v" (index $p0 "nodePort") }}{{ end }}
          {{- end }}
          {{- if and $regionLabel (ne $np "") }}
          {{- $connPub = printf "mongodb://%s:%s@dbconn.%s:%s/?directConnection=true" $ue $pwe $regionLabel $np }}
          {{- end }}
          {{- end }}
          {{- end }}

          {{- if and (ne $projectName "") (ne $projectUid "") }}
          ---

          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: {{ printf "%s-db-project-patch" $name }}
            namespace: {{ $ns }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: db-project-patch
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            managementPolicies:
              - Observe
              - Create
              - Update
            providerConfigRef:
              kind: ClusterProviderConfig
              name: default
            forProvider:
              manifest:
                apiVersion: example.crossplane.io/v1
                kind: DB
                metadata:
                  name: {{ $name }}
                  namespace: {{ $ns }}
                  labels:
                    {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
                    region: {{ index .observed.composite.resource.metadata.labels "region" | quote }}
                    {{- end }}
                    crossplane.io/project-name: {{ $projectName | quote }}
                    crossplane.io/project-uid: {{ $projectUid | quote }}
                  ownerReferences:
                  - apiVersion: example.crossplane.io/v1
                    kind: Project
                    name: {{ $projectName }}
                    uid: {{ $projectUid }}
          {{- end }}

          ---

          apiVersion: example.crossplane.io/v1
          kind: DB
          metadata:
            name: {{ $name }}
            namespace: {{ $ns }}
          status:
            phase: {{ $productPhase }}
            reason: {{ $reason | quote }}
            clusterVersionRef: {{ $clusterVersion | quote }}
            mountPath: {{ $mountPath | quote }}
            effectiveResources:
              cpuRequest: {{ $cpu | quote }}
              memoryRequest: {{ $mem | quote }}
              cpuLimit: {{ $cpuLim | quote }}
              memoryLimit: {{ $memLim | quote }}
              storageSize: {{ $stor | quote }}
            observedReplicas: {{ $observedReplicas }}
            availableReplicas: {{ $availableReplicas }}
            observed:
              kubeblocksPhase: {{ $kbPhase | quote }}
              observedReplicas: {{ $observedReplicas }}
              availableReplicas: {{ $availableReplicas }}
              {{ if ne $restartOpsName "" }}
              operation:
                type: "Restart"
                phase: {{ $restartOpsPhase | quote }}
                name: {{ $restartOpsName | quote }}
              {{ end }}
            lifecycle:
              everReady: {{ $everReady }}
              {{ if ne $lastReadyTime "" }}
              lastReadyTime: {{ $lastReadyTime | quote }}
              {{ end }}
            kubeblocksServices:
              - name: {{ printf "%s-mongodb" $name | quote }}
                type: ClusterIP
                purpose: component-mongodb
              - name: {{ printf "%s-mongodb-headless" $name | quote }}
                type: ClusterIP
                purpose: headless-instances
              - name: {{ printf "%s-mongodb-mongodb" $name | quote }}
                type: ClusterIP
                purpose: primary-rw
              - name: {{ printf "%s-mongodb-mongodb-ro" $name | quote }}
                type: ClusterIP
                purpose: secondary-ro
              {{- if $exposeNodePort }}
              - name: {{ printf "%s-export" $name | quote }}
                type: NodePort
                purpose: primary-tcp-external
              {{- end }}
            {{- if ne $connPriv "" }}
            connectionStringPrivate: {{ $connPriv | quote }}
            {{- end }}
            {{- if ne $connPub "" }}
            connectionStringPublic: {{ $connPub | quote }}
            {{- end }}
            {{- if ne $projectName "" }}
            projectName: {{ $projectName | quote }}
            {{- end }}
            {{- if ne $projectUid "" }}
            projectUid: {{ $projectUid | quote }}
            {{- end }}
            conditions:
              - type: Ready
                status: {{ if eq $productPhase "Running" -}} "True" {{- else -}} "False" {{- end }}
                reason: {{ $reason | quote }}
                message: 'DB product phase is {{ $productPhase }}; KubeBlocks Cluster phase is {{ $kbPhase }}'
                lastTransitionTime: {{ $lastTransition }}
