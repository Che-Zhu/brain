apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: dbs.example.crossplane.io          # typically <plural>.<group>
spec:
  scope: Namespaced
  group: example.crossplane.io
  names:
    kind: DB
    plural: dbs
  defaultCompositionRef:
    name: dbs-postgresql-kubeblocks-go-templating
  versions:
  - name: v1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
              type: object
              properties:
                compositionRef:
                  type: object
                  description: Select which Composition to use (e.g. postgresql vs redis)
                  properties:
                    name:
                      type: string
                compositionSelector:
                  type: object
                  description: Select Composition by labels
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                crossplane:
                  type: object
                  description: Crossplane control fields
                  properties:
                    compositionRef:
                      type: object
                      properties:
                        name:
                          type: string
                    compositionSelector:
                      type: object
                      properties:
                        matchLabels:
                          type: object
                          additionalProperties:
                            type: string
                engine:
                  type: string
                  description: Database engine (postgresql, redis, mysql)
                quota:
                  type: string
                  enum: [xs, s, m, l]
                  default: "xs"
                  description: >
                    Resource preset per engine (xs smallest). Omitted cpuRequest, memoryRequest,
                    cpuLimit, memoryLimit, and storageSize are filled from the quota preset; set those fields
                    to override individual values. Preset data PVC size for quota xs is at most 3Gi
                    (Redis xs uses 3Gi for the main volume and 1Gi for sentinel).
                replicas:
                  type: integer
                  default: 1
                  description: KubeBlocks Cluster replica count for the primary component when running (default 1). Preserved while spec.paused is true.
                paused:
                  type: boolean
                  default: false
                  description: >
                    Lifecycle flag for Start/Stop. When true, the active composition scales database
                    compute components to zero while preserving data, configuration, and spec.replicas.
                    When false, the composition renders the configured spec.replicas value.
                restartRequest:
                  type: integer
                  default: 0
                  minimum: 0
                  description: >
                    Non-negative declarative restart request counter. Incrementing the value causes
                    the active composition to render a KubeBlocks Restart OpsRequest for the database
                    component. API clients should prefer POST /api/db/v1alpha1/restart so the server
                    reads and increments the current value.
                storageSize:
                  type: string
                  description: >
                    PVC storage request (e.g. 8Gi, 20Gi). When omitted, the active composition uses
                    engine-specific storage for spec.quota (xs quota caps preset primary volume at 3Gi).
                cpuRequest:
                  type: string
                memoryRequest:
                  type: string
                cpuLimit:
                  type: string
                memoryLimit:
                  type: string
                storageClassName:
                  type: string
                  description: StorageClass for PVCs. Omit to use cluster default.
                terminationPolicy:
                  type: string
                  default: "Delete"
                  description: KubeBlocks Cluster terminationPolicy — Delete or WipeOut (default Delete).
                exposeNodePort:
                  type: boolean
                  default: false
                  description: >
                    When true, compose a NodePort Service named {metadata.name}-export in the claim
                    namespace targeting the primary workload (leader for ApeCloud MySQL). nodePort is
                    omitted so the Kubernetes apiserver allocates a free port in the cluster NodePort
                    range (avoids collisions).
                connectionSecretName:
                  type: string
                  description: Name of the connection Secret. Defaults to {name}-connection.
                secretData:
                  type: object
                  additionalProperties:
                    type: string
                  description: Custom Secret data (keys and raw string values; values are base64-encoded in the Secret).
                scheduledBackup:
                  type: object
                  description: >
                    Scheduled (cron) backup policy for the KubeBlocks cluster: when to run automated
                    backups, retention, and optional BackupRepo. Does not trigger one-off snapshots; use
                    the backup API or a Backup CR for on-demand backups. Compositions map this to
                    Cluster.spec.backup: PostgreSQL (pg-basebackup + fixed repo in template), MongoDB
                    (dump + repoName), MySQL ApeCloud (xtrabackup + repoName), Redis (datafile + repoName).
                  properties:
                    cronExpression:
                      type: string
                      description: Cron schedule for backups (e.g. "13 10 * * *" for daily at 10:13).
                    enabled:
                      type: boolean
                      description: Whether scheduled backup is enabled.
                    retentionPeriod:
                      type: string
                      description: How long to retain backups (e.g. "14d").
                    repoName:
                      type: string
                      description: KubeBlocks BackupRepo resource name (e.g. backuprepo-minio, backuprepo-s3).
                projectName:
                  type: string
                  description: >
                    When set, the active composition observes the Project claim with this name in the
                    same namespace, adds labels crossplane.io/project-name and crossplane.io/project-uid
                    to composed resources. Composed workloads ownerReference the DB claim; only the
                    DB composite is SSA-patched to add Project ownerReferences/labels. Echoes
                    status.projectName / status.projectUid.
                restoreFromBackup:
                  type: object
                  description: >
                    Restore a new cluster from an existing backup set (KubeBlocks restore annotation).
                    Supported by postgres/mysql/mongodb/redis compositions in this package. By default,
                    backup namespace is claim namespace and volumeRestorePolicy is Parallel.
                  properties:
                    backupName:
                      type: string
                      description: Name of the full backup to restore from.
                    namespace:
                      type: string
                      description: Namespace where the backup object exists. Defaults to DB claim namespace.
                    volumeRestorePolicy:
                      type: string
                      description: KubeBlocks volume restore policy (for example Parallel).
                    connectionPassword:
                      type: string
                      description: Optional MySQL connection password to preserve original account password on restore.
              required:
                - engine
          status:
            type: object
            properties:
              phase:
                type: string
                description: Product-facing DB lifecycle phase consumed by API/UI.
                enum:
                  - Creating
                  - Running
                  - Updating
                  - Restarting
                  - Stopping
                  - Paused
                  - Starting
                  - Failed
                  - Deleting
                  - Unknown
              reason:
                type: string
                description: Short product/debug reason for the current lifecycle phase.
              clusterVersionRef:
                type: string
                description: Observed KubeBlocks Cluster version reference used by the composed database Cluster.
              observedReplicas:
                type: integer
              availableReplicas:
                type: integer
              observed:
                type: object
                description: Raw observed provider details retained for debugging and support.
                properties:
                  kubeblocksPhase:
                    type: string
                  observedReplicas:
                    type: integer
                  availableReplicas:
                    type: integer
                  operation:
                    type: object
                    properties:
                      type:
                        type: string
                      phase:
                        type: string
                      name:
                        type: string
              lifecycle:
                type: object
                description: Product lifecycle memory maintained by composition status.
                properties:
                  everReady:
                    type: boolean
                  lastReadyTime:
                    type: string
              kubeblocksServices:
                type: array
                description: >
                  Expected KubeBlocks-managed Services for this engine (DNS names are
                  {name}.{namespace}.svc). When spec.exposeNodePort is true, the composition also
                  creates {metadata.name}-export (NodePort) matching KubeBlocks export shape
                  (component label + primary/leader role on the workload Service port).
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                    purpose:
                      type: string
              secretData:
                type: object
                additionalProperties:
                  type: string
                description: Base64-encoded Secret data (from Secret with label app.kubernetes.io/instance={name})
              connectionStringPrivate:
                type: string
                description: >
                  In-cluster connection URI for the active engine (postgresql / mongodb / mysql /
                  redis), composed from the observed KubeBlocks account or conn-credential Secret
                  (base64-decoded username and password; host/port from Secret when present).
              connectionStringPublic:
                type: string
                description: >
                  URI via dbconn.{metadata.labels.region}:allocated NodePort on {name}-export when
                  spec.exposeNodePort is true and metadata.labels.region is set. MongoDB and
                  PostgreSQL append ?directConnection=true; MySQL and Redis use no query string.
              projectName:
                type: string
                description: Observed Project claim name when spec.projectName is set.
              projectUid:
                type: string
                description: Observed Project UID when the Project is resolved.
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type: { type: string }
                    status: { type: string }
                    reason: { type: string }
                    message: { type: string }
                    lastTransitionTime: { type: string }
