# Quota (DB.spec.quota): preset xs|s|m|l maps to CPU/memory/storage and requests+limits in the Go
# template pipeline below. Omitted spec.cpuRequest, spec.memoryRequest, spec.cpuLimit,
# spec.memoryLimit, and spec.storageSize are taken from the chosen quota; any of those fields set
# on the DB claim override only that value. XRD default is quota xs. For this engine, quota xs
# caps the preset data PVC at 3Gi. See packages/crossplane/service/db/db.yaml for the API schema.
# exposeNodePort: when DB.spec.exposeNodePort is true, composes Service {name}-export (NodePort;
# nodePort omitted so the apiserver allocates a free port).
# KubeBlocks (ApeCloud MySQL): {name}-mysql (ClusterIP leader), {name}-mysql-headless. Conn Secret:
# {name}-conn-credential (host/port/username/password). Export: component-name=apecloud-mysql,
# kubeblocks.io/role=leader, selector instance + leader.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: dbs-mysql-kubeblocks-go-templating
  labels:
    engine: mysql
  annotations:
    meta.crossplane.io/display-name: mysql
    meta.crossplane.io/icon-url: https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg
    meta.crossplane.io/description: MySQL database via KubeBlocks (ApeCloud)
    meta.crossplane.io/template: |
      apiVersion: example.crossplane.io/v1
      kind: DB
      metadata:
        name: {{ name }}
        namespace: default
        labels:
          region: 192.168.12.53.nip.io
      spec:
        crossplane:
          compositionRef:
            name: dbs-mysql-kubeblocks-go-templating
        engine: mysql
        quota: xs
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: DB
  mode: Pipeline
  pipeline:
    - step: render-kubeblocks-mysql
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $kbCluster := getComposedResource . "kubeblocks-cluster" }}
            {{- $mysqlConnCredentialObject := getComposedResource . "mysql-conn-credential-object" }}
            {{- $exportSvc := getComposedResource . "db-nodeport-export" }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{- $projectName = trim (toString $spec.projectName) }}{{- end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{- $projectUid = toString $uidVal }}{{- end }}
            {{- end }}
            {{- end }}
            {{- $lastTransition := now | date "2006-01-02T15:04:05Z07:00" }}
            {{- if and $kbCluster $kbCluster.status.conditions }}
            {{- range $kbCluster.status.conditions }}
            {{- if and (eq .type "Ready") .lastTransitionTime }}
            {{- $lastTransition = .lastTransitionTime }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- $quota := .observed.composite.resource.spec.quota | default "xs" | lower }}
            {{- $cpu := "100m" }}{{- $mem := "256Mi" }}{{- $cpuLim := "500m" }}{{- $memLim := "512Mi" }}{{- $stor := "3Gi" }}
            {{- if eq $quota "s" }}{{- $cpu = "250m" }}{{- $mem = "512Mi" }}{{- $cpuLim = "1000m" }}{{- $memLim = "1Gi" }}{{- $stor = "10Gi" }}
            {{- else if eq $quota "m" }}{{- $cpu = "500m" }}{{- $mem = "1Gi" }}{{- $cpuLim = "2000m" }}{{- $memLim = "2Gi" }}{{- $stor = "20Gi" }}
            {{- else if eq $quota "l" }}{{- $cpu = "1000m" }}{{- $mem = "2Gi" }}{{- $cpuLim = "4000m" }}{{- $memLim = "4Gi" }}{{- $stor = "50Gi" }}
            {{- end }}
            {{- if .observed.composite.resource.spec.cpuRequest }}{{- $cpu = .observed.composite.resource.spec.cpuRequest }}{{- end }}
            {{- if .observed.composite.resource.spec.memoryRequest }}{{- $mem = .observed.composite.resource.spec.memoryRequest }}{{- end }}
            {{- if .observed.composite.resource.spec.cpuLimit }}{{- $cpuLim = .observed.composite.resource.spec.cpuLimit }}{{- end }}
            {{- if .observed.composite.resource.spec.memoryLimit }}{{- $memLim = .observed.composite.resource.spec.memoryLimit }}{{- end }}
            {{- if .observed.composite.resource.spec.storageSize }}{{- $stor = .observed.composite.resource.spec.storageSize }}{{- end }}
            {{- $exposeNodePort := false }}
            {{- if hasKey .observed.composite.resource.spec "exposeNodePort" }}{{- $exposeNodePort = .observed.composite.resource.spec.exposeNodePort }}{{- end }}
            {{- $scheduledBackup := index .observed.composite.resource.spec "scheduledBackup" }}
            {{- if not $scheduledBackup }}{{- $scheduledBackup = index .observed.composite.resource.spec "backup" }}{{- end }}
            {{- $restore := index .observed.composite.resource.spec "restoreFromBackup" }}
            {{- if ne $projectName "" }}
            ---

            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---

            apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: {{ printf "%s-sa" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: mysql-serviceaccount
              labels:
                crossplane.io/composite: {{ $name }}
                {{- if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{- end }}
                {{- if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: Project
                name: {{ $projectName }}
                uid: {{ $projectUid }}
              {{- end }}

            ---

            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: {{ printf "%s-sa" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: mysql-role
              labels:
                crossplane.io/composite: {{ $name }}
                {{- if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{- end }}
                {{- if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: Project
                name: {{ $projectName }}
                uid: {{ $projectUid }}
              {{- end }}
            rules:
            - apiGroups:
              - '*'
              resources:
              - '*'
              verbs:
              - '*'

            ---

            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: {{ printf "%s-sa" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: mysql-rolebinding
              labels:
                crossplane.io/composite: {{ $name }}
                {{- if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{- end }}
                {{- if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: Project
                name: {{ $projectName }}
                uid: {{ $projectUid }}
              {{- end }}
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ printf "%s-sa" $name }}
            subjects:
            - kind: ServiceAccount
              name: {{ printf "%s-sa" $name }}
              namespace: {{ $ns }}

            {{- if .observed.composite.resource.spec.secretData }}
            ---

            apiVersion: v1
            kind: Secret
            metadata:
              name: {{ .observed.composite.resource.spec.connectionSecretName | default (printf "%s-connection" $name) }}
              namespace: {{ $ns }}
              labels:
                app.kubernetes.io/instance: {{ $name }}
                app.kubernetes.io/managed-by: crossplane
                app.kubernetes.io/name: apecloud-mysql
                apps.kubeblocks.io/cluster-type: mysql
                crossplane.io/composite: {{ $name }}
                {{- if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{- end }}
                {{- if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{- end }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: mysql-connection-secret
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: Project
                name: {{ $projectName }}
                uid: {{ $projectUid }}
              {{- end }}
            type: Opaque
            data:
              {{- range $k, $v := .observed.composite.resource.spec.secretData }}
              {{ $k }}: {{ $v | b64enc }}
              {{- end }}
            {{- end }}

            ---

            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster

            {{- $clusterVersion := .observed.composite.resource.spec.engine | default "mysql" }}
            {{- if eq $clusterVersion "mysql" }}{{ $clusterVersion = "ac-mysql-8.0.30-1" }}{{ end }}

            metadata:
              namespace: {{ $ns }}
              name: {{ $name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: kubeblocks-cluster
                {{- if and $restore (index $restore "backupName") }}
                {{- $backupName := index $restore "backupName" }}
                {{- $restoreNS := $ns }}{{- if index $restore "namespace" }}{{- $restoreNS = index $restore "namespace" }}{{- end }}
                {{- $vrp := "Parallel" }}{{- if index $restore "volumeRestorePolicy" }}{{- $vrp = index $restore "volumeRestorePolicy" }}{{- end }}
                {{- if index $restore "connectionPassword" }}
                kubeblocks.io/restore-from-backup: {{ printf "{\"mysql\":{\"name\":\"%s\",\"namespace\":\"%s\",\"volumeRestorePolicy\":\"%s\",\"connectionPassword\":\"%s\"}}" $backupName $restoreNS $vrp (index $restore "connectionPassword") | quote }}
                {{- else }}
                kubeblocks.io/restore-from-backup: {{ printf "{\"mysql\":{\"name\":\"%s\",\"namespace\":\"%s\",\"volumeRestorePolicy\":\"%s\"}}" $backupName $restoreNS $vrp | quote }}
                {{- end }}
                {{- end }}
                {{- if $kbCluster }}
                {{- if eq $kbCluster.status.phase "Running" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
                {{- end }}
              labels:
                clusterdefinition.kubeblocks.io/name: apecloud-mysql
                clusterversion.kubeblocks.io/name: {{ $clusterVersion }}
                crossplane.io/composite: {{ $name }}
                {{- if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{- end }}
                {{- if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: Project
                name: {{ $projectName }}
                uid: {{ $projectUid }}
              {{- end }}
            spec:
              affinity:
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys:
                - kubernetes.io/hostname

              clusterDefinitionRef: apecloud-mysql
              clusterVersionRef: {{ $clusterVersion }}

              backup:
                cronExpression: {{ if $scheduledBackup }}{{ (index $scheduledBackup "cronExpression") | default "04 07 * * *" | quote }}{{ else }}"04 07 * * *"{{ end }}
                enabled: {{ if $scheduledBackup }}{{ index $scheduledBackup "enabled" | default true }}{{ else }}true{{ end }}
                incrementalBackupEnabled: false
                method: xtrabackup
                pitrEnabled: false
                repoName: {{ if $scheduledBackup }}{{ (index $scheduledBackup "repoName") | default "backuprepo-minio" | quote }}{{ else }}"backuprepo-minio"{{ end }}
                retentionPeriod: {{ if $scheduledBackup }}{{ (index $scheduledBackup "retentionPeriod") | default "14d" | quote }}{{ else }}"14d"{{ end }}

              componentSpecs:
              - componentDefRef: mysql
                name: mysql
                replicas: {{ .observed.composite.resource.spec.replicas | default 1 }}
                serviceAccountName: {{ printf "%s-sa" $name }}
                switchPolicy:
                  type: Noop
                resources:
                  limits:
                    cpu: {{ $cpuLim }}
                    memory: {{ $memLim }}
                  requests:
                    cpu: {{ $cpu }}
                    memory: {{ $mem }}
                volumeClaimTemplates:
                - name: data
                  spec:
                    accessModes:
                    - ReadWriteOnce
                    resources:
                      requests:
                        storage: {{ $stor }}
                    {{- if .observed.composite.resource.spec.storageClassName }}
                    storageClassName: {{ .observed.composite.resource.spec.storageClassName }}
                    {{- end }}

              terminationPolicy: {{ .observed.composite.resource.spec.terminationPolicy | default "Delete" | replace "Wipeout" "WipeOut" }}

            {{- if $exposeNodePort }}
            ---

            apiVersion: v1
            kind: Service
            metadata:
              namespace: {{ $ns }}
              name: {{ printf "%s-export" $name }}
              labels:
                app.kubernetes.io/instance: {{ $name }}
                apps.kubeblocks.io/component-name: apecloud-mysql
                kubeblocks.io/role: leader
                app.kubernetes.io/managed-by: crossplane
                crossplane.io/composite: {{ $name }}
                {{- if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{- end }}
                {{- if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{- end }}
              {{- if and (ne $projectName "") (ne $projectUid "") }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: Project
                name: {{ $projectName }}
                uid: {{ $projectUid }}
              {{- end }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: db-nodeport-export
            spec:
              type: NodePort
              ports:
              - name: tcp
                port: 3306
                targetPort: 3306
                protocol: TCP
              selector:
                app.kubernetes.io/instance: {{ $name }}
                kubeblocks.io/role: leader
            {{- end }}

            ---

            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-conn-credential-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: mysql-conn-credential-object
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: {{ printf "%s-conn-credential" $name }}
                    namespace: {{ $ns }}

            ---
            {{- $connPriv := "" }}
            {{- $connPub := "" }}
            {{- if and $mysqlConnCredentialObject $mysqlConnCredentialObject.status $mysqlConnCredentialObject.status.atProvider $mysqlConnCredentialObject.status.atProvider.manifest }}
            {{- $d := $mysqlConnCredentialObject.status.atProvider.manifest.data }}
            {{- if and $d (index $d "username") (index $d "password") (index $d "host") (index $d "port") }}
            {{- $u := index $d "username" | b64dec }}
            {{- $pw := index $d "password" | b64dec }}
            {{- $host := index $d "host" | b64dec }}
            {{- $port := index $d "port" | b64dec }}
            {{- $ue := $u | urlquery }}
            {{- $pwe := $pw | urlquery }}
            {{- $connPriv = printf "mysql://%s:%s@%s.%s.svc:%s" $ue $pwe $host $ns $port }}
            {{- $regionLabel := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $regionLabel = index .observed.composite.resource.metadata.labels "region" }}
            {{- end }}
            {{- $np := "" }}
            {{- if and $exportSvc $exportSvc.spec $exportSvc.spec.ports (gt (len $exportSvc.spec.ports) 0) }}
            {{- $p0 := index $exportSvc.spec.ports 0 }}
            {{- if and $p0 (index $p0 "nodePort") }}{{ $np = printf "%v" (index $p0 "nodePort") }}{{ end }}
            {{- end }}
            {{- if and $regionLabel (ne $np "") }}
            {{- $connPub = printf "mysql://%s:%s@dbconn.%s:%s" $ue $pwe $regionLabel $np }}
            {{- end }}
            {{- end }}
            {{- end }}

            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---

            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-db-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: db-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: DB
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{- end }}

            apiVersion: example.crossplane.io/v1
            kind: DB
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
            status:
              phase: {{ $kbCluster.status.phase | default "Unknown" }}
              observedReplicas: {{ $kbCluster.status.observedReplicas | default 0 }}
              availableReplicas: {{ $kbCluster.status.availableReplicas | default 0 }}
              kubeblocksServices:
                - name: {{ printf "%s-mysql" $name | quote }}
                  type: ClusterIP
                  purpose: leader-mysql
                - name: {{ printf "%s-mysql-headless" $name | quote }}
                  type: ClusterIP
                  purpose: headless-instances
                {{- if $exposeNodePort }}
                - name: {{ printf "%s-export" $name | quote }}
                  type: NodePort
                  purpose: leader-tcp-external
                {{- end }}
              {{- if ne $connPriv "" }}
              connectionStringPrivate: {{ $connPriv | quote }}
              {{- end }}
              {{- if ne $connPub "" }}
              connectionStringPublic: {{ $connPub | quote }}
              {{- end }}
              {{- if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{- end }}
              {{- if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{- end }}
              conditions:
                - type: Ready
                  status: {{ if eq $kbCluster.status.phase "Running" -}} "True" {{- else -}} "False" {{- end }}
                  reason: {{ $kbCluster.status.phase | default "Waiting" }}
                  message: 'KubeBlocks Cluster phase is {{ $kbCluster.status.phase | default "Unknown" }}'
                  lastTransitionTime: {{ $lastTransition }}
