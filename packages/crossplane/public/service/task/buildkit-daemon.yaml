# Privileged BuildKit daemon for S2I Tasks with spec.buildkitHost (see tasks-s2i-job.yaml).
# Apply once per cluster (or env): kubectl apply -f buildkit-daemon.yaml
#
# Tenant Task Jobs stay in user namespaces (baseline OK); they use buildctl against this Service only.
# Tasks default to this URL in build mode (no spec.buildkitHost required). Override spec.buildkitHost if needed.
#
# Keep ClusterIP-only; restrict with NetworkPolicy if needed.
#
# With remote BuildKit, Next/Railpack compile runs here — size memory for large frontends (OOM on daemon
# looks like client "stream closed: EOF"). Tune requests/limits to your nodes.
---
apiVersion: v1
kind: Namespace
metadata:
  name: build-system
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: v1
kind: Service
metadata:
  name: buildkit
  namespace: build-system
spec:
  selector:
    app: buildkit
  ports:
    - name: buildkit
      port: 1234
      targetPort: 1234
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkit
  namespace: build-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buildkit
  template:
    metadata:
      labels:
        app: buildkit
    spec:
      containers:
        - name: buildkitd
          image: moby/buildkit:latest
          args:
            - --addr
            - tcp://0.0.0.0:1234
          ports:
            - name: buildkit
              containerPort: 1234
          resources:
            requests:
              memory: 4Gi
              cpu: "2"
            limits:
              memory: 16Gi
              cpu: "8"
          securityContext:
            privileged: true
