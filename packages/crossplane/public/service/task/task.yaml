apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: tasks.example.crossplane.io
spec:
  scope: Namespaced
  group: example.crossplane.io
  names:
    kind: Task
    plural: tasks
  defaultCompositionRef:
    name: tasks-s2i-job
  versions:
  - name: v1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              crossplane:
                type: object
                description: Crossplane control fields
                properties:
                  compositionRef:
                    type: object
                    properties:
                      name:
                        type: string
                  compositionSelector:
                    type: object
                    properties:
                      matchLabels:
                        type: object
                        additionalProperties:
                          type: string
              name:
                type: string
                description: Logical task name, used as Job base name
              repoUrl:
                type: string
                description: Git repository URL (without credentials, e.g. https://github.com/USER/REPO)
              builderImage:
                type: string
                description: Builder image to run the task in
                default: puddlecat/railpack:latest
              outputVolumeSize:
                type: string
                description: >
                  emptyDir sizeLimit for the Job workspace (clone, OCI tarball at /workspace/stages/s2i-image.tar).
                  Set when the built image is large (e.g. 20Gi). Requires storage quota support on the node.
                default: ""
              s2iMemoryRequest:
                type: string
                description: >
                  Per-container memory request for S2I Job pods (builder, optional buildkit sidecar, pusher).
                  Raise if scheduling fails due to insufficient node memory.
                default: "1Gi"
              s2iMemoryLimit:
                type: string
                description: >
                  Per-container memory limit. The pusher runs buildctl OCI export and skopeo; exporting large images
                  can spike RAM — increase if the container exits with OOMKilled during "exporting to oci" / "sending tarball".
                default: "12Gi"
              s2iCpuRequest:
                type: string
                description: Per-container CPU request for S2I Job pods.
                default: "500m"
              s2iCpuLimit:
                type: string
                description: Per-container CPU limit for S2I Job pods (Kubernetes quantity, e.g. "8" or "4000m").
                default: "8"
              projectName:
                type: string
                description: >
                  Kubernetes metadata.name of the target Instance (project). When set together with
                  projectUid, after a successful S2I Job the composition also creates an AP from the
                  pushed GHCR image, labeled and owned by that Instance.
                default: ""
              projectUid:
                type: string
                description: Kubernetes metadata.uid of the target Instance (project); paired with projectName.
                default: ""
              s2iMode:
                type: string
                description: >
                  build: clone repo, run railpack prepare, then BuildKit build and push to GHCR (default).
                  plan: analyze repo only — railpack prepare writes railpack-plan.json / railpack-info.json under
                  /workspace/plan in the Job log context; Job exits without build, push, or deploy.
                enum:
                - build
                - plan
                default: build
              buildkitHost:
                type: string
                description: >
                  Optional override for the BuildKit TCP address in s2iMode build. When empty, defaults to
                  tcp://buildkit.build-system.svc.cluster.local:1234 (see packages/crossplane/service/task/buildkit-daemon.yaml).
                  When buildkitInPod is true, this field is ignored for routing (localhost sidecar is used).
                default: ""
              buildkitInPod:
                type: boolean
                description: >
                  When true, run a privileged buildkitd sidecar in the Job pod (legacy). When false or omitted, use remote BuildKit
                  (default cluster URL or buildkitHost). Tenant namespaces can stay PSA baseline when this is false.
                default: false
              rotateDb:
                type: object
                description: >
                  Password rotation for KubeBlocks DB claims (postgresql, mysql, mongodb, redis). Use
                  spec.crossplane.compositionRef.name: tasks-rotate-db-secret on the Task claim. Targets
                  example.crossplane.io/v1 DB resources in the same namespace as this Task. Exactly one of
                  dbName or dbLabelSelector should be set. newPasswordSecretRef points to an existing Secret
                  in the same namespace holding the new plaintext password (read-only for the Job).
                properties:
                  dbName:
                    type: string
                    description: Target a single DB claim by metadata.name (same as KubeBlocks Cluster name).
                  dbLabelSelector:
                    type: string
                    description: >
                      Label query to match multiple DB claims (e.g. rotatePassword=true). kubectl label
                      semantics; applied with kubectl get dbs -l in the Task namespace.
                  newPasswordSecretRef:
                    type: object
                    description: Secret in the same namespace containing the new password string (not base64).
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      key:
                        type: string
                        default: password
                  jobImage:
                    type: string
                    default: debian:bookworm-slim
                    description: >
                      Image for the rotation Job (must be Debian-based for apt install of kubectl, pip,
                      and redis-tools). Override if your cluster blocks docker.io or needs a mirror.
          status:
            type: object
            properties:
              phase:
                type: string
                description: Pending, Running, Complete, or Failed
              jobName:
                type: string
              startTime:
                type: string
                format: date-time
                description: Job start time (from underlying Job status)
              completionTime:
                type: string
                format: date-time
                description: Job completion time (from underlying Job status)
              succeeded:
                type: integer
                description: Number of successful completions (1 = complete)
              duration:
                type: string
                description: Human-readable duration (e.g. 5m36s), computed from startTime and completionTime
              conditions:
                type: array
                description: Job conditions (e.g. type Complete)
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastProbeTime:
                      type: string
                    lastTransitionTime:
                      type: string

