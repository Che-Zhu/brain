apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: tasks-s2i-job
  labels:
    task.example.crossplane.io/type: s2i
  annotations:
    meta.crossplane.io/display-name: task
    meta.crossplane.io/description: >
      S2I Task: spec.s2iMode build (default) runs railpack prepare + BuildKit push to GHCR; plan runs
      prepare only (railpack-plan.json / railpack-info.json) with no build or push. Optional projectName +
      projectUid composes an AP alongside the Task (image ghcr.io/<owner>/<repo>:latest). spec.type is
      `prelude` until the S2I Job succeeds, then omitted on the next reconcile so UIs can treat the AP as
      a normal deployment. Build mode uses BuildKit. Default: buildctl talks to tcp://buildkit.build-system.svc.cluster.local:1234
      (apply packages/crossplane/service/task/buildkit-daemon.yaml once); tenant Job pods need no privileged container.
      Override with spec.buildkitHost for another daemon. Opt in to legacy in-pod privileged buildkitd with spec.buildkitInPod: true
      (tenant namespace must allow privileged). See s2i-example.yaml.
      Each Task gets a dedicated ServiceAccount and Role
      (create ConfigMaps; patch/get/update/delete only on <job-name>-s2i-result, same prefix as the composed Job).
      The ConfigMap sets metadata.ownerReferences to the Task (example.crossplane.io/v1) so it is garbage-collected when the Task is deleted.
      The Job writes that ConfigMap
      with binaryData plan.json, info.json (railpack-info.json), metrics.json (inputs + per-stage durations: build_image = BuildKit OCI tarball export only;
      push_latest / push_version = GHCR upload and tag-copy via skopeo (exponential backoff, up to 8 attempts each); plus clone, plan_generate, etc.), data s2i.mode, optional
      built-images.txt and deployed-ap-name. Labels include task.example.crossplane.io/task-uid (Task composite UID). This composition creates the per-Task ServiceAccount, Role, and
      RoleBinding. Job name and image version tag are derived from metadata.generation plus stable spec fields
      so Job.spec.template does not change on every reconcile (Kubernetes forbids mutating it). Example Task:
      packages/crossplane/example/s2i-example.yaml.
    meta.crossplane.io/template: |
      apiVersion: example.crossplane.io/v1
      kind: Task
      metadata:
        name: {{ name }}
      spec:
        name: {{ name }}
        repoUrl: https://github.com/<your-github-username>/<your-repo>
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: Task
  mode: Pipeline
  pipeline:
    - step: render-task-job
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $comp := .observed.composite.resource }}
            {{- $spec := $comp.spec }}
            {{- $name := default $comp.metadata.name $spec.name }}
            {{- $ns := $comp.metadata.namespace }}
            {{- $s2iMode := lower (default "build" $spec.s2iMode) }}
            {{- /* Job.spec.template is immutable: never use (now) or other per-reconcile values in the pod spec.
                 Suffix + versionTag derive from spec.generation for *new* Jobs. Once a composed Job exists, pin
                 jobName / cmName / versionTag to the live Job so Crossplane does not rewrite pod env (e.g. after
                 Task.metadata.generation bumps while the Job name stays the original hash suffix). */}}
            {{- $gen := int (default 1 $comp.metadata.generation) }}
            {{- $repoName := trimSuffix ".git" (last (splitList "/" $spec.repoUrl)) | trim | lower }}
            {{- $biCanon := $spec.builderImage | default "puddlecat/railpack:latest" }}
            {{- $suffix := (sha256sum (printf "%d|%s|%s|%s|%s|%s" $gen $name $ns $repoName $s2iMode $biCanon)) | trunc 6 }}
            {{- $computedJobName := printf "%s-%s" $name $suffix }}
            {{- $ownerAndRepo := trimPrefix "https://github.com/" $spec.repoUrl }}
            {{- $owner := index (splitList "/" $ownerAndRepo) 0 | trim | lower }}
            {{- $hash := (sha256sum (printf "%s-%s-%s" $name $ns $repoName) | trunc 6) }}
            {{- $versionTag := printf "g%d.%s" $gen $hash }}
            {{- $job := getComposedResource . "task-job" }}
            {{- $jobName := $computedJobName }}
            {{- if and $job $job.metadata (ne (default "" $job.metadata.name) "") }}
            {{-   $jobName = $job.metadata.name }}
            {{-   if and $job.spec $job.spec.template $job.spec.template.spec $job.spec.template.spec.containers }}
            {{-     range $job.spec.template.spec.containers }}
            {{-       range .env }}
            {{-         if and .name (eq .name "S2I_INPUT_VERSION_TAG") .value }}
            {{-           $versionTag = .value }}
            {{-         end }}
            {{-       end }}
            {{-     end }}
            {{-   end }}
            {{- end }}
            {{- $cmName := printf "%s-s2i-result" $jobName }}
            {{- $projectName := trim (default "" $spec.projectName) }}
            {{- $projectUid := trim (default "" $spec.projectUid) }}
            {{- $planOnly := eq $s2iMode "plan" }}
            {{- $buildkitHostUser := trim (default "" $spec.buildkitHost) }}
            {{- $buildkitInPod := and (hasKey $spec "buildkitInPod") $spec.buildkitInPod }}
            {{- $defaultRemoteBk := "tcp://buildkit.build-system.svc.cluster.local:1234" }}
            {{- $effectiveBkHost := ternary "tcp://127.0.0.1:1234" (ternary $buildkitHostUser $defaultRemoteBk (ne $buildkitHostUser "")) $buildkitInPod }}
            {{- $remoteBuildkit := and (not $planOnly) (not $buildkitInPod) }}
            {{- $deployApTarget := and (not $planOnly) $projectName $projectUid }}
            {{- $deployAp := $deployApTarget }}
            {{- $s2iJobSucceeded := and $job (eq (int (default 0 $job.status.succeeded)) 1) }}
            {{- $saName := printf "%s-s2i-writer" $name }}
            {{- $memReq := $spec.s2iMemoryRequest | default "1Gi" }}
            {{- $memLim := $spec.s2iMemoryLimit | default "12Gi" }}
            {{- $cpuReq := $spec.s2iCpuRequest | default "500m" }}
            {{- $cpuLim := trim (toString ($spec.s2iCpuLimit | default "8")) }}
            {{- $outVol := trim (default "" $spec.outputVolumeSize) }}
            ---

            apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: {{ $saName }}
              namespace: {{ $ns }}
              labels:
                crossplane.io/composite: {{ $comp.metadata.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: task-s2i-sa
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: {{ $saName }}
              namespace: {{ $ns }}
              labels:
                crossplane.io/composite: {{ $comp.metadata.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: task-s2i-role
            rules:
            - apiGroups: [""]
              resources: ["configmaps"]
              verbs: ["create"]
            - apiGroups: [""]
              resources: ["configmaps"]
              resourceNames: ["{{ $cmName }}"]
              verbs: ["get", "patch", "update", "delete"]
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: {{ $saName }}
              namespace: {{ $ns }}
              labels:
                crossplane.io/composite: {{ $comp.metadata.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: task-s2i-rolebinding
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $saName }}
            subjects:
            - kind: ServiceAccount
              name: {{ $saName }}
              namespace: {{ $ns }}
            ---

            apiVersion: batch/v1
            kind: Job
            metadata:
              name: {{ $jobName }}
              namespace: {{ $ns }}
              labels:
                crossplane.io/composite: {{ $comp.metadata.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: task-job
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              template:
                spec:
                  serviceAccountName: {{ $saName }}
                  restartPolicy: Never
                  volumes:
                  - name: workspace
            {{- if ne $outVol "" }}
                    emptyDir:
                      sizeLimit: {{ $outVol | quote }}
            {{- else }}
                    emptyDir: {}
            {{- end }}
                  containers:
                  {{ if $planOnly }}
                  - name: builder
                    image: {{ $spec.builderImage | default "puddlecat/railpack:latest" }}
                    command: ["/bin/bash", "-c"]
                    volumeMounts:
                    - name: workspace
                      mountPath: /workspace
                    args:
                    - |
                      set -euo pipefail
                      mkdir -p /workspace/stages /workspace/src /workspace/plan
                      date +%s > /workspace/stages/wall_start

                      echo "S2I mode: plan (analyze only; no BuildKit / no push)"

                      git clone https://$GITHUB_TOKEN@{{ (trimPrefix "https://" $spec.repoUrl) }} /workspace/src || exit 1
                      cd /workspace/src
                      date +%s > /workspace/stages/clone_done

                      railpack prepare . \
                        --plan-out /workspace/plan/railpack-plan.json \
                        --info-out /workspace/plan/railpack-info.json \
                        --env GITHUB_TOKEN=dummy \
                        || { echo "Railpack prepare failed"; exit 1; }
                      date +%s > /workspace/stages/plan_gen_done

                      printf '%s' "GITHUB_TOKEN=$GITHUB_TOKEN" | sha256sum | awk '{print $1}' > /workspace/plan/secrets-hash.txt
                      printf '%s' '{{ $ns }}-{{ $name }}' > /workspace/plan/cache-key.txt
                      date +%s > /workspace/stages/prepare_done

                      echo "Build plan written to /workspace/plan/railpack-plan.json"
                      echo "Build info written to /workspace/plan/railpack-info.json"
                      echo "S2I_RESULT mode=plan railpack_plan_json=/workspace/plan/railpack-plan.json railpack_info_json=/workspace/plan/railpack-info.json"
                      echo "Builder finished (plan-only)"

                      fmt_secs() {
                        s="${1:-0}"
                        case "$s" in ''|*[!0-9]*) s=0 ;; esac
                        if [ "$s" -lt 60 ]; then echo "${s}s"; return; fi
                        m=$((s / 60))
                        r=$((s % 60))
                        echo "${m}m${r}s"
                      }
                      read_ts() { tr -d ' \n\r' <"$1" 2>/dev/null || echo 0; }
                      sec_diff() {
                        a=$(read_ts "$1")
                        b=$(read_ts "$2")
                        case "$a$b" in *[!0-9]*) echo 0; return ;; esac
                        if [ "$a" -eq 0 ] || [ "$b" -eq 0 ]; then echo 0; return; fi
                        d=$((b - a))
                        if [ "$d" -lt 0 ]; then d=0; fi
                        echo "$d"
                      }
                      WS=$(read_ts /workspace/stages/wall_start)
                      CD=$(read_ts /workspace/stages/clone_done)
                      PG=$(read_ts /workspace/stages/plan_gen_done)
                      PD=$(read_ts /workspace/stages/prepare_done)
                      clone_sec=$(sec_diff /workspace/stages/wall_start /workspace/stages/clone_done)
                      plan_gen_sec=$(sec_diff /workspace/stages/clone_done /workspace/stages/plan_gen_done)
                      cp=$(sec_diff /workspace/stages/wall_start /workspace/stages/prepare_done)
                      export WS CD PG PD CP="$cp" CLONE_SEC="$clone_sec" PLAN_GEN_SEC="$plan_gen_sec" HUMAN_CP="$(fmt_secs "$cp")" HUMAN_CLONE="$(fmt_secs "$clone_sec")" HUMAN_PLAN_GEN="$(fmt_secs "$plan_gen_sec")"
                      echo "STAGE_DURATIONS clone=$(fmt_secs "$clone_sec") plan_generate=$(fmt_secs "$plan_gen_sec") total=$(fmt_secs "$cp")"
                      if ! command -v python3 >/dev/null 2>&1; then
                        command -v apk >/dev/null 2>&1 && apk add --no-cache python3 >/dev/null 2>&1 || true
                      fi
                      if command -v python3 >/dev/null 2>&1; then
                        python3 -c 'import json,os;e=os.environ;g=e.get;ws=int(g("WS")or 0);cd=int(g("CD")or 0);pg=int(g("PG")or 0);pd=int(g("PD")or 0);cps=int(g("CP")or 0);cl=int(g("CLONE_SEC")or 0);pgn=int(g("PLAN_GEN_SEC")or 0);st={"timestampsUnix":{"wall_start":ws,"clone_done":cd,"plan_gen_done":pg,"prepare_done":pd},"durationsSeconds":{"clone":cl,"plan_generate":pgn,"clone_prepare":cps,"total":cps},"durationsHuman":{"clone":g("HUMAN_CLONE","0s"),"plan_generate":g("HUMAN_PLAN_GEN","0s"),"clone_prepare":g("HUMAN_CP","0s"),"total":g("HUMAN_CP","0s")}};inp={"repoUrl":g("S2I_INPUT_REPO_URL",""),"s2iMode":g("S2I_INPUT_S2I_MODE",""),"builderImage":g("S2I_INPUT_BUILDER_IMAGE",""),"taskName":g("S2I_INPUT_TASK_NAME",""),"namespace":g("S2I_INPUT_NAMESPACE",""),"jobName":g("S2I_INPUT_JOB_NAME",""),"projectName":g("S2I_INPUT_PROJECT_NAME",""),"projectUid":g("S2I_INPUT_PROJECT_UID",""),"githubOwner":g("S2I_INPUT_GITHUB_OWNER",""),"githubRepoBaseName":g("S2I_INPUT_REPO_BASENAME",""),"versionTag":g("S2I_INPUT_VERSION_TAG","")};open("/tmp/s2i_metrics.json","w").write(json.dumps({"inputs":inp,"stages":st},separators=(",",":")))'
                      else
                        echo "WARN: python3 not found; metrics.json omitted from ConfigMap"
                        rm -f /tmp/s2i_metrics.json
                      fi

                      s2i_publish_result_configmap() {
                        command -v curl >/dev/null 2>&1 || { echo "WARN: curl not found; install curl in builder image to publish s2i-result ConfigMap"; return 1; }
                        CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                        NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                        HOST=${KUBERNETES_SERVICE_HOST:?}
                        PORT=${KUBERNETES_SERVICE_PORT:-443}
                        BASE="https://${HOST}:${PORT}"
                        CM="${S2I_RESULT_CM_NAME:?}"
                        HDR_AUTH="Authorization: Bearer ${TOKEN}"
                        CT_JSON="Content-Type: application/json"
                        CT_PATCH="Content-Type: application/strategic-merge-patch+json"
                        do_post() {
                          curl -sS --cacert "$CA" -H "$HDR_AUTH" -H "$CT_JSON" -o /tmp/s2i_cm_resp -w '%{http_code}' -X POST --data-binary "$1" "$BASE/api/v1/namespaces/${NS}/configmaps"
                        }
                        do_patch() {
                          curl -sS --cacert "$CA" -H "$HDR_AUTH" -H "$CT_PATCH" -o /tmp/s2i_cm_resp -w '%{http_code}' -X PATCH --data-binary @"$1" "$BASE/api/v1/namespaces/${NS}/configmaps/${CM}"
                        }
                        if [ -n "${S2I_TASK_UID:-}" ]; then
                          META=$(printf '{"apiVersion":"v1","kind":"ConfigMap","metadata":{"name":"%s","namespace":"%s","labels":{"task.example.crossplane.io/task":"%s","task.example.crossplane.io/kind":"s2i-result","task.example.crossplane.io/task-uid":"%s"},"ownerReferences":[{"apiVersion":"example.crossplane.io/v1","kind":"Task","name":"%s","uid":"%s","blockOwnerDeletion":false}]}}' "$CM" "$NS" "$S2I_TASK_NAME" "$S2I_TASK_UID" "$S2I_TASK_NAME" "$S2I_TASK_UID")
                        else
                          META=$(printf '{"apiVersion":"v1","kind":"ConfigMap","metadata":{"name":"%s","namespace":"%s","labels":{"task.example.crossplane.io/task":"%s","task.example.crossplane.io/kind":"s2i-result"}}}' "$CM" "$NS" "$S2I_TASK_NAME")
                        fi
                        CODE=$(do_post "$META")
                        if [ "$CODE" != "201" ] && [ "$CODE" != "200" ]; then
                          if [ "$CODE" != "409" ] && [ "$CODE" != "422" ]; then
                            echo "S2I ConfigMap create failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1
                          fi
                        fi
                        if [ -n "${S2I_TASK_UID:-}" ] && { [ "$CODE" = "409" ] || [ "$CODE" = "422" ]; }; then
                          printf '{"metadata":{"labels":{"task.example.crossplane.io/task-uid":"%s"},"ownerReferences":[{"apiVersion":"example.crossplane.io/v1","kind":"Task","name":"%s","uid":"%s","blockOwnerDeletion":false}]}}' "$S2I_TASK_UID" "$S2I_TASK_NAME" "$S2I_TASK_UID" > /tmp/s2i_patch_owner.json
                          CODE=$(do_patch /tmp/s2i_patch_owner.json)
                          if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch owner/labels failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                        fi
                        { printf '%s' '{"binaryData":{"plan.json":"'; base64 < /workspace/plan/railpack-plan.json | tr -d '\n'; printf '","info.json":"'; base64 < /workspace/plan/railpack-info.json | tr -d '\n'; printf '"}}'; } > /tmp/s2i_patch_plan.json
                        CODE=$(do_patch /tmp/s2i_patch_plan.json)
                        if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch plan/info failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                        printf '{"data":{"s2i.mode":"%s"}}' "$S2I_MODE" > /tmp/s2i_patch_mode.json
                        CODE=$(do_patch /tmp/s2i_patch_mode.json)
                        if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch mode failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                        if [ "$S2I_MODE" = "build" ]; then
                          IMGS="${S2I_BUILT_IMAGES:?}"
                          { printf '%s' '{"binaryData":{"built-images.txt":"'; printf '%s' "$IMGS" | base64 | tr -d '\n'; printf '"}}'; } > /tmp/s2i_patch_img.json
                          CODE=$(do_patch /tmp/s2i_patch_img.json)
                          if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch images failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                          if [ -n "${S2I_DEPLOY_AP_NAME:-}" ]; then
                            printf '{"data":{"deployed-ap-name":"%s"}}' "$S2I_DEPLOY_AP_NAME" > /tmp/s2i_patch_ap.json
                            CODE=$(do_patch /tmp/s2i_patch_ap.json)
                            if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch ap name failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                          fi
                        fi
                        if [ -f /tmp/s2i_metrics.json ]; then
                          { printf '%s' '{"binaryData":{"metrics.json":"'; base64 < /tmp/s2i_metrics.json | tr -d '\n'; printf '"}}'; } > /tmp/s2i_patch_metrics.json
                          CODE=$(do_patch /tmp/s2i_patch_metrics.json)
                          if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch metrics failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                        fi
                        echo "S2I_RESULT configmap=${CM} namespace=${NS}"
                      }
                      s2i_publish_result_configmap || echo "WARN: s2i-result ConfigMap not published"
                    env:
                    - name: GITHUB_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: ghcr-cred
                          key: githubToken
                    - name: S2I_RESULT_CM_NAME
                      value: "{{ $cmName }}"
                    - name: S2I_TASK_NAME
                      value: "{{ $name }}"
                    - name: S2I_TASK_UID
                      value: "{{ $comp.metadata.uid }}"
                    - name: S2I_MODE
                      value: "plan"
                    - name: S2I_INPUT_REPO_URL
                      value: "{{ $spec.repoUrl }}"
                    - name: S2I_INPUT_S2I_MODE
                      value: "{{ $s2iMode }}"
                    - name: S2I_INPUT_BUILDER_IMAGE
                      value: "{{ if $spec.builderImage }}{{ $spec.builderImage }}{{ else }}puddlecat/railpack:latest{{ end }}"
                    - name: S2I_INPUT_TASK_NAME
                      value: "{{ $name }}"
                    - name: S2I_INPUT_NAMESPACE
                      value: "{{ $ns }}"
                    - name: S2I_INPUT_JOB_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['job-name']
                    - name: S2I_INPUT_PROJECT_NAME
                      value: "{{ $projectName }}"
                    - name: S2I_INPUT_PROJECT_UID
                      value: "{{ $projectUid }}"
                    - name: S2I_INPUT_GITHUB_OWNER
                      value: "{{ $owner }}"
                    - name: S2I_INPUT_REPO_BASENAME
                      value: "{{ $repoName }}"
                    - name: S2I_INPUT_VERSION_TAG
                      value: "{{ $versionTag }}"
                    resources:
                      requests:
                        memory: {{ $memReq | quote }}
                        cpu: {{ $cpuReq | quote }}
                      limits:
                        memory: {{ $memLim | quote }}
            {{- if ne $cpuLim "" }}
                        cpu: {{ $cpuLim | quote }}
            {{- end }}
                  {{ else }}
                  - name: builder
                    image: {{ $spec.builderImage | default "puddlecat/railpack:latest" }}
                    command: ["/bin/bash", "-c"]
                    volumeMounts:
                    - name: workspace
                      mountPath: /workspace
                    args:
                    - |
                      mkdir -p /workspace/stages /workspace/src /workspace/plan
                      date +%s > /workspace/stages/wall_start

                      echo "Waiting for BuildKit at ${BUILDKIT_HOST}..."
                      BK_RAW="${BUILDKIT_HOST#tcp://}"
                      BK_HOST="${BK_RAW%%:*}"
                      BK_PORT="${BK_RAW##*:}"
                      until (echo > /dev/tcp/$BK_HOST/$BK_PORT) 2>/dev/null; do
                        sleep 2
                      done
                      echo "BuildKit ready"
                      date +%s > /workspace/stages/buildkit_ready

                      # Clone your repo into the shared workspace
                      git clone https://$GITHUB_TOKEN@{{ (trimPrefix "https://" $spec.repoUrl) }} /workspace/src || exit 1
                      cd /workspace/src
                      date +%s > /workspace/stages/clone_done

                      # Generate the build plan/info consumed by the Railpack BuildKit frontend.
                      railpack prepare . \
                        --plan-out /workspace/plan/railpack-plan.json \
                        --info-out /workspace/plan/railpack-info.json \
                        --env GITHUB_TOKEN=dummy \
                        || { echo "Railpack prepare failed"; exit 1; }
                      date +%s > /workspace/stages/plan_gen_done

                      printf '%s' "GITHUB_TOKEN=$GITHUB_TOKEN" | sha256sum | awk '{print $1}' > /workspace/plan/secrets-hash.txt
                      printf '%s' '{{ $ns }}-{{ $name }}' > /workspace/plan/cache-key.txt
                      date +%s > /workspace/stages/prepare_done

                      echo "Build plan written to /workspace/plan/railpack-plan.json"
                      echo "Builder finished preparation"
                    env:
                    - name: BUILDKIT_HOST
                      value: {{ $effectiveBkHost | quote }}
                    - name: GITHUB_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: ghcr-cred
                          key: githubToken
                    resources:
                      requests:
                        memory: {{ $memReq | quote }}
                        cpu: {{ $cpuReq | quote }}
                      limits:
                        memory: {{ $memLim | quote }}
            {{- if ne $cpuLim "" }}
                        cpu: {{ $cpuLim | quote }}
            {{- end }}
                  {{ if not $remoteBuildkit }}
                  - name: buildkit
                    image: moby/buildkit:latest
                    volumeMounts:
                    - name: workspace
                      mountPath: /workspace
                    command: ["/bin/sh", "-c"]
                    args:
                    - |
                      buildkitd --addr tcp://0.0.0.0:1234 &
                      BK_PID=$!
                      while [ ! -f /workspace/pusher-done ]; do sleep 2; done
                      kill $BK_PID 2>/dev/null || true
                      exit 0
                    securityContext:
                      privileged: true
                    resources:
                      requests:
                        memory: {{ $memReq | quote }}
                        cpu: {{ $cpuReq | quote }}
                      limits:
                        memory: {{ $memLim | quote }}
            {{- if ne $cpuLim "" }}
                        cpu: {{ $cpuLim | quote }}
            {{- end }}
                  {{ end }}
                  - name: pusher
                    image: moby/buildkit:latest
                    volumeMounts:
                    - name: workspace
                      mountPath: /workspace
                    env:
                    - name: BUILDKIT_HOST
                      value: {{ $effectiveBkHost | quote }}
                    - name: GITHUB_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: ghcr-cred
                          key: githubToken
                    - name: S2I_RESULT_CM_NAME
                      value: "{{ $cmName }}"
                    - name: S2I_TASK_NAME
                      value: "{{ $name }}"
                    - name: S2I_TASK_UID
                      value: "{{ $comp.metadata.uid }}"
                    - name: S2I_MODE
                      value: "build"
                    - name: S2I_BUILT_IMAGES
                      value: "ghcr.io/{{ $owner }}/{{ $repoName }}:latest ghcr.io/{{ $owner }}/{{ $repoName }}:{{ $versionTag }}"
                    - name: S2I_DEPLOY_AP_NAME
                      value: "{{ if $deployApTarget }}{{ $name }}{{ end }}"
                    - name: S2I_INPUT_REPO_URL
                      value: "{{ $spec.repoUrl }}"
                    - name: S2I_INPUT_S2I_MODE
                      value: "{{ $s2iMode }}"
                    - name: S2I_INPUT_BUILDER_IMAGE
                      value: "{{ if $spec.builderImage }}{{ $spec.builderImage }}{{ else }}puddlecat/railpack:latest{{ end }}"
                    - name: S2I_INPUT_TASK_NAME
                      value: "{{ $name }}"
                    - name: S2I_INPUT_NAMESPACE
                      value: "{{ $ns }}"
                    - name: S2I_INPUT_JOB_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['job-name']
                    - name: S2I_INPUT_PROJECT_NAME
                      value: "{{ $projectName }}"
                    - name: S2I_INPUT_PROJECT_UID
                      value: "{{ $projectUid }}"
                    - name: S2I_INPUT_GITHUB_OWNER
                      value: "{{ $owner }}"
                    - name: S2I_INPUT_REPO_BASENAME
                      value: "{{ $repoName }}"
                    - name: S2I_INPUT_VERSION_TAG
                      value: "{{ $versionTag }}"
                    resources:
                      requests:
                        memory: {{ $memReq | quote }}
                        cpu: {{ $cpuReq | quote }}
                      limits:
                        memory: {{ $memLim | quote }}
            {{- if ne $cpuLim "" }}
                        cpu: {{ $cpuLim | quote }}
            {{- end }}
                    command: ["/bin/sh", "-c"]
                    args:
                    - |
                      set -euo pipefail

                      echo "Preparing GHCR auth..."
                      AUTH=$(printf '%s:%s' '{{ $owner }}' "$GITHUB_TOKEN" | base64 | tr -d '\n')
                      mkdir -p /root/.docker
                      cat > /root/.docker/config.json <<EOF
                      {
                        "auths": {
                          "ghcr.io": {
                            "auth": "$AUTH"
                          }
                        }
                      }
                      EOF

                      echo "Installing skopeo (push OCI export to GHCR separately from BuildKit build)..."
                      apk add --no-cache skopeo >/dev/null

                      echo "Waiting for builder to write railpack plan..."
                      until [ -f /workspace/plan/railpack-plan.json ] && [ -f /workspace/plan/secrets-hash.txt ] && [ -f /workspace/plan/cache-key.txt ]; do sleep 5; done
                      date +%s > /workspace/stages/plan_ready

                      SECRETS_HASH=$(cat /workspace/plan/secrets-hash.txt)
                      CACHE_KEY=$(cat /workspace/plan/cache-key.txt)

                      echo "Building image with BuildKit (OCI tarball; no registry I/O)..."
                      rm -f /workspace/stages/s2i-image.tar
                      buildctl --addr "$BUILDKIT_HOST" build \
                        --local context=/workspace/src \
                        --local dockerfile=/workspace/plan \
                        --frontend=gateway.v0 \
                        --opt source=ghcr.io/railwayapp/railpack-frontend \
                        --opt secrets-hash="$SECRETS_HASH" \
                        --opt cache-key="$CACHE_KEY" \
                        --opt github-token="$GITHUB_TOKEN" \
                        --secret id=GITHUB_TOKEN,env=GITHUB_TOKEN \
                        --output type=oci,dest=/workspace/stages/s2i-image.tar
                      date +%s > /workspace/stages/build_image_done

                      s2i_retry() {
                        _r_max=8
                        _r_n=1
                        _r_sleep=5
                        while [ "$_r_n" -le "$_r_max" ]; do
                          if "$@"; then
                            return 0
                          fi
                          if [ "$_r_n" -ge "$_r_max" ]; then
                            echo "s2i_retry: failed after $_r_max attempts: $*" >&2
                            return 1
                          fi
                          echo "s2i_retry: attempt $_r_n/$_r_max failed, sleeping ${_r_sleep}s..." >&2
                          sleep "$_r_sleep"
                          _r_n=$((_r_n + 1))
                          _r_sleep=$((_r_sleep * 2))
                          [ "$_r_sleep" -gt 90 ] && _r_sleep=90
                        done
                        return 1
                      }

                      echo "Pushing :latest to GHCR..."
                      s2i_retry skopeo copy --authfile /root/.docker/config.json \
                        oci-archive:/workspace/stages/s2i-image.tar \
                        docker://ghcr.io/{{ $owner }}/{{ $repoName }}:latest
                      date +%s > /workspace/stages/push_latest_done

                      echo "Publishing version tag (copy manifest from :latest)..."
                      s2i_retry skopeo copy --authfile /root/.docker/config.json \
                        docker://ghcr.io/{{ $owner }}/{{ $repoName }}:latest \
                        docker://ghcr.io/{{ $owner }}/{{ $repoName }}:{{ $versionTag }}
                      date +%s > /workspace/stages/push_version_done

                      echo "Images pushed successfully to:"
                      echo "  ghcr.io/{{ $owner }}/{{ $repoName }}:latest"
                      echo "  ghcr.io/{{ $owner }}/{{ $repoName }}:{{ $versionTag }}"

                      # Per-stage wall-clock durations (shared /workspace/stages); printed above IMAGES for log/UI parsers.
                      fmt_secs() {
                        s="${1:-0}"
                        case "$s" in ''|*[!0-9]*) s=0 ;; esac
                        if [ "$s" -lt 60 ]; then echo "${s}s"; return; fi
                        m=$((s / 60))
                        r=$((s % 60))
                        echo "${m}m${r}s"
                      }
                      read_ts() { tr -d ' \n\r' <"$1" 2>/dev/null || echo 0; }
                      sec_diff() {
                        a=$(read_ts "$1")
                        b=$(read_ts "$2")
                        case "$a$b" in *[!0-9]*) echo 0; return ;; esac
                        if [ "$a" -eq 0 ] || [ "$b" -eq 0 ]; then echo 0; return; fi
                        d=$((b - a))
                        if [ "$d" -lt 0 ]; then d=0; fi
                        echo "$d"
                      }
                      bw=$(sec_diff /workspace/stages/wall_start /workspace/stages/buildkit_ready)
                      cl=$(sec_diff /workspace/stages/buildkit_ready /workspace/stages/clone_done)
                      pgn=$(sec_diff /workspace/stages/clone_done /workspace/stages/plan_gen_done)
                      cp=$(sec_diff /workspace/stages/buildkit_ready /workspace/stages/prepare_done)
                      wp=$(sec_diff /workspace/stages/prepare_done /workspace/stages/plan_ready)
                      bimg=$(sec_diff /workspace/stages/plan_ready /workspace/stages/build_image_done)
                      pl=$(sec_diff /workspace/stages/build_image_done /workspace/stages/push_latest_done)
                      pv=$(sec_diff /workspace/stages/push_latest_done /workspace/stages/push_version_done)
                      tot=$(sec_diff /workspace/stages/wall_start /workspace/stages/push_version_done)
                      echo "STAGE_DURATIONS buildkit_wait=$(fmt_secs "$bw") clone=$(fmt_secs "$cl") plan_generate=$(fmt_secs "$pgn") clone_prepare=$(fmt_secs "$cp") wait_plan=$(fmt_secs "$wp") build_image=$(fmt_secs "$bimg") push_latest=$(fmt_secs "$pl") push_version=$(fmt_secs "$pv") total=$(fmt_secs "$tot")"

                      export TS_WALL=$(read_ts /workspace/stages/wall_start)
                      export TS_BUILDKIT=$(read_ts /workspace/stages/buildkit_ready)
                      export TS_CLONE_DONE=$(read_ts /workspace/stages/clone_done)
                      export TS_PLAN_GEN=$(read_ts /workspace/stages/plan_gen_done)
                      export TS_PREPARE=$(read_ts /workspace/stages/prepare_done)
                      export TS_PLAN=$(read_ts /workspace/stages/plan_ready)
                      export TS_BUILD_IMG=$(read_ts /workspace/stages/build_image_done)
                      export TS_PUSH_LATEST=$(read_ts /workspace/stages/push_latest_done)
                      export TS_PUSH_VERSION=$(read_ts /workspace/stages/push_version_done)
                      export DUR_BW="$bw" DUR_CLONE="$cl" DUR_PLAN_GEN="$pgn" DUR_CP="$cp" DUR_WP="$wp" DUR_BUILD_IMG="$bimg" DUR_PL="$pl" DUR_PV="$pv" DUR_TOT="$tot"
                      export HUM_BW="$(fmt_secs "$bw")" HUM_CLONE="$(fmt_secs "$cl")" HUM_PLAN_GEN="$(fmt_secs "$pgn")" HUM_CP="$(fmt_secs "$cp")" HUM_WP="$(fmt_secs "$wp")" HUM_BUILD_IMG="$(fmt_secs "$bimg")" HUM_PL="$(fmt_secs "$pl")" HUM_PV="$(fmt_secs "$pv")" HUM_TOT="$(fmt_secs "$tot")"
                      if ! command -v python3 >/dev/null 2>&1; then
                        command -v apk >/dev/null 2>&1 && apk add --no-cache python3 >/dev/null 2>&1 || true
                      fi
                      if command -v python3 >/dev/null 2>&1; then
                        python3 -c 'import json,os;e=os.environ;g=e.get;T=lambda k:int(g(k)or 0);st={"timestampsUnix":{"wall_start":T("TS_WALL"),"buildkit_ready":T("TS_BUILDKIT"),"clone_done":T("TS_CLONE_DONE"),"plan_gen_done":T("TS_PLAN_GEN"),"prepare_done":T("TS_PREPARE"),"plan_ready":T("TS_PLAN"),"build_image_done":T("TS_BUILD_IMG"),"push_latest_done":T("TS_PUSH_LATEST"),"push_version_done":T("TS_PUSH_VERSION")},"durationsSeconds":{"buildkit_wait":T("DUR_BW"),"clone":T("DUR_CLONE"),"plan_generate":T("DUR_PLAN_GEN"),"clone_prepare":T("DUR_CP"),"wait_plan":T("DUR_WP"),"build_image":T("DUR_BUILD_IMG"),"push_latest":T("DUR_PL"),"push_version":T("DUR_PV"),"total":T("DUR_TOT")},"durationsHuman":{"buildkit_wait":g("HUM_BW",""),"clone":g("HUM_CLONE",""),"plan_generate":g("HUM_PLAN_GEN",""),"clone_prepare":g("HUM_CP",""),"wait_plan":g("HUM_WP",""),"build_image":g("HUM_BUILD_IMG",""),"push_latest":g("HUM_PL",""),"push_version":g("HUM_PV",""),"total":g("HUM_TOT","")}};inp={"repoUrl":g("S2I_INPUT_REPO_URL",""),"s2iMode":g("S2I_INPUT_S2I_MODE",""),"builderImage":g("S2I_INPUT_BUILDER_IMAGE",""),"taskName":g("S2I_INPUT_TASK_NAME",""),"namespace":g("S2I_INPUT_NAMESPACE",""),"jobName":g("S2I_INPUT_JOB_NAME",""),"projectName":g("S2I_INPUT_PROJECT_NAME",""),"projectUid":g("S2I_INPUT_PROJECT_UID",""),"githubOwner":g("S2I_INPUT_GITHUB_OWNER",""),"githubRepoBaseName":g("S2I_INPUT_REPO_BASENAME",""),"versionTag":g("S2I_INPUT_VERSION_TAG","")};open("/tmp/s2i_metrics.json","w").write(json.dumps({"inputs":inp,"stages":st},separators=(",",":")))'
                      else
                        echo "WARN: python3 not found; metrics.json omitted from ConfigMap"
                        rm -f /tmp/s2i_metrics.json
                      fi

                      # Final line: image references for external extraction
                      echo "IMAGES ghcr.io/{{ $owner }}/{{ $repoName }}:latest ghcr.io/{{ $owner }}/{{ $repoName }}:{{ $versionTag }}"

                      if ! command -v curl >/dev/null 2>&1; then
                        command -v apk >/dev/null 2>&1 && apk add --no-cache curl >/dev/null 2>&1 || true
                      fi
                      s2i_publish_result_configmap() {
                        command -v curl >/dev/null 2>&1 || { echo "WARN: curl not found; cannot publish s2i-result ConfigMap"; return 1; }
                        CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                        NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                        HOST=${KUBERNETES_SERVICE_HOST:?}
                        PORT=${KUBERNETES_SERVICE_PORT:-443}
                        BASE="https://${HOST}:${PORT}"
                        CM="${S2I_RESULT_CM_NAME:?}"
                        HDR_AUTH="Authorization: Bearer ${TOKEN}"
                        CT_JSON="Content-Type: application/json"
                        CT_PATCH="Content-Type: application/strategic-merge-patch+json"
                        do_post() {
                          curl -sS --cacert "$CA" -H "$HDR_AUTH" -H "$CT_JSON" -o /tmp/s2i_cm_resp -w '%{http_code}' -X POST --data-binary "$1" "$BASE/api/v1/namespaces/${NS}/configmaps"
                        }
                        do_patch() {
                          curl -sS --cacert "$CA" -H "$HDR_AUTH" -H "$CT_PATCH" -o /tmp/s2i_cm_resp -w '%{http_code}' -X PATCH --data-binary @"$1" "$BASE/api/v1/namespaces/${NS}/configmaps/${CM}"
                        }
                        if [ -n "${S2I_TASK_UID:-}" ]; then
                          META=$(printf '{"apiVersion":"v1","kind":"ConfigMap","metadata":{"name":"%s","namespace":"%s","labels":{"task.example.crossplane.io/task":"%s","task.example.crossplane.io/kind":"s2i-result","task.example.crossplane.io/task-uid":"%s"},"ownerReferences":[{"apiVersion":"example.crossplane.io/v1","kind":"Task","name":"%s","uid":"%s","blockOwnerDeletion":false}]}}' "$CM" "$NS" "$S2I_TASK_NAME" "$S2I_TASK_UID" "$S2I_TASK_NAME" "$S2I_TASK_UID")
                        else
                          META=$(printf '{"apiVersion":"v1","kind":"ConfigMap","metadata":{"name":"%s","namespace":"%s","labels":{"task.example.crossplane.io/task":"%s","task.example.crossplane.io/kind":"s2i-result"}}}' "$CM" "$NS" "$S2I_TASK_NAME")
                        fi
                        CODE=$(do_post "$META")
                        if [ "$CODE" != "201" ] && [ "$CODE" != "200" ]; then
                          if [ "$CODE" != "409" ] && [ "$CODE" != "422" ]; then
                            echo "S2I ConfigMap create failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1
                          fi
                        fi
                        if [ -n "${S2I_TASK_UID:-}" ] && { [ "$CODE" = "409" ] || [ "$CODE" = "422" ]; }; then
                          printf '{"metadata":{"labels":{"task.example.crossplane.io/task-uid":"%s"},"ownerReferences":[{"apiVersion":"example.crossplane.io/v1","kind":"Task","name":"%s","uid":"%s","blockOwnerDeletion":false}]}}' "$S2I_TASK_UID" "$S2I_TASK_NAME" "$S2I_TASK_UID" > /tmp/s2i_patch_owner.json
                          CODE=$(do_patch /tmp/s2i_patch_owner.json)
                          if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch owner/labels failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                        fi
                        { printf '%s' '{"binaryData":{"plan.json":"'; base64 < /workspace/plan/railpack-plan.json | tr -d '\n'; printf '","info.json":"'; base64 < /workspace/plan/railpack-info.json | tr -d '\n'; printf '"}}'; } > /tmp/s2i_patch_plan.json
                        CODE=$(do_patch /tmp/s2i_patch_plan.json)
                        if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch plan/info failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                        printf '{"data":{"s2i.mode":"%s"}}' "$S2I_MODE" > /tmp/s2i_patch_mode.json
                        CODE=$(do_patch /tmp/s2i_patch_mode.json)
                        if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch mode failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                        if [ "$S2I_MODE" = "build" ]; then
                          IMGS="${S2I_BUILT_IMAGES:?}"
                          { printf '%s' '{"binaryData":{"built-images.txt":"'; printf '%s' "$IMGS" | base64 | tr -d '\n'; printf '"}}'; } > /tmp/s2i_patch_img.json
                          CODE=$(do_patch /tmp/s2i_patch_img.json)
                          if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch images failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                          if [ -n "${S2I_DEPLOY_AP_NAME:-}" ]; then
                            printf '{"data":{"deployed-ap-name":"%s"}}' "$S2I_DEPLOY_AP_NAME" > /tmp/s2i_patch_ap.json
                            CODE=$(do_patch /tmp/s2i_patch_ap.json)
                            if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch ap name failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                          fi
                        fi
                        if [ -f /tmp/s2i_metrics.json ]; then
                          { printf '%s' '{"binaryData":{"metrics.json":"'; base64 < /tmp/s2i_metrics.json | tr -d '\n'; printf '"}}'; } > /tmp/s2i_patch_metrics.json
                          CODE=$(do_patch /tmp/s2i_patch_metrics.json)
                          if [ "$CODE" != "200" ]; then echo "S2I ConfigMap patch metrics failed HTTP $CODE"; cat /tmp/s2i_cm_resp; return 1; fi
                        fi
                        echo "S2I_RESULT configmap=${CM} namespace=${NS}"
                      }
                      s2i_publish_result_configmap || echo "WARN: s2i-result ConfigMap not published"

                      touch /workspace/pusher-done
                  {{ end }}

            ---

            apiVersion: example.crossplane.io/v1
            kind: Task
            metadata:
              name: {{ $comp.metadata.name }}
              namespace: {{ $ns }}
            status:
              {{- if $job }}
              phase: {{ if eq (toString $job.status.succeeded) "1" }}Complete{{ else }}{{ if $job.status.completionTime }}Failed{{ else }}{{ if $job.status.startTime }}Running{{ else }}Pending{{ end }}{{ end }}{{ end }}
              jobName: {{ $job.metadata.name }}
              {{- if $job.status.startTime }}
              startTime: {{ $job.status.startTime }}
              {{- end }}
              {{- if $job.status.completionTime }}
              completionTime: {{ $job.status.completionTime }}
              {{- end }}
              succeeded: {{ int (default 0 $job.status.succeeded) }}
              {{- if and $job.status.startTime $job.status.completionTime }}
              {{- $t0 := toDate "2006-01-02T15:04:05Z07:00" $job.status.startTime }}
              {{- $t1 := toDate "2006-01-02T15:04:05Z07:00" $job.status.completionTime }}
              duration: {{ printf "%v" ($t1.Sub $t0) | quote }}
              {{- end }}
              {{- if $job.status.conditions }}
              conditions:
              {{ $job.status.conditions | toYaml | nindent 2 }}
              {{- end }}
              {{- else }}
              phase: Pending
              jobName: {{ $jobName }}
              {{- end }}
            {{- /* AP with assumed GHCR tag; `prelude` until Job succeeds, then field omitted so spec matches a normal AP. */}}
            {{ if $deployAp }}
            ---
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $projectName }}
              ownerReferences:
                # Crossplane sets the Task composite as the sole controller of composed resources;
                # Instance must be non-controller or apply fails ("already controlled").
                - apiVersion: app.sealos.io/v1
                  kind: Instance
                  name: {{ $projectName }}
                  uid: {{ $projectUid }}
                  blockOwnerDeletion: true
                  controller: false
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: task-built-ap
            spec:
              crossplane:
                compositionRef:
                  name: aps-deployment-ingress-go-templating
              {{- if not $s2iJobSucceeded }}
              type: prelude
              {{- end }}
              image: ghcr.io/{{ $owner }}/{{ $repoName }}:latest
              replicas: 1
            {{ end }}

