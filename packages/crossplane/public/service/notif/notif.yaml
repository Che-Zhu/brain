# Notif composite - inbox fields under spec.notification; optional Grafana alerting resources under spec.grafana.
# Default composition: notifs-project-go-templating (notification/project only).
# Select notifs-grafana-alert-system-go-templating for Grafana Folder/ContactPoint/Policy/RuleGroup.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: notifs.example.crossplane.io
spec:
  scope: Namespaced
  group: example.crossplane.io
  names:
    kind: Notif
    plural: notifs
  defaultCompositionRef:
    name: notifs-project-go-templating
  versions:
    - name: v1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                crossplane:
                  type: object
                  description: Optional Composition selection
                  properties:
                    compositionRef:
                      type: object
                      properties:
                        name:
                          type: string
                    compositionSelector:
                      type: object
                      properties:
                        matchLabels:
                          type: object
                          additionalProperties:
                            type: string
                # --- In-app / inbox notification record (Sealos notifications) ---
                notification:
                  type: object
                  description: User-visible notification payload and optional Project linkage
                  properties:
                    projectName:
                      type: string
                      description: >
                        When set, composition observes Project with this name in the claim namespace and
                        may patch labels / owner refs on this Notif composite.
                    title:
                      type: string
                      description: Short headline for inbox/toast UI
                    content:
                      type: string
                    severity:
                      type: string
                      enum:
                        - info
                        - success
                        - warning
                        - error
                      default: info
                    category:
                      type: string
                    link:
                      type: string
                    read:
                      type: boolean
                      default: false
                    archived:
                      type: boolean
                      default: false
                    dedupeKey:
                      type: string
                    expiresAt:
                      type: string
                      format: date-time
                    sourceRef:
                      type: object
                      properties:
                        apiVersion:
                          type: string
                        kind:
                          type: string
                        name:
                          type: string
                        namespace:
                          type: string
                        uid:
                          type: string
                    data:
                      type: object
                      description: Arbitrary structured payload for clients
                      x-kubernetes-preserve-unknown-fields: true
                # --- Grafana Operator resources (select compositionRef: notifs-grafana-alert-system-go-templating) ---
                grafana:
                  type: object
                  description: >
                    Input for a reusable Grafana alert system composition. The Grafana composition creates GrafanaFolder, GrafanaContactPoint,
                    GrafanaNotificationPolicy, and GrafanaAlertRuleGroup via provider-kubernetes Objects.
                  properties:
                    name:
                      type: string
                      description: Basename used to derive all four Grafana resource names when metadataName fields are omitted.
                    namespace:
                      type: string
                      description: Namespace where Grafana Operator reconciles Grafana* CRs.
                    matchLabels:
                      type: object
                      description: Grafana instance labels (rendered as spec.instanceSelector.matchLabels).
                      additionalProperties:
                        type: string
                    folder:
                      type: object
                      properties:
                        metadataName:
                          type: string
                          description: GrafanaFolder metadata.name (default {grafana.name}-folder).
                        alert:
                          type: object
                          properties:
                            title:
                              type: string
                              description: GrafanaFolder spec.title.
                    contactPoint:
                      type: object
                      properties:
                        metadataName:
                          type: string
                          description: Kubernetes object name for GrafanaContactPoint (default {grafana.name}-contact-point).
                        grafanaReceiverName:
                          type: string
                          description: Grafana contact point name (spec.name); defaults to {grafana.name}.
                        type:
                          type: string
                        resyncPeriod:
                          type: string
                        allowCrossNamespaceImport:
                          type: boolean
                        settings:
                          type: object
                          description: Webhook settings (url, httpMethod, etc.)
                          x-kubernetes-preserve-unknown-fields: true
                    notificationPolicy:
                      type: object
                      properties:
                        metadataName:
                          type: string
                          description: GrafanaNotificationPolicy metadata.name (default {grafana.name}-policy).
                        route:
                          type: object
                          description: GrafanaNotificationPolicy spec.route subtree
                          x-kubernetes-preserve-unknown-fields: true
                    alertRuleGroup:
                      type: object
                      properties:
                        metadataName:
                          type: string
                          description: GrafanaAlertRuleGroup metadata.name (default {grafana.name}-alert-rule-group).
                        interval:
                          type: string
                        resyncPeriod:
                          type: string
                        folderRef:
                          type: string
                          description: Usually folder.metadataName
                        rules:
                          type: array
                          description: Grafana alert rules (full rule objects)
                          items:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                lastTransitionTime:
                  type: string
                  format: date-time
                projectName:
                  type: string
                projectUid:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
