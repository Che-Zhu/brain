# Optional spec.projectName: observes example.crossplane.io Project (same namespace), SSA-patches
# the Notif composite with crossplane.io/project-name and crossplane.io/project-uid, owner refs,
# and sets status.projectName / status.projectUid. Requires provider-kubernetes RBAC on notifs
# (see packages/crossplane/public/provider-kubernetes-example-rbac.yaml).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: notifs-project-go-templating
  annotations:
    meta.crossplane.io/display-name: notif
    meta.crossplane.io/description: >
      Notification record with optional Project affiliation (observe, labels, SSA patch, status).
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: Notif
  mode: Pipeline
  pipeline:
    - step: render-notif-project
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-notif-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: notif-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Notif
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{- end }}
            ---
            apiVersion: example.crossplane.io/v1
            kind: Notif
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{- if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{- end }}
              {{- if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{- end }}
