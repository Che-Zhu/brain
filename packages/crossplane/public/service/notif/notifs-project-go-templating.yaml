# Notification-only Notif Composition:
# - spec.notification: optional Project observe + SSA patch when projectName is set.
# Grafana resources are handled by notifs-grafana-alert-system-go-templating.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: notifs-project-go-templating
  annotations:
    meta.crossplane.io/display-name: notif
    meta.crossplane.io/description: >
      Notification record with optional Project affiliation (spec.notification.projectName).
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: Notif
  mode: Pipeline
  pipeline:
    - step: render-notif-project
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $r := .observed.composite.resource -}}
            {{- $spec := $r.spec | default dict -}}
            {{- $meta := $r.metadata -}}
            {{- $name := $meta.name -}}
            {{- $ns := $meta.namespace -}}
            {{- $notif := index $spec "notification" | default dict -}}
            {{- $projectName := "" -}}
            {{- if hasKey $notif "projectName" }}{{ $projectName = trim (toString (index $notif "projectName")) }}{{ end -}}
            {{- $projectObs := getComposedResource . "project-observe" -}}
            {{- $projectUid := "" -}}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest -}}
            {{- $m := $projectObs.status.atProvider.manifest -}}
            {{- $pmeta := index $m "metadata" -}}
            {{- if $pmeta -}}
            {{- $uidVal := index $pmeta "uid" -}}
            {{- if $uidVal -}}{{ $projectUid = toString $uidVal }}{{- end -}}
            {{- end -}}
            {{- end -}}

            {{- /* --- Project observe & patch (unchanged behavior, nested spec.notification.projectName) --- */ -}}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}

            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-notif-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: notif-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Notif
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                      - apiVersion: example.crossplane.io/v1
                        kind: Project
                        name: {{ $projectName }}
                        uid: {{ $projectUid }}
            {{- end }}

            ---
            apiVersion: example.crossplane.io/v1
            kind: Notif
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{- if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{- end }}
              {{- if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{- end }}
