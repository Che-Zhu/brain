# Grafana alert-system Composition for Notif.
#
# This composition emits Grafana Operator CRs directly. It does not use
# provider-kubernetes Objects, because these Grafana* resources are composed
# resources owned by the Notif claim, not existing resources to observe/import.
#
# Select from a Notif claim with:
#   spec.crossplane.compositionRef.name: notifs-grafana-alert-system-go-templating
#
# Input tree: spec.grafana
# - name: basename used to derive folder/contact-point/policy/rule-group names
# - namespace: namespace for Grafana Operator CRs
# - matchLabels: Grafana instance labels, rendered as spec.instanceSelector.matchLabels
# - folder.alert.title
# - contactPoint.settings
# - notificationPolicy.route
# - alertRuleGroup: full GrafanaAlertRuleGroup spec-ish subtree (rules, interval, etc.)
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: notifs-grafana-alert-system-go-templating
  annotations:
    meta.crossplane.io/display-name: notif-grafana-alert-system
    meta.crossplane.io/description: >
      Creates a reusable Grafana alerting system (Folder, ContactPoint, NotificationPolicy,
      AlertRuleGroup) from spec.grafana on a Notif composite.
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: Notif
  mode: Pipeline
  pipeline:
    - step: render-grafana-alert-system
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $r := .observed.composite.resource -}}
            {{- $spec := $r.spec | default dict -}}
            {{- $meta := $r.metadata -}}
            {{- $claimName := $meta.name -}}
            {{- $claimNs := $meta.namespace -}}
            {{- $claimUid := $meta.uid -}}
            {{- $grafana := index $spec "grafana" | default dict -}}
            {{- $base := index $grafana "name" | default $claimName | toString -}}
            {{- $grafanaNs := index $grafana "namespace" | default $claimNs | toString -}}
            {{- $matchLabels := index $grafana "matchLabels" | default (dict "dashboards" "grafana") -}}
            {{- $instanceSelector := dict "matchLabels" $matchLabels -}}

            {{- $folder := index $grafana "folder" | default dict -}}
            {{- $folderAlert := index $folder "alert" | default dict -}}
            {{- $folderName := index $folder "metadataName" | default (printf "%s-folder" $base) | toString -}}
            {{- $folderTitle := index $folderAlert "title" | default "Alerts" | toString -}}

            {{- $contact := index $grafana "contactPoint" | default dict -}}
            {{- $contactName := index $contact "metadataName" | default (printf "%s-contact-point" $base) | toString -}}
            {{- $receiverName := index $contact "grafanaReceiverName" | default $base | toString -}}
            {{- $contactType := index $contact "type" | default "webhook" | toString -}}
            {{- $contactResync := index $contact "resyncPeriod" | default "10m0s" | toString -}}
            {{- $allowCrossNs := index $contact "allowCrossNamespaceImport" | default false -}}
            {{- $contactSettings := index $contact "settings" | default dict -}}

            {{- $policy := index $grafana "notificationPolicy" | default dict -}}
            {{- $policyName := index $policy "metadataName" | default (printf "%s-policy" $base) | toString -}}
            {{- $route := index $policy "route" | default dict -}}
            {{- if not (index $route "receiver") -}}{{- $_ := set $route "receiver" $receiverName -}}{{- end -}}
            {{- if not (index $route "object_matchers") -}}{{- $_ := set $route "object_matchers" (list (list "contactpoint" "=" $receiverName)) -}}{{- end -}}

            {{- $arg := index $grafana "alertRuleGroup" | default dict -}}
            {{- $argName := index $arg "metadataName" | default (printf "%s-alert-rule-group" $base) | toString -}}
            {{- $argSpec := omit $arg "metadataName" -}}
            {{- if not (index $argSpec "folderRef") -}}{{- $_ := set $argSpec "folderRef" $folderName -}}{{- end -}}
            {{- if not (index $argSpec "instanceSelector") -}}{{- $_ := set $argSpec "instanceSelector" $instanceSelector -}}{{- end -}}
            {{- if not (index $argSpec "interval") -}}{{- $_ := set $argSpec "interval" "5m" -}}{{- end -}}
            {{- if not (index $argSpec "resyncPeriod") -}}{{- $_ := set $argSpec "resyncPeriod" "5m0s" -}}{{- end -}}

            ---
            apiVersion: grafana.integreatly.org/v1beta1
            kind: GrafanaFolder
            metadata:
              name: {{ $folderName }}
              namespace: {{ $grafanaNs }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-folder
                gotemplating.fn.crossplane.io/ready: "True"
              labels:
                crossplane.io/composite: {{ $claimName }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: Notif
                name: {{ $claimName }}
                uid: {{ $claimUid }}
            spec:
              instanceSelector:
            {{ toYaml $instanceSelector | nindent 4 }}
              title: {{ $folderTitle | quote }}

            ---
            apiVersion: grafana.integreatly.org/v1beta1
            kind: GrafanaContactPoint
            metadata:
              name: {{ $contactName }}
              namespace: {{ $grafanaNs }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-contact-point
                gotemplating.fn.crossplane.io/ready: "True"
              labels:
                crossplane.io/composite: {{ $claimName }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: Notif
                name: {{ $claimName }}
                uid: {{ $claimUid }}
            spec:
              allowCrossNamespaceImport: {{ $allowCrossNs }}
              instanceSelector:
            {{ toYaml $instanceSelector | nindent 4 }}
              name: {{ $receiverName | quote }}
              resyncPeriod: {{ $contactResync | quote }}
              type: {{ $contactType | quote }}
              settings:
            {{ if $contactSettings }}
            {{ toYaml $contactSettings | nindent 4 }}
            {{ else }}
                httpMethod: POST
                url: "https://example.invalid/replace-me"
            {{ end }}

            ---
            apiVersion: grafana.integreatly.org/v1beta1
            kind: GrafanaNotificationPolicy
            metadata:
              name: {{ $policyName }}
              namespace: {{ $grafanaNs }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-notification-policy
                gotemplating.fn.crossplane.io/ready: "True"
              labels:
                crossplane.io/composite: {{ $claimName }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: Notif
                name: {{ $claimName }}
                uid: {{ $claimUid }}
            spec:
              instanceSelector:
            {{ toYaml $instanceSelector | nindent 4 }}
              route:
            {{ toYaml $route | nindent 4 }}

            ---
            apiVersion: grafana.integreatly.org/v1beta1
            kind: GrafanaAlertRuleGroup
            metadata:
              name: {{ $argName }}
              namespace: {{ $grafanaNs }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-alert-rule-group
                gotemplating.fn.crossplane.io/ready: "True"
              labels:
                crossplane.io/composite: {{ $claimName }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: Notif
                name: {{ $claimName }}
                uid: {{ $claimUid }}
            spec:
            {{ toYaml $argSpec | nindent 2 }}

            ---
            apiVersion: example.crossplane.io/v1
            kind: Notif
            metadata:
              name: {{ $claimName }}
              namespace: {{ $claimNs }}
            status:
              phase: Ready
