apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-webhook-go-templating
  annotations:
    meta.crossplane.io/display-name: webhook (adnanh)
    meta.crossplane.io/description: >
      adnanh/webhook with hooks ConfigMap, optional composed Secret (spec.webhookSecret), Deployment,
      Service, and Ingress. No config-backup or snapshot CronJob pipeline (unlike aps-deployment-ingress-go-templating).
      Typical payload: JSON POST (e.g. GitHub release event with action, release.*, repository.*); omit webhookSecret when rules match payload only.
    meta.crossplane.io/icon-data: "data:image/svg+xml;base64,"
    meta.crossplane.io/template: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
      spec:
        crossplane:
          compositionRef:
            name: aps-webhook-go-templating
        image: almir/webhook:2.8.3
        hooksYamlTmpl: |
          # Copy hooks from packages/crossplane/example/webhook-ap-example.yaml (adnanh/webhook -template syntax).
        # Optional: set webhookSecret to create <name>-webhook-secret and mount WEBHOOK_SECRET (e.g. GitHub HMAC).
        # webhookSecret: your-secret
        endpoints:
          - port: 9000
            host: {{ name }}.{{ region }}
        cpuRequest: 50m
        memoryRequest: 64Mi
        cpuLimit: 500m
        memoryLimit: 256Mi
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-webhook-deployment-service-ingress
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $endpoints := list }}
            {{- if hasKey $spec "endpoints" }}
            {{- $endpoints = default (list) $spec.endpoints }}
            {{- else if and $spec.port $spec.host }}
            {{- $endpoints = list (dict "port" $spec.port "host" (trim (toString $spec.host))) }}
            {{- end }}
            {{- $hooks := "" }}
            {{- if hasKey $spec "hooksYamlTmpl" }}
            {{- $hooks = $spec.hooksYamlTmpl }}
            {{- end }}
            {{- if eq (trim $hooks) "" }}
            {{- $hooks = "# spec.hooksYamlTmpl empty — set hooks on the AP (see packages/crossplane/example/webhook-ap-example.yaml)\n- id: stub\n  execute-command: \"/bin/true\"\n" }}
            {{- end }}
            {{- $listen := 9000 }}
            {{- if and $endpoints (gt (len $endpoints) 0) }}
            {{- $listen = (index $endpoints 0).port }}
            {{- end }}
            {{- if and (hasKey $spec "webhookListenPort") $spec.webhookListenPort }}
            {{- $listen = $spec.webhookListenPort }}
            {{- end }}
            {{- $extraArgs := list }}
            {{- if hasKey $spec "webhookExtraArgs" }}
            {{- $extraArgs = default (list) $spec.webhookExtraArgs }}
            {{- end }}
            {{- $hooksCm := printf "%s-webhook-hooks" $name }}
            {{- $secretName := printf "%s-webhook-secret" $name }}
            {{- with $spec.webhookSecret }}
            {{- if ne (trim .) "" }}
            ---
            apiVersion: v1
            kind: Secret
            metadata:
              name: {{ $secretName }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: webhook-secret
                gotemplating.fn.crossplane.io/ready: "True"
              labels:
                crossplane.io/composite: {{ $name }}
            type: Opaque
            stringData:
              WEBHOOK_SECRET: {{ . | quote }}
            {{- end }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: {{ $hooksCm }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: webhook-hooks
                gotemplating.fn.crossplane.io/ready: "True"
              labels:
                crossplane.io/composite: {{ $name }}
            data:
              hooks.yaml.tmpl: |
                {{ $hooks | nindent 4 }}
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: webhook-deployment
                gotemplating.fn.crossplane.io/ready: "True"
              labels:
                crossplane.io/composite: {{ $name }}
            spec:
              replicas: {{ $spec.replicas | default 1 }}
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $name }}
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 0
                  maxSurge: 1
              template:
                metadata:
                  labels:
                    app: {{ $name }}
                spec:
                  automountServiceAccountToken: false
                  securityContext:
                    runAsNonRoot: true
                    runAsUser: 65534
                    runAsGroup: 65534
                    seccompProfile:
                      type: RuntimeDefault
                  {{- if hasKey $spec "imagePullSecrets" }}
                  {{- if $spec.imagePullSecrets }}
                  imagePullSecrets:
                  {{- range $spec.imagePullSecrets }}
                  - name: {{ .name }}
                  {{- end }}
                  {{- end }}
                  {{- end }}
                  containers:
                  - name: webhook
                    image: {{ $spec.image }}
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                    args:
                    - -hooks=/etc/webhook/hooks.yaml.tmpl
                    - -template
                    - -verbose
                    - -ip=0.0.0.0
                    - -port={{ $listen }}
                    {{- range $extraArgs }}
                    - {{ . | quote }}
                    {{- end }}
                    {{- with $spec.webhookSecret }}
                    {{- if ne (trim .) "" }}
                    env:
                    - name: WEBHOOK_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: {{ $secretName }}
                          key: WEBHOOK_SECRET
                    {{- if $spec.env }}
                    {{- range $spec.env }}
                    {{- if ne .name "WEBHOOK_SECRET" }}
                    - name: {{ .name }}
                      {{- if .valueFrom }}
                      valueFrom:
            {{ .valueFrom | toYaml | nindent 12 }}
                      {{- else }}
                      value: {{ .value | quote }}
                      {{- end }}
                    {{- end }}
                    {{- end }}
                    {{- end }}
                    {{- else }}
                    {{- if $spec.env }}
                    env:
                    {{- range $spec.env }}
                    - name: {{ .name }}
                      {{- if .valueFrom }}
                      valueFrom:
            {{ .valueFrom | toYaml | nindent 12 }}
                      {{- else }}
                      value: {{ .value | quote }}
                      {{- end }}
                    {{- end }}
                    {{- end }}
                    {{- end }}
                    {{- else }}
                    {{- if $spec.env }}
                    env:
                    {{- range $spec.env }}
                    - name: {{ .name }}
                      {{- if .valueFrom }}
                      valueFrom:
            {{ .valueFrom | toYaml | nindent 12 }}
                      {{- else }}
                      value: {{ .value | quote }}
                      {{- end }}
                    {{- end }}
                    {{- end }}
                    {{- end }}
                    ports:
                    - containerPort: {{ $listen }}
                      name: http-{{ $listen }}
                      protocol: TCP
                    volumeMounts:
                    - name: hooks
                      mountPath: /etc/webhook
                      readOnly: true
                    resources:
                      requests:
                        cpu: {{ $spec.cpuRequest | default "50m" }}
                        memory: {{ $spec.memoryRequest | default "64Mi" }}
                      limits:
                        cpu: {{ $spec.cpuLimit | default "500m" }}
                        memory: {{ $spec.memoryLimit | default "256Mi" }}
                    imagePullPolicy: {{ $spec.imagePullPolicy | default "IfNotPresent" }}
                    {{- if $spec.probes }}
                    {{- if $spec.probes.startup }}
                    startupProbe:
            {{ $spec.probes.startup | toYaml | nindent 22 }}
                    {{- end }}
                    {{- if $spec.probes.liveness }}
                    livenessProbe:
            {{ $spec.probes.liveness | toYaml | nindent 22 }}
                    {{- end }}
                    {{- if $spec.probes.readiness }}
                    readinessProbe:
            {{ $spec.probes.readiness | toYaml | nindent 22 }}
                    {{- end }}
                    {{- else }}
                    readinessProbe:
                      tcpSocket:
                        port: {{ $listen }}
                      initialDelaySeconds: 3
                      periodSeconds: 10
                    livenessProbe:
                      tcpSocket:
                        port: {{ $listen }}
                      initialDelaySeconds: 10
                      periodSeconds: 20
                    {{- end }}
                  volumes:
                  - name: hooks
                    configMap:
                      name: {{ $hooksCm }}
            {{- $portsSeen := dict }}
            {{- range $endpoints }}
            {{- $portKey := printf "p%d" .port }}
            {{- if not (index $portsSeen $portKey) }}
            {{- $_ := set $portsSeen $portKey 1 }}
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: {{ printf "%s-service-port-%d" $name .port }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: webhook-service-port-{{ .port }}
              labels:
                crossplane.io/composite: {{ $name }}
            spec:
              selector:
                app: {{ $name }}
              ports:
              - name: http-{{ .port }}
                port: {{ .port }}
                targetPort: http-{{ .port }}
                protocol: TCP
            {{- end }}
            {{- end }}
            {{- if $endpoints }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: {{ printf "%s-ingress" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: webhook-ingress
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/ssl-redirect: 'false'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
              {{- if $spec.ingressAnnotations }}
              {{- range $k, $v := $spec.ingressAnnotations }}
                {{ $k }}: {{ $v | quote }}
              {{- end }}
              {{- end }}
            spec:
              ingressClassName: nginx
              rules:
              {{- range $endpoints }}
              - host: {{ .host }}
                http:
                  paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: {{ printf "%s-service-port-%d" $name .port }}
                        port:
                          number: {{ .port }}
              {{- end }}
              tls:
              - hosts:
                {{- range $endpoints }}
                - {{ .host }}
                {{- end }}
                secretName: wildcard-cert
            {{- end }}
            ---
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              configVersionHash: {{ sha256sum $hooks | trunc 12 }}
