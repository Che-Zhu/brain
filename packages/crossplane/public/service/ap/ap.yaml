apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: aps.example.crossplane.io
spec:
  scope: Namespaced
  group: example.crossplane.io
  names:
    kind: AP
    plural: aps
  defaultCompositionRef:
    name: aps-deployment-ingress-go-templating
  versions:
  - name: v1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        x-kubernetes-preserve-unknown-fields: true
        properties:
          metadata:
            type: object
            description: >
              Claim metadata. The default AP composition reads desired networking from
              spec.input.network: a Private Address target App Listening Port plus optional
              Platform Address requests. metadata.labels.region carries the routing domain
              used to allocate platform hosts.
            properties:
              labels:
                type: object
                additionalProperties:
                  type: string
          spec:
            type: object
            x-kubernetes-preserve-unknown-fields: true
            additionalProperties: true
            properties:
              compositionRef:
                type: object
                properties:
                  name:
                    type: string
              compositionSelector:
                type: object
                properties:
                  matchLabels:
                    type: object
                    additionalProperties:
                      type: string
              crossplane:
                type: object
                properties:
                  compositionRef:
                    type: object
                    properties:
                      name:
                        type: string
              template:
                type: string
                description: Template type for composition selection (e.g. perplexica)
              name:
                type: string
                description: Instance name used for all composed resource naming
              projectName:
                type: string
                description: >
                  When set, compositions observe the Project claim with this name in the same
                  namespace as the AP (example.crossplane.io/v1), add labels crossplane.io/project-name
                  and crossplane.io/project-uid to composed resources, and set ownerReferences once
                  the Project UID is observed.
              input:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: >
                  Template-specific parameters and deployment overrides. Sealos *-composite.yaml
                  compositions store Sealos inputs here. aps-deployment-ingress-go-templating uses image,
                  network, env, probes, and imagePullPolicy.
                properties:
                  image:
                    type: string
                    description: Container image (e.g. puddlecat/sealos-brain-ai:0.20.67)
                  network:
                    type: object
                    description: >
                      AP Network contract. privatePort is the App Listening Port targeted by the single
                      cluster-internal Private Address. Public Addresses are managed through EntryPoint.
                    properties:
                      privatePort:
                        type: integer
                        minimum: 1
                        maximum: 65535
                        description: App Listening Port for the Private Address target.
                      platformAddresses:
                        type: array
                        x-kubernetes-list-type: map
                        x-kubernetes-list-map-keys:
                          - id
                        description: >
                          Platform Address requests desired for this AP. Each entry has a stable
                          opaque ID and the App Listening Port it targets; host and URL allocation
                          are derived by the platform.
                        items:
                          type: object
                          required:
                            - id
                            - port
                          properties:
                            id:
                              type: string
                              pattern: ^pa_[a-z0-9]{6,32}$
                              description: Stable opaque Platform Address ID.
                            port:
                              type: integer
                              minimum: 1
                              maximum: 65535
                              description: Target App Listening Port for this Public Address.
                      customDomains:
                        type: array
                        x-kubernetes-list-type: map
                        x-kubernetes-list-map-keys:
                          - id
                        description: >
                          Custom Domain Binding requests desired for this AP. Each entry binds a
                          user-owned domain to an existing Platform Address by stable ID.
                        items:
                          type: object
                          required:
                            - id
                            - domain
                            - platformAddressId
                          properties:
                            id:
                              type: string
                              pattern: ^cd_[a-z0-9]{6,32}$
                              description: Stable opaque Custom Domain Binding ID.
                            domain:
                              type: string
                              description: User-owned Custom Domain.
                            platformAddressId:
                              type: string
                              pattern: ^pa_[a-z0-9]{6,32}$
                              description: Existing Platform Address ID used as the CNAME target.
                  imagePullPolicy:
                    type: string
                    default: "Always"
                  env:
                    type: array
                    items:
                      type: object
                      required: [name]
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                        valueFrom:
                          type: object
                          description: Kubernetes EnvVarSource (e.g. secretKeyRef, configMapKeyRef)
                          properties:
                            secretKeyRef:
                              type: object
                              properties:
                                name: { type: string }
                                key: { type: string }
                                optional: { type: boolean }
                            configMapKeyRef:
                              type: object
                              properties:
                                name: { type: string }
                                key: { type: string }
                                optional: { type: boolean }
                  probes:
                    type: object
                    description: |
                      Health probes for the Deployment container. No defaults are applied;
                      configure startup, liveness, and readiness explicitly for production safety.
                    properties:
                      startup:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      liveness:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      readiness:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
              resource:
                type: object
                description: >
                  Workload scale and container resources (Kubernetes-shaped). Used by
                  aps-deployment-ingress-go-templating for Deployment replicas and container
                  resources.requests/limits.
                properties:
                  replicaStrategy:
                    type: object
                    required:
                      - type
                    description: >
                      Canonical AP replica behavior. Fixed Replicas pins the Deployment to
                      replicaStrategy.fixed.replicas. Elastic Scaling creates an AP-owned
                      HorizontalPodAutoscaler from replicaStrategy.elastic. Legacy resource.replicas
                      remains a fixed fallback only when replicaStrategy is absent.
                    x-kubernetes-validations:
                      - rule: "self.type == 'fixed' ? has(self.fixed) : true"
                        message: "fixed replica strategy requires fixed settings."
                      - rule: "self.type == 'elastic' ? has(self.elastic) : true"
                        message: "elastic replica strategy requires elastic settings."
                    properties:
                      type:
                        type: string
                        enum:
                          - fixed
                          - elastic
                      fixed:
                        type: object
                        required:
                          - replicas
                        properties:
                          replicas:
                            type: integer
                            minimum: 1
                            maximum: 20
                            description: Fixed Deployment replica count.
                      elastic:
                        type: object
                        required:
                          - minReplicas
                          - maxReplicas
                          - target
                        description: >
                          Elastic Scaling settings. CPU targets use utilization percentage;
                          Memory targets use an absolute average value.
                        x-kubernetes-validations:
                          - rule: "self.minReplicas <= self.maxReplicas"
                            message: "minReplicas must be less than or equal to maxReplicas."
                        properties:
                          minReplicas:
                            type: integer
                            minimum: 1
                            maximum: 20
                            description: Minimum AP replicas for Elastic Scaling.
                          maxReplicas:
                            type: integer
                            minimum: 1
                            maximum: 20
                            description: Maximum AP replicas for Elastic Scaling.
                          target:
                            type: object
                            required:
                              - metric
                              - type
                            description: Discriminated HorizontalPodAutoscaler resource metric target.
                            x-kubernetes-validations:
                              - rule: "self.metric == 'cpu' ? self.type == 'utilization' && has(self.utilizationPercent) && !has(self.averageValue) : true"
                                message: "CPU elastic targets require utilizationPercent and must not set averageValue."
                              - rule: "self.metric == 'memory' ? self.type == 'averageValue' && has(self.averageValue) && !has(self.utilizationPercent) : true"
                                message: "Memory elastic targets require averageValue and must not set utilizationPercent."
                            properties:
                              metric:
                                type: string
                                enum:
                                  - cpu
                                  - memory
                              type:
                                type: string
                                enum:
                                  - utilization
                                  - averageValue
                              utilizationPercent:
                                type: integer
                                minimum: 1
                                maximum: 100
                                description: Target average CPU utilization percentage.
                              averageValue:
                                type: string
                                pattern: ^[1-9][0-9]*(Mi|Gi)$
                                description: Target average Memory usage as a Kubernetes quantity, for example 512Mi.
                  replicas:
                    type: integer
                    default: 1
                    minimum: 1
                    maximum: 20
                    description: Legacy Desired Deployment replica count. Used only when replicaStrategy is absent.
                  requests:
                    type: object
                    description: Container resources.requests
                    properties:
                      cpu:
                        type: string
                        default: "200m"
                      memory:
                        type: string
                        default: "204Mi"
                  limits:
                    type: object
                    description: Container resources.limits
                    properties:
                      cpu:
                        type: string
                        default: "2000m"
                      memory:
                        type: string
                        default: "2048Mi"
              type:
                type: string
                description: >
                  Optional workflow hint for clients. Value `prelude` marks an AP applied before the
                  image is guaranteed pullable (e.g. with S2I); UIs may show building or not-ready
                  treatment. Omit the field for standard deployments.
                enum:
                  - prelude
              paused:
                type: boolean
                default: false
                description: >
                  When true, scales the composed Deployment to 0 replicas and applies SealOS-style
                  pause annotations (compatible with workloads managed by SealOS Deploy). When false,
                  the Deployment uses spec.resource.replicaStrategy fixed replicas, falling back to
                  legacy spec.resource.replicas (default 1) when replicaStrategy is absent.
              restartRequest:
                type: integer
                minimum: 0
                description: >
                  Bump this integer to trigger a coordinated pod-template change (RollingUpdate) via the
                  Crossplane composition. Mirrors incrementing workload restart counters in GitOps flows.
                  The UI/API may instead call POST /api/ap/v1alpha1/restart to annotate the Deployment directly.
              ingressAnnotations:
                type: object
                additionalProperties:
                  type: string
                description: Additional ingress annotations
              hooksYamlTmpl:
                type: string
                description: >
                  For composition aps-webhook-go-templating only: full hooks file body in adnanh
                  hooks.yaml.tmpl form (e.g. getenv WEBHOOK_SECRET with js filter for GitHub HMAC).
              webhookSecret:
                type: string
                description: >
                  For aps-webhook-go-templating: if set, creates Secret <metadata.name>-webhook-secret
                  with key WEBHOOK_SECRET and injects it into the pod. The plaintext is stored on the
                  AP resource (etcd); for GitOps prefer omitting this field and using spec.input.env with
                  valueFrom.secretKeyRef instead. Must match GitHub's webhook secret when using HMAC rules.
              webhookListenPort:
                type: integer
                description: >
                  For aps-webhook-go-templating: adnanh -port value. Defaults to the first
                  endpoint port, or 9000 when endpoints are empty.
              webhookExtraArgs:
                type: array
                description: Extra CLI arguments appended after default adnanh args.
                items:
                  type: string
              imagePullSecrets:
                type: array
                description: Optional imagePullSecrets for the webhook Deployment (defaults to none).
                items:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
          status:
            type: object
            properties:
              phase:
                type: string
                description: >
                  For aps-deployment-ingress-go-templating: Running / Progressing / Failed / Degraded / Unknown
                  from the composed Deployment, and **Paused** when AP **spec.paused** is true (even while
                  replicas reach zero). When unpaused, rollout state comes from Deployment conditions.
              configVersionHash:
                type: string
                description: Hash of current effective config; use to match and display the corresponding ConfigMap
              projectName:
                type: string
                description: >
                  When spec.projectName is set, the composition echoes it here (Crossplane typically does not
                  merge metadata.labels on the composite from composed output; use this field for affiliation).
              projectUid:
                type: string
                description: >
                  UID of the observed Project claim when spec.projectName is set and project-observe has synced.
              network:
                type: object
                description: AP Network observed state for the Settings Network section.
                properties:
                  privateAddress:
                    type: string
                    description: >
                      Cluster-internal Private Address. Omits :80 for App Listening Port 80 and includes
                      :<port> for non-default ports.
                  privatePort:
                    type: integer
                    minimum: 1
                    maximum: 65535
                    description: App Listening Port targeted by the Private Address.
                  publicAddresses:
                    type: array
                    description: Render-ready public URLs derived from AP Public Addresses and observed ingress state.
                    items:
                      type: object
                      properties:
                        host:
                          type: string
                          description: Public Address host.
                        id:
                          type: string
                          description: Stable opaque Platform Address ID.
                        url:
                          type: string
                          description: Render-ready public URL including scheme.
                        port:
                          type: integer
                          description: Target App Listening Port.
                        type:
                          type: string
                          description: Public address type.
                        status:
                          type: string
                          description: Public access status.
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type: { type: string }
                    status: { type: string }
                    reason: { type: string }
                    message: { type: string }
                    lastTransitionTime: { type: string }
