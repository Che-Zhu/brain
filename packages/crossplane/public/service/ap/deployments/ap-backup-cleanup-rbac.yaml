# RBAC for AP backup ConfigMap cleanup CronJob.
# ServiceAccount used by the cleanup job; create in the same namespace as the CronJob (e.g. crossplane-system).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ap-backup-cleanup
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ap-config-snapshot-cleanup
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["example.crossplane.io"]
  resources: ["aps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ap-backup-cleanup-binding
subjects:
- kind: ServiceAccount
  name: ap-backup-cleanup
  namespace: crossplane-system
roleRef:
  kind: ClusterRole
  name: ap-config-snapshot-cleanup
  apiGroup: rbac.authorization.k8s.io
