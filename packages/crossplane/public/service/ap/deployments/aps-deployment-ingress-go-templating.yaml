                crossplane.io/project-name: {{ $projectName | quote }}
                {{ if ne $projectUid "" }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
              {{ end }}
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $jobName }}
            subjects:
            - kind: ServiceAccount
              name: {{ $jobName }}
              namespace: {{ $ns }}
