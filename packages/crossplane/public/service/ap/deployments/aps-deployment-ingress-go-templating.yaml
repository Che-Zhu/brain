apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-deployment-ingress-go-templating
  annotations:
    meta.crossplane.io/type: deployment
    meta.crossplane.io/display-name: app
    meta.crossplane.io/description: >
      Generic app with Deployment, Service, and optional Ingress from spec.input.network.
      Container image is spec.input.image; replicas and CPU/memory are spec.resource (Kubernetes-shaped).
      Public Addresses in spec.input.network.platformAddresses route platform hosts to App Listening Ports.
      Optional spec.projectName observes a Project claim in the same namespace (kubernetes.m
      Object Observe), adds labels crossplane.io/project-name and crossplane.io/project-uid. Composed workloads
      (Deployment, Services, Ingress, ConfigMap, etc.) ownerReference the AP claim only; only the AP composite
      is SSA-patched to add Project ownerReferences/labels. Echoes status.projectName / status.projectUid
      (Crossplane does not merge composite metadata from composition output for most fields).
    # Lucide rocket as data URI; used when icon-url is omitted (frontend prefers icon-url, then icon-data).
    meta.crossplane.io/icon-data: "data:image/svg+xml;base64,"
    meta.crossplane.io/template: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        namespace: {{ namespace }}
        labels:
          region: 192.168.12.53.nip.io
      spec:
        crossplane:
          compositionRef:
            name: aps-deployment-ingress-go-templating
        # Optional: Project claim name (same namespace) for crossplane.io/project-name and owner refs
        # projectName: my-project
        input:
          image: {{ image }}
          network:
            privatePort: 80
        resource:
          replicas: 1
          requests:
            cpu: 200m
            memory: 204Mi
          limits:
            cpu: 2000m
            memory: 2048Mi
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-deployment-service-ingress
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $req := default dict $resource.requests }}
            {{- $lim := default dict $resource.limits }}
            {{- $replicas := 1 }}
            {{- $replicaStrategy := default dict $resource.replicaStrategy }}
            {{- $replicaStrategyType := toString ($replicaStrategy.type | default "") }}
            {{- $fixedStrategy := default dict $replicaStrategy.fixed }}
            {{- $elasticStrategy := default dict $replicaStrategy.elastic }}
            {{- $elasticTarget := default dict $elasticStrategy.target }}
            {{- $elasticCpuTarget := and (eq (toString ($elasticTarget.metric | default "")) "cpu") (eq (toString ($elasticTarget.type | default "")) "utilization") (hasKey $elasticTarget "utilizationPercent") }}
            {{- $elasticMemoryTarget := and (eq (toString ($elasticTarget.metric | default "")) "memory") (eq (toString ($elasticTarget.type | default "")) "averageValue") (hasKey $elasticTarget "averageValue") }}
            {{- $elasticEnabled := and (eq $replicaStrategyType "elastic") (hasKey $elasticStrategy "minReplicas") (hasKey $elasticStrategy "maxReplicas") (or $elasticCpuTarget $elasticMemoryTarget) }}
            {{- $elasticMinReplicas := 1 }}
            {{- $elasticMaxReplicas := 10 }}
            {{- $elasticTargetMetric := "cpu" }}
            {{- $elasticCpuUtilizationPercent := 80 }}
            {{- $elasticMemoryAverageValue := "512Mi" }}
            {{- if $elasticEnabled }}
            {{- $elasticMinReplicas = int $elasticStrategy.minReplicas }}
            {{- $elasticMaxReplicas = int $elasticStrategy.maxReplicas }}
            {{- if $elasticMemoryTarget }}
            {{- $elasticTargetMetric = "memory" }}
            {{- $elasticMemoryAverageValue = toString $elasticTarget.averageValue }}
            {{- else }}
            {{- $elasticCpuUtilizationPercent = int $elasticTarget.utilizationPercent }}
            {{- end }}
            {{- end }}
            {{- if hasKey $fixedStrategy "replicas" }}
            {{- $replicas = int $fixedStrategy.replicas }}
            {{- else if hasKey $resource "replicas" }}
            {{- $replicas = int $resource.replicas }}
            {{- end }}
            {{- $cpuRequest := "200m" }}
            {{- if $req.cpu }}{{ $cpuRequest = $req.cpu }}{{ end }}
            {{- $memoryRequest := "204Mi" }}
            {{- if $req.memory }}{{ $memoryRequest = $req.memory }}{{ end }}
            {{- $cpuLimit := "2000m" }}
            {{- if $lim.cpu }}{{ $cpuLimit = $lim.cpu }}{{ end }}
            {{- $memoryLimit := "2048Mi" }}
            {{- if $lim.memory }}{{ $memoryLimit = $lim.memory }}{{ end }}
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $network := $input.network | default dict }}
            {{- $privatePort := 0 }}
            {{- if hasKey $network "privatePort" }}{{ $privatePort = int $network.privatePort }}{{ end }}
            {{- $routingDomain := "" }}
            {{- $metadataLabels := .observed.composite.resource.metadata.labels | default dict }}
            {{- if hasKey $metadataLabels "region" }}{{ $routingDomain = trim (toString $metadataLabels.region) }}{{ end }}
            {{- $safeAPName := lower $name }}
            {{- $safeAPName = regexReplaceAll "[^a-z0-9-]+" $safeAPName "-" }}
            {{- $safeAPName = trimAll "-" $safeAPName }}
            {{- if eq $safeAPName "" }}{{ $safeAPName = "ap" }}{{ end }}
            {{- $platformAddresses := list }}
            {{- if and (gt $privatePort 0) (hasKey $network "platformAddresses") }}
            {{- range $network.platformAddresses }}
            {{- $paID := "" }}
            {{- if hasKey . "id" }}{{ $paID = trim (toString .id) }}{{ end }}
            {{- $paPort := 0 }}
            {{- if hasKey . "port" }}{{ $paPort = int .port }}{{ end }}
            {{- if and (regexMatch "^pa_[a-z0-9]{6,32}$" $paID) (gt $paPort 0) }}
            {{- $platformAddresses = concat $platformAddresses (list (dict "id" $paID "port" $paPort)) }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- $networkPublicAddresses := list }}
            {{- if ne $routingDomain "" }}
            {{- range $platformAddresses }}
            {{- $slug := sha256sum (printf "%s/%s/%s/%s" $ns $name $apUid .id) | trunc 10 }}
            {{- $hostPrefix := $safeAPName | trunc 52 | trimSuffix "-" }}
            {{- if eq $hostPrefix "" }}{{ $hostPrefix = "ap" }}{{ end }}
            {{- $host := printf "%s-%s.%s" $hostPrefix $slug $routingDomain }}
            {{- $networkPublicAddresses = concat $networkPublicAddresses (list (dict "id" .id "host" $host "port" .port)) }}
            {{- end }}
            {{- end }}
            {{- $ports := list }}
            {{- $portsSeen := dict }}
            {{- if gt $privatePort 0 }}
            {{- $_ := set $portsSeen (printf "p%d" $privatePort) 1 }}
            {{- $ports = concat $ports (list (dict "port" $privatePort)) }}
            {{- end }}
            {{- range $platformAddresses }}
            {{- $portKey := printf "p%d" .port }}
            {{- if not (index $portsSeen $portKey) }}
            {{- $_ := set $portsSeen $portKey 1 }}
            {{- $ports = concat $ports (list (dict "port" .port)) }}
            {{- end }}
            {{- end }}
            {{- $needIngress := gt (len $networkPublicAddresses) 0 }}
            {{- /* Pause/start: AP spec.paused scales Deployment to zero with SealOS pause annotation. */}}
            {{- $paused := false }}
            {{- if and (hasKey $spec "paused") $spec.paused }}{{ $paused = true }}{{ end }}
            {{- $desiredReplicas := $replicas }}
            {{- if $paused }}{{ $desiredReplicas = 0 }}{{ end }}
            {{- $restartRequest := 0 }}
            {{- if hasKey $spec "restartRequest" }}{{ $restartRequest = int ($spec.restartRequest | default 0) }}{{ end }}
            {{- /* Build an effective spec snapshot with defaults resolved so rollback is self-contained */}}
            {{- $effectiveInput := dict
                  "image" ($input.image | default "")
                  "imagePullPolicy" ($input.imagePullPolicy | default "Always")
                  "env" ($input.env | default (list))
                  "probes" ($input.probes | default (dict))
            }}
            {{- if gt $privatePort 0 }}
            {{- $effectiveNetwork := dict "privatePort" $privatePort }}
            {{- if gt (len $platformAddresses) 0 }}
            {{- $_ := set $effectiveNetwork "platformAddresses" $platformAddresses }}
            {{- end }}
            {{- $_ := set $effectiveInput "network" $effectiveNetwork }}
            {{- end }}
            {{- $effectiveReplicaStrategy := dict
                  "type" "fixed"
                  "fixed" (dict "replicas" $replicas)
            }}
            {{- if $elasticEnabled }}
            {{- $effectiveElasticTarget := dict
                  "metric" "cpu"
                  "type" "utilization"
                  "utilizationPercent" $elasticCpuUtilizationPercent
            }}
            {{- if eq $elasticTargetMetric "memory" }}
            {{- $effectiveElasticTarget = dict
                  "metric" "memory"
                  "type" "averageValue"
                  "averageValue" $elasticMemoryAverageValue
            }}
            {{- end }}
            {{- $effectiveReplicaStrategy = dict
                  "type" "elastic"
                  "fixed" (dict "replicas" $replicas)
                  "elastic" (dict
                    "minReplicas" $elasticMinReplicas
                    "maxReplicas" $elasticMaxReplicas
                    "target" $effectiveElasticTarget
                  )
            }}
            {{- end }}
            {{- $effective := dict
                  "name" $name
                  "namespace" $ns
                  "input" $effectiveInput
                  "resource" (dict
                    "replicas" $replicas
                    "replicaStrategy" $effectiveReplicaStrategy
                    "requests" (dict "cpu" $cpuRequest "memory" $memoryRequest)
                    "limits" (dict "cpu" $cpuLimit "memory" $memoryLimit)
                  )
                  "projectName" $projectName
                  "paused" $paused
                  "restartRequest" $restartRequest
                  "ingressAnnotations" ($spec.ingressAnnotations | default (dict))
            }}
            {{- $effectiveYaml := $effective | toYaml }}
            {{- $versionHash := sha256sum $effectiveYaml | trunc 12 }}
            {{- $managedConfigMapName := printf "%s-config-backup" $name }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: {{ $managedConfigMapName }}
              namespace: {{ $ns }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: AP
                name: {{ $name }}
                uid: {{ $apUid }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-config-backup
                gotemplating.fn.crossplane.io/ready: "True"
                app.sealos.io/config-snapshot: "true"
                app.sealos.io/config-version-hash: {{ $versionHash }}
              labels:
                app.sealos.io/ap-uid: {{ $apUid }}
                app.sealos.io/backup: "true"
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
            data:
              config.yaml: |
                {{ $effectiveYaml | nindent 4 }}
            ---

            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                {{- if $paused }}
                deploy.cloud.sealos.io/pause: '{"target":"","value":""}'
                {{- else if not $elasticEnabled }}
                deploy.cloud.sealos.io/minReplicas: {{ $replicas | quote }}
                deploy.cloud.sealos.io/maxReplicas: {{ $replicas | quote }}
                deploy.cloud.sealos.io/resize: "0Gi"
                {{- end }}
              labels:
                crossplane.io/composite: {{ $name }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: AP
                name: {{ $name }}
                uid: {{ $apUid }}
            spec:
              {{ if or $paused (not $elasticEnabled) }}
              replicas: {{ $desiredReplicas }}
              {{ end }}
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $name }}
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 0
                  maxSurge: 1
              template:
                metadata:
                  labels:
                    app: {{ $name }}
                    restartNonce: "{{ $restartRequest }}"
                spec:
                  imagePullSecrets:
                  - name: ghcr-cred
                  automountServiceAccountToken: false
                  containers:
                  - name: {{ $name }}
                    image: {{ $input.image }}
                    {{- if $ports }}
                    ports:
                    {{- range $ports }}
                    - containerPort: {{ .port }}
                      name: http-{{ .port }}
                    {{- end }}
                    {{- end }}
                    {{- if $input.env }}
                    env:
                    {{- range $input.env }}
                    - name: {{ .name }}
                      {{- if .valueFrom }}
                      valueFrom:
            {{ .valueFrom | toYaml | nindent 12 }}
                      {{- else }}
                      value: {{ .value | quote }}
                      {{- end }}
                    {{- end }}
                    {{- end }}
                    resources:
                      requests:
                        cpu: {{ $cpuRequest }}
                        memory: {{ $memoryRequest }}
                      limits:
                        cpu: {{ $cpuLimit }}
                        memory: {{ $memoryLimit }}
                    imagePullPolicy: {{ $input.imagePullPolicy | default "Always" }}
                    {{- if $input.probes }}
                    {{- if $input.probes.startup }}
                    startupProbe:
            {{ $input.probes.startup | toYaml | nindent 22 }}
                    {{- end }}
                    {{- if $input.probes.liveness }}
                    livenessProbe:
            {{ $input.probes.liveness | toYaml | nindent 22 }}
                    {{- end }}
                    {{- if $input.probes.readiness }}
                    readinessProbe:
            {{ $input.probes.readiness | toYaml | nindent 22 }}
                    {{- end }}
                    {{- end }}
            {{- if and $elasticEnabled (not $paused) }}

            ---

            apiVersion: autoscaling/v2
            kind: HorizontalPodAutoscaler
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-horizontal-pod-autoscaler
                gotemplating.fn.crossplane.io/ready: "True"
              labels:
                crossplane.io/composite: {{ $name }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: AP
                name: {{ $name }}
                uid: {{ $apUid }}
            spec:
              scaleTargetRef:
                apiVersion: apps/v1
                kind: Deployment
                name: {{ $name }}
              minReplicas: {{ $elasticMinReplicas }}
              maxReplicas: {{ $elasticMaxReplicas }}
              metrics:
              - type: Resource
                resource:
                  name: {{ $elasticTargetMetric }}
                  target:
                    {{- if eq $elasticTargetMetric "memory" }}
                    type: AverageValue
                    averageValue: {{ $elasticMemoryAverageValue }}
                    {{- else }}
                    type: Utilization
                    averageUtilization: {{ $elasticCpuUtilizationPercent }}
                    {{- end }}
            {{- end }}

            {{- if $ports }}
            ---

            apiVersion: v1
            kind: Service
            metadata:
              name: {{ printf "%s-service" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-service
                gotemplating.fn.crossplane.io/ready: "True"
              labels:
                crossplane.io/composite: {{ $name }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: AP
                name: {{ $name }}
                uid: {{ $apUid }}
            spec:
              selector:
                app: {{ $name }}
              ports:
              {{- range $ports }}
              - name: http-{{ .port }}
                port: {{ .port }}
                targetPort: {{ .port }}
                protocol: TCP
              {{- end }}
            {{- end }}
            {{- if $needIngress }}

            ---

            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: {{ printf "%s-ingress" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-ingress
                gotemplating.fn.crossplane.io/ready: "True"
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/ssl-redirect: 'false'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
              {{- if $spec.ingressAnnotations }}
              {{- range $k, $v := $spec.ingressAnnotations }}
                {{ $k }}: {{ $v | quote }}
              {{- end }}
              {{- end }}
              {{ if ne $projectName "" }}
              labels:
                crossplane.io/composite: {{ $name }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ if ne $projectUid "" }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
              {{ end }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: AP
                name: {{ $name }}
                uid: {{ $apUid }}
            spec:
              ingressClassName: nginx
              rules:
              {{- range $networkPublicAddresses }}
              - host: {{ .host }}
                http:
                  paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: {{ printf "%s-service" $name }}
                        port:
                          number: {{ .port }}
              {{- end }}
              tls:
              - hosts:
                {{- range $networkPublicAddresses }}
                - {{ .host }}
                {{- end }}
                secretName: wildcard-cert
            {{- end }}

            {{ if and (ne $projectName "") (ne $projectUid "") }}
            ---
            # Patch the AP claim itself with project affiliation. Crossplane does not merge
            # metadata.labels / metadata.ownerReferences from the composed `kind: AP` output
            # back onto the composite — only status is merged. So a provider-kubernetes Object
            # SSA-patches the AP. Requires RBAC on aps.example.crossplane.io (see
            # packages/crossplane/public/provider-kubernetes-example-rbac.yaml).
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}

            {{- /* AP status.phase: spec.paused wins; else derive from composed Deployment. */}}
            {{- $dep := getComposedResource . "app-deployment" }}
            {{- $phase := "Unknown" }}
            {{- if and (hasKey $spec "paused") $spec.paused }}
            {{- $phase = "Paused" }}
            {{- else if $dep }}
            {{-   $avail := "" }}
            {{-   $prog := "" }}
            {{-   $progReason := "" }}
            {{-   if and $dep.status $dep.status.conditions }}
            {{-     range $c := $dep.status.conditions }}
            {{-       if eq $c.type "Available" }}{{ $avail = $c.status }}{{ end }}
            {{-       if eq $c.type "Progressing" }}{{ $prog = $c.status }}{{ $progReason = default "" $c.reason }}{{ end }}
            {{-     end }}
            {{-   end }}
            {{-   if and (eq $avail "True") (eq $prog "True") (eq $progReason "NewReplicaSetAvailable") }}
            {{-     $phase = "Running" }}
            {{-   else if and (eq $prog "False") (eq $progReason "ProgressDeadlineExceeded") }}
            {{-     $phase = "Failed" }}
            {{-   else if eq $prog "True" }}
            {{-     $phase = "Progressing" }}
            {{-   else if eq $avail "False" }}
            {{-     $phase = "Degraded" }}
            {{-   end }}
            {{- end }}
            {{- $ingObs := getComposedResource . "app-ingress" }}
            {{- $pubScheme := "http" }}
            {{- if and $ingObs $ingObs.spec $ingObs.spec.tls }}
            {{- if gt (len $ingObs.spec.tls) 0 }}
            {{- $pubScheme = "https" }}
            {{- end }}
            {{- end }}

            {{- $entryTargetStatus := "unknown" }}
            {{- if eq $phase "Running" }}{{ $entryTargetStatus = "accessible" }}
            {{- else if eq $phase "Progressing" }}{{ $entryTargetStatus = "progressing" }}
            {{- else if or (eq $phase "Failed") (eq $phase "Degraded") (eq $phase "Paused") }}{{ $entryTargetStatus = "inaccessible" }}
            {{- end }}
            {{- if $needIngress }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-entrypoint" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-entrypoint
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
                - Delete
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: EntryPoint
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/composite: {{ $name | quote }}
                      {{ if ne $projectName "" }}
                      crossplane.io/project-name: {{ $projectName | quote }}
                      {{ end }}
                      {{ if ne $projectUid "" }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                      {{ end }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: AP
                      name: {{ $name }}
                      uid: {{ $apUid }}
                  spec:
                    apRef: {{ $name | quote }}
                    targets:
                      {{ range $networkPublicAddresses }}
                      - id: {{ .id | quote }}
                        port: {{ .port }}
                        platformDomain: {{ .host | quote }}
                        status: {{ $entryTargetStatus | quote }}
                      {{ end }}
            {{- end }}

            ---

            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
            status:
              phase: {{ $phase }}
              configVersionHash: {{ $versionHash }}
