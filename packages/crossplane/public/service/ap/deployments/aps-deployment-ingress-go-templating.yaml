apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-deployment-ingress-go-templating
  annotations:
    meta.crossplane.io/type: deployment
    meta.crossplane.io/display-name: app
    meta.crossplane.io/description: >
      Generic app with Deployment, Service, and optional Ingress per spec.input.endpoints[].public (default true).
      Container image is spec.input.image; replicas and CPU/memory are spec.resource (Kubernetes-shaped).
      With metadata.labels.region, hostname is {name}-{slug}.{region} for a single public port, or
      {name}-p{port}-{slug}.{region} when multiple endpoints are public. Optional endpoints.host when region
      is omitted. Optional spec.projectName observes a Project claim in the same namespace (kubernetes.m
      Object Observe), adds labels crossplane.io/project-name and crossplane.io/project-uid. Composed workloads
      (Deployment, Services, Ingress, ConfigMap, etc.) ownerReference the AP claim only; only the AP composite
      is SSA-patched to add Project ownerReferences/labels. Echoes status.projectName / status.projectUid
      (Crossplane does not merge composite metadata from composition output for most fields).
    # Lucide rocket as data URI; used when icon-url is omitted (frontend prefers icon-url, then icon-data).
    meta.crossplane.io/icon-data: "data:image/svg+xml;base64,"
    meta.crossplane.io/template: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        namespace: {{ namespace }}
        labels:
          region: 192.168.12.53.nip.io
      spec:
        crossplane:
          compositionRef:
            name: aps-deployment-ingress-go-templating
        # Optional: Project claim name (same namespace) for crossplane.io/project-name and owner refs
        # projectName: my-project
        input:
          image: {{ image }}
          network:
            privatePort: 80
        resource:
          replicas: 1
          requests:
            cpu: 200m
            memory: 204Mi
          limits:
            cpu: 2000m
            memory: 2048Mi
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-deployment-service-ingress
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $req := default dict $resource.requests }}
            {{- $lim := default dict $resource.limits }}
            {{- $replicas := 1 }}
            {{- if hasKey $resource "replicas" }}{{ $replicas = int $resource.replicas }}{{ end }}
            {{- $cpuRequest := "200m" }}
            {{- if $req.cpu }}{{ $cpuRequest = $req.cpu }}{{ end }}
            {{- $memoryRequest := "204Mi" }}
            {{- if $req.memory }}{{ $memoryRequest = $req.memory }}{{ end }}
            {{- $cpuLimit := "2000m" }}
            {{- if $lim.cpu }}{{ $cpuLimit = $lim.cpu }}{{ end }}
            {{- $memoryLimit := "2048Mi" }}
            {{- if $lim.memory }}{{ $memoryLimit = $lim.memory }}{{ end }}
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $network := $input.network | default dict }}
            {{- $privatePort := 0 }}
            {{- if hasKey $network "privatePort" }}{{ $privatePort = int $network.privatePort }}{{ end }}
            {{- $networkPublicAddresses := list }}
            {{- if and (gt $privatePort 0) (hasKey $network "publicAddresses") }}
            {{- range $network.publicAddresses }}
            {{- $pubHost := "" }}
            {{- if hasKey . "host" }}{{ $pubHost = trim (toString .host) }}{{ end }}
            {{- $pubPort := 0 }}
            {{- if hasKey . "port" }}{{ $pubPort = int .port }}{{ end }}
            {{- if and (ne $pubHost "") (gt $pubPort 0) }}
            {{- $networkPublicAddresses = concat $networkPublicAddresses (list (dict "host" $pubHost "port" $pubPort)) }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- $endpointsRaw := list }}
            {{- if gt $privatePort 0 }}
            {{- $endpointsRaw = list (dict "port" $privatePort "public" false) }}
            {{- range $networkPublicAddresses }}
            {{- $endpointsRaw = concat $endpointsRaw (list (dict "port" .port "host" .host "public" true "fixedHost" true)) }}
            {{- end }}
            {{- else if hasKey $input "endpoints" }}
            {{- $endpointsRaw = default (list) $input.endpoints }}
            {{- else if and $input.port $input.host }}
            {{- $endpointsRaw = list (dict "port" $input.port "host" (trim (toString $input.host))) }}
            {{- end }}
            {{- $publicOnly := list }}
            {{- range $endpointsRaw }}
            {{- $ipub := true }}
            {{- if hasKey . "public" }}{{ $ipub = .public }}{{ end }}
            {{- if $ipub }}{{ $publicOnly = concat $publicOnly (list 1) }}{{ end }}
            {{- end }}
            {{- $multiPublic := gt (len $publicOnly) 1 }}
            {{- $endpoints := list }}
            {{- range $endpointsRaw }}
            {{- $p := .port }}
            {{- $hostIn := "" }}
            {{- if hasKey . "host" }}{{ $hostIn = trim (toString .host) }}{{ end }}
            {{- $isPublic := true }}
            {{- if hasKey . "public" }}{{ $isPublic = .public }}{{ end }}
            {{- $fixedHost := false }}
            {{- if hasKey . "fixedHost" }}{{ $fixedHost = .fixedHost }}{{ end }}
            {{- $effHost := "" }}
            {{- if $isPublic }}
            {{-   if $fixedHost }}
            {{-     $effHost = $hostIn }}
            {{-   else if ne $region "" }}
            {{-     if $multiPublic }}{{ $effHost = printf "%s-p%d-%s.%s" $name $p $slug $region }}{{ else }}{{ $effHost = $computedHost }}{{ end }}
            {{-   else }}
            {{-     $effHost = $hostIn }}
            {{-   end }}
            {{- end }}
            {{- $endpoints = concat $endpoints (list (dict "port" $p "host" $effHost "public" $isPublic)) }}
            {{- end }}
            {{- $ports := list }}
            {{- $portsSeen := dict }}
            {{- range $endpoints }}
            {{- $portKey := printf "p%d" .port }}
            {{- if not (index $portsSeen $portKey) }}
            {{- $_ := set $portsSeen $portKey 1 }}
            {{- $ports = concat $ports (list (dict "port" .port)) }}
            {{- end }}
            {{- end }}
            {{- $needIngress := false }}
            {{- range $endpoints }}
            {{- if and .public (ne (trim (toString (default "" .host))) "") }}{{ $needIngress = true }}{{ end }}
            {{- end }}
            {{- /* Pause/start: AP spec.paused scales Deployment to zero with SealOS pause annotation. */}}
            {{- $paused := false }}
            {{- if and (hasKey $spec "paused") $spec.paused }}{{ $paused = true }}{{ end }}
            {{- $desiredReplicas := $replicas }}
            {{- if $paused }}{{ $desiredReplicas = 0 }}{{ end }}
            {{- $restartRequest := 0 }}
            {{- if hasKey $spec "restartRequest" }}{{ $restartRequest = int ($spec.restartRequest | default 0) }}{{ end }}
            {{- /* Build an effective spec snapshot with defaults resolved so rollback is self-contained */}}
            {{- $effectiveInput := dict
                  "image" ($input.image | default "")
                  "imagePullPolicy" ($input.imagePullPolicy | default "Always")
                  "env" ($input.env | default (list))
                  "probes" ($input.probes | default (dict))
            }}
            {{- if gt $privatePort 0 }}
            {{- $effectiveNetwork := dict "privatePort" $privatePort }}
            {{- if gt (len $networkPublicAddresses) 0 }}
            {{- $_ := set $effectiveNetwork "publicAddresses" $networkPublicAddresses }}
            {{- end }}
            {{- $_ := set $effectiveInput "network" $effectiveNetwork }}
            {{- else }}
            {{- $_ := set $effectiveInput "endpoints" $endpoints }}
            {{- end }}
            {{- $effective := dict
                  "name" $name
                  "namespace" $ns
                  "input" $effectiveInput
                  "resource" (dict
                    "replicas" $replicas
                    "requests" (dict "cpu" $cpuRequest "memory" $memoryRequest)
                    "limits" (dict "cpu" $cpuLimit "memory" $memoryLimit)
                  )
                  "projectName" $projectName
                  "paused" $paused
                  "restartRequest" $restartRequest
                  "ingressAnnotations" ($spec.ingressAnnotations | default (dict))
            }}
            {{- $effectiveYaml := $effective | toYaml }}
            {{- $versionHash := sha256sum $effectiveYaml | trunc 12 }}
            {{- $managedConfigMapName := printf "%s-config-backup" $name }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: {{ $managedConfigMapName }}
              namespace: {{ $ns }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: AP
                name: {{ $name }}
                uid: {{ $apUid }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-config-backup
                gotemplating.fn.crossplane.io/ready: "True"
                app.sealos.io/config-snapshot: "true"
                app.sealos.io/config-version-hash: {{ $versionHash }}
              labels:
                app.sealos.io/ap-uid: {{ $apUid }}
                app.sealos.io/backup: "true"
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
            data:
              config.yaml: |
                {{ $effectiveYaml | nindent 4 }}
            ---

            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                {{- if $paused }}
                deploy.cloud.sealos.io/pause: '{"target":"","value":""}'
                {{- else }}
                deploy.cloud.sealos.io/minReplicas: {{ $replicas | quote }}
                deploy.cloud.sealos.io/maxReplicas: {{ $replicas | quote }}
                deploy.cloud.sealos.io/resize: "0Gi"
                {{- end }}
              labels:
                crossplane.io/composite: {{ $name }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: AP
                name: {{ $name }}
                uid: {{ $apUid }}
            spec:
              replicas: {{ $desiredReplicas }}
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $name }}
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 0
                  maxSurge: 1
              template:
                metadata:
                  labels:
                    app: {{ $name }}
                    restartNonce: "{{ $restartRequest }}"
                spec:
                  imagePullSecrets:
                  - name: ghcr-cred
                  automountServiceAccountToken: false
                  containers:
                  - name: {{ $name }}
                    image: {{ $input.image }}
                    {{- if $ports }}
                    ports:
                    {{- range $ports }}
                    - containerPort: {{ .port }}
                      name: http-{{ .port }}
                    {{- end }}
                    {{- end }}
                    {{- if $input.env }}
                    env:
                    {{- range $input.env }}
                    - name: {{ .name }}
                      {{- if .valueFrom }}
                      valueFrom:
            {{ .valueFrom | toYaml | nindent 12 }}
                      {{- else }}
                      value: {{ .value | quote }}
                      {{- end }}
                    {{- end }}
                    {{- end }}
                    resources:
                      requests:
                        cpu: {{ $cpuRequest }}
                        memory: {{ $memoryRequest }}
                      limits:
                        cpu: {{ $cpuLimit }}
                        memory: {{ $memoryLimit }}
                    imagePullPolicy: {{ $input.imagePullPolicy | default "Always" }}
                    {{- if $input.probes }}
                    {{- if $input.probes.startup }}
                    startupProbe:
            {{ $input.probes.startup | toYaml | nindent 22 }}
                    {{- end }}
                    {{- if $input.probes.liveness }}
                    livenessProbe:
            {{ $input.probes.liveness | toYaml | nindent 22 }}
                    {{- end }}
                    {{- if $input.probes.readiness }}
                    readinessProbe:
            {{ $input.probes.readiness | toYaml | nindent 22 }}
                    {{- end }}
                    {{- end }}

            {{- if $ports }}
            ---

            apiVersion: v1
            kind: Service
            metadata:
              name: {{ printf "%s-service" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-service
              labels:
                crossplane.io/composite: {{ $name }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: AP
                name: {{ $name }}
                uid: {{ $apUid }}
            spec:
              selector:
                app: {{ $name }}
              ports:
              {{- range $ports }}
              - name: http-{{ .port }}
                port: {{ .port }}
                targetPort: {{ .port }}
                protocol: TCP
              {{- end }}
            {{- end }}
            {{- if $needIngress }}

            ---

            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: {{ printf "%s-ingress" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-ingress
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/ssl-redirect: 'false'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
              {{- if $spec.ingressAnnotations }}
              {{- range $k, $v := $spec.ingressAnnotations }}
                {{ $k }}: {{ $v | quote }}
              {{- end }}
              {{- end }}
              {{ if ne $projectName "" }}
              labels:
                crossplane.io/composite: {{ $name }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ if ne $projectUid "" }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
              {{ end }}
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: AP
                name: {{ $name }}
                uid: {{ $apUid }}
            spec:
              ingressClassName: nginx
              rules:
              {{- range $endpoints }}
              {{- if and .public (ne (trim (toString (default "" .host))) "") }}
              - host: {{ .host }}
                http:
                  paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: {{ printf "%s-service" $name }}
                        port:
                          number: {{ .port }}
              {{- end }}
              {{- end }}
              tls:
              - hosts:
                {{- range $endpoints }}
                {{- if and .public (ne (trim (toString (default "" .host))) "") }}
                - {{ .host }}
                {{- end }}
                {{- end }}
                secretName: wildcard-cert
            {{- end }}

            {{ if and (ne $projectName "") (ne $projectUid "") }}
            ---
            # Patch the AP claim itself with project affiliation. Crossplane does not merge
            # metadata.labels / metadata.ownerReferences from the composed `kind: AP` output
            # back onto the composite — only status is merged. So a provider-kubernetes Object
            # SSA-patches the AP. Requires RBAC on aps.example.crossplane.io (see
            # packages/crossplane/public/provider-kubernetes-example-rbac.yaml).
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}

            {{- /* AP status.phase: spec.paused wins; else derive from composed Deployment. */}}
            {{- $dep := getComposedResource . "app-deployment" }}
            {{- $phase := "Unknown" }}
            {{- if and (hasKey $spec "paused") $spec.paused }}
            {{- $phase = "Paused" }}
            {{- else if $dep }}
            {{-   $avail := "" }}
            {{-   $prog := "" }}
            {{-   $progReason := "" }}
            {{-   if and $dep.status $dep.status.conditions }}
            {{-     range $c := $dep.status.conditions }}
            {{-       if eq $c.type "Available" }}{{ $avail = $c.status }}{{ end }}
            {{-       if eq $c.type "Progressing" }}{{ $prog = $c.status }}{{ $progReason = default "" $c.reason }}{{ end }}
            {{-     end }}
            {{-   end }}
            {{-   if and (eq $avail "True") (eq $prog "True") (eq $progReason "NewReplicaSetAvailable") }}
            {{-     $phase = "Running" }}
            {{-   else if and (eq $prog "False") (eq $progReason "ProgressDeadlineExceeded") }}
            {{-     $phase = "Failed" }}
            {{-   else if eq $prog "True" }}
            {{-     $phase = "Progressing" }}
            {{-   else if eq $avail "False" }}
            {{-     $phase = "Degraded" }}
            {{-   end }}
            {{- end }}
            {{- $ingObs := getComposedResource . "app-ingress" }}
            {{- $pubScheme := "http" }}
            {{- if and $ingObs $ingObs.spec $ingObs.spec.tls }}
            {{- if gt (len $ingObs.spec.tls) 0 }}
            {{- $pubScheme = "https" }}
            {{- end }}
            {{- end }}

            {{- $entryTargetStatus := "unknown" }}
            {{- if eq $phase "Running" }}{{ $entryTargetStatus = "accessible" }}
            {{- else if eq $phase "Progressing" }}{{ $entryTargetStatus = "progressing" }}
            {{- else if or (eq $phase "Failed") (eq $phase "Degraded") (eq $phase "Paused") }}{{ $entryTargetStatus = "inaccessible" }}
            {{- end }}
            {{- if $needIngress }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-entrypoint" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-entrypoint
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
                - Delete
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: EntryPoint
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/composite: {{ $name | quote }}
                      {{ if ne $projectName "" }}
                      crossplane.io/project-name: {{ $projectName | quote }}
                      {{ end }}
                      {{ if ne $projectUid "" }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                      {{ end }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: AP
                      name: {{ $name }}
                      uid: {{ $apUid }}
                  spec:
                    apRef: {{ $name | quote }}
                    targets:
                      {{ range $endpoints }}
                      {{ if and .public (ne (trim (toString (default "" .host))) "") }}
                      - port: {{ .port }}
                        platformDomain: {{ trim (toString .host) | quote }}
                        status: {{ $entryTargetStatus | quote }}
                      {{ end }}
                      {{ end }}
            {{- end }}

            ---

            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
            status:
              phase: {{ $phase }}
              configVersionHash: {{ $versionHash }}
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
              {{ if gt (len $ports) 0 }}
              endpoints:
              {{ range $ports }}
              {{- $p := .port }}
              {{- $svcKey := "app-service" }}
              {{- $svcObs := getComposedResource $ $svcKey }}
              {{- $svcDns := printf "%s-service" $name }}
              {{- $priv := printf "http://%s.%s.svc:%v" $svcDns $ns $p }}
              {{- if and $svcObs $svcObs.spec $svcObs.spec.clusterIP }}
              {{- $cip := $svcObs.spec.clusterIP | toString }}
              {{- if and $cip (ne $cip "None") (ne $cip "") }}
              {{- $priv = printf "http://%s:%v" $cip $p }}
              {{- end }}
              {{- end }}
              {{- $pub := "" }}
              {{- $pubHost := "" }}
              {{- range $ep := $endpoints }}
              {{- if and $ep.public (eq (int $ep.port) (int $p)) (eq $pubHost "") (ne (trim (toString (default "" $ep.host))) "") }}
              {{- $pubHost = trim (toString $ep.host) }}
              {{- end }}
              {{- end }}
              {{- if ne $pubHost "" }}
              {{- if and $ingObs $ingObs.spec $ingObs.spec.rules }}
              {{- $wantSvc := $svcDns }}
              {{- range $rule := $ingObs.spec.rules }}
              {{- if and $rule.http $rule.host }}
              {{- range $rule.http.paths }}
              {{- if and .backend .backend.service .backend.service.name (eq .backend.service.name $wantSvc) }}
              {{- $pn := 0 }}{{ if .backend.service.port.number }}{{ $pn = .backend.service.port.number }}{{ end }}
              {{- if eq $pn $p }}
              {{- $pubHost = $rule.host }}
              {{- end }}
              {{- end }}
              {{- end }}
              {{- end }}
              {{- end }}
              {{- end }}
              {{- $pub = printf "%s://%s/" $pubScheme $pubHost }}
              {{- end }}
                - number: {{ $p }}
                  privateAddress: {{ $priv | quote }}
              {{- if ne $pub "" }}
                  publicAddress: {{ $pub | quote }}
              {{- end }}
              {{ end }}
              {{ end }}
              {{ if gt $privatePort 0 }}
