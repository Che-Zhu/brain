# CronJob to retain only the latest 10 orphaned snapshot ConfigMaps per AP instance per namespace.
# Also deletes orphaned snapshots whose AP no longer exists, if older than 2 days (room for resume).
# Orphaned snapshots (name contains -config-snapshot-) are created by the AP composition Job
# with label app.sealos.io/backup=true and app.sealos.io/ap-uid (AP UID).
# Requires ap-backup-cleanup-rbac.yaml (ServiceAccount + ClusterRole + ClusterRoleBinding).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ap-config-backup-cleanup
  namespace: crossplane-system
spec:
  schedule: "0 */6 * * *"   # every 6 hours
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          serviceAccountName: ap-backup-cleanup
          restartPolicy: OnFailure
          containers:
          - name: cleanup
            image: bitnami/kubectl:latest
            command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              KEEP=10
              STALE_AGE_SEC=172800

              # 1. Delete stale orphans: ap-uid references an AP that no longer exists, and ConfigMap is older than 2 days
              VALID_UIDS=$(kubectl get ap -A -o jsonpath='{range .items[*]}{.metadata.uid}{"\n"}{end}' 2>/dev/null | sort -u || true)
              kubectl get configmap -A -l app.sealos.io/backup=true -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{" "}{.metadata.labels.app\.sealos\.io/ap-uid}{" "}{.metadata.creationTimestamp}{"\n"}{end}' 2>/dev/null | grep -- '-config-snapshot-' | while read -r ns name ap_uid created; do
                [ -z "$ap_uid" ] && continue
                echo "$VALID_UIDS" | grep -Fxq "$ap_uid" 2>/dev/null && continue
                now=$(date +%s)
                created_sec=$(date -d "$created" +%s 2>/dev/null || date -d "${created%%Z}Z" +%s 2>/dev/null || true)
                [ -z "$created_sec" ] && continue
                age=$((now - created_sec))
                if [ "$age" -gt "$STALE_AGE_SEC" ]; then
                  echo "Deleting stale orphan $ns/$name (ap-uid $ap_uid no longer exists, age ${age}s > ${STALE_AGE_SEC}s)"
                  kubectl delete configmap -n "$ns" "$name" --ignore-not-found=true
                fi
              done

              # 2. Unique (namespace, ap-uid) pairs that have orphaned snapshot ConfigMaps (-config-snapshot-)
              pairs=$(kubectl get configmap -A -l app.sealos.io/backup=true \
                -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.labels.app\.sealos\.io/ap-uid}{"\n"}{end}' | sort -u || true)

              echo "$pairs" | while read -r ns ap_uid; do
                [ -z "$ns" ] && continue
                [ -z "$ap_uid" ] && continue
                echo "Cleaning up orphaned snapshots for ap-uid=$ap_uid in namespace=$ns"

                # List orphaned ConfigMaps only (name contains -config-snapshot-), oldest first; reverse so newest first
                configs=$(kubectl get configmap -n "$ns" \
                  -l "app.sealos.io/ap-uid=$ap_uid,app.sealos.io/backup=true" \
                  --sort-by=.metadata.creationTimestamp \
                  -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -- '-config-snapshot-' || true | tac)

                count=$(echo "$configs" | grep -c . || true)
                if [ "$count" -le "$KEEP" ]; then
                  echo "  Keeping all $count configs (<= $KEEP)"
                  continue
                fi

                # Skip first KEEP (newest), delete the rest
                to_delete=$(echo "$configs" | tail -n +$((KEEP + 1)))
                echo "$to_delete" | while read -r name; do
                  [ -z "$name" ] && continue
                  echo "  Deleting old snapshot: $ns/$name"
                  kubectl delete configmap -n "$ns" "$name" --ignore-not-found=true
                done
              done
              echo "Cleanup finished."
