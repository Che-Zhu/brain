apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-brain-system-go-templating
  annotations:
    meta.crossplane.io/display-name: brain-system bundle
    meta.crossplane.io/description: >
      Deploy one project Instance plus three APs (brain-api, brain-auth, brain-ui).
      The composed Instance matches packages/sealos composeInstanceResource (templateType inline,
      title, defaults.app_name). For each of api, auth, and ui you may set either a single port+host
      or spec.endpoints (array of { port, host }) for multiple Services/Ingress rules. If endpoints
      is present, it replaces port+host for that child (use [] for no exposure).
    meta.crossplane.io/template: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
      spec:
        crossplane:
          compositionRef:
            name: aps-brain-system-go-templating
        region: {{ region }}
        # Optional overrides (per child: port+host OR endpoints: [{ port, host }, ...]):
        # api:
        #   image: puddlecat/brain-api:latest
        #   endpoints:
        #     - port: 9000
        #       host: {{ name }}-api-p9000.{{ region }}
        # auth:
        #   image: puddlecat/brain-auth:latest
        # ui:
        #   image: puddlecat/brain-ui:latest
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-brain-system
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $region := "" }}
            {{- if hasKey $spec "region" }}
            {{- $region = trim (toString $spec.region) }}
            {{- end }}

            {{- $api := dict }}
            {{- if hasKey $spec "api" }}
            {{- $api = default (dict) $spec.api }}
            {{- end }}
            {{- $auth := dict }}
            {{- if hasKey $spec "auth" }}
            {{- $auth = default (dict) $spec.auth }}
            {{- end }}
            {{- $ui := dict }}
            {{- if hasKey $spec "ui" }}
            {{- $ui = default (dict) $spec.ui }}
            {{- end }}

            {{- $apiName := default (printf "%s-api" $name) $api.name }}
            {{- $authName := default (printf "%s-auth" $name) $auth.name }}
            {{- $uiName := default (printf "%s-ui" $name) $ui.name }}

            {{- $apiHost := default "" $api.host }}
            {{- if and (eq (trim (toString $apiHost)) "") (ne $region "") }}
            {{- $apiHost = printf "%s.%s" $apiName $region }}
            {{- end }}
            {{- $authHost := default "" $auth.host }}
            {{- if and (eq (trim (toString $authHost)) "") (ne $region "") }}
            {{- $authHost = printf "%s.%s" $authName $region }}
            {{- end }}
            {{- $uiHost := default "" $ui.host }}
            {{- if and (eq (trim (toString $uiHost)) "") (ne $region "") }}
            {{- $uiHost = printf "%s.%s" $uiName $region }}
            {{- end }}

            {{- $apiPort := 9000 }}
            {{- if hasKey $api "port" }}
            {{- $apiPort = $api.port }}
            {{- end }}
            {{- $authPort := 9500 }}
            {{- if hasKey $auth "port" }}
            {{- $authPort = $auth.port }}
            {{- end }}
            {{- $uiPort := 3000 }}
            {{- if hasKey $ui "port" }}
            {{- $uiPort = $ui.port }}
            {{- end }}

            {{- $apiEndpoints := list }}
            {{- if hasKey $api "endpoints" }}
            {{- $apiEndpoints = default (list) $api.endpoints }}
            {{- else if ne (trim (toString $apiHost)) "" }}
            {{- $apiEndpoints = list (dict "port" $apiPort "host" $apiHost) }}
            {{- end }}
            {{- $authEndpoints := list }}
            {{- if hasKey $auth "endpoints" }}
            {{- $authEndpoints = default (list) $auth.endpoints }}
            {{- else if ne (trim (toString $authHost)) "" }}
            {{- $authEndpoints = list (dict "port" $authPort "host" $authHost) }}
            {{- end }}
            {{- $uiEndpoints := list }}
            {{- if hasKey $ui "endpoints" }}
            {{- $uiEndpoints = default (list) $ui.endpoints }}
            {{- else if ne (trim (toString $uiHost)) "" }}
            {{- $uiEndpoints = list (dict "port" $uiPort "host" $uiHost) }}
            {{- end }}

            ---
            apiVersion: app.sealos.io/v1
            kind: Instance
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: brain-instance
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              templateType: inline
              title: {{ $name | quote }}
              defaults:
                app_name:
                  type: string
                  value: {{ $name | quote }}

            ---
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ $apiName }}
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: brain-api
                cloud.sealos.io/deploy-on-sealos-displayName: brain-api
            spec:
              crossplane:
                compositionRef:
                  name: aps-deployment-ingress-go-templating
              image: {{ default "puddlecat/brain-api:latest" $api.image }}
              replicas: {{ default 1 $api.replicas }}
              endpoints:
              {{- if $apiEndpoints }}
              {{ $apiEndpoints | toYaml | nindent 14 }}
              {{- else }}
                []
              {{- end }}
              cpuRequest: {{ default "200m" $api.cpuRequest }}
              memoryRequest: {{ default "204Mi" $api.memoryRequest }}
              cpuLimit: {{ default "2000m" $api.cpuLimit }}
              memoryLimit: {{ default "2048Mi" $api.memoryLimit }}
              imagePullPolicy: {{ default "Always" $api.imagePullPolicy }}
              env:
              {{- if hasKey $api "env" }}
              {{ default (list) $api.env | toYaml | nindent 14 }}
              {{- else }}
                []
              {{- end }}

            ---
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ $authName }}
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: brain-auth
                cloud.sealos.io/deploy-on-sealos-displayName: brain-auth
            spec:
              crossplane:
                compositionRef:
                  name: aps-deployment-ingress-go-templating
              image: {{ default "puddlecat/brain-auth:latest" $auth.image }}
              replicas: {{ default 1 $auth.replicas }}
              endpoints:
              {{- if $authEndpoints }}
              {{ $authEndpoints | toYaml | nindent 14 }}
              {{- else }}
                []
              {{- end }}
              cpuRequest: {{ default "200m" $auth.cpuRequest }}
              memoryRequest: {{ default "204Mi" $auth.memoryRequest }}
              cpuLimit: {{ default "2000m" $auth.cpuLimit }}
              memoryLimit: {{ default "2048Mi" $auth.memoryLimit }}
              imagePullPolicy: {{ default "Always" $auth.imagePullPolicy }}
              env:
              {{- if hasKey $auth "env" }}
              {{ default (list) $auth.env | toYaml | nindent 14 }}
              {{- else }}
                []
              {{- end }}

            ---
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ $uiName }}
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: brain-ui
                cloud.sealos.io/deploy-on-sealos-displayName: brain-ui
            spec:
              crossplane:
                compositionRef:
                  name: aps-deployment-ingress-go-templating
              image: {{ default "puddlecat/brain-ui:latest" $ui.image }}
              replicas: {{ default 1 $ui.replicas }}
              endpoints:
              {{- if $uiEndpoints }}
              {{ $uiEndpoints | toYaml | nindent 14 }}
              {{- else }}
                []
              {{- end }}
              cpuRequest: {{ default "200m" $ui.cpuRequest }}
              memoryRequest: {{ default "204Mi" $ui.memoryRequest }}
              cpuLimit: {{ default "2000m" $ui.cpuLimit }}
              memoryLimit: {{ default "2048Mi" $ui.memoryLimit }}
              imagePullPolicy: {{ default "Always" $ui.imagePullPolicy }}
              env:
              {{- if hasKey $ui "env" }}
              {{ default (list) $ui.env | toYaml | nindent 14 }}
              {{- else }}
                []
              {{- end }}
