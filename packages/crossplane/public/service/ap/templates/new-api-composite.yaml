apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-new-api-go-templating
  labels:
    template: new-api
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: New API
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/new-api/logo.png"
    meta.crossplane.io/description: Open-source AI model gateway compatible with the OpenAI API, with multi-provider routing, quota management, channel orchestration, and an admin dashboard.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/new-api/README.md"
    meta.crossplane.io/url: "https://docs.newapi.pro/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: new-api
        template: new-api
        # projectName: my-project
        name: {{ name }}
        input:
          # sessionSecret: auto-generated if omitted
          # cryptoSecret: auto-generated if omitted
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-new-api
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $sessionSecret := $input.sessionSecret | default (printf "%s" (randAlphaNum 32)) }}
            {{- $cryptoSecret := $input.cryptoSecret | default (printf "%s" (randAlphaNum 32)) }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-serviceaccount
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-role
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-rolebinding
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-redis
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-redis
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-cluster
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: redis-7.2.7
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/version: 7.2.7
                clusterversion.kubeblocks.io/name: redis-7.2.7
                clusterdefinition.kubeblocks.io/name: redis
            spec:
              affinity:
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys:
                  - kubernetes.io/hostname
              clusterDefinitionRef: redis
              componentSpecs:
                - name: redis
                  componentDef: redis-7
                  serviceVersion: 7.2.7
                  replicas: 1
                  serviceAccountName: {{ $appName }}-redis
                  enabledLogs:
                    - running
                  env:
                    - name: CUSTOM_SENTINEL_MASTER_NAME
                  switchPolicy:
                    type: Noop
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
                - name: redis-sentinel
                  componentDef: redis-sentinel-7
                  serviceVersion: 7.2.7
                  replicas: 1
                  serviceAccountName: {{ $appName }}-redis
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
              terminationPolicy: Delete
              topology: replication
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-serviceaccount-2
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-role-2
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-rolebinding-2
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-pg
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-pg
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-cluster-2
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: postgresql-16.4.0
                clusterdefinition.kubeblocks.io/name: postgresql
                clusterversion.kubeblocks.io/name: postgresql-16.4.0
            spec:
              affinity:
                podAntiAffinity: Preferred
                tenancy: SharedNode
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-16.4.0
              terminationPolicy: Delete
              componentSpecs:
                - name: postgresql
                  componentDefRef: postgresql
                  disableExporter: true
                  enabledLogs:
                    - running
                  replicas: 1
                  serviceAccountName: {{ $appName }}-pg
                  switchPolicy:
                    type: Noop
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-job
              namespace: {{ $ns }}
              name: {{ $appName }}-pg-init
            spec:
              ttlSecondsAfterFinished: 300
              backoffLimit: 3
              template:
                spec:
                  restartPolicy: OnFailure
                  containers:
                    - name: pgsql-init
                      image: postgres:16.4
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: PG_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                      command:
                        - /bin/sh
                        - -c
                        - |
                          set -eu
                          for i in $(seq 1 60); do
                            if pg_isready -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d postgres >/dev/null 2>&1; then
                              break
                            fi
                            sleep 2
                          done
                          pg_isready -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d postgres >/dev/null 2>&1
                          if ! PGPASSWORD="${PG_PASSWORD}" psql "postgresql://${PG_USERNAME}@${PG_HOST}:${PG_PORT}/postgres" -tAc "SELECT 1 FROM pg_database WHERE datname='new-api'" | grep -q 1; then
                            PGPASSWORD="${PG_PASSWORD}" psql "postgresql://${PG_USERNAME}@${PG_HOST}:${PG_PORT}/postgres" -v ON_ERROR_STOP=1 -c "CREATE DATABASE \"new-api\";"
                          fi
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: calciumion/new-api:v0.11.4
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              serviceName: {{ $appName }}
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                    cloud.sealos.io/app-deploy-manager: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: calciumion/new-api:v0.11.4
                      imagePullPolicy: IfNotPresent
                      args:
                        - --log-dir
                        - /app/logs
                      env:
                        - name: PG_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: SQL_DSN
                          value: postgresql://$(PG_USERNAME):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)/new-api
                        - name: REDIS_HOST
                          value: {{ $appName }}-redis-redis-redis.{{ $ns }}.svc.cluster.local
                        - name: REDIS_PORT
                          value: '6379'
                        - name: REDIS_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: username
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_CONN_STRING
                          value: redis://$(REDIS_USERNAME):$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)
                        - name: SESSION_SECRET
                          value: {{ $sessionSecret }}
                        - name: CRYPTO_SECRET
                          value: {{ $cryptoSecret }}
                        - name: TZ
                          value: Asia/Shanghai
                        - name: ERROR_LOG_ENABLED
                          value: 'true'
                        - name: BATCH_UPDATE_ENABLED
                          value: 'true'
                      ports:
                        - name: http
                          containerPort: 3000
                      resources:
                        limits:
                          cpu: 200m
                          memory: 256Mi
                        requests:
                          cpu: 20m
                          memory: 25Mi
                      livenessProbe:
                        httpGet:
                          path: /api/status
                          port: 3000
                          scheme: HTTP
                        initialDelaySeconds: 10
                        periodSeconds: 30
                        timeoutSeconds: 10
                        failureThreshold: 3
                      readinessProbe:
                        httpGet:
                          path: /api/status
                          port: 3000
                          scheme: HTTP
                        initialDelaySeconds: 10
                        periodSeconds: 30
                        timeoutSeconds: 10
                        failureThreshold: 3
                      startupProbe:
                        httpGet:
                          path: /api/status
                          port: 3000
                          scheme: HTTP
                        periodSeconds: 10
                        timeoutSeconds: 10
                        failureThreshold: 30
                      volumeMounts:
                        - name: vn-data
                          mountPath: /data
                        - name: vn-appvn-logs
                          mountPath: /app/logs
              volumeClaimTemplates:
                - metadata:
                    name: vn-data
                    annotations:
                      path: /data
                      value: '0.1'
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 103Mi
                - metadata:
                    name: vn-appvn-logs
                    annotations:
                      path: /app/logs
                      value: '0.1'
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 103Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                app: {{ $appName }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - name: tcp-3000
                  port: 3000
                  targetPort: 3000
                  protocol: TCP
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 3000
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: new-api-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/new-api/logo.png
              name: {{ $appName }}
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
