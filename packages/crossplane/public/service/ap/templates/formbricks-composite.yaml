apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-formbricks-go-templating
  labels:
    template: formbricks
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Formbricks
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/formbricks/logo.png"
    meta.crossplane.io/description: Formbricks provides a free and open source surveying platform. Gather feedback at every point in the user journey with beautiful in-app, website, link and email surveys.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/formbricks/README.md"
    meta.crossplane.io/url: "https://formbricks.com"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: formbricks
        template: formbricks
        # projectName: my-project
        name: {{ name }}
        input:
          # URL for your privacy policy page
          privacyUrl: "https://www.formbricks.com/privacy"
          # URL for your terms of service page
          termsUrl: "https://www.formbricks.com/terms"
          # URL for your imprint page
          imprintUrl: "https://www.formbricks.com/imprint"
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-formbricks
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $privacyUrl := $input.privacyUrl | default "https://www.formbricks.com/privacy" }}
            {{- $termsUrl := $input.termsUrl | default "https://www.formbricks.com/terms" }}
            {{- $imprintUrl := $input.imprintUrl | default "https://www.formbricks.com/imprint" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            # PostgreSQL Database Resources
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-serviceaccount
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-role
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-rolebinding
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-pg
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-pg
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-cluster
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: postgresql
                clusterversion.kubeblocks.io/name: postgresql-14.8.0
                sealos-db-provider-cr: {{ $appName }}-pg
              name: {{ $appName }}-pg
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-14.8.0
              componentSpecs:
                - componentDefRef: postgresql
                  monitor: true
                  name: postgresql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-pg
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
              terminationPolicy: Delete
            ---
            # PostgreSQL Init Job
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-job
              namespace: {{ $ns }}
              name: {{ $appName }}-pg-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: pgsql-init
                      image: postgres:14-alpine
                      env:
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: PG_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: DATABASE_URL
                          value: postgresql://$(PG_USERNAME):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until psql ${DATABASE_URL} -c 'CREATE EXTENSION IF NOT EXISTS vector; CREATE DATABASE formbricks;' &>/dev/null; do sleep 1; done
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            # Redis Database Resources
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-serviceaccount-2
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-role-2
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-rolebinding-2
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-redis
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-redis
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-cluster-2
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: redis
                kb.io/database: redis-7.2.7
                app.kubernetes.io/instance: {{ $appName }}
                app.kubernetes.io/version: 7.2.7
                helm.sh/chart: redis-cluster-0.9.0
                sealos-db-provider-cr: {{ $appName }}-redis
            spec:
              clusterDefinitionRef: redis
              affinity:
                podAntiAffinity: Preferred
                topologyKeys:
                  - kubernetes.io/hostname
              tolerations:
                - key: kb-data
                  operator: Equal
                  value: "true"
                  effect: NoSchedule
              componentSpecs:
                - name: redis
                  componentDef: redis-7
                  enabledLogs:
                    - running
                  env:
                    - name: CUSTOM_SENTINEL_MASTER_NAME
                  serviceVersion: 7.2.7
                  serviceAccountName: {{ $appName }}-redis
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                - componentDef: redis-sentinel-7
                  name: redis-sentinel
                  replicas: 1
                  resources:
                    limits:
                      cpu: 100m
                      memory: 100Mi
                    requests:
                      cpu: 10m
                      memory: 10Mi
                  serviceVersion: 7.2.7
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
              terminationPolicy: Delete
              topology: replication
            ---
            # Application Secret
            apiVersion: v1
            kind: Secret
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-secret
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            type: Opaque
            stringData:
              NEXTAUTH_SECRET: {{ randAlphaNum 32 }}
              ENCRYPTION_KEY: {{ randAlphaNum 32 }}
              CRON_SECRET: {{ randAlphaNum 32 }}
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-job-2
              namespace: {{ $ns }}
              name: {{ $appName }}-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: {{ $appName }}-init
                      image: ghcr.io/formbricks/formbricks:3.17.0
                      imagePullPolicy: IfNotPresent
                      env:
                        # Database configuration
                        - name: POSTGRES_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: POSTGRES_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: POSTGRES_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: POSTGRES_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DATABASE_URL
                          value: postgresql://$(POSTGRES_USERNAME):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/formbricks
                        
                        # Redis configuration
                        - name: REDIS_HOST
                          value: {{ $appName }}-redis-redis-redis
                        - name: REDIS_PORT
                          value: '6379'
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_URL
                          value: redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)
                        
                        # Application secrets
                        - name: NEXTAUTH_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: NEXTAUTH_SECRET
                        - name: ENCRYPTION_KEY
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: ENCRYPTION_KEY
                        - name: CRON_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: CRON_SECRET
                        
                        # Application URLs
                        - name: WEBAPP_URL
                          value: https://{{ $host }}
                        - name: NEXTAUTH_URL
                          value: https://{{ $host }}
                        - name: PRIVACY_URL
                          value: {{ $privacyUrl }}
                        - name: TERMS_URL
                          value: {{ $termsUrl }}
                        - name: IMPRINT_URL
                          value: {{ $imprintUrl }}
                        
                        # Other settings
                        - name: DOCKER_CRON_ENABLED
                          value: "0"
                        - name: EMAIL_VERIFICATION_DISABLED
                          value: "1"
                        - name: PASSWORD_RESET_DISABLED
                          value: "1"
                        - name: SIGNUP_DISABLED
                          value: "0"
                        - name: INVITE_DISABLED
                          value: "0"
                        - name: TELEMETRY_DISABLED
                          value: "1"
                      
                      resources:
                        limits:
                          cpu: 2000m
                          memory: 2048Mi
                        requests:
                          cpu: 200m
                          memory: 204Mi
                      command:
                        - /bin/sh
                        - -c
                        - |
                          sed -i "$(($(wc -l < /home/nextjs/start.sh)-2)),\$d" /home/nextjs/start.sh
                          /home/nextjs/start.sh
                  restartPolicy: OnFailure
              backoffLimit: 10
              ttlSecondsAfterFinished: 300
            ---
            # Application Deployment
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: ghcr.io/formbricks/formbricks:3.17.0
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: ghcr.io/formbricks/formbricks:3.17.0
                      imagePullPolicy: IfNotPresent
                      ports:
                        - containerPort: 3000
                          name: http
                          protocol: TCP
                      env:
                        # Database configuration
                        - name: POSTGRES_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: POSTGRES_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: POSTGRES_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: POSTGRES_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DATABASE_URL
                          value: postgresql://$(POSTGRES_USERNAME):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/formbricks
                        
                        # Redis configuration
                        - name: REDIS_HOST
                          value: {{ $appName }}-redis-redis-redis
                        - name: REDIS_PORT
                          value: '6379'
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_URL
                          value: redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)
                        
                        # Application secrets
                        - name: NEXTAUTH_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: NEXTAUTH_SECRET
                        - name: ENCRYPTION_KEY
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: ENCRYPTION_KEY
                        - name: CRON_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: CRON_SECRET
                        
                        # Application URLs
                        - name: WEBAPP_URL
                          value: https://{{ $host }}
                        - name: NEXTAUTH_URL
                          value: https://{{ $host }}
                        - name: PRIVACY_URL
                          value: {{ $privacyUrl }}
                        - name: TERMS_URL
                          value: {{ $termsUrl }}
                        - name: IMPRINT_URL
                          value: {{ $imprintUrl }}
                        
                        # Other settings
                        - name: DOCKER_CRON_ENABLED
                          value: "0"
                        - name: EMAIL_VERIFICATION_DISABLED
                          value: "1"
                        - name: PASSWORD_RESET_DISABLED
                          value: "1"
                        - name: SIGNUP_DISABLED
                          value: "0"
                        - name: INVITE_DISABLED
                          value: "0"
                        - name: TELEMETRY_DISABLED
                          value: "1"
                      
                      resources:
                        limits:
                          cpu: 500m
                          memory: 512Mi
                        requests:
                          cpu: 50m
                          memory: 51Mi
                      
                      livenessProbe:
                        failureThreshold: 15
                        httpGet:
                          path: /health
                          port: 3000
                        initialDelaySeconds: 30
                        periodSeconds: 10
                        successThreshold: 1
                        timeoutSeconds: 5
                      
                      readinessProbe:
                        failureThreshold: 5
                        httpGet:
                          path: /health
                          port: 3000
                        initialDelaySeconds: 10
                        periodSeconds: 10
                        successThreshold: 1
                        timeoutSeconds: 5
            ---
            # Service
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              type: ClusterIP
              selector:
                app: {{ $appName }}
              ports:
                - name: http
                  protocol: TCP
                  port: 3000
                  targetPort: 3000
            ---
            # Ingress
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 3000
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            # App CR
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: formbricks-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: 'https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/formbricks/logo.png'
              name: Formbricks
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
