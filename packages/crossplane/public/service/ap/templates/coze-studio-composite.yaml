apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-coze-studio-go-templating
  labels:
    template: coze-studio
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Coze Studio
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/coze-studio/logo.svg"
    meta.crossplane.io/description: An open-source AI agent development platform with integrated workflow, knowledge, memory, plugin, and chat capabilities.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/coze-studio/README.md"
    meta.crossplane.io/url: "https://github.com/coze-dev/coze-studio"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: coze-studio
        template: coze-studio
        # projectName: my-project
        name: {{ name }}
        input:
          # pluginAesAuthSecret: auto-generated if omitted
          # pluginAesStateSecret: auto-generated if omitted
          # pluginAesOauthTokenSecret: auto-generated if omitted
          # the API Key for Ark API Key
          apiKey: ""
          # the Model ID or Endpoint ID of Ark
          modelId: ""
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-coze-studio
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $pluginAesAuthSecret := $input.pluginAesAuthSecret | default (printf "%s" (randAlphaNum 32)) }}
            {{- $pluginAesStateSecret := $input.pluginAesStateSecret | default (printf "%s" (randAlphaNum 32)) }}
            {{- $pluginAesOauthTokenSecret := $input.pluginAesOauthTokenSecret | default (printf "%s" (randAlphaNum 32)) }}
            {{- $apiKey := $input.apiKey | default "" }}
            {{- $modelId := $input.modelId | default "" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: objectstorage.sealos.io/v1
            kind: ObjectStorageBucket
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-objectstoragebucket
              namespace: {{ $ns }}
              name: {{ $appName }}
            spec:
              policy: private
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-serviceaccount
              namespace: {{ $ns }}
              name: {{ $appName }}-mysql
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-role
              namespace: {{ $ns }}
              name: {{ $appName }}-mysql
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-rolebinding
              namespace: {{ $ns }}
              name: {{ $appName }}-mysql
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-mysql
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-mysql
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-cluster
              namespace: {{ $ns }}
              name: {{ $appName }}-mysql
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: ac-mysql-8.0.30-1
                clusterdefinition.kubeblocks.io/name: apecloud-mysql
                clusterversion.kubeblocks.io/name: ac-mysql-8.0.30-1
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys:
                  - kubernetes.io/hostname
              clusterDefinitionRef: apecloud-mysql
              clusterVersionRef: ac-mysql-8.0.30-1
              componentSpecs:
                - name: mysql
                  componentDefRef: mysql
                  monitor: true
                  replicas: 1
                  serviceAccountName: {{ $appName }}-mysql
                  switchPolicy:
                    type: Noop
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-serviceaccount-2
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-role-2
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-rolebinding-2
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-redis
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-redis
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-cluster-2
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: redis-7.2.7
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/version: 7.2.7
                clusterversion.kubeblocks.io/name: redis-7.2.7
                clusterdefinition.kubeblocks.io/name: redis
            spec:
              affinity:
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys:
                  - kubernetes.io/hostname
              clusterDefinitionRef: redis
              componentSpecs:
                - name: redis
                  componentDef: redis-7
                  serviceVersion: 7.2.7
                  replicas: 1
                  serviceAccountName: {{ $appName }}-redis
                  enabledLogs:
                    - running
                  env:
                    - name: CUSTOM_SENTINEL_MASTER_NAME
                  switchPolicy:
                    type: Noop
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
                - name: redis-sentinel
                  componentDef: redis-sentinel-7
                  serviceVersion: 7.2.7
                  replicas: 1
                  serviceAccountName: {{ $appName }}-redis
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
              terminationPolicy: Delete
              topology: replication
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}-config
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                app: {{ $appName }}-config
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-config
            data:
              vn-etcvn-nginxvn-nginxvn-conf: |
                worker_processes 1;
                events { worker_connections 1024; }

                http {
                  include       mime.types;
                  default_type  application/octet-stream;
                  sendfile      on;
                  keepalive_timeout 65;
                  client_max_body_size 0;
                  include /etc/nginx/conf.d/*.conf;
                }
              vn-etcvn-nginxvn-confvn-dvn-defaultvn-conf: |
                server {
                  listen 80;
                  server_name _;

                  location / {
                    root /usr/share/nginx/html;
                    try_files $uri $uri/ /index.html;
                    index index.html index.htm;
                    etag on;
                    if_modified_since exact;
                    add_header Cache-Control "no-cache";
                    add_header Cache-Control "public, max-age=3600";
                  }

                  location ~ ^/(api|v[1-3]|admin)(/|$) {
                    proxy_pass http://{{ $appName }}-server:8888;
                    proxy_set_header Host $http_host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 600s;
                    proxy_ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
                    proxy_ssl_verify off;
                    sub_filter ':8889' ':80/local_storage';
                    sub_filter_once off;
                    sub_filter_types 'application/json' 'text/event-stream';
                  }

                  location /local_storage/ {
                    if ($args ~* "(^|.*&)x-wf-file_name=[^&]*(&.*|$)") {
                      set $args $1$2;
                    }
                    if ($args ~* "^x-wf-file_name=[^&]*$") {
                      set $args "";
                    }
                    rewrite ^/local_storage/(.*)$ /$1 break;
                    proxy_pass http://{{ $appName }}-server:8889;
                    proxy_set_header Host $http_host;
                  }
                }
              vn-optvn-bitnamivn-elasticsearchvn-configvn-myvn-elast-1b395bf5: |
                cluster.name: coze-studio
                discovery.type: single-node
                network.host: 0.0.0.0
                http.port: 9200
                xpack.security.enabled: false
              vn-appvn-resourcesvn-confvn-modelvn-templatevn-arkvn-d-8dd26182: |
                id: 61010
                name: Doubao-Seed-1.6
                icon_uri: default_icon/doubao_v2.png
                icon_url: ""
                description:
                  zh: 全新多模态深度思考模型，同时支持 thinking、non-thinking、auto 三种思考模式。
                  en: "A brand-new multimodal deep thinking model supports thinking, non-thinking, and auto modes."
                meta:
                  protocol: ark
                  capability:
                    function_call: true
                    input_modal:
                      - text
                      - image
                      - video
                    input_tokens: 224000
                    json_mode: true
                    max_tokens: 256000
                    output_modal:
                      - text
                    output_tokens: 32000
                    prefix_caching: true
                    reasoning: true
                    prefill_response: false
                conn_config:
                  base_url: "https://ark.cn-beijing.volces.com/api/v3/"
                  api_key: "{{ $apiKey }}"
                  timeout: 0s
                  model: "{{ $modelId }}"
                  temperature: 0.1
                  frequency_penalty: 0
                  presence_penalty: 0
                  max_tokens: 4096
                  top_p: 0.7
                  top_k: 0
                  stop: []
                  enable_thinking: true
                  ark:
                    region: ""
                    access_key: ""
                    secret_key: ""
                    retry_times: null
                  custom_header: {}
                  custom: {}
                status: 0
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-nsqlookupd
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $appName }}-nsqlookupd
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-nsqlookupd
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: nsqio/nsq:v1.2.1
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-nsqlookupd
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-nsqlookupd
                    cloud.sealos.io/app-deploy-manager: {{ $appName }}-nsqlookupd
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-nsqlookupd
                      image: nsqio/nsq:v1.2.1
                      imagePullPolicy: IfNotPresent
                      command:
                        - /nsqlookupd
                      ports:
                        - containerPort: 4160
                          name: tcp
                        - containerPort: 4161
                          name: http
                      livenessProbe:
                        tcpSocket:
                          port: 4160
                        initialDelaySeconds: 10
                        periodSeconds: 10
                      readinessProbe:
                        tcpSocket:
                          port: 4160
                        initialDelaySeconds: 5
                        periodSeconds: 5
                      resources:
                        limits:
                          cpu: 200m
                          memory: 256Mi
                        requests:
                          cpu: 20m
                          memory: 25Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-service
              namespace: {{ $ns }}
              name: {{ $appName }}-nsqlookupd
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                app: {{ $appName }}-nsqlookupd
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-nsqlookupd
            spec:
              selector:
                app: {{ $appName }}-nsqlookupd
              ports:
                - name: tcp
                  port: 4160
                  targetPort: 4160
                - name: http
                  port: 4161
                  targetPort: 4161
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-nsqd
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $appName }}-nsqd
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-nsqd
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-deployment-2
                originImageName: nsqio/nsq:v1.2.1
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-nsqd
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-nsqd
                    cloud.sealos.io/app-deploy-manager: {{ $appName }}-nsqd
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-nsqd
                      image: nsqio/nsq:v1.2.1
                      imagePullPolicy: IfNotPresent
                      command:
                        - /nsqd
                        - --lookupd-tcp-address={{ $appName }}-nsqlookupd:4160
                        - --broadcast-address={{ $appName }}-nsqd
                      ports:
                        - containerPort: 4150
                          name: tcp
                        - containerPort: 4151
                          name: http
                      livenessProbe:
                        tcpSocket:
                          port: 4150
                        initialDelaySeconds: 15
                        periodSeconds: 10
                      readinessProbe:
                        tcpSocket:
                          port: 4150
                        initialDelaySeconds: 5
                        periodSeconds: 5
                      resources:
                        limits:
                          cpu: 200m
                          memory: 256Mi
                        requests:
                          cpu: 20m
                          memory: 25Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-nsqd
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                app: {{ $appName }}-nsqd
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-nsqd
            spec:
              selector:
                app: {{ $appName }}-nsqd
              ports:
                - name: tcp
                  port: 4150
                  targetPort: 4150
                - name: http
                  port: 4151
                  targetPort: 4151
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-etcd
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $appName }}-etcd
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-etcd
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: coze-studio-statefulset
                originImageName: bitnamilegacy/etcd@sha256:1b9977cf4cce7546873e0ee50e684c38a38a4e7a27d22086fbd2b8a1b44a69d0
            spec:
              revisionHistoryLimit: 1
              persistentVolumeClaimRetentionPolicy:
                whenDeleted: Delete
                whenScaled: Delete
              serviceName: {{ $appName }}-etcd
              replicas: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-etcd
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-etcd
                    cloud.sealos.io/app-deploy-manager: {{ $appName }}-etcd
                spec:
                  automountServiceAccountToken: false
                  securityContext:
                    fsGroup: 1001
                  initContainers:
                    - name: init-data-dir
                      image: busybox:1.36.1
                      imagePullPolicy: IfNotPresent
                      command:
                        - sh
                        - -c
                        - mkdir -p /bitnami/etcd/data && chown -R 1001:0 /bitnami/etcd && chmod -R ug+rwX /bitnami/etcd
                      volumeMounts:
                        - name: data
                          mountPath: /bitnami/etcd
                  containers:
                    - name: {{ $appName }}-etcd
                      image: bitnamilegacy/etcd@sha256:1b9977cf4cce7546873e0ee50e684c38a38a4e7a27d22086fbd2b8a1b44a69d0
                      imagePullPolicy: IfNotPresent
                      securityContext:
                        runAsNonRoot: true
                        allowPrivilegeEscalation: false
                        capabilities:
                          drop:
                            - ALL
                      command:
                        - /opt/bitnami/scripts/etcd/entrypoint.sh
                        - /opt/bitnami/scripts/etcd/run.sh
                      env:
