apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-dify-go-templating
  labels:
    template: dify
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Dify
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/dify/logo.svg"
    meta.crossplane.io/description: Dify is an open-source LLM app development platform.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/dify/README.md"
    meta.crossplane.io/url: "https://dify.ai/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: dify
        template: dify
        # projectName: my-project
        name: {{ name }}
        input:
          # secretKey: auto-generated if omitted
          # innerApiKey: auto-generated if omitted
          # pluginDaemonKey: auto-generated if omitted
          # admin init password (required)
          initPassword: ""
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-dify
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $secretKey := $input.secretKey | default (printf "sk-%s" (randAlphaNum 45)) }}
            {{- $innerApiKey := $input.innerApiKey | default (printf "sk-%s" (randAlphaNum 32)) }}
            {{- $pluginDaemonKey := $input.pluginDaemonKey | default (printf "sk-%s" (randAlphaNum 32)) }}
            {{- $initPassword := $input.initPassword | default "" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-api
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dify-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: langgenius/dify-api:1.11.2
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-api
                app: {{ $appName }}-api
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}-api
              selector:
                matchLabels:
                  app: {{ $appName }}-api
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-api
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  initContainers:
                    - name: wait-db
                      image: senzing/postgresql-client:2.2.4
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: DATABASE_URL
                          value: postgresql://$(PG_USERNAME):$(PG_PASSWORD)@{{ $appName }}-pg-postgresql.{{ $ns }}.svc:$(PG_PORT)
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until pg_isready -d $(DATABASE_URL); do
                            echo "Waiting for database to start..."
                            sleep 2
                          done
                          echo "Database is ready"
                          until psql ${DATABASE_URL} -lqt | cut -d \| -f 1 | grep -qw dify; do
                            echo "Waiting for dify database to be created..."
                            sleep 5
                          done
                          echo "Dify database is ready"
                    - name: init-permissions
                      image: busybox:1.37.0
                      imagePullPolicy: IfNotPresent
                      command:
                        - /bin/sh
                        - -c
                        - |
                          FLAG_FILE="/app/api/storage/.init_permissions"
                          if [ -f "{{ "${FLAG_FILE}" }}" ]; then
                            echo "Permissions already initialized. Exiting."
                            exit 0
                          fi
                          echo "Initializing permissions for /app/api/storage"
                          chown -R 1001:1001 /app/api/storage && touch "{{ "${FLAG_FILE}" }}"
                          echo "Permissions initialized. Exiting."
                      volumeMounts:
                        - name: vn-appvn-apivn-storage
                          mountPath: /app/api/storage
                  containers:
                    - name: {{ $appName }}-api
                      image: langgenius/dify-api:1.11.2
                      env:
                        - name: MODE
                          value: api
                        - name: LOG_LEVEL
                          value: INFO
                        - name: SECRET_KEY
                          value: {{ $secretKey }}
                        - name: CONSOLE_WEB_URL
                          value: https://{{ $host }}
                        - name: INIT_PASSWORD
                          value: {{ $initPassword }}
                        - name: CONSOLE_API_URL
                          value: https://{{ $host }}
                        - name: SERVICE_API_URL
                          value: https://{{ $host }}
                        - name: APP_API_URL
                          value: https://{{ $host }}
                        - name: FILES_URL
                          value: ''
                        - name: MIGRATION_ENABLED
                          value: 'true'
                        - name: DB_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: DB_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DB_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: DB_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: DB_DATABASE
                          value: dify
                        - name: REDIS_HOST
                          value: {{ $appName }}-redis-redis-redis
                        - name: REDIS_PORT
                          value: '6379'
                        - name: REDIS_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: username
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_USE_SSL
                          value: 'false'
                        - name: REDIS_DB
                          value: '0'
                        - name: CELERY_BROKER_URL
                          value: redis://$(REDIS_USERNAME):$(REDIS_PASSWORD)@$(REDIS_HOST).{{ $ns }}.svc:$(REDIS_PORT)/1
                        - name: WEB_API_CORS_ALLOW_ORIGINS
                          value: '*'
                        - name: CONSOLE_CORS_ALLOW_ORIGINS
                          value: '*'
                        - name: STORAGE_TYPE
                          value: 'opendal'
                        - name: OPENDAL_SCHEME
                          value: 'fs'
                        - name: OPENDAL_FS_ROOT
                          value: 'storage'
                        - name: STORAGE_LOCAL_PATH
                          value: '/app/api/storage'
                        - name: VECTOR_STORE
                          value: 'weaviate'
                        - name: WEAVIATE_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-weaviate-conn-credential
                              key: host
                        - name: WEAVIATE_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-weaviate-conn-credential
                              key: port
                        - name: WEAVIATE_ENDPOINT
                          value: http://$(WEAVIATE_HOST):$(WEAVIATE_PORT)
                        - name: WEAVIATE_API_KEY
                          value: ""
                        - name: CODE_EXECUTION_ENDPOINT
                          value: http://{{ $appName }}-sandbox.{{ $ns }}.svc:8194
                        - name: CODE_EXECUTION_API_KEY
                          value: dify-sandbox
                        - name: CODE_MAX_NUMBER
                          value: '9223372036854775807'
                        - name: CODE_MIN_NUMBER
                          value: '-9223372036854775808'
                        - name: CODE_MAX_STRING_LENGTH
                          value: '80000'
                        - name: TEMPLATE_TRANSFORM_MAX_LENGTH
                          value: '80000'
                        - name: CODE_MAX_STRING_ARRAY_LENGTH
                          value: '30'
                        - name: CODE_MAX_OBJECT_ARRAY_LENGTH
                          value: '30'
                        - name: CODE_MAX_NUMBER_ARRAY_LENGTH
                          value: '1000'
                        - name: CONSOLE_API_URL
                          value: https://{{ $host }}
                        - name: CONSOLE_WEB_URL
                          value: https://{{ $host }}
                        - name: APP_WEB_URL
                          value: https://{{ $host }}
                        - name: SERVICE_API_URL
                          value: https://{{ $host }}
                        - name: PLUGIN_DAEMON_URL
                          value: http://{{ $appName }}-plugin-daemon:5002
                        - name: PLUGIN_DAEMON_KEY
                          value: {{ $pluginDaemonKey }}
                        - name: PLUGIN_REMOTE_INSTALL_HOST
                          value: {{ $appName }}-plugin-daemon
                        - name: PLUGIN_REMOTE_INSTALL_PORT
                          value: '5003'
                        - name: PLUGIN_MAX_PACKAGE_SIZE
                          value: '52428800'
                        - name: INNER_API_KEY_FOR_PLUGIN
                          value: {{ $innerApiKey }}
                      resources:
                        requests:
                          cpu: 200m
                          memory: 256Mi
                          ephemeral-storage: 200Mi
                        limits:
                          cpu: 1000m
                          memory: 2Gi
                          ephemeral-storage: 200Mi
                      ports:
                        - containerPort: 5001
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-appvn-apivn-storage
                          mountPath: /app/api/storage
                    - name: {{ $appName }}-worker
                      image: langgenius/dify-api:1.11.2
                      env:
                        - name: MODE
                          value: worker
                        - name: LOG_LEVEL
                          value: INFO
                        - name: SECRET_KEY
                          value: {{ $secretKey }}
                        - name: DB_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: DB_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DB_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: DB_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: DB_DATABASE
                          value: dify
                        - name: REDIS_HOST
                          value: {{ $appName }}-redis-redis-redis
                        - name: REDIS_PORT
                          value: '6379'
                        - name: REDIS_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: username
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_USE_SSL
                          value: 'false'
                        - name: REDIS_DB
                          value: '0'
                        - name: CELERY_BROKER_URL
                          value: redis://$(REDIS_USERNAME):$(REDIS_PASSWORD)@$(REDIS_HOST).{{ $ns }}.svc:$(REDIS_PORT)/1
                        - name: WEB_API_CORS_ALLOW_ORIGINS
                          value: '*'
                        - name: CONSOLE_CORS_ALLOW_ORIGINS
                          value: '*'
                        - name: STORAGE_TYPE
                          value: 'opendal'
                        - name: OPENDAL_SCHEME
                          value: 'fs'
                        - name: OPENDAL_FS_ROOT
                          value: 'storage'
                        - name: STORAGE_LOCAL_PATH
                          value: '/app/api/storage'
                        - name: VECTOR_STORE
                          value: 'weaviate'
                        - name: WEAVIATE_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-weaviate-conn-credential
                              key: host
                        - name: WEAVIATE_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-weaviate-conn-credential
                              key: port
                        - name: WEAVIATE_ENDPOINT
                          value: http://$(WEAVIATE_HOST):$(WEAVIATE_PORT)
                        - name: WEAVIATE_API_KEY
                          value: ""
                        - name: CONSOLE_API_URL
                          value: https://{{ $host }}
                        - name: CONSOLE_WEB_URL
                          value: https://{{ $host }}
                        - name: APP_WEB_URL
                          value: https://{{ $host }}
                        - name: SERVICE_API_URL
                          value: https://{{ $host }}
                        - name: PLUGIN_DAEMON_URL
                          value: http://{{ $appName }}-plugin-daemon:5002
                        - name: PLUGIN_DAEMON_KEY
                          value: {{ $pluginDaemonKey }}
                        - name: PLUGIN_REMOTE_INSTALL_HOST
                          value: {{ $appName }}-plugin-daemon
                        - name: PLUGIN_REMOTE_INSTALL_PORT
                          value: '5003'
                        - name: PLUGIN_MAX_PACKAGE_SIZE
                          value: '52428800'
                        - name: INNER_API_KEY_FOR_PLUGIN
                          value: {{ $innerApiKey }}
                      resources:
                        requests:
                          cpu: 200m
                          memory: 256Mi
                          ephemeral-storage: 200Mi
                        limits:
                          cpu: 1000m
                          memory: 2Gi
                          ephemeral-storage: 200Mi
                      ports:
                        - containerPort: 5001
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-appvn-apivn-storage
                          mountPath: /app/api/storage
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /app/api/storage
                      value: '1'
                    name: vn-appvn-apivn-storage
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dify-service
              namespace: {{ $ns }}
              name: {{ $appName }}-api
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-api
            spec:
              ports:
                - port: 5001
              selector:
                app: {{ $appName }}-api
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-web
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dify-deployment
                originImageName: langgenius/dify-web:1.11.2
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-web
                app: {{ $appName }}-web
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-web
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-web
                spec:
                  automountServiceAccountToken: false
                  initContainers:
                    - name: wait-db
                      image: senzing/postgresql-client:2.2.4
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: DATABASE_URL
                          value: postgresql://$(PG_USERNAME):$(PG_PASSWORD)@{{ $appName }}-pg-postgresql.{{ $ns }}.svc:$(PG_PORT)
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until pg_isready -d $(DATABASE_URL); do
                            echo "Waiting for database to start..."
                            sleep 2
                          done
                          echo "Database is ready"
                          until psql ${DATABASE_URL} -lqt | cut -d \| -f 1 | grep -qw dify; do
                            echo "Waiting for dify database to be created..."
                            sleep 5
                          done
                          echo "Dify database is ready"
                  containers:
                    - name: {{ $appName }}-web
                      image: langgenius/dify-web:1.11.2
                      env:
                        - name: EDITION
                          value: SELF_HOSTED
                        - name: CONSOLE_API_URL
                          value: https://{{ $host }}
                        - name: CONSOLE_WEB_URL
                          value: https://{{ $host }}
                        - name: APP_API_URL
                          value: https://{{ $host }}
                        - name: APP_WEB_URL
                          value: https://{{ $host }}
                        - name: SERVICE_API_URL
                          value: https://{{ $host }}
                        - name: MARKETPLACE_API_URL
                          value: https://marketplace.dify.ai
                        - name: MARKETPLACE_URL
                          value: https://marketplace.dify.ai
                      resources:
                        requests:
                          cpu: 100m
                          memory: 256Mi
                        limits:
                          cpu: 1
                          memory: 2Gi
                      ports:
                        - containerPort: 3000
                      imagePullPolicy: IfNotPresent
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dify-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-web
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-web
            spec:
              ports:
                - port: 3000
              selector:
                app: {{ $appName }}-web
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-web
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-web
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dify-ingress
                kubernetes.io/ingress.class: nginx
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}-web
                            port:
                              number: 3000
                      - pathType: Prefix
                        path: /explore
                        backend:
                          service:
                            name: {{ $appName }}-web
                            port:
                              number: 3000
                      - pathType: Prefix
                        path: /console/api
                        backend:
                          service:
                            name: {{ $appName }}-api
                            port:
                              number: 5001
                      - pathType: Prefix
                        path: /api
                        backend:
                          service:
                            name: {{ $appName }}-api
                            port:
                              number: 5001
                      - pathType: Prefix
                        path: /v1
                        backend:
                          service:
                            name: {{ $appName }}-api
                            port:
                              number: 5001
                      - pathType: Prefix
                        path: /files
                        backend:
                          service:
                            name: {{ $appName }}-api
                            port:
                              number: 5001
                      - pathType: Prefix
                        path: /mcp
                        backend:
                          service:
                            name: {{ $appName }}-api
                            port:
                              number: 5001
                      - pathType: Prefix
                        path: /triggers
                        backend:
                          service:
                            name: {{ $appName }}-api
                            port:
                              number: 5001
                      - pathType: Prefix
                        path: /e
                        backend:
                          service:
                            name: {{ $appName }}-plugin-daemon
                            port:
                              number: 5002
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: apps/v1
