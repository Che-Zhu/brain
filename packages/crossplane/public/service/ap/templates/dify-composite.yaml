                app: {{ $appName }}-plugin-daemon
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}-plugin-daemon
              selector:
                matchLabels:
                  app: {{ $appName }}-plugin-daemon
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-plugin-daemon
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  initContainers:
                    - name: wait-db
                      image: senzing/postgresql-client:2.2.4
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: DATABASE_URL
                          value: postgresql://$(PG_USERNAME):$(PG_PASSWORD)@{{ $appName }}-pg-postgresql.{{ $ns }}.svc:$(PG_PORT)
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until pg_isready -d $(DATABASE_URL); do
                            echo "Waiting for database to start..."
                            sleep 2
                          done
                          echo "Database is ready"
                          until psql ${DATABASE_URL} -lqt | cut -d \| -f 1 | grep -qw dify; do
                            echo "Waiting for dify database to be created..."
                            sleep 5
                          done
                          echo "Dify database is ready"
                  containers:
                    - name: {{ $appName }}-plugin-daemon
                      image: langgenius/dify-plugin-daemon:0.5.2-local
                      env:
                        - name: DB_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: DB_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DB_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: DB_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: DB_DATABASE
                          value: dify
                        - name: REDIS_HOST
                          value: {{ $appName }}-redis-redis-redis
                        - name: REDIS_PORT
                          value: '6379'
                        - name: REDIS_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: username
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_USE_SSL
                          value: 'false'
                        - name: REDIS_DB
                          value: '0'
                        - name: DB_DATABASE
                          value: dify_plugin
                        - name: SERVER_PORT
                          value: '5002'
                        - name: SERVER_KEY
                          value: {{ $pluginDaemonKey }}
                        - name: MAX_PLUGIN_PACKAGE_SIZE
                          value: '52428800'
                        - name: PPROF_ENABLED
                          value: 'false'
                        - name: DIFY_INNER_API_URL
                          value: http://{{ $appName }}-api:5001
                        - name: DIFY_INNER_API_KEY
                          value: {{ $innerApiKey }}
                        - name: PLUGIN_REMOTE_INSTALLING_HOST
                          value: localhost
                        - name: PLUGIN_REMOTE_INSTALLING_PORT
                          value: '5003'
                        - name: PLUGIN_WORKING_PATH
                          value: /app/storage/cwd
                        - name: FORCE_VERIFYING_SIGNATURE
                          value: 'true'
                        # - name: PIP_MIRROR_URL
                        #   value: https://pypi.tuna.tsinghua.edu.cn/simple
                      resources:
                        requests:
                          cpu: 100m
                          memory: 128Mi
                          ephemeral-storage: 500Mi
                        limits:
                          cpu: 1
                          memory: 1Gi
                          ephemeral-storage: 500Mi
                      ports:
                        - name: server-port
                          containerPort: 5002
                        - name: remote-port
                          containerPort: 5003
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-appvn-storage
                          mountPath: /app/storage
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /app/storage
                      value: '3'
                    name: vn-appvn-storage
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 3Gi
