apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-rocketchat-micro-go-templating
  labels:
    template: rocketchat-micro
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Rocket.Chat Microservices
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/rocketchat-micro/logo.svg"
    meta.crossplane.io/description: Rocket.Chat Microservices is an enterprise-grade, open-source communication platform built with a microservices architecture for superior scalability and performance. Ideal for organizations requiring high availability and horizontal scaling capabilities.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/rocketchat-micro/README.md"
    meta.crossplane.io/url: "https://rocket.chat/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: rocketchat-micro
        template: rocketchat-micro
        # projectName: my-project
        name: {{ name }}
        input:
          {}
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-rocketchat-micro
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            # MongoDB Database
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-mongo
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-mongo
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: mongodb-8.0.4
                app.kubernetes.io/instance: {{ $appName }}
                helm.sh/chart: mongodb-cluster-0.9.1
                sealos-db-provider-cr: {{ $appName }}-mongo
              annotations: {}
              name: {{ $appName }}-mongo
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              componentSpecs:
                - componentDef: mongodb
                  serviceVersion: 8.0.4
                  name: mongodb
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-mongo
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-job
              namespace: {{ $ns }}
              name: {{ $appName }}-mongo-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: mongo-init
                      image: mongo:6.0
                      env:
                        - name: MONGO_INITDB_ROOT_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mongodb-mongodb-account-root
                              key: password
                        - name: MONGO_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mongodb-mongodb-account-root
                              key: host
                      command:
                        - /bin/bash
                        - -c
                        - |
                          # Wait for MongoDB to be ready
                          until mongosh "mongodb://root:${MONGO_INITDB_ROOT_PASSWORD}@${MONGO_HOST}:27017/admin" --eval "db.adminCommand('ping')" &>/dev/null; do
                            echo "Waiting for MongoDB..."
                            sleep 2
                          done
                          
                          # Create rocketchat database and user
                          mongosh "mongodb://root:${MONGO_INITDB_ROOT_PASSWORD}@${MONGO_HOST}:27017/admin" <<EOF
                          use rocketchat
                          db.createUser({
                            user: "rocketchat",
                            pwd: "rocketchat",
                            roles: [
                              { role: "readWrite", db: "rocketchat" },
                              { role: "clusterMonitor", db: "admin" }
                            ]
                          })
                          EOF
                      resources:
                        requests:
                          cpu: 10m
                          memory: 51Mi
                        limits:
                          cpu: 100m
                          memory: 512Mi
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            # ConfigMap for all application configs
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}-nats
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-nats
            data:
              vn-etcvn-natsvn-configvn-natsvn-conf: |
                # NATS Clients Port
                port: 4222

                # PID file shared with configuration reloader.
                pid_file: "/var/run/nats/nats.pid"

                ###############
                #             #
                # Monitoring  #
                #             #
                ###############
                http: 8222
                server_name:$POD_NAME
                ###################################
                #                                 #
                # NATS Full Mesh Clustering Setup #
                #                                 #
                ###################################
                cluster {
                  port: 6222

                  routes = [
                    nats://{{ $appName }}-nats-0.{{ $appName }}-nats.{{ $ns }}.svc.cluster.local:6222,
                    nats://{{ $appName }}-nats-1.{{ $appName }}-nats.{{ $ns }}.svc.cluster.local:6222,
                  ]
                  cluster_advertise: $CLUSTER_ADVERTISE

                  connect_retries: 120
                }
                lame_duck_grace_period: 10s
                lame_duck_duration: 30s
            ---
            # Main Rocket.Chat Application
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: rocketchat/rocket.chat:7.9.0
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              strategy:
                rollingUpdate:
                  maxSurge: 1
                  maxUnavailable: 1
                type: RollingUpdate
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: rocketchat/rocket.chat:7.9.0
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: DEPLOY_PLATFORM
                          value: sealos-microservices
                        - name: INSTANCE_IP
                          valueFrom:
                            fieldRef:
                              fieldPath: status.podIP
                        - name: MONGO_ROOT_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mongodb-mongodb-account-root
                              key: password
                        - name: MONGO_ENDPOINT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mongodb-mongodb-account-root
                              key: endpoint
                        - name: MONGO_URL
                          value: mongodb://rocketchat:rocketchat@$(MONGO_ENDPOINT)/rocketchat?replicaSet={{ $appName }}-mongo-mongodb
                        - name: MONGO_OPLOG_URL
                          value: mongodb://root:$(MONGO_ROOT_PASSWORD)@$(MONGO_ENDPOINT)/local?replicaSet={{ $appName }}-mongo-mongodb&authSource=admin
                        - name: ROOT_URL
                          value: "https://{{ $host }}"
                        - name: OVERWRITE_SETTING_Prometheus_Enabled
                          value: "true"
                        - name: OVERWRITE_SETTING_Prometheus_Port
                          value: "9100"
                        - name: MS_METRICS
                          value: "true"
                        - name: MS_METRICS_PORT
                          value: "9458"
                        - name: TRANSPORTER
                          value: nats://{{ $appName }}-nats:4222
                        - name: MOLECULER_LOG_LEVEL
                          value: "warn"
                        - name: HEARTBEAT_INTERVAL
                          value: "10"
                        - name: HEARTBEAT_TIMEOUT
                          value: "30"
                        - name: RETRY_ENABLED
                          value: 'yes'
                      ports:
                        - name: http
                          containerPort: 3000
                        - name: metrics
                          containerPort: 9100
                        - name: ms-metrics
                          containerPort: 9458
                      livenessProbe:
                        httpGet:
                          path: /health
                          port: http
                        initialDelaySeconds: 60
                        periodSeconds: 15
                        timeoutSeconds: 5
                        successThreshold: 1
                        failureThreshold: 3
                      readinessProbe:
                        httpGet:
                          path: /health
                          port: http
                        initialDelaySeconds: 10
                        periodSeconds: 15
                        timeoutSeconds: 5
                        successThreshold: 1
                        failureThreshold: 3
                      resources:
                        requests:
                          cpu: 100m
                          memory: 256Mi
                        limits:
                          cpu: 1000m
                          memory: 1024Mi
            ---
            # NATS StatefulSet for microservices communication
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-nats
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-statefulset
                originImageName: nats:2.4-alpine
                deploy.cloud.sealos.io/minReplicas: '2'
                deploy.cloud.sealos.io/maxReplicas: '2'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-nats
                app: {{ $appName }}-nats
            spec:
              selector:
                matchLabels:
                  app: {{ $appName }}-nats
              replicas: 2
              revisionHistoryLimit: 1
              serviceName: {{ $appName }}-nats
              podManagementPolicy: Parallel
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-nats
                spec:
                  automountServiceAccountToken: false
                  volumes:
                  - name: vn-etcvn-natsvn-configvn-natsvn-conf
                    configMap:
                      name: {{ $appName }}-nats
                      items:
                        - key: vn-etcvn-natsvn-configvn-natsvn-conf
                          path: ./etc/nats-config/nats.conf
                      defaultMode: 420
                  - name: pid
                    emptyDir: {}

                  shareProcessNamespace: true
                  terminationGracePeriodSeconds: 60
                  containers:
                  - name: {{ $appName }}-nats
                    image: nats:2.4-alpine
                    imagePullPolicy: IfNotPresent
                    resources:
                      requests:
                        cpu: 10m
                        memory: 32Mi
                      limits:
                        cpu: 100m
                        memory: 128Mi
                    ports:
                    - containerPort: 4222
                      name: client
                    - containerPort: 6222
                      name: cluster
                    - containerPort: 8222
                      name: monitor
                    - containerPort: 7777
                      name: metrics

                    command:
                    - "nats-server"
                    - "--config"
                    - "/etc/nats-config/nats.conf"

                    env:
                    - name: POD_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.name
                    - name: SERVER_NAME
                      value: $(POD_NAME)
                    - name: POD_NAMESPACE
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.namespace
                    - name: CLUSTER_ADVERTISE
                      value: $(POD_NAME).{{ $appName }}-nats.$(POD_NAMESPACE).svc.cluster.local
                    volumeMounts:
                    - name: vn-etcvn-natsvn-configvn-natsvn-conf
                      mountPath: /etc/nats-config/nats.conf
                      subPath: ./etc/nats-config/nats.conf
                    - name: pid
                      mountPath: /var/run/nats

                    livenessProbe:
                      httpGet:
                        path: /
                        port: 8222
                      initialDelaySeconds: 10
                      timeoutSeconds: 5
                      periodSeconds: 30
                      successThreshold: 1
                      failureThreshold: 3
                    startupProbe:
                      httpGet:
                        path: /
                        port: 8222
                      initialDelaySeconds: 10
                      timeoutSeconds: 5
                      periodSeconds: 10
                      successThreshold: 1
                      failureThreshold: 30

                    lifecycle:
                      preStop:
                        exec:
                          command:
                          - "nats-server"
                          - "-sl=ldm=/var/run/nats/nats.pid"

                  - name: {{ $appName }}-nats-reloader
                    image: natsio/nats-server-config-reloader:0.6.3
                    imagePullPolicy: IfNotPresent
                    resources:
                      requests:
                        cpu: 10m
                        memory: 16Mi
                      limits:
                        cpu: 50m
                        memory: 32Mi
                    command:
                    - "nats-server-config-reloader"
                    - "-pid"
                    - "/var/run/nats/nats.pid"
                    - "-config"
                    - "/etc/nats-config/nats.conf"
                    volumeMounts:
                    - name: vn-etcvn-natsvn-configvn-natsvn-conf
                      mountPath: /etc/nats-config/nats.conf
                      subPath: ./etc/nats-config/nats.conf
                    - name: pid
                      mountPath: /var/run/nats
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - name: http
                  port: 3000
                  targetPort: 3000
                  protocol: TCP
                - name: metrics
                  port: 9100
                  targetPort: 9100
                  protocol: TCP
                - name: ms-metrics
                  port: 9458
                  targetPort: 9458
                  protocol: TCP
              selector:
                app: {{ $appName }}
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-nats
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-nats
            spec:
              selector:
                app: {{ $appName }}-nats
              clusterIP: None
              publishNotReadyAddresses: true
              ports:
              - name: client
                port: 4222
              - name: cluster
                port: 6222
              - name: monitor
                port: 8222
              - name: metrics
                port: 7777
              - name: leafnodes
                port: 7422
              - name: gateways
                port: 7522
            ---
            # Account Microservice
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-account
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-deployment-2
                originImageName: rocketchat/account-service:7.9.0
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-account
                app: {{ $appName }}-account
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-account
              strategy:
                rollingUpdate:
                  maxSurge: 1
                  maxUnavailable: 1
                type: RollingUpdate
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-account
                spec:
                  automountServiceAccountToken: false
                  containers:
                  - name: {{ $appName }}-account
                    image: rocketchat/account-service:7.9.0
                    imagePullPolicy: IfNotPresent
                    env:
                    - name: MONGO_ROOT_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: {{ $appName }}-mongodb-mongodb-account-root
                          key: password
                    - name: MONGO_ENDPOINT
                      valueFrom:
                        secretKeyRef:
                          name: {{ $appName }}-mongodb-mongodb-account-root
                          key: endpoint
                    - name: MONGO_URL
                      value: mongodb://rocketchat:rocketchat@$(MONGO_ENDPOINT)/rocketchat?replicaSet={{ $appName }}-mongo-mongodb
                    - name: TRANSPORTER
                      value: nats://{{ $appName }}-nats:4222
                    - name: MOLECULER_LOG_LEVEL
                      value: "warn"
                    - name: HEARTBEAT_INTERVAL
                      value: "10"
                    - name: HEARTBEAT_TIMEOUT
                      value: "30"
                    - name: RETRY_ENABLED
                      value: 'yes'
                    - name: MS_METRICS
                      value: "true"
                    - name: MS_METRICS_PORT
                      value: "9458"
                    ports:
                    - name: ms-metrics
                      containerPort: 9458
                    resources:
                      requests:
                        cpu: 10m
                        memory: 12Mi
                      limits:
                        cpu: 100m
                        memory: 128Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-service-3
              namespace: {{ $ns }}
              name: {{ $appName }}-account
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-account
            spec:
              type: ClusterIP
              ports:
              - name: metrics
                targetPort: 9458
                port: 9458
                protocol: TCP
              selector:
                app: {{ $appName }}-account
            ---
            # Authorization Microservice
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-authorization
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rocketchat-micro-deployment-3
                originImageName: rocketchat/authorization-service:7.9.0
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
