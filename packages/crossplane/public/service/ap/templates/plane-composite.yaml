apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-plane-go-templating
  labels:
    template: plane
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Plane
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/plane/logo.png"
    meta.crossplane.io/description: Open Source JIRA, Linear, Monday, and Asana Alternative. Plane helps you track your issues, epics, and product roadmaps in the simplest way possible.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/plane/README.md"
    meta.crossplane.io/url: "http://plane.so/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: plane
        template: plane
        # projectName: my-project
        name: {{ name }}
        input:
          {}
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-plane
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: objectstorage.sealos.io/v1
            kind: ObjectStorageBucket
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-objectstoragebucket
              namespace: {{ $ns }}
              name: {{ $appName }}
            spec:
              policy: private
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: postgresql
                clusterversion.kubeblocks.io/name: postgresql-14.8.0
                sealos-db-provider-cr: {{ $appName }}-pg
              annotations: {}
              name: {{ $appName }}-pg
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-14.8.0
              componentSpecs:
                - componentDefRef: postgresql
                  monitor: true
                  name: postgresql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-pg
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi

              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-pg
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-pg
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-job
              namespace: {{ $ns }}
              name: {{ $appName }}-pg-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: pgsql-init
                      image: senzing/postgresql-client:2.2.4
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: PG_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DATABASE_URL
                          value: postgresql://$(PG_USERNAME):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)/postgres
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until pg_isready -d "${DATABASE_URL}" >/dev/null 2>&1; do sleep 1; done
                          if ! psql "${DATABASE_URL}" -tAc "SELECT 1 FROM pg_database WHERE datname='plane'" | grep -q 1; then
                            psql "${DATABASE_URL}" -c 'CREATE DATABASE plane;'
                          fi
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-job-2
              namespace: {{ $ns }}
              name: {{ $appName }}-api-migrate
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: {{ $appName }}-api-migrate
                      image: makeplane/plane-backend:v0.22-dev
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: DEBUG
                          value: "0"
                        - name: DOCKERIZED
                          value: "1"
                        - name: GUNICORN_WORKERS
                          value: "1"
                        - name: WEB_URL
                          value: "https://{{ $host }}"
                        - name: APP_BASE_URL
                          value: "https://{{ $host }}"
                        - name: APP_BASE_PATH
                          value: ""
                        - name: ADMIN_BASE_URL
                          value: "https://{{ $host }}"
                        - name: ADMIN_BASE_PATH
                          value: "/god-mode"
                        - name: SPACE_BASE_URL
                          value: "https://{{ $host }}"
                        - name: SPACE_BASE_PATH
                          value: "/spaces"
                        - name: CORS_ALLOWED_ORIGINS
                          value: "http://{{ $host }},https://{{ $host }}"
                        - name: REDIS_HOST
                          value: "{{ $appName }}-redis-redis-redis.{{ $ns }}.svc.cluster.local"
                        - name: REDIS_PORT
                          value: '6379'
                        - name: REDIS_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: username
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_URL
                          value: "redis://$(REDIS_USER):$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)"
                        - name: DATABASE_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: DATABASE_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: DATABASE_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: DATABASE_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DATABASE_URL
                          value: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/plane"
                        - name: SECRET_KEY
                          value: "NjBncDBieWZ6MmR2ZmZhNDVjeGwyMHAxc2N5OXhicGY2ZDhjNXkwZ2VlamdreXAxYjU="
                        - name: FILE_SIZE_LIMIT
                          value: "5242880"
                        - name: AWS_S3_BUCKET_NAME
                          value: "upload"
                        - name: S3_SECRET_ACCESS_KEY
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: secretKey
                        - name: S3_ACCESS_KEY_ID
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: accessKey
                        - name: S3_BUCKET
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key-{{ $appName }}-sa-{{ $appName }}
                              key: bucket
                        - name: BACKEND_STORAGE_MINIO_EXTERNAL_ENDPOINT
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: external
                        - name: AWS_SECRET_ACCESS_KEY
                          value: "$(S3_SECRET_ACCESS_KEY)"
                        - name: AWS_ACCESS_KEY_ID
                          value: "$(S3_ACCESS_KEY_ID)"
                        - name: BACKEND_STORAGE_PRIVATE_BUCKET
                          value: "$(S3_BUCKET)"
                        - name: BACKEND_STORAGE_MINIO_ENDPOINT
                          value: "$(BACKEND_STORAGE_MINIO_EXTERNAL_ENDPOINT)"
                        - name: AWS_S3_ENDPOINT_URL
                          value: "https://$(BACKEND_STORAGE_MINIO_ENDPOINT)/$(BACKEND_STORAGE_PRIVATE_BUCKET)"
                        - name: USE_MINIO
                          value: "0"
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until ./bin/docker-entrypoint-migrator.sh &>/dev/null; do sleep 1; done
                      resources:
                        requests:
                          cpu: 100m
                          memory: 51Mi
                        limits:
                          cpu: 1000m
                          memory: 512Mi
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-serviceaccount-2
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-cluster-2
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: redis
                kb.io/database: redis-7.2.7
                app.kubernetes.io/instance: {{ $appName }}
                app.kubernetes.io/version: 7.2.7
                helm.sh/chart: redis-cluster-0.9.0
                sealos-db-provider-cr: {{ $appName }}-redis
            spec:
              clusterDefinitionRef: redis
              affinity:
                podAntiAffinity: Preferred
                topologyKeys:
                  - kubernetes.io/hostname
              tolerations:
                - key: kb-data
                  operator: Equal
                  value: "true"
                  effect: NoSchedule
              componentSpecs:
                - name: redis
                  componentDef: redis-7
                  enabledLogs:
                    - running
                  env:
                    - name: CUSTOM_SENTINEL_MASTER_NAME
                  serviceVersion: 7.2.7
                  serviceAccountName: {{ $appName }}-redis
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                - componentDef: redis-sentinel-7
                  name: redis-sentinel
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceVersion: 7.2.7
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
              terminationPolicy: Delete
              topology: replication
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-role-2
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-rolebinding-2
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-redis
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-redis
                namespace: {{ $ns }}
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-admin
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: makeplane/plane-admin:v0.22-dev
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-admin
                app: {{ $appName }}-admin
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-admin
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 0
                  maxSurge: 1
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-admin
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-admin
                      image: makeplane/plane-admin:v0.22-dev
                      command:
                        - node
                      args:
                        - admin/server.js
                        - admin
                      env:
                        - name: NEXT_PUBLIC_API_BASE_URL
                          value: "https://{{ $host }}"
                        - name: NEXT_PUBLIC_WEB_BASE_URL
                          value: "https://{{ $host }}"
                        - name: NEXT_PUBLIC_ADMIN_BASE_URL
                          value: "https://{{ $host }}"
                        - name: NEXT_PUBLIC_ADMIN_BASE_PATH
                          value: "/god-mode"
                        - name: NEXT_PUBLIC_SPACE_BASE_URL
                          value: "https://{{ $host }}"
                        - name: NEXT_PUBLIC_SPACE_BASE_PATH
                          value: "/spaces"
                      resources:
                        requests:
                          cpu: 10m
                          memory: 12Mi
                        limits:
                          cpu: 100m
                          memory: 128Mi
                      ports:
                        - containerPort: 3000
                      imagePullPolicy: IfNotPresent
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-service
              namespace: {{ $ns }}
              name: {{ $appName }}-admin
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-admin
                app: {{ $appName }}-admin
            spec:
              ports:
                - name: http
                  port: 3000
                  targetPort: 3000
              selector:
                app: {{ $appName }}-admin
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-api
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plane-deployment-2
                originImageName: makeplane/plane-backend:v0.22-dev
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-api
                app: {{ $appName }}-api
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-api
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 0
                  maxSurge: 1
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-api
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-api
                      image: makeplane/plane-backend:v0.22-dev
                      command:
                        - ./bin/docker-entrypoint-api.sh
                      env:
                        - name: DEBUG
                          value: "0"
                        - name: DOCKERIZED
                          value: "1"
                        - name: GUNICORN_WORKERS
                          value: "1"
                        - name: WEB_URL
                          value: "https://{{ $host }}"
                        - name: APP_BASE_URL
                          value: "https://{{ $host }}"
                        - name: APP_BASE_PATH
                          value: ""
                        - name: ADMIN_BASE_URL
                          value: "https://{{ $host }}"
                        - name: ADMIN_BASE_PATH
                          value: "/god-mode"
                        - name: SPACE_BASE_URL
                          value: "https://{{ $host }}"
                        - name: SPACE_BASE_PATH
                          value: "/spaces"
                        - name: CORS_ALLOWED_ORIGINS
                          value: "http://{{ $host }},https://{{ $host }}"
                        - name: REDIS_HOST
                          value: "{{ $appName }}-redis-redis-redis.{{ $ns }}.svc.cluster.local"
                        - name: REDIS_PORT
                          value: '6379'
                        - name: REDIS_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: username
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_URL
                          value: "redis://$(REDIS_USER):$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)"
                        - name: DATABASE_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: DATABASE_HOST
                          valueFrom:
                            secretKeyRef:
