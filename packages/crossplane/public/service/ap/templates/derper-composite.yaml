apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-derper-go-templating
  labels:
    template: derper
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Derper
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/derper/logo.svg"
    meta.crossplane.io/description: A slim build of Tailscale DERP relay server for self-hosted use with STUN support
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/derper/README.md"
    meta.crossplane.io/url: "https://github.com/yangchuansheng/derper"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: derper
        template: derper
        # projectName: my-project
        name: {{ name }}
        input:
          # Enable STUN service (true/false) (required)
          enableStun: "true"
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-derper
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $enableStun := $input.enableStun | default "true" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: derper-serviceaccount
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: derper-role
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            rules:
              - apiGroups: [""]
                resources: ["services"]
                verbs: ["get", "list", "patch"]
              - apiGroups: ["apps"]
                resources: ["deployments"]
                verbs: ["get", "list", "patch"]
              - apiGroups: ["apps"]
                resources: ["deployments/scale"]
                verbs: ["get", "patch", "update"]
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: derper-rolebinding
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}
                namespace: {{ $ns }}
            roleRef:
              kind: Role
              name: {{ $appName }}
              apiGroup: rbac.authorization.k8s.io
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: derper-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              type: NodePort
              ports:
                - name: derp-tcp
                  port: 12345
                  targetPort: 12345
                  protocol: TCP
                - name: stun-udp
                  port: 3478
                  targetPort: 3478
                  protocol: UDP
              selector:
                app: {{ $appName }}
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: derper-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: ghcr.io/yangchuansheng/derper:v1.90.6
                deploy.cloud.sealos.io/minReplicas: "1"
                deploy.cloud.sealos.io/maxReplicas: "1"
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 0
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: ghcr.io/yangchuansheng/derper:v1.90.6
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: DERP_DOMAIN
                          value: "tcp.{{ $region }}"
                        - name: DERP_CERT_MODE
                          value: manual
                        - name: DERP_CERT_DIR
                          value: /cert
                        - name: DERP_ADDR
                          value: ":12345"
                        - name: DERP_STUN
                          value: "{{ $enableStun }}"
                        - name: DERP_STUN_PORT
                          value: "3478"
                        - name: DERP_HTTP_PORT
                          value: "-1"
                        - name: DERP_VERIFY_CLIENTS
                          value: "false"
                      ports:
                        - name: derp-tcp
                          containerPort: 12345
                          protocol: TCP
                        - name: stun-udp
                          containerPort: 3478
                          protocol: UDP
                      resources:
                        requests:
                          cpu: 10m
                          memory: 12Mi
                        limits:
                          cpu: 100m
                          memory: 128Mi
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: derper-job
              namespace: {{ $ns }}
              name: {{ $appName }}-config-updater
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-config-updater
            spec:
              completions: 1
              template:
                spec:
                  serviceAccountName: {{ $appName }}
                  restartPolicy: Never
                  containers:
                    - name: config-updater
                      image: bitnamilegacy/kubectl:1.28.9
                      imagePullPolicy: IfNotPresent
                      command:
                        - /bin/sh
                        - -c
                        - |
                          set -e
                          echo "Waiting for Service to be ready..."
                          until kubectl get service {{ $appName }} -n {{ $ns }} &>/dev/null; do
                            sleep 2
                          done

                          echo "Detecting NodePort..."
                          DERP_NODEPORT=$(kubectl get service {{ $appName }} -n {{ $ns }} -o jsonpath='{.spec.ports[?(@.name=="derp-tcp")].nodePort}')
                          STUN_NODEPORT=$(kubectl get service {{ $appName }} -n {{ $ns }} -o jsonpath='{.spec.ports[?(@.name=="stun-udp")].nodePort}')

                          echo "DERP NodePort: $DERP_NODEPORT"
                          echo "STUN NodePort: $STUN_NODEPORT"

                          if [ -z "$DERP_NODEPORT" ] || [ -z "$STUN_NODEPORT" ]; then
                            echo "Error: Failed to get NodePort"
                            exit 1
                          fi

                          echo "Updating Service ports..."
                          kubectl patch service {{ $appName }} -n {{ $ns }} --type='json' -p='[
                            {"op": "replace", "path": "/spec/ports/0/port", "value": '"$DERP_NODEPORT"'},
                            {"op": "replace", "path": "/spec/ports/0/targetPort", "value": '"$DERP_NODEPORT"'},
                            {"op": "replace", "path": "/spec/ports/1/port", "value": '"$STUN_NODEPORT"'},
                            {"op": "replace", "path": "/spec/ports/1/targetPort", "value": '"$STUN_NODEPORT"'}
                          ]'

                          echo "Updating Deployment environment variables..."
                          kubectl patch deployment {{ $appName }} -n {{ $ns }} --type='json' -p='[
                            {"op": "replace", "path": "/spec/template/spec/containers/0/env/3/value", "value": ":'$DERP_NODEPORT'"},
                            {"op": "replace", "path": "/spec/template/spec/containers/0/env/5/value", "value": "'$STUN_NODEPORT'"}
                          ]'

                          echo "Updating Deployment container ports..."
                          kubectl patch deployment {{ $appName }} -n {{ $ns }} --type='json' -p='[
                            {"op": "replace", "path": "/spec/template/spec/containers/0/ports/0/containerPort", "value": '"$DERP_NODEPORT"'},
                            {"op": "replace", "path": "/spec/template/spec/containers/0/ports/1/containerPort", "value": '"$STUN_NODEPORT"'}
                          ]'

                          echo "Scaling Deployment to 1 replica..."
                          kubectl scale deployment {{ $appName }} -n {{ $ns }} --replicas=1

                          echo "Configuration updated successfully!"
              backoffLimit: 3
              ttlSecondsAfterFinished: 300
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
