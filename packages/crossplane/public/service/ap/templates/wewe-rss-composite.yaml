apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-wewe-rss-go-templating
  labels:
    template: wewe-rss
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Wewe RSS
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/wewe-rss/logo.png"
    meta.crossplane.io/description: 🤗更优雅的微信公众号订阅方式，支持私有化部署、微信公众号RSS生成（基于微信读书）v2.x
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/wewe-rss/README.md"
    meta.crossplane.io/url: "https://github.com/cooderl/wewe-rss"
    meta.crossplane.io/author: sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: wewe-rss
        template: wewe-rss
        # projectName: my-project
        name: {{ name }}
        input:
          # 服务接口请求授权码 (required)
          authCode: "123567"
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-wewe-rss
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $authCode := $input.authCode | default "123567" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wewe-rss-cluster
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: apecloud-mysql
                clusterversion.kubeblocks.io/name: ac-mysql-8.0.30
                sealos-db-provider-cr: {{ $appName }}-mysql
              name: {{ $appName }}-mysql
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: apecloud-mysql
              clusterVersionRef: ac-mysql-8.0.30
              componentSpecs:
                - componentDefRef: mysql
                  monitor: true
                  name: mysql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-mysql
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wewe-rss-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wewe-rss-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wewe-rss-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-mysql
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-mysql
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wewe-rss-job
              namespace: {{ $ns }}
              name: {{ $appName }}-mysql-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: mysql-init
                      image: joseluisq/mysql-client:8.0.30
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: MYSQL_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: username
                        - name: MYSQL_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: password
                        - name: MYSQL_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: host
                        - name: MYSQL_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: port
                        - name: MYSQL_CONN
                          value: $(MYSQL_HOST).{{ $ns }}.svc
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until mysql -h $MYSQL_CONN -P $MYSQL_PORT -u $MYSQL_USER -p$MYSQL_PASSWORD -e 'CREATE DATABASE IF NOT EXISTS wewe_rss;'; do sleep 1; done
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wewe-rss-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: cooderl/wewe-rss:v2.6.1
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $appName }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: app
                      image: cooderl/wewe-rss:v2.6.1
                      env:
                        - name: MYSQL_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: password
                        - name: MYSQL_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: host
                        - name: DATABASE_URL
                          value: mysql://root:$(MYSQL_PASSWORD)@$(MYSQL_HOST):3306/wewe_rss?schema=public&connect_timeout=30&pool_timeout=30&socket_timeout=30
                        - name: AUTH_CODE
                          value: {{ $authCode }}
                        - name: SERVER_ORIGIN_URL
                          value: https://{{ $host }}
                      ports:
                        - containerPort: 4000
                      resources:
                        requests:
                          cpu: 100m
                          memory: 256Mi
                        limits:
                          cpu: 500m
                          memory: 512Mi
                      imagePullPolicy: IfNotPresent
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wewe-rss-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 4000
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wewe-rss-ingress
                kubernetes.io/ingress.class: nginx
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 4000
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
