apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-enshrouded-go-templating
  labels:
    template: enshrouded
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: 雾锁王国私服
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/enshrouded/logo.png"
    meta.crossplane.io/description: 该私服默认可容纳 4~8 个玩家流畅玩耍
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/enshrouded/README.md"
    meta.crossplane.io/url: "https://github.com/mornedhels/enshrouded-server"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: enshrouded
        template: enshrouded
        # projectName: my-project
        name: {{ name }}
        input:
          # 私服名称
          serverName: ""
          # 私服密码
          serverPassword: ""
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-enshrouded
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $serverName := $input.serverName | default "" }}
            {{- $serverPassword := $input.serverPassword | default "" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: enshrouded-service
              namespace: {{ $ns }}
              name: {{ $appName }}-nodeport
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              type: NodePort
              ports:
                - protocol: UDP
                  port: 15636
                  targetPort: 15636
                  name: game
                - protocol: UDP
                  port: 15637
                  targetPort: 15637
                  name: query
              selector:
                app: {{ $appName }}
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: enshrouded-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: registry.cn-hangzhou.aliyuncs.com/luanshaotong/enshrouded:v0.2
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  initContainers:
                    - name: take-data-dir-ownership
                      image: alpine
                      command:
                        [
                          '/bin/sh',
                          '-c',
                          'mkdir -p /opt/enshrouded; chown -R 4711:4711 /opt/enshrouded; chmod -R 0777 /opt/enshrouded',
                        ]
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-optvn-enshrouded
                          mountPath: /opt/enshrouded
                    - name: switch-ports
                      image: bitnamilegacy/kubectl
                      env:
                        - name: APP_NAME
                          valueFrom:
                            fieldRef:
                              fieldPath: metadata.labels['app']
                      command:
                        - sh
                        - -c
                        - |
                          echo "APP_NAME=$APP_NAME"
                          if [ -f /opt/enshrouded/gameport ]; then
                              echo "Game port already set"
                              . /opt/enshrouded/gameport
                              . /opt/enshrouded/queryport
                          else
                              echo "Setting game port"
                              GAME_PORT=`kubectl get svc ${APP_NAME}-external -o=jsonpath='{.spec.ports[?(@.name=="game")].nodePort}'`
                              QUERY_PORT=`kubectl get svc ${APP_NAME}-external -o=jsonpath='{.spec.ports[?(@.name=="query")].nodePort}'`

                              echo "GAME_PORT=$GAME_PORT QUERY_PORT=$QUERY_PORT"
                              echo "GAME_PORT=$GAME_PORT" > /opt/enshrouded/gameport
                              echo "QUERY_PORT=$QUERY_PORT" > /opt/enshrouded/queryport
                          fi

                          kubectl patch svc ${APP_NAME}-external -p '{"spec":{"type":"ClusterIP"}}'

                          kubectl patch svc {{ $appName }}-external --type='json' -p="[{\"op\": \"replace\", \"path\": \"/spec/type\", \"value\": \"NodePort\"}, {\"op\": \"replace\", \"path\": \"/spec/ports/0/nodePort\", \"value\": $GAME_PORT}, {\"op\": \"replace\", \"path\": \"/spec/ports/0/targetPort\", \"value\": $GAME_PORT}, {\"op\": \"replace\", \"path\": \"/spec/ports/0/name\", \"value\": game}, {\"op\": \"replace\", \"path\": \"/spec/ports/1/nodePort\", \"value\": $QUERY_PORT}, {\"op\": \"replace\", \"path\": \"/spec/ports/1/targetPort\", \"value\": $QUERY_PORT}, {\"op\": \"replace\", \"path\": \"/spec/ports/1/name\", \"value\": query}]"

                          echo "Game port set to $GAME_PORT"
                          echo "Query port set to $QUERY_PORT"

                          if [ -f /opt/enshrouded/server/enshrouded_server.json ]; then
                              sed -i "s/\"gamePort\": [0-9]\+,$/\"gamePort\": $GAME_PORT,/" /opt/enshrouded/server/enshrouded_server.json
                              sed -i "s/\"queryPort\": [0-9]\+,$/\"queryPort\": $QUERY_PORT,/" /opt/enshrouded/server/enshrouded_server.json
                          fi
                      volumeMounts:
                        - name: vn-optvn-enshrouded
                          mountPath: /opt/enshrouded
                  containers:
                    - name: {{ $appName }}
                      image: registry.cn-hangzhou.aliyuncs.com/luanshaotong/enshrouded:v0.2
                      env:
                        - name: SERVER_IP
                          valueFrom:
                            fieldRef:
                              fieldPath: status.podIP
                        # - name: PUID
                        #   value: "1000"
                        # - name: PGID
                        #   value: "1000"
                        # - name: SERVER_PORT
                        #   value: "15636"
                        # - name: SERVER_QUERYPORT
                        #   value: "15637"
                        - name: SERVER_SLOT_COUNT
                          value: '16'
                        - name: SERVER_PASSWORD
                          value: {{ $serverPassword }}
                        - name: SERVER_NAME
                          value: {{ $serverName }}
                      resources:
                        requests:
                          cpu: 1000m
                          memory: 5461Mi
                          ephemeral-storage: 4Gi
                        limits:
                          cpu: 4000m
                          memory: 16384Mi
                          ephemeral-storage: 4Gi
                      ports:
                        - containerPort: 15636
                          name: game
                          protocol: UDP
                        - containerPort: 15637
                          name: query
                          protocol: UDP
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-optvn-enshrouded
                          mountPath: /opt/enshrouded
                  securityContext:
                    runAsUser: 0
                  serviceAccountName: {{ $appName }}-sa
                  serviceAccount: {{ $appName }}-sa
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /opt/enshrouded
                      value: '30'
                    name: vn-optvn-enshrouded
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 30Gi
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: enshrouded-job
              namespace: {{ $ns }}
              name: {{ $appName }}-restart
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: {{ $appName }}-restart
                      image: bitnamilegacy/kubectl
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until kubectl exec {{ $appName }}-0 -c e{{ $appName }} -- ls /opt/enshrouded-data/game_ready &>/dev/null; do sleep 1; done
                          kubectl rollout restart statefulset {{ $appName }}
                  restartPolicy: Never
                  serviceAccountName: {{ $appName }}-sa
                  serviceAccount: {{ $appName }}-sa
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
