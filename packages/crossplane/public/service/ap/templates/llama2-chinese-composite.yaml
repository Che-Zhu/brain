apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-llama2-chinese-go-templating
  labels:
    template: llama2-chinese
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: llama2-chinese
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/llama2-chinese/logo.png"
    meta.crossplane.io/description: 全部开源，完全可商用的中文版 Llama2 模型及中英文 SFT 数据集，输入格式严格遵循 llama-2-chat 格式，兼容适配所有针对原版 llama-2-chat 模型的优化。
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/llama2-chinese/README.md"
    meta.crossplane.io/url: "https://github.com/LinkSoul-AI/Chinese-Llama-2-7b"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: llama2-chinese
        template: llama2-chinese
        # projectName: my-project
        name: {{ name }}
        input:
          {}
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-llama2-chinese
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: llama2-chinese-persistentvolumeclaim
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              accessModes:
                - ReadOnlyMany
              resources:
                requests:
                  storage: 10Gi
              storageClassName: sealfs-csi-llama-chinese
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: llama2-chinese-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}
            data:
              vn-appvn-charactersvn-instruction-followingvn-nonevn-yaml: |2-
                    user: ""
                    bot: ""
                    turn_template: "<|user|><|user-message|> [/INST] <|bot|><|bot-message|> </s><s>[INST] "
                    context: "[INST] <<SYS>>\nPlease answer all the questions in Chinese.\n<</SYS>>\n\n"
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: llama2-chinese-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: luanshaotong/text-generation-webui-cpu:dev
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 1
                  maxSurge: 0
              serviceName: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  containers:
                    - name: {{ $appName }}
                      image: luanshaotong/text-generation-webui-cpu:dev
                      command: ["sh", "-c"]
                      args: ["cp /share/models/* /app/models/ && /scripts/docker-entrypoint.sh python3 /app/server.py --listen --verbose --chat --model Chinese-Llama-2-7b-ggml-q4.bin --extensions openai --n_ctx 4096"]
                      resources:
                        requests:
                          cpu: 2
                          memory: 4Gi
                        limits:
                          cpu: 15
                          memory: 8Gi
                      ports:
                        - containerPort: 5001
                      volumeMounts:
                        - name: models
                          mountPath: "/share/models"
                        - mountPath: /app/characters/instruction-following/None.yaml
                          name: vn-appvn-charactersvn-instruction-followingvn-nonevn-yaml
                          subPath: ./app/characters/instruction-following/None.yaml
                  volumes:
                    - name: models
                      persistentVolumeClaim:
                        claimName: {{ $appName }}
                    - configMap:
                        defaultMode: 420
                        items:
                        - key: vn-appvn-charactersvn-instruction-followingvn-nonevn-yaml
                          path: ./app/characters/instruction-following/None.yaml
                        name: {{ $appName }}
                      name: vn-appvn-charactersvn-instruction-followingvn-nonevn-yaml
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: llama2-chinese-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 5001
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: llama2-chinese-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'false'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/rewrite-target: /$2
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /()(.*)
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 5001
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
