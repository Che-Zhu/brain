apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-openclaw-go-templating
  labels:
    template: openclaw
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: OpenClaw
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/openclaw/logo.svg"
    meta.crossplane.io/description: AI agent gateway with multi-channel support including WhatsApp, Telegram, and Discord integration
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/openclaw/README.md"
    meta.crossplane.io/url: "https://openclaw.ai/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: openclaw
        template: openclaw
        # projectName: my-project
        name: {{ name }}
        input:
          # gatewayToken: auto-generated if omitted
          # provider kind (openai_compat or anthropic_compat) (required)
          providerKind: "anthropic_compat"
          # Compatible provider base URL (must end with /v1 for OpenAI-compatible) (required)
          baseUrl: "https://aiproxy.usw-1.sealos.io/v1"
          # Provider API key (required)
          apiKey: ""
          # Default model id (raw id, e.g. gpt-5.2 / claude-opus-4-6-20251101) (required)
          model: "claude-opus-4-6"
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-openclaw
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $gatewayToken := $input.gatewayToken | default (printf "%s" (randAlphaNum 64)) }}
            {{- $providerKind := $input.providerKind | default "anthropic_compat" }}
            {{- $baseUrl := $input.baseUrl | default "https://aiproxy.usw-1.sealos.io/v1" }}
            {{- $apiKey := $input.apiKey | default "" }}
            {{- $model := $input.model | default "claude-opus-4-6" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: openclaw-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: ghcr.io/openclaw/openclaw:2026.3.8
                deploy.cloud.sealos.io/minReplicas: "1"
                deploy.cloud.sealos.io/maxReplicas: "1"
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $appName }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              serviceName: {{ $appName }}
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  securityContext:
                    fsGroup: 1000
                  initContainers:
                    - name: init-openclaw-data
                      image: busybox:1.36
                      imagePullPolicy: IfNotPresent
                      command:
                        - /bin/sh
                        - -lc
                        - |
                          set -eu
                          mkdir -p /home/node/.openclaw /home/node/workspace /home/node/.npm
                          chown -R 1000:1000 /home/node/.openclaw /home/node/workspace /home/node/.npm
                      volumeMounts:
                        - name: vn-homevn-nodevn-openclaw
                          mountPath: /home/node/.openclaw
                        - name: vn-homevn-nodevn-workspace
                          mountPath: /home/node/workspace
                        - name: vn-homevn-nodevn-npm
                          mountPath: /home/node/.npm
                    - name: init-openclaw-config
                      image: ghcr.io/openclaw/openclaw:2026.3.8
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: OPENCLAW_PROVIDER_KIND
                          value: {{ $providerKind }}
                        - name: OPENCLAW_DEFAULT_MODEL
                          value: {{ $model }}
                        - name: OPENAI_API_KEY
                          value: {{ $apiKey }}
                        - name: OPENAI_BASE_URL
                          value: {{ $baseUrl }}
                        - name: ANTHROPIC_API_KEY
                          value: {{ $apiKey }}
                        - name: ANTHROPIC_BASE_URL
                          value: {{ $baseUrl }}
                      command:
                        - /bin/sh
                        - -lc
                        - |
                          set -eu

                          node openclaw.mjs config set gateway.controlUi.allowInsecureAuth true --json >/dev/null
                          node openclaw.mjs config set gateway.controlUi.dangerouslyDisableDeviceAuth true --json >/dev/null
                          node openclaw.mjs config set gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback true --json >/dev/null

                          MODEL_RAW="${OPENCLAW_DEFAULT_MODEL:-}"
                          MODEL_RAW="${MODEL_RAW#openai/}"
                          MODEL_RAW="${MODEL_RAW#anthropic/}"
                          MODEL_RAW="${MODEL_RAW#google/}"

                          if [ "${OPENCLAW_PROVIDER_KIND}" = "openai_compat" ]; then
                            CONF=$(node -e 'const m=process.argv[1];const c={baseUrl:process.env.OPENAI_BASE_URL,apiKey:process.env.OPENAI_API_KEY,api:"openai-completions",models:[{id:"compat_openai/"+m,name:m}]};process.stdout.write(JSON.stringify(c));' "$MODEL_RAW")
                            node openclaw.mjs config set models.providers.compat_openai "$CONF" --json >/dev/null
                            node openclaw.mjs config set agents.defaults.model.primary "compat_openai/$MODEL_RAW" >/dev/null
                          elif [ "${OPENCLAW_PROVIDER_KIND}" = "anthropic_compat" ]; then
                            CONF=$(node -e 'const m=process.argv[1];const c={baseUrl:process.env.ANTHROPIC_BASE_URL,apiKey:process.env.ANTHROPIC_API_KEY,api:"anthropic-messages",models:[{id:"compat_anthropic/"+m,name:m}]};process.stdout.write(JSON.stringify(c));' "$MODEL_RAW")
                            node openclaw.mjs config set models.providers.compat_anthropic "$CONF" --json >/dev/null
                            node openclaw.mjs config set agents.defaults.model.primary "compat_anthropic/$MODEL_RAW" >/dev/null
                          else
                            echo "Unsupported provider_kind: ${OPENCLAW_PROVIDER_KIND}" >&2
                            exit 1
                          fi
                      volumeMounts:
                        - name: vn-homevn-nodevn-openclaw
                          mountPath: /home/node/.openclaw
                        - name: vn-homevn-nodevn-workspace
                          mountPath: /home/node/workspace
                        - name: vn-homevn-nodevn-npm
                          mountPath: /home/node/.npm
                      resources:
                        requests:
                          cpu: 50m
                          memory: 51Mi
                        limits:
                          cpu: 500m
                          memory: 512Mi
                  containers:
                    - name: {{ $appName }}
                      image: ghcr.io/openclaw/openclaw:2026.3.8
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: NODE_ENV
                          value: production
                        - name: GATEWAY_TOKEN
                          value: {{ $gatewayToken }}
                        - name: OPENCLAW_PROVIDER_KIND
                          value: {{ $providerKind }}
                        - name: OPENCLAW_DEFAULT_MODEL
                          value: {{ $model }}
                        - name: OPENAI_API_KEY
                          value: {{ $apiKey }}
                        - name: OPENAI_BASE_URL
                          value: {{ $baseUrl }}
                        - name: ANTHROPIC_API_KEY
                          value: {{ $apiKey }}
                        - name: ANTHROPIC_BASE_URL
                          value: {{ $baseUrl }}
                      command:
                        - /bin/sh
                        - -lc
                        - node openclaw.mjs gateway --allow-unconfigured --bind lan --port 3000 --token "${GATEWAY_TOKEN}"
                      ports:
                        - name: gateway
                          containerPort: 3000
                          protocol: TCP
                      startupProbe:
                        httpGet:
                          path: /healthz
                          port: 3000
                        initialDelaySeconds: 10
                        periodSeconds: 5
                        timeoutSeconds: 5
                        failureThreshold: 6
                      livenessProbe:
                        httpGet:
                          path: /healthz
                          port: 3000
                        periodSeconds: 30
                        timeoutSeconds: 5
                        failureThreshold: 5
                      readinessProbe:
                        httpGet:
                          path: /readyz
                          port: 3000
                        periodSeconds: 10
                        timeoutSeconds: 5
                        failureThreshold: 3
                      volumeMounts:
                        - name: vn-homevn-nodevn-openclaw
                          mountPath: /home/node/.openclaw
                        - name: vn-homevn-nodevn-workspace
                          mountPath: /home/node/workspace
                        - name: vn-homevn-nodevn-npm
                          mountPath: /home/node/.npm
                      resources:
                        requests:
                          cpu: 100m
                          memory: 204Mi
                        limits:
                          cpu: 1000m
                          memory: 2048Mi
              volumeClaimTemplates:
                - metadata:
                    name: vn-homevn-nodevn-openclaw
                    annotations:
                      path: /home/node/.openclaw
                      value: '0.1'
                  spec:
                    accessModes: [ReadWriteOnce]
                    resources:
                      requests:
                        storage: 103Mi
                - metadata:
                    name: vn-homevn-nodevn-workspace
                    annotations:
                      path: /home/node/workspace
                      value: '0.1'
                  spec:
                    accessModes: [ReadWriteOnce]
                    resources:
                      requests:
                        storage: 103Mi
                - metadata:
                    name: vn-homevn-nodevn-npm
                    annotations:
                      path: /home/node/.npm
                      value: '0.1'
                  spec:
                    accessModes: [ReadWriteOnce]
                    resources:
                      requests:
                        storage: 103Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: openclaw-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                app: {{ $appName }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              type: ClusterIP
              selector:
                app: {{ $appName }}
              ports:
                - name: gateway
                  port: 3000
                  targetPort: 3000
                  protocol: TCP
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: openclaw-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: "true"
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
                nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 3000
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: openclaw-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}/?token={{ $gatewayToken }}&gatewayUrl=wss%3A%2F%2F{{ $host }}
              displayType: normal
              icon: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/openclaw/logo.svg
              name: OpenClaw
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
