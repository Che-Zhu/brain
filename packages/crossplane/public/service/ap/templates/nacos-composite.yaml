apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-nacos-go-templating
  labels:
    template: nacos
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Nacos
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/nacos/logo.svg"
    meta.crossplane.io/description: Dynamic Naming and Configuration Service - an easy-to-use platform designed for dynamic service discovery and configuration and service management
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/nacos/README.md"
    meta.crossplane.io/url: "https://nacos.io/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: nacos
        template: nacos
        # projectName: my-project
        name: {{ name }}
        input:
          # JWT secret key for authentication (Base64 encoded, must be at least 32 characters)
          authToken: "VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg="
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-nacos
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $authToken := $input.authToken | default "VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: nacos-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: nacos-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: nacos-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-mysql
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-mysql
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: apecloud-mysql
                clusterversion.kubeblocks.io/name: ac-mysql-8.0.30
                sealos-db-provider-cr: {{ $appName }}-mysql
              annotations: {}
              name: {{ $appName }}-mysql
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: apecloud-mysql
              clusterVersionRef: ac-mysql-8.0.30
              componentSpecs:
                - componentDefRef: mysql
                  monitor: true
                  name: mysql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-mysql
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: nacos-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}-mysql-init
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-mysql-init
            data:
              vn-tmpvn-nacosvn-mysqlvn-sql: |
                /*
                 * Copyright 1999-2018 Alibaba Group Holding Ltd.
                 *
                 * Licensed under the Apache License, Version 2.0 (the "License");
                 * you may not use this file except in compliance with the License.
                 * You may obtain a copy of the License at
                 *
                 *      http://www.apache.org/licenses/LICENSE-2.0
                 *
                 * Unless required by applicable law or agreed to in writing, software
                 * distributed under the License is distributed on an "AS IS" BASIS,
                 * WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
                 * See the License for the specific language governing permissions and
                 * limitations under the License.
                 */

                -- Create database
                CREATE DATABASE IF NOT EXISTS nacos_devtest CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
                USE nacos_devtest;

                /******************************************/
                /*   表名称 = config_info                  */
                /******************************************/
                CREATE TABLE `config_info` (
                                               `id` bigint(20) NOT NULL AUTO_INCREMENT COMMENT 'id',
                                               `data_id` varchar(255) NOT NULL COMMENT 'data_id',
                                               `group_id` varchar(128) DEFAULT NULL COMMENT 'group_id',
                                               `content` longtext NOT NULL COMMENT 'content',
                                               `md5` varchar(32) DEFAULT NULL COMMENT 'md5',
                                               `gmt_create` datetime NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
                                               `gmt_modified` datetime NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '修改时间',
                                               `src_user` text COMMENT 'source user',
                                               `src_ip` varchar(50) DEFAULT NULL COMMENT 'source ip',
                                               `app_name` varchar(128) DEFAULT NULL COMMENT 'app_name',
                                               `tenant_id` varchar(128) DEFAULT '' COMMENT '租户字段',
                                               `c_desc` varchar(256) DEFAULT NULL COMMENT 'configuration description',
                                               `c_use` varchar(64) DEFAULT NULL COMMENT 'configuration usage',
                                               `effect` varchar(64) DEFAULT NULL COMMENT '配置生效的描述',
                                               `type` varchar(64) DEFAULT NULL COMMENT '配置的类型',
                                               `c_schema` text COMMENT '配置的模式',
                                               `encrypted_data_key` varchar(1024) NOT NULL DEFAULT '' COMMENT '密钥',
                                               PRIMARY KEY (`id`),
                                               UNIQUE KEY `uk_configinfo_datagrouptenant` (`data_id`,`group_id`,`tenant_id`)
                ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='config_info';

                /******************************************/
                /*   表名称 = config_info  since 2.5.0                */
                /******************************************/
                CREATE TABLE `config_info_gray` (
                                                    `id` bigint unsigned NOT NULL AUTO_INCREMENT COMMENT 'id',
                                                    `data_id` varchar(255) NOT NULL COMMENT 'data_id',
                                                    `group_id` varchar(128) NOT NULL COMMENT 'group_id',
                                                    `content` longtext NOT NULL COMMENT 'content',
                                                    `md5` varchar(32) DEFAULT NULL COMMENT 'md5',
                                                    `src_user` text COMMENT 'src_user',
                                                    `src_ip` varchar(100) DEFAULT NULL COMMENT 'src_ip',
                                                    `gmt_create` datetime(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3) COMMENT 'gmt_create',
                                                    `gmt_modified` datetime(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3) COMMENT 'gmt_modified',
                                                    `app_name` varchar(128) DEFAULT NULL COMMENT 'app_name',
                                                    `tenant_id` varchar(128) DEFAULT '' COMMENT 'tenant_id',
                                                    `gray_name` varchar(128) NOT NULL COMMENT 'gray_name',
                                                    `gray_rule` text COMMENT 'gray_rule',
                                                    `encrypted_data_key` varchar(256) NOT NULL DEFAULT '' COMMENT 'encrypted_data_key',
                                                    PRIMARY KEY (`id`),
                                                    UNIQUE KEY `uk_configinfogray_datagrouptenantgray` (`data_id`,`group_id`,`tenant_id`,`gray_name`),
                                                    KEY `idx_dataid_gmt_modified` (`data_id`,`gmt_modified`),
                                                    KEY `idx_gmt_modified` (`gmt_modified`)
                ) ENGINE=InnoDB AUTO_INCREMENT=1 DEFAULT CHARSET=utf8 COMMENT='config_info_gray';

                /******************************************/
                /*   表名称 = config_tags_relation         */
                /******************************************/
                CREATE TABLE `config_tags_relation` (
                                                        `id` bigint(20) NOT NULL COMMENT 'id',
                                                        `tag_name` varchar(128) NOT NULL COMMENT 'tag_name',
                                                        `tag_type` varchar(64) DEFAULT NULL COMMENT 'tag_type',
                                                        `data_id` varchar(255) NOT NULL COMMENT 'data_id',
                                                        `group_id` varchar(128) NOT NULL COMMENT 'group_id',
                                                        `tenant_id` varchar(128) DEFAULT '' COMMENT 'tenant_id',
                                                        `nid` bigint(20) NOT NULL AUTO_INCREMENT COMMENT 'nid, 自增长标识',
                                                        PRIMARY KEY (`nid`),
                                                        UNIQUE KEY `uk_configtagrelation_configidtag` (`id`,`tag_name`,`tag_type`),
                                                        KEY `idx_tenant_id` (`tenant_id`)
                ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='config_tag_relation';

                /******************************************/
                /*   表名称 = group_capacity               */
                /******************************************/
                CREATE TABLE `group_capacity` (
                                                  `id` bigint(20) unsigned NOT NULL AUTO_INCREMENT COMMENT '主键ID',
                                                  `group_id` varchar(128) NOT NULL DEFAULT '' COMMENT 'Group ID，空字符表示整个集群',
                                                  `quota` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '配额，0表示使用默认值',
                                                  `usage` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '使用量',
                                                  `max_size` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '单个配置大小上限，单位为字节，0表示使用默认值',
                                                  `max_aggr_count` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '聚合子配置最大个数，，0表示使用默认值',
                                                  `max_aggr_size` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '单个聚合数据的子配置大小上限，单位为字节，0表示使用默认值',
                                                  `max_history_count` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '最大变更历史数量',
                                                  `gmt_create` datetime NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
                                                  `gmt_modified` datetime NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '修改时间',
                                                  PRIMARY KEY (`id`),
                                                  UNIQUE KEY `uk_group_id` (`group_id`)
                ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='集群、各Group容量信息表';

                /******************************************/
                /*   表名称 = his_config_info              */
                /******************************************/
                CREATE TABLE `his_config_info` (
                                                   `id` bigint(20) unsigned NOT NULL COMMENT 'id',
                                                   `nid` bigint(20) unsigned NOT NULL AUTO_INCREMENT COMMENT 'nid, 自增标识',
                                                   `data_id` varchar(255) NOT NULL COMMENT 'data_id',
                                                   `group_id` varchar(128) NOT NULL COMMENT 'group_id',
                                                   `app_name` varchar(128) DEFAULT NULL COMMENT 'app_name',
                                                   `content` longtext NOT NULL COMMENT 'content',
                                                   `md5` varchar(32) DEFAULT NULL COMMENT 'md5',
                                                   `gmt_create` datetime NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
                                                   `gmt_modified` datetime NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '修改时间',
                                                   `src_user` text COMMENT 'source user',
                                                   `src_ip` varchar(50) DEFAULT NULL COMMENT 'source ip',
                                                   `op_type` char(10) DEFAULT NULL COMMENT 'operation type',
                                                   `tenant_id` varchar(128) DEFAULT '' COMMENT '租户字段',
                                                   `encrypted_data_key` varchar(1024) NOT NULL DEFAULT '' COMMENT '密钥',
                                                   `publish_type` varchar(50)  DEFAULT 'formal' COMMENT 'publish type gray or formal',
                                                   `gray_name` varchar(50)  DEFAULT NULL COMMENT 'gray name',
                                                   `ext_info`  longtext DEFAULT NULL COMMENT 'ext info',
                                                   PRIMARY KEY (`nid`),
                                                   KEY `idx_gmt_create` (`gmt_create`),
                                                   KEY `idx_gmt_modified` (`gmt_modified`),
                                                   KEY `idx_did` (`data_id`)
                ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='多租户改造';


                /******************************************/
                /*   表名称 = tenant_capacity              */
                /******************************************/
                CREATE TABLE `tenant_capacity` (
                                                   `id` bigint(20) unsigned NOT NULL AUTO_INCREMENT COMMENT '主键ID',
                                                   `tenant_id` varchar(128) NOT NULL DEFAULT '' COMMENT 'Tenant ID',
                                                   `quota` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '配额，0表示使用默认值',
                                                   `usage` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '使用量',
                                                   `max_size` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '单个配置大小上限，单位为字节，0表示使用默认值',
                                                   `max_aggr_count` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '聚合子配置最大个数',
                                                   `max_aggr_size` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '单个聚合数据的子配置大小上限，单位为字节，0表示使用默认值',
                                                   `max_history_count` int(10) unsigned NOT NULL DEFAULT '0' COMMENT '最大变更历史数量',
                                                   `gmt_create` datetime NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
                                                   `gmt_modified` datetime NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '修改时间',
                                                   PRIMARY KEY (`id`),
                                                   UNIQUE KEY `uk_tenant_id` (`tenant_id`)
                ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='租户容量信息表';


                CREATE TABLE `tenant_info` (
                                               `id` bigint(20) NOT NULL AUTO_INCREMENT COMMENT 'id',
                                               `kp` varchar(128) NOT NULL COMMENT 'kp',
                                               `tenant_id` varchar(128) default '' COMMENT 'tenant_id',
                                               `tenant_name` varchar(128) default '' COMMENT 'tenant_name',
                                               `tenant_desc` varchar(256) DEFAULT NULL COMMENT 'tenant_desc',
                                               `create_source` varchar(32) DEFAULT NULL COMMENT 'create_source',
                                               `gmt_create` bigint(20) NOT NULL COMMENT '创建时间',
                                               `gmt_modified` bigint(20) NOT NULL COMMENT '修改时间',
                                               PRIMARY KEY (`id`),
                                               UNIQUE KEY `uk_tenant_info_kptenantid` (`kp`,`tenant_id`),
                                               KEY `idx_tenant_id` (`tenant_id`)
                ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='tenant_info';

                CREATE TABLE `users` (
                                         `username` varchar(50) NOT NULL PRIMARY KEY COMMENT 'username',
                                         `password` varchar(500) NOT NULL COMMENT 'password',
                                         `enabled` boolean NOT NULL COMMENT 'enabled'
                );

                CREATE TABLE `roles` (
                                         `username` varchar(50) NOT NULL COMMENT 'username',
                                         `role` varchar(50) NOT NULL COMMENT 'role',
                                         UNIQUE INDEX `idx_user_role` (`username` ASC, `role` ASC) USING BTREE
                );

                CREATE TABLE `permissions` (
                                               `role` varchar(50) NOT NULL COMMENT 'role',
                                               `resource` varchar(128) NOT NULL COMMENT 'resource',
                                               `action` varchar(8) NOT NULL COMMENT 'action',
                                               UNIQUE INDEX `uk_role_permission` (`role`,`resource`,`action`) USING BTREE
                );

                -- Insert default user
                INSERT INTO users (username, password, enabled) VALUES ('nacos', '$2a$10$EuWPZHzz32dJN7jexM34MOeYirDdFAZm2kuWj7VEOJhhZkDrxfvUu', TRUE);
                INSERT INTO roles (username, role) VALUES ('nacos', 'ROLE_ADMIN');
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: nacos-configmap-2
              namespace: {{ $ns }}
              name: {{ $appName }}-console
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-console
            data:
              vn-homevn-nacosvn-confvn-clustervn-conf: |
                {{ $appName }}.{{ $ns }}.svc.cluster.local:8848
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: nacos-job
              namespace: {{ $ns }}
              name: {{ $appName }}-mysql-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: mysql-init
                      image: mysql:8.0.30
                      env:
                        - name: MYSQL_ROOT_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: password
                        - name: MYSQL_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: host
                        - name: MYSQL_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: port
                      command:
                        - /bin/bash
                        - -c
                        - |
                          set -e
                          echo "Waiting for MySQL to be ready..."
                          until mysql -h${MYSQL_HOST} -P${MYSQL_PORT} -uroot -p${MYSQL_ROOT_PASSWORD} -e "SELECT 1" &>/dev/null; do
                            echo "MySQL is not ready yet..."
                            sleep 2
                          done
                          echo "MySQL is ready. Initializing database..."
                          
                          # Execute SQL file
                          mysql -h${MYSQL_HOST} -P${MYSQL_PORT} -uroot -p${MYSQL_ROOT_PASSWORD} < /tmp/nacos-mysql.sql
                          
                          echo "Database initialization completed successfully."
                      volumeMounts:
                        - name: vn-tmpvn-nacosvn-mysqlvn-sql
                          mountPath: /tmp/nacos-mysql.sql
                          subPath: ./tmp/nacos-mysql.sql
                  volumes:
                    - name: vn-tmpvn-nacosvn-mysqlvn-sql
                      configMap:
                        name: {{ $appName }}-mysql-init
                        items:
                          - key: vn-tmpvn-nacosvn-mysqlvn-sql
                            path: ./tmp/nacos-mysql.sql
                        defaultMode: 420
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-console
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: nacos-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: nacos/nacos-server:v3.0.3
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-console
                app: {{ $appName }}-console
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              serviceName: {{ $appName }}-console
              selector:
                matchLabels:
                  app: {{ $appName }}-console
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-console
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-console
                      image: nacos/nacos-server:v3.0.3
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: NACOS_DEPLOYMENT_TYPE
                          value: console
                        - name: PREFER_HOST_MODE
                          value: hostname
                        - name: MODE
                          value: standalone
                        - name: SPRING_DATASOURCE_PLATFORM
                          value: mysql
                        - name: MYSQL_SERVICE_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: host
                        - name: MYSQL_SERVICE_PORT
                          valueFrom:
