apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-rybbit-go-templating
  labels:
    template: rybbit
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Rybbit
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/rybbit/logo.png"
    meta.crossplane.io/description: Rybbit is the modern open source and privacy friendly alternative to Google Analytics.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/rybbit/README.md"
    meta.crossplane.io/url: "https://rybbit.io/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: rybbit
        template: rybbit
        # projectName: my-project
        name: {{ name }}
        input:
          {}
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-rybbit
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: postgresql
                clusterversion.kubeblocks.io/name: postgresql-14.8.0
                sealos-db-provider-cr: {{ $appName }}-pg
              annotations: {}
              name: {{ $appName }}-pg
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-14.8.0
              componentSpecs:
                - componentDefRef: postgresql
                  monitor: true
                  name: postgresql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-pg
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi

              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-pg
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-pg
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-job
              namespace: {{ $ns }}
              name: {{ $appName }}-pg-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: pgsql-init
                      image: senzing/postgresql-client:2.2.4
                      env:
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DATABASE_URL
                          value: postgresql://postgres:$(PG_PASSWORD)@{{ $appName }}-pg-postgresql.{{ $ns }}.svc:5432
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until psql ${DATABASE_URL} -c 'CREATE DATABASE analytics;' &>/dev/null; do sleep 1; done
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}-clickhouse
            data:
              vn-etcvn-clickhouse-servervn-configvn-dvn-enable-jsonvn-xml: |-
                <clickhouse>
                    <settings>
                        <enable_json_type>1</enable_json_type>
                    </settings>
                </clickhouse>
              vn-etcvn-clickhouse-servervn-configvn-dvn-logging-rulesvn-xml: |-
                <clickhouse>
                  <logger>
                      <level>warning</level>
                      <console>true</console>
                  </logger>
                  <query_thread_log remove="remove"/>
                  <query_log remove="remove"/>
                  <text_log remove="remove"/>
                  <trace_log remove="remove"/>
                  <metric_log remove="remove"/>
                  <asynchronous_metric_log remove="remove"/>
                  <session_log remove="remove"/>
                  <part_log remove="remove"/>
                </clickhouse>
              vn-etcvn-clickhouse-servervn-configvn-dvn-networkvn-xml: |-
                <clickhouse>
                    <listen_host>0.0.0.0</listen_host>
                </clickhouse>
              vn-etcvn-clickhouse-servervn-usersvn-dvn-user-loggingvn-xml: |-
                <clickhouse>
                  <profiles>
                    <default>
                      <log_queries>0</log_queries>
                      <log_query_threads>0</log_query_threads>
                    </default>
                  </profiles>
                </clickhouse>
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-clickhouse
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: clickhouse/clickhouse-server:25.4.2
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-clickhouse
                app: {{ $appName }}-clickhouse
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}-clickhouse
              selector:
                matchLabels:
                  app: {{ $appName }}-clickhouse
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-clickhouse
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-clickhouse
                      image: clickhouse/clickhouse-server:25.4.2
                      env:
                        - name: CLICKHOUSE_DB
                          value: analytics
                        - name: CLICKHOUSE_USER
                          value: default
                        - name: CLICKHOUSE_PASSWORD
                          value: frog
                      resources:
                        requests:
                          cpu: 100m
                          memory: 204Mi
                        limits:
                          cpu: 1000m
                          memory: 2048Mi
                      imagePullPolicy: IfNotPresent
                      readinessProbe:
                        failureThreshold: 30
                        httpGet:
                          path: /ping
                          port: 8123
                          scheme: HTTP
                        periodSeconds: 10
                        successThreshold: 1
                        timeoutSeconds: 1
                      volumeMounts:
                        - name: vn-etcvn-clickhouse-servervn-configvn-dvn-enable-jsonvn-xml
                          mountPath: /etc/clickhouse-server/config.d/enable_json.xml
                          subPath: ./etc/clickhouse-server/config.d/enable_json.xml
                        - name: vn-etcvn-clickhouse-servervn-configvn-dvn-logging-rulesvn-xml
                          mountPath: /etc/clickhouse-server/config.d/logging_rules.xml
                          subPath: ./etc/clickhouse-server/config.d/logging_rules.xml
                        - name: vn-etcvn-clickhouse-servervn-configvn-dvn-networkvn-xml
                          mountPath: /etc/clickhouse-server/config.d/network.xml
                          subPath: ./etc/clickhouse-server/config.d/network.xml
                        - name: vn-etcvn-clickhouse-servervn-usersvn-dvn-user-loggingvn-xml
                          mountPath: /etc/clickhouse-server/users.d/user_logging.xml
                          subPath: ./etc/clickhouse-server/users.d/user_logging.xml
                        - name: vn-varvn-libvn-clickhouse
                          mountPath: /var/lib/clickhouse
                  volumes:
                    - name: vn-etcvn-clickhouse-servervn-configvn-dvn-enable-jsonvn-xml
                      configMap:
                        name: {{ $appName }}-clickhouse
                        items:
                          - key: vn-etcvn-clickhouse-servervn-configvn-dvn-enable-jsonvn-xml
                            path: ./etc/clickhouse-server/config.d/enable_json.xml
                    - name: vn-etcvn-clickhouse-servervn-configvn-dvn-logging-rulesvn-xml
                      configMap:
                        name: {{ $appName }}-clickhouse
                        items:
                          - key: vn-etcvn-clickhouse-servervn-configvn-dvn-logging-rulesvn-xml
                            path: ./etc/clickhouse-server/config.d/logging_rules.xml
                    - name: vn-etcvn-clickhouse-servervn-configvn-dvn-networkvn-xml
                      configMap:
                        name: {{ $appName }}-clickhouse
                        items:
                          - key: vn-etcvn-clickhouse-servervn-configvn-dvn-networkvn-xml
                            path: ./etc/clickhouse-server/config.d/network.xml
                    - name: vn-etcvn-clickhouse-servervn-usersvn-dvn-user-loggingvn-xml
                      configMap:
                        name: {{ $appName }}-clickhouse
                        items:
                          - key: vn-etcvn-clickhouse-servervn-usersvn-dvn-user-loggingvn-xml
                            path: ./etc/clickhouse-server/users.d/user_logging.xml
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /var/lib/clickhouse
                      value: '1'
                    name: vn-varvn-libvn-clickhouse
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-service
              namespace: {{ $ns }}
              name: {{ $appName }}-clickhouse
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-clickhouse
            spec:
              ports:
                - name: http
                  targetPort: 8123
                  port: 8123
                - name: admin
                  targetPort: 9000
                  port: 9000
              selector:
                app: {{ $appName }}-clickhouse
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-backend
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-deployment
                originImageName: ghcr.io/rybbit-io/rybbit-backend:sha-a863cc3
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-backend
                app: {{ $appName }}-backend
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-backend
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 0
                  maxSurge: 1
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-backend
                spec:
                  automountServiceAccountToken: false
                  initContainers:
                    - name: wait-for-postgres
                      image: postgres:14-alpine
                      command: ['sh', '-c', 
                        'until pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER; do echo waiting for postgres; sleep 2; done;']
                      env:
                        - name: POSTGRES_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: POSTGRES_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: POSTGRES_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: PGPASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                  containers:
                    - name: {{ $appName }}-backend
                      image: ghcr.io/rybbit-io/rybbit-backend:sha-a863cc3
                      env:
                        - name: NODE_ENV
                          value: 'production'
                        - name: CLICKHOUSE_HOST
                          value: 'http://{{ $appName }}-clickhouse.{{ $ns }}.svc.cluster.local:8123'
                        - name: CLICKHOUSE_DB
                          value: 'analytics'
                        - name: CLICKHOUSE_PASSWORD
                          value: 'frog'
                        - name: POSTGRES_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: POSTGRES_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: POSTGRES_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: POSTGRES_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: POSTGRES_DB
                          value: 'analytics'
                        - name: BETTER_AUTH_SECRET
                          value: 'iu6lZsxtU4c0AfGJsD7Jrr3eafD11Ah7'
                        - name: DISABLE_SIGNUP
                          value: 'false'
                        - name: BASE_URL
                          value: https://{{ $host }}
                      resources:
                        requests:
                          cpu: 20m
                          memory: 25Mi
                        limits:
                          cpu: 200m
                          memory: 256Mi
                      ports:
                        - name: http
                          protocol: TCP
                          containerPort: 3001
                      imagePullPolicy: IfNotPresent
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-backend
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-backend
            spec:
              ports:
                - name: http
                  targetPort: 3001
                  port: 3001
              selector:
                app: {{ $appName }}-backend
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-backend
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-backend
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}-backend
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-ingress
                nginx.ingress.kubernetes.io/rewrite-target: "/$1"
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /api/(.*)
                        backend:
                          service:
                            name: {{ $appName }}-backend
                            port:
                              number: 3001
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-client
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-deployment-2
                originImageName: ghcr.io/rybbit-io/rybbit-client:sha-a863cc3
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-client
                app: {{ $appName }}-client
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-client
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 0
                  maxSurge: 1
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-client
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-client
                      image: ghcr.io/rybbit-io/rybbit-client:sha-a863cc3
                      env:
                        - name: NODE_ENV
                          value: 'production'
                        - name: NEXT_PUBLIC_BACKEND_URL
                          value: https://{{ $host }}
                      resources:
                        requests:
                          cpu: 20m
                          memory: 12Mi
                        limits:
                          cpu: 200m
                          memory: 128Mi
                      ports:
                        - name: http
                          protocol: TCP
                          containerPort: 3002
                      imagePullPolicy: IfNotPresent
                      readinessProbe:
                        failureThreshold: 30
                        httpGet:
                          path: /
                          port: 3002
                          scheme: HTTP
                        initialDelaySeconds: 5
                        periodSeconds: 10
                        timeoutSeconds: 3
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-service-3
              namespace: {{ $ns }}
              name: {{ $appName }}-client
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-client
            spec:
              ports:
                - name: http
                  targetPort: 3002
                  port: 3002
              selector:
                app: {{ $appName }}-client
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-client
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-client
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}-client
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-ingress-2
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}-client
                            port:
                              number: 3002
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rybbit-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/rybbit/logo.png"
              name: "Rybbit"
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
