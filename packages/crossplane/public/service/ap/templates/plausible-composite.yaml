apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-plausible-go-templating
  labels:
    template: plausible
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: plausible
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/plausible/logo.png"
    meta.crossplane.io/description: Simple, open-source, lightweight (< 1 KB) and privacy-friendly web analytics alternative to Google Analytics.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/plausible/README.md"
    meta.crossplane.io/url: "https://github.com/plausible/analytics"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: plausible
        template: plausible
        # projectName: my-project
        name: {{ name }}
        input:
          # clickhouse user name (required)
          clickhouseUser: ""
          # clickhouse password (required)
          clickhousePassword: ""
          # true or false (required)
          disableRegistration: ""
          # You can generate it using the following command: openssl rand -base64 64 | tr -d ' ' ; echo (required)
          secretKeyBase: "FhNHzoWJyoQgT21RsFQG+KUzJ/o5YbKsszc6CMOArA0OXxjZ763oCGiItOPlKJAfIQO0uov8xt8p5k+MqtmtOQ=="
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-plausible
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $clickhouseUser := $input.clickhouseUser | default "" }}
            {{- $clickhousePassword := $input.clickhousePassword | default "" }}
            {{- $disableRegistration := $input.disableRegistration | default "" }}
            {{- $secretKeyBase := $input.secretKeyBase | default "FhNHzoWJyoQgT21RsFQG+KUzJ/o5YbKsszc6CMOArA0OXxjZ763oCGiItOPlKJAfIQO0uov8xt8p5k+MqtmtOQ==" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plausible-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-db
                app.kubernetes.io/instance: {{ $appName }}-db
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-db
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: postgresql
                clusterversion.kubeblocks.io/name: postgresql-14.8.0
                sealos-db-provider-cr: {{ $appName }}-db
              annotations: {}
              name: {{ $appName }}-db
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-14.8.0
              componentSpecs:
                - componentDefRef: postgresql
                  monitor: true
                  name: postgresql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-db
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi

              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plausible-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-db
                app.kubernetes.io/instance: {{ $appName }}-db
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-db
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plausible-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-db
                app.kubernetes.io/instance: {{ $appName }}-db
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-db
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-db
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-db
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plausible-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}-events-db
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-events-db
                app: {{ $appName }}-events-db
            data:
              vn-etcvn-clickhouse-servervn-configvn-dvn-loggingvn-xml: |-
                <clickhouse>

                    <!-- disable IPv6 -->
                    <listen_host>0.0.0.0</listen_host>

                    <logger>
                        <level>warning</level>
                        <console>true</console>
                    </logger>

                    <!-- Stop all the unnecessary logging -->
                    <query_thread_log remove="remove"/>
                    <query_log remove="remove"/>
                    <text_log remove="remove"/>
                    <trace_log remove="remove"/>
                    <metric_log remove="remove"/>
                    <asynchronous_metric_log remove="remove"/>
                    <session_log remove="remove"/>
                    <part_log remove="remove"/>
                </clickhouse>
              vn-etcvn-clickhouse-servervn-usersvn-dvn-loggingvn-xml: |-
                <clickhouse>
                    <profiles>
                        <default>
                            <log_queries>0</log_queries>
                            <log_query_threads>0</log_query_threads>
                        </default>
                    </profiles>
                </clickhouse>
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-events-db
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plausible-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: clickhouse/clickhouse-server:23.3.7.5-alpine
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-events-db
                app: {{ $appName }}-events-db
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-events-db
              serviceName: {{ $appName }}-events-db
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-events-db
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-events-db
                      image: clickhouse/clickhouse-server:23.3.7.5-alpine
                      env:
                        - name: CLICKHOUSE_DB
                          value: plausible
                        - name: CLICKHOUSE_LISTEN_HOST
                          value: 0.0.0.0
                        - name: CLICKHOUSE_USER
                          value: {{ $clickhouseUser }}
                        - name: CLICKHOUSE_PASSWORD
                          value: {{ $clickhousePassword }}
                      resources:
                        requests:
                          cpu: 50m
                          memory: 102Mi
                        limits:
                          cpu: 500m
                          memory: 1024Mi
                      command: []
                      args: []
                      ports:
                        - containerPort: 8123
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-etcvn-clickhouse-servervn-configvn-dvn-loggingvn-xml
                          mountPath: /etc/clickhouse-server/config.d/logging.xml
                          subPath: ./etc/clickhouse-server/config.d/logging.xml
                        - name: vn-etcvn-clickhouse-servervn-usersvn-dvn-loggingvn-xml
                          mountPath: /etc/clickhouse-server/users.d/logging.xml
                          subPath: ./etc/clickhouse-server/users.d/logging.xml
                        - name: vn-varvn-libvn-clickhouse
                          mountPath: /var/lib/clickhouse
                  volumes:
                    - name: vn-etcvn-clickhouse-servervn-configvn-dvn-loggingvn-xml
                      configMap:
                        name: {{ $appName }}-events-db
                        items:
                          - key: vn-etcvn-clickhouse-servervn-configvn-dvn-loggingvn-xml
                            path: ./etc/clickhouse-server/config.d/logging.xml
                    - name: vn-etcvn-clickhouse-servervn-usersvn-dvn-loggingvn-xml
                      configMap:
                        name: {{ $appName }}-events-db
                        items:
                          - key: vn-etcvn-clickhouse-servervn-usersvn-dvn-loggingvn-xml
                            path: ./etc/clickhouse-server/users.d/logging.xml
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /var/lib/clickhouse
                      value: '1'
                    name: vn-varvn-libvn-clickhouse
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plausible-service
              namespace: {{ $ns }}
              name: {{ $appName }}-events-db
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-events-db
            spec:
              ports:
                - port: 8123
              selector:
                app: {{ $appName }}-events-db
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plausible-deployment
                originImageName: plausible/analytics:v2.0
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 1
                  maxSurge: 0
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: plausible/analytics:v2.0
                      env:
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-db-conn-credential
                              key: password
                        - name: DATABASE_URL
                          value: postgres://postgres:$(PG_PASSWORD)@{{ $appName }}-db-postgresql:5432/plausible
                        - name: CLICKHOUSE_DATABASE_URL
                          value: http://{{ $clickhouseUser }}:{{ $clickhousePassword }}@{{ $appName }}-events-db:8123/plausible
                        - name: DISABLE_REGISTRATION
                          value: {{ $disableRegistration }}
                        - name: BASE_URL
                          value: https://{{ $host }}
                        - name: SECRET_KEY_BASE
                          value: {{ $secretKeyBase }}
                      resources:
                        requests:
                          cpu: 100m
                          memory: 102Mi
                        limits:
                          cpu: 1000m
                          memory: 1024Mi
                      command:
                        - sh
                        - -c
                      args:
                        - sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run
                      ports:
                        - containerPort: 8000
                      imagePullPolicy: IfNotPresent
                      volumeMounts: []
                  volumes: []
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plausible-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 8000
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: plausible-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'false'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/rewrite-target: /$2
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /()(.*)
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 8000
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
