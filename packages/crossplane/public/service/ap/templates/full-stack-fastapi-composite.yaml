apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-full-stack-fastapi-go-templating
  labels:
    template: full-stack-fastapi
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Full Stack FastAPI
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/full-stack-fastapi/logo.png"
    meta.crossplane.io/description: Production-ready FastAPI + PostgreSQL + Frontend stack
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/full-stack-fastapi/README.md"
    meta.crossplane.io/url: "https://github.com/yangchuansheng/full-stack-fastapi-template"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: full-stack-fastapi
        template: full-stack-fastapi
        # projectName: my-project
        name: {{ name }}
        input:
          # Backend secret key (JWT signing) (required)
          secretKey: "${{ random(32) }}"
          # Initial superuser email for backend (required)
          firstSuperuser: ""
          # Initial superuser password for backend (required)
          firstSuperuserPassword: ""
          # Sender email for SMTP (optional)
          emailsFromEmail: ""
          # SMTP host (optional)
          smtpHost: ""
          # SMTP user (optional)
          smtpUser: ""
          # SMTP password (optional)
          smtpPassword: ""
          # Sentry DSN (optional)
          sentryDsn: ""
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-full-stack-fastapi
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $secretKey := $input.secretKey | default "${{ random(32) }}" }}
            {{- $firstSuperuser := $input.firstSuperuser | default "" }}
            {{- $firstSuperuserPassword := $input.firstSuperuserPassword | default "" }}
            {{- $emailsFromEmail := $input.emailsFromEmail | default "" }}
            {{- $smtpHost := $input.smtpHost | default "" }}
            {{- $smtpUser := $input.smtpUser | default "" }}
            {{- $smtpPassword := $input.smtpPassword | default "" }}
            {{- $sentryDsn := $input.sentryDsn | default "" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            # PostgreSQL ServiceAccount
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: full-stack-fastapi-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            ---
            # PostgreSQL Role
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: full-stack-fastapi-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            # PostgreSQL RoleBinding
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: full-stack-fastapi-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-pg
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-pg
            ---
            # PostgreSQL Cluster (Kubeblocks)
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: postgresql
                clusterversion.kubeblocks.io/name: postgresql-14.8.0
                sealos-db-provider-cr: {{ $appName }}-pg
              annotations: {}
              name: {{ $appName }}-pg
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-14.8.0
              componentSpecs:
                - componentDefRef: postgresql
                  monitor: true
                  name: postgresql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-pg
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
              terminationPolicy: Delete
              tolerations: []
            ---
            # PostgreSQL Init Job - create database 'app'
            apiVersion: batch/v1
            kind: Job
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: full-stack-fastapi-job
              namespace: {{ $ns }}
              name: {{ $appName }}-pg-init
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-pg-init
            spec:
              completions: 1
              template:
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: pgsql-init
                      image: postgres:14-alpine
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: PG_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: DATABASE_URL
                          value: postgresql://$(PG_USERNAME):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until psql ${DATABASE_URL} -c 'CREATE DATABASE app;' &>/dev/null; do sleep 1; done
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            # PostgreSQL Init Job - create database 'app'
            apiVersion: batch/v1
            kind: Job
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: full-stack-fastapi-job-2
              namespace: {{ $ns }}
              name: {{ $appName }}-init
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-init
            spec:
              completions: 1
              template:
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: init-prestart
                      image: ghcr.io/yangchuansheng/full-stack-fastapi-backend:0.8.0
                      imagePullPolicy: IfNotPresent
                      command: ["/bin/bash", "-c"]
                      args:
                        - |
                          set -e
                          echo "Running backend prestart (DB migrations & initial data)"
                          until bash scripts/prestart.sh; do sleep 1; done
                      env:
                        - name: ENVIRONMENT
                          value: production
                        - name: DOMAIN
                          value: {{ $host }}
                        - name: FRONTEND_HOST
                          value: https://{{ $host }}
                        - name: BACKEND_CORS_ORIGINS
                          value: https://{{ $host }}
                        - name: SECRET_KEY
                          value: {{ $secretKey }}
                        - name: FIRST_SUPERUSER
                          value: {{ $firstSuperuser }}
                        - name: FIRST_SUPERUSER_PASSWORD
                          value: {{ $firstSuperuserPassword }}
                        - name: EMAILS_FROM_EMAIL
                          value: {{ $emailsFromEmail }}
                        - name: SMTP_HOST
                          value: {{ $smtpHost }}
                        - name: SMTP_USER
                          value: {{ $smtpUser }}
                        - name: SMTP_PASSWORD
                          value: {{ $smtpPassword }}
                        - name: POSTGRES_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: POSTGRES_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: POSTGRES_SERVER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: POSTGRES_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: POSTGRES_DB
                          value: app
                        - name: SENTRY_DSN
                          value: {{ $sentryDsn }}
                        - name: PROJECT_NAME
                          value: Full Stack FastAPI Project
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            # Backend StatefulSet
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-backend
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: full-stack-fastapi-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: ghcr.io/yangchuansheng/full-stack-fastapi-backend:0.8.0
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-backend
                app: {{ $appName }}-backend
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-backend
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-backend
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-backend
                      image: ghcr.io/yangchuansheng/full-stack-fastapi-backend:0.8.0
                      imagePullPolicy: IfNotPresent
                      env:
                        # Environment and domain
                        - name: ENVIRONMENT
                          value: production
                        - name: DOMAIN
                          value: {{ $host }}
                        - name: FRONTEND_HOST
                          value: https://{{ $host }}
                        # CORS (allow frontend domain)
                        - name: BACKEND_CORS_ORIGINS
                          value: https://{{ $host }}
                        # Security and first user
                        - name: SECRET_KEY
                          value: {{ $secretKey }}
                        - name: FIRST_SUPERUSER
                          value: {{ $firstSuperuser }}
                        - name: FIRST_SUPERUSER_PASSWORD
                          value: {{ $firstSuperuserPassword }}
                        # SMTP (optional)
                        - name: EMAILS_FROM_EMAIL
                          value: {{ $emailsFromEmail }}
                        - name: SMTP_HOST
                          value: {{ $smtpHost }}
                        - name: SMTP_USER
                          value: {{ $smtpUser }}
                        - name: SMTP_PASSWORD
                          value: {{ $smtpPassword }}
                        # DB configuration (from Kubeblocks secret)
                        - name: POSTGRES_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: POSTGRES_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: POSTGRES_SERVER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: POSTGRES_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: POSTGRES_DB
                          value: app
                        # Sentry (optional)
                        - name: SENTRY_DSN
                          value: {{ $sentryDsn }}
                        - name: PROJECT_NAME
                          value: Full Stack FastAPI Project
                      ports:
                        - containerPort: 8000
                          name: http
                      resources:
                        requests:
                          cpu: 20m
                          memory: 51Mi
                        limits:
                          cpu: 200m
                          memory: 512Mi
                      livenessProbe:
                        httpGet:
                          path: /api/v1/utils/health-check/
                          port: http
                        initialDelaySeconds: 30
                        periodSeconds: 10
                        timeoutSeconds: 5
                        failureThreshold: 5
                      readinessProbe:
                        httpGet:
                          path: /api/v1/utils/health-check/
                          port: http
                        initialDelaySeconds: 20
                        periodSeconds: 10
                        timeoutSeconds: 5
                        failureThreshold: 10
            ---
            # Backend Service
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: full-stack-fastapi-service
              namespace: {{ $ns }}
              name: {{ $appName }}-backend
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-backend
            spec:
              type: ClusterIP
              ports:
                - port: 8000
                  targetPort: 8000
                  protocol: TCP
                  name: http
              selector:
                app: {{ $appName }}-backend
            ---
            # Frontend Deployment (Main App)
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: full-stack-fastapi-deployment-2
                originImageName: ghcr.io/yangchuansheng/full-stack-fastapi-frontend:0.8.0
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: ghcr.io/yangchuansheng/full-stack-fastapi-frontend:0.8.0
                      imagePullPolicy: IfNotPresent
                      ports:
                        - containerPort: 80
                          name: http
                      resources:
                        requests:
                          cpu: 10m
                          memory: 12Mi
                        limits:
                          cpu: 100m
                          memory: 128Mi
            ---
            # Frontend Service
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: full-stack-fastapi-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              type: ClusterIP
              ports:
                - port: 80
                  targetPort: 80
                  protocol: TCP
                  name: http
              selector:
                app: {{ $appName }}
            ---
            # Frontend Ingress
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: full-stack-fastapi-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 80
                      - pathType: Prefix
                        path: /api
                        backend:
                          service:
                            name: {{ $appName }}-backend
                            port:
                              number: 8000
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            # App CR (link to frontend)
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: full-stack-fastapi-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/full-stack-fastapi/logo.png"
              name: Full Stack FastAPI
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
