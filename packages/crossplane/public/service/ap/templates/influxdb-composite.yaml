apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-influxdb-go-templating
  labels:
    template: influxdb
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: influxdb
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/influxdb/logo.svg"
    meta.crossplane.io/description: Real-time insights from any time series data with a single, purpose-built database. Run at any scale in any environment in the cloud, on-premises, or at the edge.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/influxdb/README.md"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: influxdb
        template: influxdb
        # projectName: my-project
        name: {{ name }}
        input:
          {}
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-influxdb
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: Secret
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: influxdb-secret
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app.kubernetes.io/instance: {{ $appName }}
                app.kubernetes.io/name: {{ $appName }}
                app.kubernetes.io/version: 2.7.5
            type: Opaque
            data:
              admin-user-password: cGFzc3cwcmQ=
              admin-user-token: dDBrZW4=
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: influxdb-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 8086
                  targetPort: 8086
                  name: http
                - port: 8088
                  targetPort: 8088
                  name: rpc
              selector:
                app: {{ $appName }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: influxdb-serviceaccount
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app.kubernetes.io/instance: {{ $appName }}
                app.kubernetes.io/name: {{ $appName }}
                app.kubernetes.io/version: 2.7.5
                app.kubernetes.io/component: {{ $appName }}
            automountServiceAccountToken: false
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: influxdb-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: nginx
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
                deploy.cloud.sealos.io/resize: 5Gi
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              updateStrategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 50%
              minReadySeconds: 10
              serviceName: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  affinity:
                    podAntiAffinity:
                      preferredDuringSchedulingIgnoredDuringExecution:
                        - podAffinityTerm:
                            labelSelector:
                              matchLabels:
                                app.kubernetes.io/instance: {{ $appName }}
                                app.kubernetes.io/name: {{ $appName }}
                                app.kubernetes.io/component: {{ $appName }}
                            topologyKey: kubernetes.io/hostname
                          weight: 1
                  securityContext:
                    fsGroup: 1001
                    fsGroupChangePolicy: Always
                    supplementalGroups: []
                    sysctls: []
                  serviceAccountName: {{ $appName }}
                  containers:
                    - name: influxdb
                      image: docker.io/bitnamilegacy/influxdb:2.7.5-debian-12-r13
                      imagePullPolicy: "IfNotPresent"
                      securityContext:
                        allowPrivilegeEscalation: false
                        capabilities:
                          drop:
                            - ALL
                        privileged: false
                        readOnlyRootFilesystem: true
                        runAsGroup: 1001
                        runAsNonRoot: true
                        runAsUser: 1001
                        seLinuxOptions: {}
                        seccompProfile:
                          type: RuntimeDefault
                      env:
                        - name: BITNAMI_DEBUG
                          value: "false"
                        - name: POD_IP
                          valueFrom:
                            fieldRef:
                              fieldPath: status.podIP
                        - name: INFLUXDB_HTTP_AUTH_ENABLED
                          value: "true"
                        - name: INFLUXDB_CREATE_USER_TOKEN
                          value: "no"
                        - name: INFLUXDB_ADMIN_USER
                          value: "admin"
                        - name: INFLUXDB_ADMIN_USER_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: admin-user-password
                        - name: INFLUXDB_ADMIN_USER_TOKEN
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: admin-user-token
                        - name: INFLUXDB_ADMIN_BUCKET
                          value: "primary"
                        - name: INFLUXDB_ADMIN_ORG
                          value: "primary"
                      envFrom:
                      ports:
                        - name: http
                          containerPort: 8086
                          protocol: TCP
                        - name: rpc
                          containerPort: 8088
                          protocol: TCP
                      livenessProbe:
                        failureThreshold: 6
                        initialDelaySeconds: 180
                        periodSeconds: 45
                        successThreshold: 1
                        timeoutSeconds: 30
                        exec:
                          command:
                            - bash
                            - -c
                            - |
                              . /opt/bitnami/scripts/libinfluxdb.sh
                              influxdb_env
                              export INFLUX_USERNAME="$INFLUXDB_ADMIN_USER"
                              export INFLUX_PASSWORD="$INFLUXDB_ADMIN_USER_PASSWORD"
                              timeout 29s influx ping --host http://$POD_IP:8086
                      readinessProbe:
                        failureThreshold: 6
                        initialDelaySeconds: 60
                        periodSeconds: 45
                        successThreshold: 1
                        timeoutSeconds: 30
                        exec:
                          command:
                            - bash
                            - -c
                            - |
                              . /opt/bitnami/scripts/libinfluxdb.sh
                              influxdb_env
                              export INFLUX_USERNAME="$INFLUXDB_ADMIN_USER"
                              export INFLUX_PASSWORD="$INFLUXDB_ADMIN_USER_PASSWORD"
                              timeout 29s influx ping --host http://$POD_IP:8086
                      resources:
                        limits:
                          cpu: 1000m
                          ephemeral-storage: 1024Mi
                          memory: 1024Mi
                        requests:
                          cpu: 100m
                          ephemeral-storage: 50Mi
                          memory: 128Mi
                      volumeMounts:
                        - name: empty-dir
                          mountPath: /tmp
                          subPath: tmp-dir
                        - name: empty-dir
                          mountPath: /opt/bitnami/influxdb/etc
                          subPath: app-conf-dir
                        - name: vn-bitnamivn-influxdb
                          mountPath: /bitnami/influxdb
                  volumes:
                    - name: empty-dir
                      emptyDir: {}
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /bitnami/influxdb
                      value: '5'
                    name: vn-bitnamivn-influxdb
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 5Gi
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: network-eadkuyljeayo
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: influxdb-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/ssl-redirect: 'false'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 8086
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
