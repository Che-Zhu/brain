apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-reactive-resume-go-templating
  labels:
    template: Reactive-Resume
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Reactive-Resume
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/Reactive-Resume/logo.svg"
    meta.crossplane.io/description: A free and open-source resume builder that simplifies the process of creating, updating, and sharing your resume.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/Reactive-Resume/README.md"
    meta.crossplane.io/url: "https://rxresu.me/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: Reactive-Resume
        template: Reactive-Resume
        # projectName: my-project
        name: {{ name }}
        input:
          # minioPasswd: auto-generated if omitted
          # domain: auto-generated if omitted
          # Storage size for minio in Gi (required)
          minioStorage: "5"
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-Reactive-Resume
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $minioPasswd := $input.minioPasswd | default (printf "%s" (randAlphaNum 24)) }}
            {{- $domain := $input.domain | default (printf "%s" (randAlphaNum 8)) }}
            {{- $minioStorage := $input.minioStorage | default "5" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: postgresql
                clusterversion.kubeblocks.io/name: postgresql-14.8.0
                sealos-db-provider-cr: {{ $appName }}-pg
              annotations: {}
              name: {{ $appName }}-pg
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-14.8.0
              componentSpecs:
                - componentDefRef: postgresql
                  monitor: true
                  name: postgresql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-pg
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi

              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            rules:
              - apiGroups:
                  - "*"
                resources:
                  - "*"
                verbs:
                  - "*"
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-pg
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-pg
            ---
            #laf minio
            apiVersion: v1
            kind: Secret
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-secret
              namespace: {{ $ns }}
              name: {{ $appName }}-minio-secret
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-minio-secret
            type: Opaque
            stringData:
              rootUser: {{ $minioPasswd }}
              rootPassword: {{ $minioPasswd }}
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-service
              namespace: {{ $ns }}
              name: {{ $appName }}-minio
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                app: {{ $appName }}-minio
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-minio
            spec:
              type: ClusterIP
              ports:
                - name: api
                  port: 9000
                  protocol: TCP
                  targetPort: 9000
                - name: console
                  port: 9001
                  protocol: TCP
                  targetPort: 9001
              selector:
                app: {{ $appName }}-minio
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-minio
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: quay.io/minio/minio
                deploy.cloud.sealos.io/minReplicas: "1"
                deploy.cloud.sealos.io/maxReplicas: "1"
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $appName }}-minio
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-minio
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}-minio-svc
              selector:
                matchLabels:
                  app: {{ $appName }}-minio
              podManagementPolicy: Parallel
              updateStrategy:
                type: RollingUpdate
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-minio
                spec:
                  terminationGracePeriodSeconds: 10
                  securityContext:
                    runAsUser: 1000
                    runAsGroup: 1000
                    fsGroup: 1000
                    fsGroupChangePolicy: OnRootMismatch
                    runAsNonRoot: true
                    seccompProfile:
                      type: RuntimeDefault
                  containers:
                    - name: {{ $appName }}-minio
                      image: quay.io/minio/minio:RELEASE.2023-03-22T06-36-24Z
                      imagePullPolicy: IfNotPresent
                      securityContext:
                        allowPrivilegeEscalation: false
                        capabilities:
                          drop:
                            - ALL
                      command:
                        [
                          "/bin/sh",
                          "-ce",
                          "/usr/bin/docker-entrypoint.sh minio server  /data -S /etc/minio/certs/ --address :9000 --console-address :9001",
                        ]
                      env:
                        - name: MINIO_ROOT_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-minio-secret
                              key: rootUser
                        - name: MINIO_ROOT_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-minio-secret
                              key: rootPassword
                        - name: MINIO_PROMETHEUS_AUTH_TYPE
                          value: public
                      ports:
                        - name: http
                          containerPort: 9000
                        - name: http-console
                          containerPort: 9001
                      resources:
                        limits:
                          cpu: 300m
                          memory: 512Mi
                        requests:
                          cpu: 100m
                          memory: 256Mi
                      volumeMounts:
                        - name: data
                          mountPath: /data
                  volumes: []
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /data
                      value: " {{ $minioStorage }} "
                    name: data
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: {{ $minioStorage }}Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-chrome
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-chrome
            spec:
              type: ClusterIP
              ports:
                - port: 3000
                  targetPort: 3000
                  protocol: TCP
                  name: http
              selector:
                app: {{ $appName }}-chrome
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-deployment
              namespace: {{ $ns }}
              name: {{ $appName }}-chrome
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $appName }}-chrome
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-chrome
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-chrome
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-chrome
                spec:
                  containers:
                    - name: {{ $appName }}-chrome
                      securityContext: {}
                      image: ghcr.io/browserless/chromium:v2.11.0
                      imagePullPolicy: IfNotPresent
                      ports:
                        - name: http
                          containerPort: 3000
                          protocol: TCP
                      env:
                        - name: TIMEOUT
                          value: "10000"
                        - name: CONCURRENT
                          value: "10"
                        - name: TOKEN
                          value: "chrome_token"
                        - name: EXIT_ON_HEALTH_FAILURE
                          value: "true"
                        - name: PRE_REQUEST_HEALTH_CHECK
                          value: "true"
                      resources:
                        limits:
                          cpu: 500m
                          memory: 512Mi
                        requests:
                          cpu: 100m
                          memory: 128Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-service-3
              namespace: {{ $ns }}
              name: {{ $appName }}-app
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-app
            spec:
              type: ClusterIP
              ports:
                - port: 3000
                  targetPort: http
                  protocol: TCP
                  name: http
              selector:
                app: {{ $appName }}-app
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-deployment-2
              namespace: {{ $ns }}
              name: {{ $appName }}-app
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $appName }}-app
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-app
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-app
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-app
                spec:
                  containers:
                    - name: {{ $appName }}-app
                      image: amruthpillai/reactive-resume:v4.1.2
                      imagePullPolicy: IfNotPresent
                      ports:
                        - name: http
                          containerPort: 3000
                          protocol: TCP
                      env:
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: PORT
                          value: "3000"
                        - name: NODE_ENV
                          value: "production"
                        - name: PUBLIC_URL
                          value: "https://{{ $domain }}.{{ $region }}"
                        - name: STORAGE_URL
                          value: "https://oss-{{ $domain }}.{{ $region }}/default"
                        - name: CHROME_TOKEN
                          value: "chrome_token"
                        - name: CHROME_URL
                          value: "ws://{{ $appName }}-chrome.{{ $ns }}.svc.cluster.local:3000"
                        - name: DATABASE_URL
                          value: "postgresql://postgres:$(PG_PASSWORD)@{{ $appName }}-pg-postgresql.{{ $ns }}.svc:5432/postgres"
                        - name: ACCESS_TOKEN_SECRET
                          value: "access_token_secret"
                        - name: REFRESH_TOKEN_SECRET
                          value: "refresh_token_secret"
                        - name: MAIL_FROM
                          value: "noreply@localhost"
                        - name: STORAGE_ENDPOINT
                          value: "{{ $appName }}-minio.{{ $ns }}.svc.cluster.local"
                        - name: STORAGE_PORT
                          value: "9000"
                        - name: STORAGE_REGION
                          value: "us-east-1"
                        - name: STORAGE_BUCKET
                          value: "default"
                        - name: STORAGE_ACCESS_KEY
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-minio-secret
                              key: rootUser
                        - name: STORAGE_SECRET_KEY
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-minio-secret
                              key: rootPassword
                        - name: STORAGE_USE_SSL
                          value: "false"
                      resources:
                        limits:
                          cpu: 500m
                          memory: 512Mi
                        requests:
                          cpu: 250m
                          memory: 256Mi
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-app
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-app
                cloud.sealos.io/app-deploy-manager-domain: {{ $domain }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
                nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $domain }}.{{ $region }}
                  http:
                    paths:
                      - backend:
                          service:
                            name: {{ $appName }}-app
                            port:
                              number: 3000
                        path: /
                        pathType: Prefix
              tls:
                - hosts:
                    - {{ $domain }}.{{ $region }}
                  secretName: wildcard-cert
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-minio-console
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-minio
                cloud.sealos.io/app-deploy-manager-domain: minio-{{ $domain }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-ingress-2
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: minio-{{ $domain }}.{{ $region }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}-minio
                            port:
                              number: 9001
              tls:
                - hosts:
                    - minio-{{ $domain }}.{{ $region }}
                  secretName: wildcard-cert
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-minio-api
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-minio
                cloud.sealos.io/app-deploy-manager-domain: oss-{{ $domain }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-ingress-3
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: oss-{{ $domain }}.{{ $region }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}-minio
                            port:
                              number: 9000
              tls:
                - hosts:
                    - oss-{{ $domain }}.{{ $region }}
                  secretName: wildcard-cert
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-job
              namespace: {{ $ns }}
              name: {{ $appName }}-postgres-schema-job
            spec:
              ttlSecondsAfterFinished: 120
              template:
                spec:
                  initContainers:
                    - name: wait-for-postgres
                      image: bitnamilegacy/postgresql:latest
                      env:
                        - name: PGPASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                      command:
                        [
                          "sh",
                          "-c",
                          "until pg_isready -h {{ $appName }}-pg-postgresql.{{ $ns }}.svc -p 5432 -U postgres; do echo waiting for postgres; sleep 2; done;",
                        ]
                      resources:
                        limits:
                          cpu: 500m
                          memory: 512Mi
                        requests:
                          cpu: 250m
                          memory: 256Mi
                  containers:
                    - name: update-schema
                      image: bitnamilegacy/postgresql:latest
                      env:
                        - name: PGPASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                      command:
                        [
                          "sh",
                          "-c",
                          'psql postgresql://postgres:$PGPASSWORD@{{ $appName }}-pg-postgresql.{{ $ns }}.svc:5432/postgres -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"',
                        ]
                      resources:
                        limits:
                          cpu: 500m
                          memory: 512Mi
                        requests:
                          cpu: 250m
                          memory: 256Mi
                  restartPolicy: OnFailure
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: Reactive-Resume-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $domain }}.{{ $region }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/Reactive-Resume/logo.svg"
              name: {{ $appName }}
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
