apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-opendeepwiki-go-templating
  labels:
    template: OpenDeepWiki
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: OpenDeepWiki
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/OpenDeepWiki/logo.png"
    meta.crossplane.io/description: 由于涉及到Github仓库拉取等功能，建议部署在新加坡服务器上。OpenDeepWiki 是参考DeepWiki 作为灵感，基于 .NET 9 和 Semantic Kernel 开发的开源项目。它旨在帮助开发者更好地理解和使用代码库，提供代码分析、文档生成、知识图谱等功能。
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/OpenDeepWiki/README.md"
    meta.crossplane.io/url: "https://opendeep.wiki"
    meta.crossplane.io/author: ifzzh
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: OpenDeepWiki
        template: OpenDeepWiki
        # projectName: my-project
        name: {{ name }}
        input:
          wikiImage: "crpi-owsezg1fzb71ozfl.cn-beijing.personal.cr.aliyuncs.com/ifzzh520/koala-wiki:stable"
          wikiWebImage: "crpi-owsezg1fzb71ozfl.cn-beijing.personal.cr.aliyuncs.com/ifzzh520/koala-wiki-web:stable"
          # webPortName: auto-generated if omitted
          # wikiPortName: auto-generated if omitted
          # webHost: auto-generated if omitted
          # webName: auto-generated if omitted
          model: "DeepSeek-V3"
          apiServer: "https://api.token-ai.cn/v1"
          # wiki后端的镜像
          wikiImage: "${{ defaults.wiki_image }}"
          # wiki后端的镜像
          wikiWebImage: "${{ defaults.wiki_web_image }}"
          # 必须要支持function的模型 (required)
          chatModel: "${{ defaults.model }}"
          # 分析模型，用于生成仓库目录结构，建议gpt-4.1 (required)
          analysisModel: "${{ defaults.model }}"
          # 输入你的API接口 (required)
          apiEndpoint: "${{ defaults.api_server }}"
          # 输入API Key (required)
          apiKey: ""
          # 中文 或 English
          language: "中文"
          # 存放仓库的位置
          koalawikiRepositories: "/repositories"
          # 每个用户AI处理文档生成的最大数量
          taskMaxSizePerUser: "5"
          # 是否修复Mermaid，1为修复，其他为不修复
          repairMermaid: "1"
          # 数据库类型
          dbType: "sqlite"
          dbConnectionString: "Data Source=/data/KoalaWiki.db"
          # 仓库增量更新间隔
          updateInterval: "5"
          # 是否启用智能过滤，这可能影响AI得到仓库的文件目录
          enablesmartfilter: "true"
          # 是否启用增量更新
          enableIncrementalUpdate: "true"
          # 保存仓库 (Gi) (required)
          volumeSizeRepositories: "3"
          # 保存文档（Gi） (required)
          volumeSizeData: "1"
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-OpenDeepWiki
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $wikiImage := $input.wikiImage | default "crpi-owsezg1fzb71ozfl.cn-beijing.personal.cr.aliyuncs.com/ifzzh520/koala-wiki:stable" }}
            {{- $wikiWebImage := $input.wikiWebImage | default "crpi-owsezg1fzb71ozfl.cn-beijing.personal.cr.aliyuncs.com/ifzzh520/koala-wiki-web:stable" }}
            {{- $webPortName := $input.webPortName | default (printf "%s" (randAlphaNum 12)) }}
            {{- $wikiPortName := $input.wikiPortName | default (printf "%s" (randAlphaNum 12)) }}
            {{- $webHost := $input.webHost | default (printf "%s" (randAlphaNum 12)) }}
            {{- $webName := $input.webName | default (printf "%s" (randAlphaNum 8)) }}
            {{- $model := $input.model | default "DeepSeek-V3" }}
            {{- $apiServer := $input.apiServer | default "https://api.token-ai.cn/v1" }}
            {{- $wikiImage := $input.wikiImage | default "${{ defaults.wiki_image }}" }}
            {{- $wikiWebImage := $input.wikiWebImage | default "${{ defaults.wiki_web_image }}" }}
            {{- $chatModel := $input.chatModel | default "${{ defaults.model }}" }}
            {{- $analysisModel := $input.analysisModel | default "${{ defaults.model }}" }}
            {{- $apiEndpoint := $input.apiEndpoint | default "${{ defaults.api_server }}" }}
            {{- $apiKey := $input.apiKey | default "" }}
            {{- $language := $input.language | default "中文" }}
            {{- $koalawikiRepositories := $input.koalawikiRepositories | default "/repositories" }}
            {{- $taskMaxSizePerUser := $input.taskMaxSizePerUser | default "5" }}
            {{- $repairMermaid := $input.repairMermaid | default "1" }}
            {{- $dbType := $input.dbType | default "sqlite" }}
            {{- $dbConnectionString := $input.dbConnectionString | default "Data Source=/data/KoalaWiki.db" }}
            {{- $updateInterval := $input.updateInterval | default "5" }}
            {{- $enablesmartfilter := $input.enablesmartfilter | default "true" }}
            {{- $enableIncrementalUpdate := $input.enableIncrementalUpdate | default "true" }}
            {{- $volumeSizeRepositories := $input.volumeSizeRepositories | default "3" }}
            {{- $volumeSizeData := $input.volumeSizeData | default "1" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: OpenDeepWiki-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: {{ $wikiImage }}                      #Your app's Docker image url
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}
              selector:
                matchLabels:
                  app: {{ $appName }}
              updateStrategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 50%
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  terminationGracePeriodSeconds: 10
                  containers:
                    - name: {{ $appName }}
                      image: {{ $wikiImage }}                                 #Your app's Docker image url
                      env: 
                        - name: KOALAWIKI_REPOSITORIES
                          value: {{ $koalawikiRepositories }}
                        - name: TASK_MAX_SIZE_PER_USER
                          value: {{ $taskMaxSizePerUser }}
                        - name: REPAIR_MERMAID
                          value: {{ $repairMermaid }}
                        - name: CHAT_MODEL
                          value: {{ $chatModel }}
                        - name: ANALYSIS_MODEL
                          value: {{ $analysisModel }}
                        - name: CHAT_API_KEY
                          value: {{ $apiKey }}
                        - name: ENDPOINT
                          value: {{ $apiEndpoint }}
                        - name: DB_TYPE
                          value: {{ $dbType }}
                        - name: DB_CONNECTION_STRING
                          value: {{ $dbConnectionString }}
                        - name: UPDATE_INTERVAL
                          value: {{ $updateInterval }}
                        - name: EnableSmartFilter
                          value: {{ $enablesmartfilter }}
                      resources:
                        requests:
                          cpu: 20m
                          memory: 204Mi
                        limits:
                          cpu: 200m
                          memory: 2048Mi
                      command: []
                      args: []
                      ports:
                        - containerPort: 8080
                          name: {{ $wikiPortName }}
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-data
                          mountPath: /data
                        - name: vn-appvn-repositories
                          mountPath: /app/repositories
                  volumes: []
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /data
                      value: '1'
                    name: vn-data
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: {{ $volumeSizeData }}Gi
                - metadata:
                    annotations:
                      path: /app/repositories
                      value: '3'
                    name: vn-appvn-repositories
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: {{ $volumeSizeRepositories }}Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: OpenDeepWiki-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
              - port: 8080
                targetPort: 8080
                name: {{ $wikiPortName }}
                protocol: TCP
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: OpenDeepWiki-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/ssl-redirect: 'false'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 8080
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: OpenDeepWiki-service-2
              namespace: {{ $ns }}
              name: {{ $webName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $webName }}
            spec:
              ports:
              - port: 3000
                targetPort: 3000
                name: {{ $webPortName }}
                protocol: TCP
              selector:
                app: {{ $webName }}
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $webName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: OpenDeepWiki-deployment
                originImageName: {{ $wikiWebImage }}   
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $webName }}
                cloud.sealos.io/app-deploy-manager: {{ $webName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $webName }}
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 0
                  maxSurge: 1
              template:
                metadata:
                  labels:
                    app: {{ $webName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $webName }}
                      image: {{ $wikiWebImage }}   
                      env:
                        - name: NEXT_PUBLIC_API_URL
                          value: https://{{ $host }}
                      resources:
                        requests:
                          cpu: 20m
                          memory: 25Mi
                        limits:
                          cpu: 200m
                          memory: 256Mi
                      ports:
                        - containerPort: 3000
                          name: {{ $webPortName }}
                      imagePullPolicy: IfNotPresent
                      volumeMounts: []
                  volumes: []
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $webName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $webName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $webHost }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: OpenDeepWiki-ingress-2
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/ssl-redirect: 'false'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
            spec:
              rules:
                - host: {{ $webHost }}.{{ $region }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $webName }}
                            port:
                              number: 3000
              tls:
                - hosts:
                    - {{ $webHost }}.{{ $region }}
                  secretName: wildcard-cert
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
