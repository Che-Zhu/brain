apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-overleaf-go-templating
  labels:
    template: overleaf
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Overleaf
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/overleaf/logo.svg"
    meta.crossplane.io/description: Overleaf is an open-source online real-time collaborative LaTeX editor.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/overleaf/README.md"
    meta.crossplane.io/url: "https://github.com/overleaf/overleaf"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: overleaf
        template: overleaf
        # projectName: my-project
        name: {{ name }}
        input:
          # Set language
          overleafSiteLanguage: "zh-CN"
          overleafAppName: "Overleaf Community Edition"
          enabledLinkedFileTypes: "project_file,project_output_file"
          # Enables Thumbnail generation using ImageMagick
          enableConversions: "true"
          # Disables email confirmation requirementk
          emailConfirmationDisabled: "true"
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-overleaf
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $overleafSiteLanguage := $input.overleafSiteLanguage | default "zh-CN" }}
            {{- $overleafAppName := $input.overleafAppName | default "Overleaf Community Edition" }}
            {{- $enabledLinkedFileTypes := $input.enabledLinkedFileTypes | default "project_file,project_output_file" }}
            {{- $enableConversions := $input.enableConversions | default "true" }}
            {{- $emailConfirmationDisabled := $input.emailConfirmationDisabled | default "true" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: sharelatex/sharelatex:5.0.6
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: sharelatex/sharelatex:5.0.6
                      env:
                        - name: OVERLEAF_MONGO_PASS
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mongodb-mongodb-account-root
                              key: password
                        - name: OVERLEAF_MONGO_URL
                          value: >-
                            mongodb://root:$(OVERLEAF_MONGO_PASS)@{{ $appName }}-mongo-mongodb.{{ $ns }}.svc:27017/sharelatex?authSource=admin
                        - name: OVERLEAF_REDIS_HOST
                          value: {{ $appName }}-redis-redis
                        - name: OVERLEAF_REDIS_PORT
                          value: '6379'
                        - name: OVERLEAF_REDIS_PASS
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: OVERLEAF_LISTEN_IP
                          value: "0.0.0.0"
                        - name: OVERLEAF_SITE_LANGUAGE
                          value: {{ $overleafSiteLanguage }}
                        - name: OVERLEAF_APP_NAME
                          value: {{ $overleafAppName }}
                        - name: ENABLED_LINKED_FILE_TYPES
                          value: {{ $enabledLinkedFileTypes }}
                        - name: ENABLE_CONVERSIONS
                          value: {{ $enableConversions }}
                        - name: EMAIL_CONFIRMATION_DISABLED
                          value: {{ $emailConfirmationDisabled }}
                        - name: TEXMFVAR
                          value: /var/lib/overleaf/tmp/texmf-var
                        - name: OVERLEAF_APP_NAME
                          value: {{ $overleafAppName }}
                        - name: OVERLEAF_BEHIND_PROXY
                          value: "true"
                      resources:
                        requests:
                          cpu: 50m
                          memory: 128Mi
                        limits:
                          cpu: 500m
                          memory: 1280Mi
                      ports:
                        - name: http
                          protocol: TCP
                          containerPort: 80
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-varvn-libvn-overleaf
                          mountPath: /var/lib/overleaf
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /var/lib/overleaf
                      value: '1'
                    name: vn-varvn-libvn-overleaf
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 80
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-ingress
                higress.io/response-header-control-remove: X-Frame-Options
                higress.io/response-header-control-update: |
                  Content-Security-Policy "default-src * blob: data: *.{{ $region }} {{ $region }}; img-src * data: blob: resource: *.{{ $region }} {{ $region }}; connect-src * wss: blob: resource:; style-src 'self' 'unsafe-inline' blob: *.{{ $region }} {{ $region }} resource:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: *.{{ $region }} {{ $region }} resource: *.baidu.com *.bdstatic.com; frame-src 'self' *.{{ $region }} {{ $region }} mailto: tel: weixin: mtt: *.baidu.com; frame-ancestors 'self' https://{{ $region }} https://*.{{ $region }}"
                  X-Xss-Protection "1; mode=block"
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/rewrite-target: /$2
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  more_clear_headers "X-Frame-Options:";
                  more_set_headers "Content-Security-Policy: default-src * blob: data: *.{{ $region }} {{ $region }}; img-src * data: blob: resource: *.{{ $region }} {{ $region }}; connect-src * wss: blob: resource:; style-src 'self' 'unsafe-inline' blob: *.{{ $region }} {{ $region }} resource:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: *.{{ $region }} {{ $region }} resource: *.baidu.com *.bdstatic.com; frame-src 'self' *.{{ $region }} {{ $region }} mailto: tel: weixin: mtt: *.baidu.com; frame-ancestors 'self' https://{{ $region }} https://*.{{ $region }}";
                  more_set_headers "X-Xss-Protection: 1; mode=block";
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /()(.*)
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 80
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-redirect
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-ingress-2
                higress.io/response-header-control-remove: X-Frame-Options
                higress.io/response-header-control-update: |
                  Content-Security-Policy "default-src * blob: data: *.{{ $region }} {{ $region }}; img-src * data: blob: resource: *.{{ $region }} {{ $region }}; connect-src * wss: blob: resource:; style-src 'self' 'unsafe-inline' blob: *.{{ $region }} {{ $region }} resource:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: *.{{ $region }} {{ $region }} resource: *.baidu.com *.bdstatic.com; frame-src 'self' *.{{ $region }} {{ $region }} mailto: tel: weixin: mtt: *.baidu.com; frame-ancestors 'self' https://{{ $region }} https://*.{{ $region }}"
                  X-Xss-Protection "1; mode=block"
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/rewrite-target: /launchpad
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  more_clear_headers "X-Frame-Options:";
                  more_set_headers "Content-Security-Policy: default-src * blob: data: *.{{ $region }} {{ $region }}; img-src * data: blob: resource: *.{{ $region }} {{ $region }}; connect-src * wss: blob: resource:; style-src 'self' 'unsafe-inline' blob: *.{{ $region }} {{ $region }} resource:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: *.{{ $region }} {{ $region }} resource: *.baidu.com *.bdstatic.com; frame-src 'self' *.{{ $region }} {{ $region }} mailto: tel: weixin: mtt: *.baidu.com; frame-ancestors 'self' https://{{ $region }} https://*.{{ $region }}";
                  more_set_headers "X-Xss-Protection: 1; mode=block";
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Exact
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 80
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/overleaf/logo.svg"
              name: Overleaf
              type: iframe
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-cluster
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: mongodb-8.0.4
                app.kubernetes.io/instance: test-db
                helm.sh/chart: mongodb-cluster-0.9.1
                sealos-db-provider-cr: {{ $appName }}-mongodb
              name: {{ $appName }}-mongodb
            spec:
              affinity:
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys:
                  - kubernetes.io/hostname
              backup:
                enabled: true
                cronExpression: 0 18 * * *
                method: dump
                pitrEnabled: false
                retentionPeriod: 7d
              componentSpecs:
                - componentDef: mongodb
                  name: mongodb
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceVersion: 8.0.4
                  serviceAccountName: {{ $appName }}-mongodb
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
              terminationPolicy: Delete
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-rolebinding
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-mongo
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-mongo
                namespace: {{ $ns }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-serviceaccount-2
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-cluster-2
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: redis
                kb.io/database: redis-7.2.7
                app.kubernetes.io/instance: {{ $appName }}
                app.kubernetes.io/version: 7.2.7
                helm.sh/chart: redis-cluster-0.9.0
                sealos-db-provider-cr: {{ $appName }}-redis
            spec:
              clusterDefinitionRef: redis
              affinity:
                podAntiAffinity: Preferred
                topologyKeys:
                  - kubernetes.io/hostname
              tolerations:
                - key: kb-data
                  operator: Equal
                  value: "true"
                  effect: NoSchedule
              componentSpecs:
                - name: redis
                  componentDef: redis-7
                  enabledLogs:
                    - running
                  env:
                    - name: CUSTOM_SENTINEL_MASTER_NAME
                  serviceVersion: 7.2.7
                  serviceAccountName: {{ $appName }}-redis
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                - componentDef: redis-sentinel-7
                  name: redis-sentinel
                  replicas: 1
                  resources:
                    limits:
                      cpu: 100m
                      memory: 100Mi
                    requests:
                      cpu: 10m
                      memory: 10Mi
                  serviceVersion: 7.2.7
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
              terminationPolicy: Delete
              topology: replication
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-role-2
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: overleaf-rolebinding-2
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-redis
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-redis
                namespace: {{ $ns }}
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
