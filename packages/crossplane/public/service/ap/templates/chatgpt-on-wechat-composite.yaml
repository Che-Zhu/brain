apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-chatgpt-on-wechat-go-templating
  labels:
    template: chatgpt-on-wechat
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: chatgpt-on-wechat
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/chatgpt-on-wechat/logo.png"
    meta.crossplane.io/description: 本项目是基于大模型的智能对话机器人，支持企业微信、微信公众号、飞书、钉钉接入，可选择GPT3.5/GPT4.0/Claude/文心一言/讯飞星火/通义千问/Gemini/LinkAI/ZhipuAI，能处理文本、语音和图片，通过插件访问操作系统和互联网等外部资源，支持基于自有知识库定制企业AI应用。
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/chatgpt-on-wechat/README.md"
    meta.crossplane.io/url: "https://github.com/zhayujie/chatgpt-on-wechat"
    meta.crossplane.io/author: zhayujie
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: chatgpt-on-wechat
        template: chatgpt-on-wechat
        # projectName: my-project
        name: {{ name }}
        input:
          # OpenAI API KEY (required)
          openAiApiKey: ""
          # OpenAI API 基础地址，带v1 (required)
          openAiApiBase: "https://api.openai.com/v1"
          # 模型名称 (required)
          model: "gpt-3.5-turbo"
          # 渠道类型 (required)
          channelType: "wx"
          # 单聊前缀
          singleChatPrefix: "["bot"]"
          # 单聊回复前缀
          singleChatReplyPrefix: ""[bot] ""
          # 群聊前缀
          groupChatPrefix: "["@bot"]"
          # 群聊白名单
          groupNameWhiteList: "["ALL_GROUP"]"
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-chatgpt-on-wechat
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $openAiApiKey := $input.openAiApiKey | default "" }}
            {{- $openAiApiBase := $input.openAiApiBase | default "https://api.openai.com/v1" }}
            {{- $model := $input.model | default "gpt-3.5-turbo" }}
            {{- $channelType := $input.channelType | default "wx" }}
            {{- $singleChatPrefix := $input.singleChatPrefix | default "[\"bot\"]" }}
            {{- $singleChatReplyPrefix := $input.singleChatReplyPrefix | default "\"[bot] \"" }}
            {{- $groupChatPrefix := $input.groupChatPrefix | default "[\"@bot\"]" }}
            {{- $groupNameWhiteList := $input.groupNameWhiteList | default "[\"ALL_GROUP\"]" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: chatgpt-on-wechat-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: zhayujie/chatgpt-on-wechat:1.6.8
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: zhayujie/chatgpt-on-wechat:1.6.8
                      env:
                        - name: OPEN_AI_API_KEY
                          value: {{ $openAiApiKey }}
                        - name: OPEN_AI_API_BASE
                          value: {{ $openAiApiBase }}
                        - name: MODEL
                          value: {{ $model }}
                        - name: CHANNEL_TYPE
                          value: {{ $channelType }}
                        - name: DINGTALK_CLIENT_ID
                          value: ''
                        - name: DINGTALK_CLIENT_SECRET
                          value: ''
                        - name: PROXY
                          value: ''
                        - name: HOT_RELOAD
                          value: 'False'
                        - name: SINGLE_CHAT_PREFIX
                          value: {{ $singleChatPrefix }}
                        - name: SINGLE_CHAT_REPLY_PREFIX
                          value: {{ $singleChatReplyPrefix }}
                        - name: GROUP_CHAT_PREFIX
                          value: {{ $groupChatPrefix }}
                        - name: GROUP_NAME_WHITE_LIST
                          value: {{ $groupNameWhiteList }}
                        - name: IMAGE_CREATE_PREFIX
                          value: '["画", "看", "找"]'
                        - name: CONVERSATION_MAX_TOKENS
                          value: '1000'
                        - name: SPEECH_RECOGNITION
                          value: 'False'
                        - name: CHARACTER_DESC
                          value: '你是ChatGPT, 一个由OpenAI训练的大型语言模型, 你旨在回答并解决人们的任何问题，并且可以使用多种语言与人交流。'
                        - name: SUBSCRIBE_MSG
                          value: |
                            感谢您的关注！
                            这里是ChatGPT，可以自由对话。
                            支持语音对话。
                            支持图片输入。
                            支持图片输出，画字开头的消息将按要求创作图片。
                            支持tool、角色扮演和文字冒险等丰富的插件。
                            输入{trigger_prefix}#help 查看详细指令。
                        - name: EXPIRES_IN_SECONDS
                          value: '3600'
                        - name: USE_GLOBAL_PLUGIN_CONFIG
                          value: 'True'
                        - name: USE_LINKAI
                          value: 'False'
                        - name: LINKAI_API_KEY
                          value: ''
                        - name: LINKAI_APP_CODE
                          value: ''
                      resources:
                        requests:
                          cpu: 50m
                          memory: 25Mi
                        limits:
                          cpu: 500m
                          memory: 256Mi
                      command: []
                      args: []
                      ports:
                        - containerPort: 80
                      imagePullPolicy: IfNotPresent
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: chatgpt-on-wechat-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 80
              selector:
                app: {{ $appName }}
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
