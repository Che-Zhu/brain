apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-rustfs-go-templating
  labels:
    template: rustfs
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: RustFS
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/rustfs/logo.png"
    meta.crossplane.io/description: RustFS is a high-performance, S3-compatible object storage system built with Rust, offering distributed storage capabilities with multiple volume support.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/rustfs/README.md"
    meta.crossplane.io/url: "https://github.com/rustfs/rustfs"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: rustfs
        template: rustfs
        # projectName: my-project
        name: {{ name }}
        input:
          # S3 Access Key for authentication (required)
          accessKey: ""
          # S3 Secret Key for authentication (required)
          secretKey: ""
          # Enable web console interface
          consoleEnable: "true"
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-rustfs
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $accessKey := $input.accessKey | default "" }}
            {{- $secretKey := $input.secretKey | default "" }}
            {{- $consoleEnable := $input.consoleEnable | default "true" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rustfs-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: rustfs/rustfs:latest
                deploy.cloud.sealos.io/minReplicas: '4'
                deploy.cloud.sealos.io/maxReplicas: '4'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 4
              podManagementPolicy: Parallel
              revisionHistoryLimit: 1
              serviceName: {{ $appName }}-headless
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  securityContext:
                    runAsUser: 10001
                    runAsGroup: 10001
                    fsGroup: 10001
                    runAsNonRoot: true
                    seccompProfile:
                      type: RuntimeDefault
                  initContainers:
                    - name: init-step
                      image: busybox
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: REPLICA_COUNT
                          value: "4"
                      command:
                        - sh
                        - -c
                        - |
                          for i in $(seq 0 $(($REPLICA_COUNT - 1))); do
                            mkdir -p /data/rustfs$i
                          done;
                      securityContext:
                        runAsNonRoot: true
                        allowPrivilegeEscalation: false
                        capabilities:
                          drop:
                            - ALL
                      volumeMounts:
                        - name: vn-datavn-rustfs0
                          mountPath: /data/rustfs0
                        - name: vn-datavn-rustfs1
                          mountPath: /data/rustfs1
                        - name: vn-datavn-rustfs2
                          mountPath: /data/rustfs2
                        - name: vn-datavn-rustfs3
                          mountPath: /data/rustfs3
                        - name: vn-logs
                          mountPath: /logs
                  containers:
                    - name: {{ $appName }}
                      image: rustfs/rustfs:latest
                      imagePullPolicy: IfNotPresent
                      command: ["/usr/bin/rustfs"]
                      env:
                        - name: RUSTFS_ADDRESS
                          value: "0.0.0.0:9000"
                        - name: RUSTFS_CONSOLE_ADDRESS
                          value: "0.0.0.0:9001"
                        - name: RUSTFS_CONSOLE_ENABLE
                          value: {{ $consoleEnable }}
                        - name: RUSTFS_ACCESS_KEY
                          value: {{ $accessKey }}
                        - name: RUSTFS_SECRET_KEY
                          value: {{ $secretKey }}
                        - name: RUSTFS_LOG_LEVEL
                          value: "info"
                        - name: RUSTFS_VOLUMES
                          value: "http://{{ $appName }}-{0...3}.{{ $appName }}-headless.{{ $ns }}.svc.cluster.local:9000/data/rustfs{0...3}"
                        - name: RUSTFS_OBS_LOG_DIRECTORY
                          value: "/logs"
                        - name: RUSTFS_SINKS_FILE_PATH
                          value: "/logs"
                      securityContext:
                        runAsUser: 10001
                        runAsGroup: 10001
                        runAsNonRoot: true
                        allowPrivilegeEscalation: false
                        capabilities:
                          drop:
                            - ALL
                      ports:
                        - containerPort: 9000
                          name: endpoint
                          protocol: TCP
                        - containerPort: 9001
                          name: console
                          protocol: TCP
                      resources:
                        requests:
                          cpu: 100m
                          memory: 256Mi
                        limits:
                          cpu: 2000m
                          memory: 4096Mi
                      livenessProbe:
                        httpGet:
                          path: /health
                          port: 9000
                        initialDelaySeconds: 60
                        periodSeconds: 10
                        timeoutSeconds: 3
                        successThreshold: 1
                        failureThreshold: 8
                      readinessProbe:
                        httpGet:
                          path: /health
                          port: 9001
                        initialDelaySeconds: 60
                        periodSeconds: 10
                        timeoutSeconds: 5
                        successThreshold: 1
                        failureThreshold: 5
                      volumeMounts:
                        - name: vn-datavn-rustfs0
                          mountPath: /data/rustfs0
                        - name: vn-datavn-rustfs1
                          mountPath: /data/rustfs1
                        - name: vn-datavn-rustfs2
                          mountPath: /data/rustfs2
                        - name: vn-datavn-rustfs3
                          mountPath: /data/rustfs3
                        - name: vn-logs
                          mountPath: /logs
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /data/rustfs0
                      value: '1'
                    name: vn-datavn-rustfs0
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 10Gi
                - metadata:
                    annotations:
                      path: /data/rustfs1
                      value: '1'
                    name: vn-datavn-rustfs1
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 10Gi
                - metadata:
                    annotations:
                      path: /data/rustfs2
                      value: '1'
                    name: vn-datavn-rustfs2
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 10Gi
                - metadata:
                    annotations:
                      path: /data/rustfs3
                      value: '1'
                    name: vn-datavn-rustfs3
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 10Gi
                - metadata:
                    annotations:
                      path: /logs
                      value: '1'
                    name: vn-logs
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rustfs-service
              namespace: {{ $ns }}
              name: {{ $appName }}-headless
            spec:
              clusterIP: None
              publishNotReadyAddresses: true
              ports:
                - port: 9000
                  targetPort: 9000
                  protocol: TCP
                  name: endpoint
                - port: 9001
                  targetPort: 9001
                  protocol: TCP
                  name: console
              selector:
                app: {{ $appName }}
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rustfs-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              type: ClusterIP
              ports:
                - port: 9001
                  targetPort: 9001
                  protocol: TCP
                  name: console
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rustfs-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
                nginx.ingress.kubernetes.io/affinity: cookie
                nginx.ingress.kubernetes.io/session-cookie-expires: "3600"
                nginx.ingress.kubernetes.io/session-cookie-hash: sha1
                nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
                nginx.ingress.kubernetes.io/session-cookie-name: {{ $appName }}
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 9001
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rustfs-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/rustfs/logo.png"
              name: RustFS
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
