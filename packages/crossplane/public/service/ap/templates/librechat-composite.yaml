apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-librechat-go-templating
  labels:
    template: librechat
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: LibreChat
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/librechat/logo.svg"
    meta.crossplane.io/description: Enhanced ChatGPT Clone
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/librechat/README.md"
    meta.crossplane.io/url: "https://github.com/danny-avila/LibreChat"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: librechat
        template: librechat
        # projectName: my-project
        name: {{ name }}
        input:
          # reverse proxy for openai, remember to add /v1 to the end of the url
          openaiReverseProxy: "https://api.openai.com/v1"
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-librechat
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $openaiReverseProxy := $input.openaiReverseProxy | default "https://api.openai.com/v1" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: librechat-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: librechat-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: ghcr.io/danny-avila/librechat:v0.7.3
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: ghcr.io/danny-avila/librechat:v0.7.3
                      env:
                        - name: MONGO_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mongodb-mongodb-account-root
                              key: password
                        - name: MONGO_URI
                          value: >-
                            mongodb://root:$(MONGO_PASSWORD)@{{ $appName }}-mongo-mongodb.{{ $ns }}.svc:27017/LibreChat?authSource=admin
                        - name: HOST
                          value: 0.0.0.0
                        - name: MEILI_HOST
                          value: http://{{ $appName }}-meilisearch:7700
                        - name: OPENAI_REVERSE_PROXY
                          value: {{ $openaiReverseProxy }}
                        - name: EMAIL_HOST
                          value: ''
                        - name: EMAIL_SERVICE
                          value: ''
                      envFrom:
                      - secretRef:
                          name: {{ $appName }}
                      resources:
                        requests:
                          cpu: 20m
                          memory: 51Mi
                        limits:
                          cpu: 200m
                          memory: 512Mi
                      ports:
                        - containerPort: 3080
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-appvn-clientvn-publicvn-images
                          mountPath: /app/client/public/images
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /app/client/public/images
                      value: '1'
                    name: vn-appvn-clientvn-publicvn-images
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Secret
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: librechat-secret
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            type: Opaque
            stringData:
              ALLOW_EMAIL_LOGIN: "true"
              ALLOW_REGISTRATION: "true"
              ALLOW_SOCIAL_LOGIN: "false"
              ALLOW_SOCIAL_REGISTRATION: "false"
              ANTHROPIC_API_KEY: user_provided
              ANTHROPIC_MODELS: claude-1,claude-instant-1,claude-2
              APP_TITLE: LibreChat
              AZURE_AI_SEARCH_API_KEY: ""
              AZURE_AI_SEARCH_API_VERSION: ""
              AZURE_AI_SEARCH_INDEX_NAME: ""
              AZURE_AI_SEARCH_SEARCH_OPTION_QUERY_TYPE: ""
              AZURE_AI_SEARCH_SEARCH_OPTION_SELECT: ""
              AZURE_AI_SEARCH_SEARCH_OPTION_TOP: ""
              AZURE_AI_SEARCH_SERVICE_ENDPOINT: ""
              AZURE_OPENAI_MODELS: gpt-3.5-turbo,gpt-4
              AZURE_USE_MODEL_AS_DEPLOYMENT_NAME: "TRUE"
              BAN_DURATION: 1000 * 60 * 60 * 2
              BAN_INTERVAL: "20"
              BAN_VIOLATIONS: "true"
              BINGAI_TOKEN: user_provided
              CHATGPT_MODELS: text-davinci-002-render-sha
              CHATGPT_TOKEN: ""
              CHECK_BALANCE: "false"
              CONCURRENT_MESSAGE_MAX: "2"
              CONCURRENT_VIOLATION_SCORE: "1"
              CREDS_IV: e2341419ec3dd3d19b13a1a87fafcbfb
              CREDS_KEY: f34be427ebb29de8d88c107a71546019685ed8b241d8f2ed00c3df97ad2566f0
              DEBUG_CONSOLE: "false"
              DEBUG_LOGGING: "true"
              DEBUG_OPENAI: "false"
              DEBUG_PLUGINS: "true"
              DISCORD_CALLBACK_URL: /oauth/discord/callback
              DISCORD_CLIENT_ID: ""
              DISCORD_CLIENT_SECRET: ""
              DOMAIN_CLIENT: http://localhost:3080
              DOMAIN_SERVER: http://localhost:3080
              EMAIL_ALLOW_SELFSIGNED: '         '
              EMAIL_ENCRYPTION: '               '
              EMAIL_ENCRYPTION_HOSTNAME: '      '
              EMAIL_FROM: noreply@librechat.ai
              EMAIL_FROM_NAME: '                '
              EMAIL_HOST: '                     '
              EMAIL_PASSWORD: '                 '
              EMAIL_PORT: '25                   '
              EMAIL_SERVICE: '                  '
              EMAIL_USERNAME: '                 '
              FACEBOOK_CALLBACK_URL: /oauth/facebook/callback
              FACEBOOK_CLIENT_ID: ""
              FACEBOOK_CLIENT_SECRET: ""
              FIREBASE_API_KEY: ""
              FIREBASE_APP_ID: ""
              FIREBASE_AUTH_DOMAIN: ""
              FIREBASE_MESSAGING_SENDER_ID: ""
              FIREBASE_PROJECT_ID: ""
              FIREBASE_STORAGE_BUCKET: ""
              GITHUB_CALLBACK_URL: /oauth/github/callback
              GITHUB_CLIENT_ID: ""
              GITHUB_CLIENT_SECRET: ""
              GOOGLE_API_KEY: ""
              GOOGLE_CALLBACK_URL: /oauth/google/callback
              GOOGLE_CLIENT_ID: ""
              GOOGLE_CLIENT_SECRET: ""
              GOOGLE_CSE_ID: ""
              GOOGLE_KEY: user_provided
              HOST: localhost
              JWT_REFRESH_SECRET: eaa5191f2914e30b9387fd84e254e4ba6fc51b4654968a9b0803b456a54b8418
              JWT_SECRET: 16f8c0ef4a5d391b26034086c628469d3f9f497f08163ab9b40137092f2909ef
              LIMIT_CONCURRENT_MESSAGES: "true"
              LIMIT_MESSAGE_IP: "true"
              LIMIT_MESSAGE_USER: "false"
              LOGIN_MAX: "7"
              LOGIN_VIOLATION_SCORE: "1"
              LOGIN_WINDOW: "5"
              MEILI_HOST: http://0.0.0.0:7700
              MEILI_MASTER_KEY: DrhYf7zENyR6AlUCKmnz0eYASOQdl6zxH7s7MKFSfFCt
              MEILI_NO_ANALYTICS: "true"
              MESSAGE_IP_MAX: "40"
              MESSAGE_IP_WINDOW: "1"
              MESSAGE_USER_MAX: "40"
              MESSAGE_USER_WINDOW: "1"
              MESSAGE_VIOLATION_SCORE: "1"
              MONGO_URI: mongodb://127.0.0.1:27017/LibreChat
              NO_INDEX: "true"
              NON_BROWSER_VIOLATION_SCORE: "20"
              OPENAI_API_KEY: user_provided
              OPENAI_MODERATION: "false"
              OPENAI_MODERATION_API_KEY: ""
              OPENID_BUTTON_LABEL: ""
              OPENID_CALLBACK_URL: /oauth/openid/callback
              OPENID_CLIENT_ID: ""
              OPENID_CLIENT_SECRET: ""
              OPENID_IMAGE_URL: ""
              OPENID_ISSUER: ""
              OPENID_SCOPE: '"openid profile email"'
              OPENID_SESSION_SECRET: ""
              PORT: "3080"
              PROXY: ""
              REFRESH_TOKEN_EXPIRY: (1000 * 60 * 60 * 24) * 7
              REGISTER_MAX: "5"
              REGISTER_WINDOW: "60"
              REGISTRATION_VIOLATION_SCORE: "1"
              SD_WEBUI_URL: http://host.docker.internal:7860
              SEARCH: "true"
              SERPAPI_API_KEY: ""
              SESSION_EXPIRY: 1000 * 60 * 15
              WOLFRAM_APP_ID: ""
              ZAPIER_NLA_API_KEY: ""
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: librechat-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 3080
              selector:
                app: {{ $appName }}
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-meilisearch
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: librechat-statefulset-2
                originImageName: getmeili/meilisearch:v1.5
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-meilisearch
                app: {{ $appName }}-meilisearch
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}-meilisearch
              selector:
                matchLabels:
                  app: {{ $appName }}-meilisearch
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-meilisearch
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-meilisearch
                      image: getmeili/meilisearch:v1.5
                      env:
                        - name: MEILI_NO_ANALYTICS
                          value: true
                      resources:
                        requests:
                          cpu: 10m
                          memory: 51Mi
                        limits:
                          cpu: 100m
                          memory: 512Mi
                      ports:
                        - containerPort: 7700
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-meili-data
                          mountPath: /meili_data
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /meili_data
                      value: '1'
                    name: vn-meili-data
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: librechat-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-meilisearch
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-meilisearch
            spec:
              ports:
                - port: 7700
              selector:
                app: {{ $appName }}-meilisearch
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: librechat-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 1g
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'false'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/rewrite-target: /$2
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /()(.*)
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 3080
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: mongodb-8.0.4
                app.kubernetes.io/instance: {{ $appName }}
                helm.sh/chart: mongodb-cluster-0.9.1
                sealos-db-provider-cr: {{ $appName }}-mongo
              annotations: {}
              name: {{ $appName }}-mongo
              generation: 1
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              backup:
                enabled: true
                cronExpression: 0 18 * * *
                method: dump
                pitrEnabled: false
                retentionPeriod: 7d
              componentSpecs:
                - componentDef: mongodb
                  serviceVersion: 8.0.4
                  name: mongodb
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-mongo
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi

              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: librechat-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: librechat-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-mongo
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-mongo
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: librechat-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/librechat/logo.svg"
              name: {{ $appName }}
              type: iframe
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
