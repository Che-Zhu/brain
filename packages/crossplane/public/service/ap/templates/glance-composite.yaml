apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-glance-go-templating
  labels:
    template: glance
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Glance
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/glance/logo.png"
    meta.crossplane.io/description: A self-hosted dashboard that puts all your feeds in one place
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/glance/README.md"
    meta.crossplane.io/url: "https://github.com/glanceapp/glance"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: glance
        template: glance
        # projectName: my-project
        name: {{ name }}
        input:
          {}
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-glance
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: glance-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            data:
              vn-appvn-configvn-glancevn-yml: |
                server:
                  assets-path: /app/assets

                theme:
                  custom-css-file: /assets/user.css

                pages:
                  - $include: home.yml
              vn-appvn-configvn-homevn-yml: |
                - name: Home
                  # Optionally, if you only have a single page you can hide the desktop navigation for a cleaner look
                  # hide-desktop-navigation: true
                  columns:
                    - size: small
                      widgets:
                        - type: calendar
                          first-day-of-week: monday
                
                        - type: rss
                          limit: 10
                          collapse-after: 3
                          cache: 12h
                          feeds:
                            - url: https://selfh.st/rss/
                              title: selfh.st
                            - url: https://ciechanow.ski/atom.xml
                            - url: https://www.joshwcomeau.com/rss.xml
                              title: Josh Comeau
                            - url: https://samwho.dev/rss.xml
                            - url: https://ishadeed.com/feed.xml
                              title: Ahmad Shadeed
                
                        - type: twitch-channels
                          channels:
                            - theprimeagen
                            - j_blow
                            - piratesoftware
                            - cohhcarnage
                            - christitustech
                            - EJ_SA
                
                    - size: full
                      widgets:
                        - type: group
                          widgets:
                            - type: hacker-news
                            - type: lobsters
                
                        - type: videos
                          channels:
                            - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
                            - UCR-DXc1voovS8nhAvccRZhg # Jeff Geerling
                            - UCsBjURrPoezykLs9EqgamOA # Fireship
                            - UCBJycsmduvYEL83R_U4JriQ # Marques Brownlee
                            - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium
                
                        - type: group
                          widgets:
                            - type: reddit
                              subreddit: technology
                              show-thumbnails: true
                            - type: reddit
                              subreddit: selfhosted
                              show-thumbnails: true
                
                    - size: small
                      widgets:
                        - type: weather
                          location: London, United Kingdom
                          units: metric # alternatively "imperial"
                          hour-format: 12h # alternatively "24h"
                          # Optionally hide the location from being displayed in the widget
                          # hide-location: true
                
                        - type: markets
                          markets:
                            - symbol: SPY
                              name: S&P 500
                            - symbol: BTC-USD
                              name: Bitcoin
                            - symbol: NVDA
                              name: NVIDIA
                            - symbol: AAPL
                              name: Apple
                            - symbol: MSFT
                              name: Microsoft
                
                        - type: releases
                          cache: 1d
                          # Without authentication the Github API allows for up to 60 requests per hour. You can create a
                          # read-only token from your Github account settings and use it here to increase the limit.
                          # token: ...
                          repositories:
                            - glanceapp/glance
                            - go-gitea/gitea
                            - immich-app/immich
                            - syncthing/syncthing
              vn-appvn-assetsvn-uservn-css: |
                /* Custom CSS styles can be added here */
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: glance-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: glanceapp/glance
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: glanceapp/glance:latest
                      imagePullPolicy: IfNotPresent
                      ports:
                        - containerPort: 8080
                      resources:
                        requests:
                          cpu: 100m
                          memory: 128Mi
                        limits:
                          cpu: 500m
                          memory: 512Mi
                      volumeMounts:
                        - name: vn-appvn-configvn-glancevn-yml
                          mountPath: /app/config/glance.yml
                          subPath: ./app/config/glance.yml
                        - name: vn-appvn-configvn-homevn-yml
                          mountPath: /app/config/home.yml
                          subPath: ./app/config/home.yml
                        - name: vn-appvn-assetsvn-uservn-css
                          mountPath: /app/assets/user.css
                          subPath: ./app/assets/user.css
                  volumes:
                    - name: vn-appvn-configvn-glancevn-yml
                      configMap:
                        name: {{ $appName }}
                        items:
                          - key: vn-appvn-configvn-glancevn-yml
                            path: ./app/config/glance.yml
                        defaultMode: 420
                    - name: vn-appvn-configvn-homevn-yml
                      configMap:
                        name: {{ $appName }}
                        items:
                          - key: vn-appvn-configvn-homevn-yml
                            path: ./app/config/home.yml
                        defaultMode: 420
                    - name: vn-appvn-assetsvn-uservn-css
                      configMap:
                        name: {{ $appName }}
                        items:
                          - key: vn-appvn-assetsvn-uservn-css
                            path: ./app/assets/user.css
                        defaultMode: 420
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: glance-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 8080
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: glance-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 8080
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: glance-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: {{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/glance/logo.png"
              name: "Glance"
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
