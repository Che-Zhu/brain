apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-dataease-go-templating
  labels:
    template: dataease
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: DataEase
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/dataease/logo.png"
    meta.crossplane.io/description: 🔥 人人可用的开源数据可视化分析工具，帆软、Tableau 等商业 BI 工具的开源替代。
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/dataease/README.md"
    meta.crossplane.io/url: dataease.io
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: dataease
        template: dataease
        # projectName: my-project
        name: {{ name }}
        input:
          {}
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-dataease
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dataease-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: registry.cn-qingdao.aliyuncs.com/dataease/dataease:v2.10.12
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  securityContext:
                    fsGroupChangePolicy: OnRootMismatch
                  initContainers:
                    - name: init-config
                      image: busybox:1.36.1
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: DB_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: host
                        - name: DB_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: username
                        - name: DB_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: password
                        - name: DB_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: port
                      command:
                      - sh
                      - -c
                      - |
                        if [ ! -f /opt/apps/config/application.yml ]; then
                          mkdir -p /opt/apps/config &&
                          cat <<EOF > /opt/apps/config/application.yml
                        server:
                          tomcat:
                            connection-timeout: 70000
                        spring:
                          servlet:
                            multipart:
                              max-file-size: 500MB
                              max-request-size: 500MB
                          datasource:
                            url: jdbc:mysql://${DB_HOST}.{{ $ns }}.svc:${DB_PORT}/dataease?autoReconnect=false&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
                            username: ${DB_USER}
                            password: ${DB_PASSWORD}
                        EOF

                        fi
                      volumeMounts:
                        - name: vn-optvn-appsvn-config
                          mountPath: /opt/apps/config
                  containers:
                    - name: {{ $appName }}
                      image: registry.cn-qingdao.aliyuncs.com/dataease/dataease:v2.10.12
                      resources:
                        requests:
                          cpu: 200m
                          memory: 256Mi
                        limits:
                          cpu: 2
                          memory: 2Gi
                      ports:
                        - containerPort: 8100
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-optvn-appsvn-config
                          mountPath: /opt/apps/config
                        - name: vn-optvn-dataease2vn-0vn-logs
                          mountPath: /opt/dataease2.0/logs
                        - name: vn-optvn-dataease2vn-0vn-datavn-static-resource
                          mountPath: /opt/dataease2.0/data/static-resource
                        - name: vn-optvn-dataease2vn-0vn-cache
                          mountPath: /opt/dataease2.0/cache
                        - name: vn-optvn-dataease2vn-0vn-datavn-geo
                          mountPath: /opt/dataease2.0/data/geo
                        - name: vn-optvn-dataease2vn-0vn-datavn-appearance
                          mountPath: /opt/dataease2.0/data/appearance
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /opt/apps/config
                      value: '0.1'
                    name: vn-optvn-appsvn-config
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 100Mi
                - metadata:
                    annotations:
                      path: /opt/dataease2.0/logs
                      value: '0.1'
                    name: vn-optvn-dataease2vn-0vn-logs
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 100Mi
                - metadata:
                    annotations:
                      path: /opt/dataease2.0/data/static-resource
                      value: '0.1'
                    name: vn-optvn-dataease2vn-0vn-datavn-static-resource
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 100Mi
                - metadata:
                    annotations:
                      path: /opt/dataease2.0/cache
                      value: '0.1'
                    name: vn-optvn-dataease2vn-0vn-cache
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 100Mi
                - metadata:
                    annotations:
                      path: /opt/dataease2.0/data/geo
                      value: '0.1'
                    name: vn-optvn-dataease2vn-0vn-datavn-geo
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 100Mi
                - metadata:
                    annotations:
                      path: /opt/dataease2.0/data/appearance
                      value: '0.1'
                    name: vn-optvn-dataease2vn-0vn-datavn-appearance
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 100Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dataease-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 8100
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dataease-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 8100
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dataease-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dataease-cluster
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: apecloud-mysql
                clusterversion.kubeblocks.io/name: ac-mysql-8.0.30
              name: {{ $appName }}-mysql
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: apecloud-mysql
              clusterVersionRef: ac-mysql-8.0.30
              componentSpecs:
                - componentDefRef: mysql
                  monitor: true
                  name: mysql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-mysql
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi

              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dataease-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dataease-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-mysql
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-mysql
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dataease-job
              namespace: {{ $ns }}
              name: {{ $appName }}-mysql-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: mysql-init
                      image: docker.io/arey/mysql-client:latest
                      env:
                        - name: MYSQL_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: username
                        - name: MYSQL_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: password
                        - name: MYSQL_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: host
                        - name: MYSQL_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: port
                      command:
                        - /bin/sh
                        - -c
                        - |
                          echo "CREATE DATABASE dataease DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_0900_ai_ci;" > /create.sql
                          until mysql -h $MYSQL_HOST -P $MYSQL_PORT -u $MYSQL_USER -p$MYSQL_PASSWORD -e 'source /create.sql;' &>/dev/null; do sleep 1; done
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dataease-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/dataease/logo.png"
              name: "DataEase"
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
