apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-grafana-otel-go-templating
  labels:
    template: grafana-otel
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Grafana OpenTelemetry Stack
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/grafana-otel/logo.svg"
    meta.crossplane.io/description: One-click Grafana/OTLP stack deployment
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/grafana-otel/README.md"
    meta.crossplane.io/url: "https://github.com/labring-actions/templates/tree/main/template/grafana-otel"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: grafana-otel
        template: grafana-otel
        # projectName: my-project
        name: {{ name }}
        input:
          {}
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-grafana-otel
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            # ConfigMap
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-otel-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            data:
              vn-confvn-otelvn-collectorvn-configvn-yaml: |
                receivers:
                  otlp:
                    protocols:
                      grpc:
                        endpoint: ${env:MY_POD_IP}:4317
                      http:
                        endpoint: ${env:MY_POD_IP}:4318
                processors:
                  batch:
                extensions:
                  zpages: {}
                exporters:
                  prometheus:
                    endpoint: 0.0.0.0:8889
                service:
                  extensions: [zpages]
                  pipelines:
                    metrics:
                      receivers: [otlp]
                      processors: [batch]
                      exporters: [prometheus]
            ---
            # Deployment
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-otel-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: otel/opentelemetry-collector:0.99.0
                deploy.cloud.sealos.io/minReplicas: "1"
                deploy.cloud.sealos.io/maxReplicas: "1"
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: opentelemetry
                component: otel-collector
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: otel/opentelemetry-collector:0.99.0
                      imagePullPolicy: IfNotPresent
                      command:
                        - "/otelcol"
                        - "--config=/conf/otel-collector-config.yaml"
                      resources:
                        limits:
                          cpu: 100m
                          memory: 128Mi
                        requests:
                          cpu: 10m
                          memory: 12Mi
                      ports:
                        - containerPort: 55679
                          name: zpages
                        - containerPort: 4317
                          name: otlp-grpc
                        - containerPort: 4318
                          name: otlp-http
                        - containerPort: 14250
                          name: jaeger-grpc
                        - containerPort: 14268
                          name: jaeger-http
                        - containerPort: 9411
                          name: zipkin
                        - containerPort: 8889
                          name: metrics
                      env:
                        - name: MY_POD_IP
                          valueFrom:
                            fieldRef:
                              apiVersion: v1
                              fieldPath: status.podIP
                      volumeMounts:
                        - name: vn-confvn-otelvn-collectorvn-configvn-yaml
                          mountPath: /conf/otel-collector-config.yaml
                          subPath: ./conf/otel-collector-config.yaml
                  volumes:
                    - name: vn-confvn-otelvn-collectorvn-configvn-yaml
                      configMap:
                        name: {{ $appName }}
                        items:
                          - key: vn-confvn-otelvn-collectorvn-configvn-yaml
                            path: ./conf/otel-collector-config.yaml
                        defaultMode: 420
            ---
            # Service
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-otel-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - name: otlp-grpc
                  port: 4317
                  protocol: TCP
                  targetPort: 4317
                - name: otlp-http
                  port: 4318
                  protocol: TCP
                  targetPort: 4318
                - name: metrics
                  port: 8889
                  protocol: TCP
                  targetPort: 8889
                - name: zpages
                  port: 55679
                  protocol: TCP
                  targetPort: 55679
              selector:
                app: {{ $appName }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-otel-configmap-2
              namespace: {{ $ns }}
              name: {{ $appName }}-prometheus
            data:
              vn-etcvn-prometheusvn-prometheusvn-yml: >-
                # my global config

                global:
                  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
                  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
                  # scrape_timeout is set to the global default (10s).

                # Alertmanager configuration

                alerting:
                  alertmanagers:
                    - static_configs:
                        - targets:
                          # - alertmanager:9093

                # Load rules once and periodically evaluate them according to the global
                'evaluation_interval'.

                rule_files:
                  # - "first_rules.yml"
                  # - "second_rules.yml"

                # A scrape configuration containing exactly one endpoint to scrape:

                # Here it's Prometheus itself.

                scrape_configs:
                  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
                  - job_name: "prometheus"

                    # metrics_path defaults to '/metrics'
                    # scheme defaults to 'http'.

                    static_configs:
                      - targets: ["localhost:9090"]
                       # The label name is added as a label `label_name=<label_value>` to any timeseries scraped from this config.
                        labels:
                          cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                          app: "prometheus"
                      - targets: ["{{ $appName }}.{{ $ns }}.svc.cluster.local:8889"]
                       # The label name is added as a label `label_name=<label_value>` to any timeseries scraped from this config.
                        labels:
                          app: "otel-collector"
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-prometheus
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-otel-statefulset
                originImageName: prom/prometheus:v3.8.0
                deploy.cloud.sealos.io/minReplicas: "1"
                deploy.cloud.sealos.io/maxReplicas: "1"
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-prometheus
                app: {{ $appName }}-prometheus
            spec:
              serviceName: {{ $appName }}-prometheus
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-prometheus
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-prometheus
                spec:
                  automountServiceAccountToken: false
                  initContainers:
                    - name: init-step
                      image: busybox
                      command:
                        - sh
                        - -c
                        - |
                          chown -R 65534:65534 /prometheus
                      volumeMounts:
                        - name: vn-prometheus
                          mountPath: /prometheus
                      imagePullPolicy: IfNotPresent
                  containers:
                    - name: {{ $appName }}-prometheus
                      image: prom/prometheus:v3.8.0
                      imagePullPolicy: IfNotPresent
                      args:
                        - --config.file=/etc/prometheus/prometheus.yml
                        - --storage.tsdb.path=/prometheus
                        - --storage.tsdb.retention.time=365d
                        - --web.console.libraries=/usr/share/prometheus/console_libraries
                        - --web.console.templates=/usr/share/prometheus/consoles
                        - --web.external-url=http://0.0.0.0:9090
                        - --log.level=info
                      ports:
                        - name: http
                          containerPort: 9090
                          protocol: TCP
                      resources:
                        limits:
                          cpu: 100m
                          memory: 128Mi
                        requests:
                          cpu: 10m
                          memory: 12Mi
                      volumeMounts:
                        - name: prometheus-cm
                          mountPath: /etc/prometheus/prometheus.yml
                          subPath: vn-etcvn-prometheusvn-prometheusvn-yml
                        - name: vn-prometheus
                          mountPath: /prometheus

                  volumes:
                    - name: prometheus-cm
                      configMap:
                        name: {{ $appName }}-prometheus
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /prometheus
                      value: "0.1"
                    name: vn-prometheus
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 100Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-otel-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-prometheus
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-prometheus
            spec:
              ports:
                - name: http
                  port: 9090
                  protocol: TCP
                  targetPort: 9090
              selector:
                app: {{ $appName }}-prometheus
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-otel-configmap-3
              namespace: {{ $ns }}
              name: {{ $appName }}-grafana
            data:
              vn-etcvn-grafanavn-provisioningvn-datasourcesvn-datasourcesvn-yml: >-
                # Configuration file version
                # See here fore more information on configuration:
                # https://grafana.com/docs/grafana/latest/administration/provisioning/#example-data-source-configuration-file

                apiVersion: 1

                # Mark provisioned data sources for deletion if they are no longer in a provisioning file.

                prune: false

                # List of data sources to insert/update depending on what's available.

                datasources:
                  - name: Prometheus
                    type: prometheus
                    access: proxy
                    orgId: 1
                    uid: grafana_prometheus
                    url: http://{{ $appName }}-prometheus.{{ $ns }}.svc.cluster.local:9090
                    basicAuth: false
                    editable: false
                    isDefault: false
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-grafana
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-otel-statefulset-2
                originImageName: grafana/grafana:12.3.0
                deploy.cloud.sealos.io/minReplicas: "1"
                deploy.cloud.sealos.io/maxReplicas: "1"
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-grafana
                app: {{ $appName }}-grafana
            spec:
              serviceName: {{ $appName }}-grafana
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-grafana
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-grafana
                spec:
                  automountServiceAccountToken: false
                  initContainers:
                    - name: init-step
                      image: busybox
                      command:
                        - sh
                        - -c
                        - |
                          chown -R 472:0 /var/lib/grafana
                      volumeMounts:
                        - name: vn-varvn-libvn-grafana
                          mountPath: /var/lib/grafana
                      imagePullPolicy: IfNotPresent
                  containers:
                    - name: {{ $appName }}-grafana
                      image: grafana/grafana:12.3.0
                      imagePullPolicy: IfNotPresent
                      ports:
                        - name: http
                          containerPort: 3000
                          protocol: TCP
                      resources:
                        limits:
                          cpu: 100m
                          memory: 128Mi
                        requests:
                          cpu: 10m
                          memory: 12Mi
                      volumeMounts:
                        - name: grafana-cm
                          mountPath: /etc/grafana/provisioning/datasources/datasources.yml
                          subPath: vn-etcvn-grafanavn-provisioningvn-datasourcesvn-datasourcesvn-yml
                        - name: vn-varvn-libvn-grafana
                          mountPath: /var/lib/grafana

                  volumes:
                    - name: grafana-cm
                      configMap:
                        name: {{ $appName }}-grafana
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /var/lib/grafana
                      value: "0.1"
                    name: vn-varvn-libvn-grafana
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 100Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-otel-service-3
              namespace: {{ $ns }}
              name: {{ $appName }}-grafana
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-grafana
            spec:
              ports:
                - name: http
                  port: 3000
                  protocol: TCP
                  targetPort: 3000
              selector:
                app: {{ $appName }}-grafana
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-grafana
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-grafana
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-otel-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: "true"
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
                nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}-grafana
                            port:
                              number: 3000
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: grafana-otel-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/grafana-otel/logo.svg"
              name: "Grafana OpenTelemetry Stack"
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
