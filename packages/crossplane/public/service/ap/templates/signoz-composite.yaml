apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-signoz-go-templating
  labels:
    template: signoz
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: SigNoz
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/signoz/logo.svg"
    meta.crossplane.io/description: SigNoz is an open-source observability platform native to OpenTelemetry with logs, traces and metrics in a single application. An open-source alternative to DataDog, NewRelic, etc.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/signoz/README.md"
    meta.crossplane.io/url: "https://signoz.io/"
    meta.crossplane.io/author: sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: signoz
        template: signoz
        # projectName: my-project
        name: {{ name }}
        input:
          # tokenizerJwtSecret: auto-generated if omitted
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-signoz
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $tokenizerJwtSecret := $input.tokenizerJwtSecret | default (printf "%s" (randAlphaNum 32)) }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: signoz-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}-clickhouse
            data:
              config.xml: |
                <?xml version="1.0"?>
                <clickhouse>
                    <logger>
                        <level>information</level>
                        <formatting>
                            <type>json</type>
                        </formatting>
                        <log>/var/log/clickhouse-server/clickhouse-server.log</log>
                        <errorlog>/var/log/clickhouse-server/clickhouse-server.err.log</errorlog>
                        <size>1000M</size>
                        <count>10</count>
                    </logger>
                    <http_port>8123</http_port>
                    <tcp_port>9000</tcp_port>
                    <mysql_port>9004</mysql_port>
                    <postgresql_port>9005</postgresql_port>
                    <interserver_http_host>{{ $appName }}-clickhouse</interserver_http_host>
                    <interserver_http_port>9009</interserver_http_port>
                    <max_connections>4096</max_connections>
                    <keep_alive_timeout>3</keep_alive_timeout>
                    <max_concurrent_queries>100</max_concurrent_queries>
                    <max_server_memory_usage>0</max_server_memory_usage>
                    <max_thread_pool_size>10000</max_thread_pool_size>
                    <max_server_memory_usage_to_ram_ratio>0.9</max_server_memory_usage_to_ram_ratio>
                    <total_memory_profiler_step>4194304</total_memory_profiler_step>
                    <total_memory_tracker_sample_probability>0</total_memory_tracker_sample_probability>
                    <uncompressed_cache_size>8589934592</uncompressed_cache_size>
                    <!-- https://clickhouse.com/docs/operations/tips -->
                    <mark_cache_size>536870912</mark_cache_size>
                    <mmap_cache_size>1000</mmap_cache_size>
                    <compiled_expression_cache_size>134217728</compiled_expression_cache_size>
                    <compiled_expression_cache_elements_size>10000</compiled_expression_cache_elements_size>
                    <path>/var/lib/clickhouse/</path>
                    <tmp_path>/var/lib/clickhouse/tmp/</tmp_path>
                    <user_files_path>/var/lib/clickhouse/user_files/</user_files_path>
                    <user_directories>
                        <users_xml>
                            <path>users.xml</path>
                        </users_xml>
                        <local_directory>
                            <path>/var/lib/clickhouse/access/</path>
                        </local_directory>
                    </user_directories>
                    <default_profile>default</default_profile>
                    <custom_settings_prefixes></custom_settings_prefixes>
                    <default_database>default</default_database>
                    <mlock_executable>true</mlock_executable>
                    <remap_executable>false</remap_executable>
                    <macros>
                        <shard>01</shard>
                        <replica>example01-01-1</replica>
                    </macros>
                    <builtin_dictionaries_reload_interval>3600</builtin_dictionaries_reload_interval>
                    <max_session_timeout>3600</max_session_timeout>
                    <default_session_timeout>60</default_session_timeout>
                    <query_log>
                        <database>system</database>
                        <table>query_log</table>
                        <partition_by>toYYYYMM(event_date)</partition_by>
                        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
                    </query_log>
                    <trace_log>
                        <database>system</database>
                        <table>trace_log</table>
                        <partition_by>toYYYYMM(event_date)</partition_by>
                        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
                    </trace_log>
                    <query_thread_log>
                        <database>system</database>
                        <table>query_thread_log</table>
                        <partition_by>toYYYYMM(event_date)</partition_by>
                        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
                    </query_thread_log>
                    <query_views_log>
                        <database>system</database>
                        <table>query_views_log</table>
                        <partition_by>toYYYYMM(event_date)</partition_by>
                        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
                    </query_views_log>
                    <part_log>
                        <database>system</database>
                        <table>part_log</table>
                        <partition_by>toYYYYMM(event_date)</partition_by>
                        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
                    </part_log>
                    <metric_log>
                        <database>system</database>
                        <table>metric_log</table>
                        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
                        <collect_interval_milliseconds>1000</collect_interval_milliseconds>
                    </metric_log>
                    <asynchronous_metric_log>
                        <database>system</database>
                        <table>asynchronous_metric_log</table>
                        <flush_interval_milliseconds>7000</flush_interval_milliseconds>
                    </asynchronous_metric_log>
                    <opentelemetry_span_log>
                        <engine>
                            engine MergeTree
                            partition by toYYYYMM(finish_date)
                            order by (finish_date, finish_time_us, trace_id)
                        </engine>
                        <database>system</database>
                        <table>opentelemetry_span_log</table>
                        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
                    </opentelemetry_span_log>
                    <crash_log>
                        <database>system</database>
                        <table>crash_log</table>
                        <partition_by />
                        <flush_interval_milliseconds>1000</flush_interval_milliseconds>
                    </crash_log>
                    <processors_profile_log>
                        <database>system</database>
                        <table>processors_profile_log</table>
                        <partition_by>toYYYYMM(event_date)</partition_by>
                        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
                    </processors_profile_log>
                    <dictionaries_config>*_dictionary.xml</dictionaries_config>
                    <user_defined_executable_functions_config>*function.xml</user_defined_executable_functions_config>
                    <user_scripts_path>/var/lib/clickhouse/user_scripts/</user_scripts_path>
                    <distributed_ddl>
                      <path>/clickhouse/task_queue/ddl</path>
                    </distributed_ddl>
                    <graphite_rollup_example>
                        <pattern>
                            <regexp>click_cost</regexp>
                            <function>any</function>
                            <retention>
                                <age>0</age>
                                <precision>3600</precision>
                            </retention>
                            <retention>
                                <age>86400</age>
                                <precision>60</precision>
                            </retention>
                        </pattern>
                        <default>
                            <function>max</function>
                            <retention>
                                <age>0</age>
                                <precision>60</precision>
                            </retention>
                            <retention>
                                <age>3600</age>
                                <precision>300</precision>
                            </retention>
                            <retention>
                                <age>86400</age>
                                <precision>3600</precision>
                            </retention>
                        </default>
                    </graphite_rollup_example>
                    <format_schema_path>/var/lib/clickhouse/format_schemas/</format_schema_path>
                    <query_masking_rules>
                        <rule>
                            <name>hide encrypt/decrypt arguments</name>
                            <regexp>((?:aes_)?(?:encrypt|decrypt)(?:_mysql)?)\s*\(\s*(?:'(?:\\'|.)+'|.*?)\s*\)</regexp>
                            <replace>\1(???)</replace>
                        </rule>
                    </query_masking_rules>
                    <merge_tree_metadata_cache>
                        <lru_cache_size>268435456</lru_cache_size>
                        <continue_if_corrupted>true</continue_if_corrupted>
                    </merge_tree_metadata_cache>

                    <listen_host>0.0.0.0</listen_host>
                </clickhouse>
              users.xml: |
                <?xml version="1.0"?>
                <clickhouse>
                    <profiles>
                        <default>
                            <max_memory_usage>10000000000</max_memory_usage>
                            <load_balancing>random</load_balancing>
                        </default>
                        <readonly>
                          <readonly>1</readonly>
                        </readonly>
                    </profiles>
                    <users>
                        <default>
                            <password></password>
                            <profile>default</profile>
                            <networks>
                                <ip>::/0</ip>
                            </networks>
                            <quota>default</quota>
                        </default>
                    </users>
                    <quotas>
                        <default>
                            <interval>
                                <duration>3600</duration>
                                <queries>0</queries>
                                <errors>0</errors>
                                <result_rows>0</result_rows>
                                <read_rows>0</read_rows>
                                <execution_time>0</execution_time>
                            </interval>
                        </default>
                    </quotas>
                </clickhouse>
              custom-function.xml: |
                <functions>
                    <function>
                        <type>executable</type>
                        <name>histogramQuantile</name>
                        <return_type>Float64</return_type>
                        <argument>
                            <type>Array(Float64)</type>
                            <name>buckets</name>
                        </argument>
                        <argument>
                            <type>Array(Float64)</type>
                            <name>counts</name>
                        </argument>
                        <argument>
                            <type>Float64</type>
                            <name>quantile</name>
                        </argument>
                        <format>CSV</format>
                        <command>./histogramQuantile</command>
                    </function>
                </functions>
              cluster.xml: |
                <?xml version="1.0"?>
                <clickhouse>
                    <zookeeper>
                        <node index="1">
                            <host>{{ $appName }}-zookeeper-0</host>
                            <port>2181</port>
                        </node>
                    </zookeeper>
                    <remote_servers>
                        <cluster>
                            <shard>
                                <replica>
                                    <host>{{ $appName }}-clickhouse-0</host>
                                    <port>9000</port>
                                </replica>
                            </shard>
                        </cluster>
                    </remote_servers>
                </clickhouse>
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: signoz-configmap-2
              namespace: {{ $ns }}
              name: {{ $appName }}-signoz
            data:
              otel-collector-config.yaml: |
                connectors:
                  signozmeter:
                    metrics_flush_interval: 1h
                    dimensions:
                      - name: service.name
                      - name: deployment.environment
                      - name: host.name
                receivers:
                  otlp:
                    protocols:
                      grpc:
                        endpoint: 0.0.0.0:4317
                      http:
                        endpoint: 0.0.0.0:4318
                  prometheus:
                    config:
                      global:
                        scrape_interval: 60s
                      scrape_configs:
                        - job_name: otel-collector
                          static_configs:
                          - targets:
                            - localhost:8888
                            labels:
                              cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                              job_name: otel-collector
                processors:
                  batch:
                    send_batch_size: 10000
                    send_batch_max_size: 11000
                    timeout: 10s
                  batch/meter:
                    send_batch_max_size: 25000
                    send_batch_size: 20000
                    timeout: 1s
                  resourcedetection:
                    # Using OTEL_RESOURCE_ATTRIBUTES envvar, env detector adds custom labels.
                    detectors: [env, system]
                    timeout: 2s
                  signozspanmetrics/delta:
                    metrics_exporter: signozclickhousemetrics
                    metrics_flush_interval: 60s
                    latency_histogram_buckets: [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 1400ms, 2000ms, 5s, 10s, 20s, 40s, 60s ]
                    dimensions_cache_size: 100000
                    aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
                    enable_exp_histogram: true
                    dimensions:
                      - name: service.namespace
                        default: default
                      - name: deployment.environment
                        default: default
                      # This is added to ensure the uniqueness of the timeseries
                      # Otherwise, identical timeseries produced by multiple replicas of
                      # collectors result in incorrect APM metrics
                      - name: signoz.collector.id
                      - name: service.version
                      - name: browser.platform
                      - name: browser.mobile
                      - name: k8s.cluster.name
                      - name: k8s.node.name
                      - name: k8s.namespace.name
                      - name: host.name
                      - name: host.type
                      - name: container.name
                extensions:
                  health_check:
                    endpoint: 0.0.0.0:13133
                  pprof:
                    endpoint: 0.0.0.0:1777
                exporters:
                  clickhousetraces:
                    datasource: tcp://{{ $appName }}-clickhouse-0:9000/signoz_traces
                    low_cardinal_exception_grouping: ${env:LOW_CARDINAL_EXCEPTION_GROUPING}
                    use_new_schema: true
                  signozclickhousemetrics:
                    dsn: tcp://{{ $appName }}-clickhouse-0:9000/signoz_metrics
                  clickhouselogsexporter:
                    dsn: tcp://{{ $appName }}-clickhouse-0:9000/signoz_logs
                    timeout: 10s
                    use_new_schema: true
                  signozclickhousemeter:
                    dsn: tcp://{{ $appName }}-clickhouse-0:9000/signoz_meter
                    timeout: 45s
                    sending_queue:
                      enabled: false
                  metadataexporter:
                    cache:
                      provider: in_memory
                    dsn: tcp://{{ $appName }}-clickhouse-0:9000/signoz_metadata
                    enabled: true
                    timeout: 45s
                service:
                  telemetry:
                    logs:
                      encoding: json
                  extensions:
                    - health_check
                    - pprof
                  pipelines:
                    traces:
                      receivers: [otlp]
                      processors: [signozspanmetrics/delta, batch]
                      exporters: [clickhousetraces, metadataexporter, signozmeter]
                    metrics:
                      receivers: [otlp]
                      processors: [batch]
                      exporters: [signozclickhousemetrics, metadataexporter, signozmeter]
                    metrics/prometheus:
                      receivers: [prometheus]
                      processors: [batch]
                      exporters: [signozclickhousemetrics, metadataexporter, signozmeter]
                    logs:
                      receivers: [otlp]
                      processors: [batch]
                      exporters: [clickhouselogsexporter, metadataexporter, signozmeter]
                    metrics/meter:
                      receivers: [signozmeter]
                      processors: [batch/meter]
                      exporters: [signozclickhousemeter]
              otel-collector-opamp-config.yaml: |
                server_endpoint: ws://{{ $appName }}:4320/v1/opamp
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-zookeeper
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: signoz-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: signoz/zookeeper:3.7.1
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-zookeeper
                app: {{ $appName }}-zookeeper
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              serviceName: {{ $appName }}-zookeeper
              selector:
                matchLabels:
                  app: {{ $appName }}-zookeeper
              template:
                metadata:
                  annotations:
                    signoz.io/scrape: "true"
                    signoz.io/port: "9141"
                    signoz.io/path: "/metrics"
                  labels:
                    app: {{ $appName }}-zookeeper
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  initContainers:
                  - name: volume-permissions
                    image: busybox
                    command: ["sh", "-c", "chown -R 1001:1001 /bitnami/zookeeper"]
                    volumeMounts:
                    - name: vn-bitnamivn-zookeeper
                      mountPath: /bitnami/zookeeper
                  containers:
                  - name: {{ $appName }}-zookeeper
                    image: signoz/zookeeper:3.7.1
                    ports:
                    - containerPort: 2181
                      name: client
                    - containerPort: 2888
                      name: server
                    - containerPort: 3888
                      name: leader-election
                    - containerPort: 9141
                      name: metrics
                    env:
                    - name: ZOO_SERVER_ID
                      value: "1"
                    - name: ALLOW_ANONYMOUS_LOGIN
                      value: "yes"
                    - name: ZOO_AUTOPURGE_INTERVAL
                      value: "1"
                    - name: ZOO_ENABLE_PROMETHEUS_METRICS
                      value: "yes"
                    - name: ZOO_PROMETHEUS_METRICS_PORT_NUMBER
                      value: "9141"
                    volumeMounts:
                    - name: vn-bitnamivn-zookeeper
                      mountPath: /bitnami/zookeeper
                    resources:
                      limits:
                        cpu: 1
                        memory: 1Gi
                      requests:
                        cpu: 100m
                        memory: 100Mi
              volumeClaimTemplates:
              - metadata:
                  annotations:
                    path: /bitnami/zookeeper
                    value: '1'
                  name: vn-bitnamivn-zookeeper
                spec:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: signoz-service
              namespace: {{ $ns }}
              name: {{ $appName }}-zookeeper-0
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-zookeeper
            spec:
              ports:
              - port: 2181
                name: client
              - port: 2888
                name: server
              - port: 3888
                name: leader-election
              - port: 9141
                name: metrics
              selector:
                app: {{ $appName }}-zookeeper
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-clickhouse
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: signoz-statefulset-2
                originImageName: clickhouse/clickhouse-server:25.5.6
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-clickhouse
                app: {{ $appName }}-clickhouse
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              serviceName: {{ $appName }}-clickhouse
              selector:
                matchLabels:
                  app: {{ $appName }}-clickhouse
              template:
                metadata:
                  annotations:
                    signoz.io/scrape: "true"
                    signoz.io/port: "9363"
                    signoz.io/path: "/metrics"
                  labels:
                    app: {{ $appName }}-clickhouse
                spec:
                  initContainers:
                  - name: init-clickhouse
                    image: clickhouse/clickhouse-server:25.5.6
                    command:
                    - bash
                    - -c
                    - |
                      version="v0.0.1"
                      node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
                      node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
                      echo "Fetching histogram-binary for {{ "${node_os}" }}/{{ "${node_arch}" }}"
                      cd /tmp
