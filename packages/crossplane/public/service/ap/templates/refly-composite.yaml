            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: refly-service-3
              namespace: {{ $ns }}
              name: {{ $appName }}-api
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-api
            spec:
              ports:
                - name: http
                  targetPort: 5800
                  port: 5800
                - name: admin
                  targetPort: 5801
                  port: 5801
              selector:
                app: {{ $appName }}-api
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: refly-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}
            data:
              vn-etcvn-nginxvn-confvn-dvn-defaultvn-conf: |-
                server {
                    listen 80;
                    server_name _;
                    root /usr/share/nginx/html;
                    index index.html;
                    
                    # API proxy
                    location /api/ {
                        proxy_pass http://{{ $appName }}-api:5800/;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection 'upgrade';
                        proxy_set_header Host $host;
                        proxy_cache_bypass $http_upgrade;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto $scheme;
                        proxy_buffering off;
                        proxy_read_timeout 1800;
                        proxy_connect_timeout 1800;
                    }
                
                    # Collab proxy
                    location /collab {
                        proxy_pass http://{{ $appName }}-api:5801/;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection 'upgrade';
                        proxy_set_header Host $host;
                        proxy_cache_bypass $http_upgrade;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto $scheme;
                        proxy_buffering off;
                        proxy_read_timeout 1800;
                        proxy_connect_timeout 1800;
                    }
                
                    # Static files
                    location / {
                        try_files $uri $uri/ /index.html;
                        expires 1h;
                        add_header Cache-Control "public, no-transform";
                        
                        # Cache static files
                        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
                            expires 7d;
                            add_header Cache-Control "public, no-transform";
                        }
                    }
                
                    # Security headers
                    add_header X-Frame-Options "SAMEORIGIN" always;
                    add_header X-XSS-Protection "1; mode=block" always;
                    add_header X-Content-Type-Options "nosniff" always;
                    add_header Referrer-Policy "no-referrer-when-downgrade" always;
                    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;
                    
                    # Additional security
                    server_tokens off;
                
                    # Basic settings
                    sendfile on;
                    tcp_nopush on;
                    tcp_nodelay on;
                    keepalive_timeout 65;
                    types_hash_max_size 2048;
                    client_max_body_size 100M;
                    
                    # Buffer size for POST submissions
                    client_body_buffer_size 10K;
                    client_header_buffer_size 1k;
                    
                    # Timeouts
                    client_body_timeout 12;
                    client_header_timeout 12;
                    send_timeout 10;
                
                    # Compression
                    gzip on;
                    gzip_vary on;
                    gzip_proxied any;
                    gzip_comp_level 6;
                    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
                    gzip_disable "msie6";
                
                    # File cache settings
                    open_file_cache max=1000 inactive=20s;
                    open_file_cache_valid 30s;
                    open_file_cache_min_uses 2;
                    open_file_cache_errors on;
                }
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: refly-deployment-2
                originImageName: reflyai/refly-web:8d870210470801f62a4d2adb3423c947afddf400
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 0
                  maxSurge: 1
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: reflyai/refly-web:8d870210470801f62a4d2adb3423c947afddf400
                      env:
                        - name: API_URL
                          value: '/api'
                        - name: COLLAB_URL
                          value: '/collab'
                        - name: STATIC_PUBLIC_ENDPOINT
                          value: '/api/v1/misc/public'
                        - name: STATIC_PRIVATE_ENDPOINT
                          value: '/api/v1/misc'
                      resources:
                        requests:
                          cpu: 20m
                          memory: 12Mi
                        limits:
                          cpu: 200m
                          memory: 128Mi
                      ports:
                        - name: http
                          protocol: TCP
                          containerPort: 80
                      imagePullPolicy: IfNotPresent
                      readinessProbe:
                        failureThreshold: 30
                        httpGet:
                          path: /
                          port: 80
                          scheme: HTTP
                        initialDelaySeconds: 5
                        periodSeconds: 10
                        timeoutSeconds: 3
                      volumeMounts:
                        - name: vn-etcvn-nginxvn-confvn-dvn-defaultvn-conf
                          mountPath: /etc/nginx/conf.d/default.conf
                          subPath: ./etc/nginx/conf.d/default.conf
                  volumes:
                    - name: vn-etcvn-nginxvn-confvn-dvn-defaultvn-conf
                      configMap:
                        name: {{ $appName }}
                        items:
                          - key: vn-etcvn-nginxvn-confvn-dvn-defaultvn-conf
                            path: ./etc/nginx/conf.d/default.conf
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: refly-service-4
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - name: http
                  targetPort: 80
                  port: 80
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: refly-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 80
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: refly-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/refly/logo.svg"
              name: "Refly"
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
