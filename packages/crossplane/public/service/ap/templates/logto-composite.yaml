apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-logto-go-templating
  labels:
    template: logto
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Logto
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/logto/logo.png"
    meta.crossplane.io/description: Logto is an open-source Identity and Access Management (IAM) platform designed to streamline Customer Identity and Access Management (CIAM) and Workforce Identity Management.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/logto/README.md"
    meta.crossplane.io/url: "https://logto.io/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: logto
        template: logto
        # projectName: my-project
        name: {{ name }}
        input:
          {}
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-logto
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: logto-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: postgresql
                clusterversion.kubeblocks.io/name: postgresql-14.8.0
                sealos-db-provider-cr: {{ $appName }}-pg
              annotations: {}
              name: {{ $appName }}-pg
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-14.8.0
              componentSpecs:
                - componentDefRef: postgresql
                  monitor: true
                  name: postgresql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-pg
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi

              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: logto-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: logto-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-pg
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-pg
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: logto-job
              namespace: {{ $ns }}
              name: {{ $appName }}-pg-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: pgsql-init
                      image: senzing/postgresql-client:2.2.4
                      env:
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DATABASE_URL
                          value: postgresql://postgres:$(PG_PASSWORD)@{{ $appName }}-pg-postgresql.{{ $ns }}.svc:5432
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until psql ${DATABASE_URL} -c 'CREATE DATABASE logto;' &>/dev/null; do sleep 1; done
                          until psql ${DATABASE_URL}/logto -c 'UPDATE sign_in_experiences SET password_policy='\''{"rejects": {"pwned": false}}'\'' WHERE tenant_id='\''admin'\'';' &>/dev/null; do sleep 1; done
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: logto-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: svhd/logto:1.24
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 0
                  maxSurge: 1
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: svhd/logto:1.24
                      command: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]
                      env:
                        - name: TRUST_PROXY_HEADER
                          value: "1"
                        - name: DATABASE_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: DATABASE_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: DATABASE_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DB_URL
                          value: "postgres://$(DATABASE_USER):$(DATABASE_PASSWORD)@{{ $appName }}-pg-postgresql.{{ $ns }}.svc:$(DATABASE_PORT)/logto"
                        - name: ENDPOINT
                          value: https://{{ $host }}
                        - name: ADMIN_ENDPOINT
                          value: https://{{ $appHostSlug }}-admin.{{ $region }}
                      resources:
                        requests:
                          cpu: 100m
                          memory: 25Mi
                        limits:
                          cpu: 1000m
                          memory: 256Mi
                      readinessProbe:
                        failureThreshold: 30
                        httpGet:
                          path: /
                          port: 3001
                          scheme: HTTP
                        periodSeconds: 10
                        successThreshold: 1
                        timeoutSeconds: 1
                      imagePullPolicy: IfNotPresent
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: logto-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - name: http
                  targetPort: 3001
                  port: 3001
                - name: admin
                  targetPort: 3002
                  port: 3002
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: logto-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 3001
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-admin
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}-admin
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: logto-ingress-2
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $appHostSlug }}-admin.{{ $region }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 3002
              tls:
                - hosts:
                    - {{ $appHostSlug }}-admin.{{ $region }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: logto-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $appHostSlug }}-admin.{{ $region }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/logto/logo.png"
              name: "Logto"
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
