apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-budibase-go-templating
  labels:
    template: budibase
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Budibase
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/budibase/logo.png"
    meta.crossplane.io/description: Budibase is an open-source low-code platform that helps you build and deploy modern business apps in minutes
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/budibase/README.md"
    meta.crossplane.io/url: "https://budibase.com/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: budibase
        template: budibase
        # projectName: my-project
        name: {{ name }}
        input:
          # Admin email address (required)
          adminEmail: ""
          # Admin password (minimum 8 characters) (required)
          adminPassword: ""
          # Enable analytics
          enableAnalytics: "false"
          # Enable SMTP for email notifications
          smtpEnabled: "false"
          # SMTP server host
          smtpHost: ""
          # SMTP server port
          smtpPort: "587"
          # SMTP username
          smtpUser: ""
          # SMTP password
          smtpPassword: ""
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-budibase
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $adminEmail := $input.adminEmail | default "" }}
            {{- $adminPassword := $input.adminPassword | default "" }}
            {{- $enableAnalytics := $input.enableAnalytics | default "false" }}
            {{- $smtpEnabled := $input.smtpEnabled | default "false" }}
            {{- $smtpHost := $input.smtpHost | default "" }}
            {{- $smtpPort := $input.smtpPort | default "587" }}
            {{- $smtpUser := $input.smtpUser | default "" }}
            {{- $smtpPassword := $input.smtpPassword | default "" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: objectstorage.sealos.io/v1
            kind: ObjectStorageBucket
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-objectstoragebucket
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              policy: private
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-redis
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-redis
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-cluster
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: redis
                kb.io/database: redis-7.2.7
                app.kubernetes.io/instance: {{ $appName }}
                app.kubernetes.io/version: 7.2.7
                helm.sh/chart: redis-cluster-0.9.0
                sealos-db-provider-cr: {{ $appName }}-redis
            spec:
              clusterDefinitionRef: redis
              affinity:
                podAntiAffinity: Preferred
                topologyKeys:
                  - kubernetes.io/hostname
              tolerations:
                - key: kb-data
                  operator: Equal
                  value: "true"
                  effect: NoSchedule
              componentSpecs:
                - name: redis
                  componentDef: redis-7
                  enabledLogs:
                    - running
                  env:
                    - name: CUSTOM_SENTINEL_MASTER_NAME
                  serviceVersion: 7.2.7
                  serviceAccountName: {{ $appName }}-redis
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                - componentDef: redis-sentinel-7
                  name: redis-sentinel
                  replicas: 1
                  resources:
                    limits:
                      cpu: 100m
                      memory: 100Mi
                    requests:
                      cpu: 10m
                      memory: 10Mi
                  serviceVersion: 7.2.7
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
              terminationPolicy: Delete
              topology: replication
            ---
            apiVersion: v1
            kind: Secret
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-secret
              namespace: {{ $ns }}
              name: {{ $appName }}-couchdb
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-couchdb
            type: Opaque
            stringData:
              adminUsername: admin
              adminPassword: {{ randAlphaNum 16 }}
              erlangCookie: {{ randAlphaNum 16 }}
              cookieAuthSecret: {{ randAlphaNum 16 }}
            ---
            apiVersion: v1
            kind: Secret
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-secret-2
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            type: Opaque
            stringData:
              internal_api_key: {{ randAlphaNum 16 }}
              jwt_secret: {{ randAlphaNum 16 }}
              bb_encryption_key: {{ randAlphaNum 16 }}
              api_encryption_key: {{ randAlphaNum 16 }}
              admin_email: {{ $adminEmail }}
              admin_password: {{ $adminPassword }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}-couchdb
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-couchdb
            data:
              vn-tmpvn-chartvn-ini: |
                [chttpd]
                bind_address = any
                require_valid_user = false

                [couchdb]
                uuid = {{ $appName }}-couchdb
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-couchdb
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: budibase/couchdb:v3.3.3-sqs-v2.1.1
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-couchdb
                app: {{ $appName }}-couchdb
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              serviceName: {{ $appName }}-couchdb
              podManagementPolicy: Parallel
              selector:
                matchLabels:
                  app: {{ $appName }}-couchdb
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-couchdb
                spec:
                  automountServiceAccountToken: false
                  initContainers:
                    - name: init-copy
                      image: busybox:1.37.0
                      imagePullPolicy: IfNotPresent
                      command:
                        - 'sh'
                        - '-c'
                        - 'cp /tmp/chart.ini /default.d; ls -lrt /default.d;'
                      volumeMounts:
                      - name: {{ $appName }}-couchdb-cm
                        mountPath: /tmp/chart.ini
                        subPath: ./tmp/chart.ini
                      - name: vn-optvn-couchdbvn-etcvn-defaultvn-d
                        mountPath: /default.d
                  containers:
                    - name: {{ $appName }}-couchdb
                      image: budibase/couchdb:v3.3.3-sqs-v2.1.1
                      imagePullPolicy: IfNotPresent
                      ports:
                        - name: couchdb
                          containerPort: 5984
                        - name: epmd
                          containerPort: 4369
                        - containerPort: 9100
                        - containerPort: 4984
                          name: sqs
                      env:
                        - name: COUCHDB_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-couchdb
                              key: adminUsername
                        - name: COUCHDB_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-couchdb
                              key: adminPassword
                        - name: COUCHDB_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-couchdb
                              key: cookieAuthSecret
                        - name: COUCHDB_ERLANG_COOKIE
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-couchdb
                              key: erlangCookie
                        - name: ERL_FLAGS
                          value: " -name couchdb "
                      livenessProbe:
                        httpGet:
                          path: /_up
                          port: 5984
                        failureThreshold: 3
                        initialDelaySeconds: 0
                        periodSeconds: 10
                        successThreshold: 1
                        timeoutSeconds: 1
                      readinessProbe:
                        httpGet:
                          path: /_up
                          port: 5984
                        failureThreshold: 3
                        initialDelaySeconds: 0
                        periodSeconds: 10
                        successThreshold: 1
                        timeoutSeconds: 1
                      resources:
                        requests:
                          cpu: 50m
                          memory: 102Mi
                        limits:
                          cpu: 500m
                          memory: 1024Mi
                      volumeMounts:
                      - name: vn-optvn-couchdbvn-etcvn-defaultvn-d
                        mountPath: /opt/couchdb/etc/default.d
                      - name: vn-optvn-couchdbvn-data
                        mountPath: /opt/couchdb/data
                      - name: {{ $appName }}-couchdb-cm
                        mountPath: /tmp/chart.ini
                        subPath: ./tmp/chart.ini
                  volumes:
                    - name: {{ $appName }}-couchdb-cm
                      configMap:
                        name: {{ $appName }}-couchdb
                        items:
                          - key: vn-tmpvn-chartvn-ini
                            path: ./tmp/chart.ini
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /opt/couchdb/data
                      value: '1'
                    name: vn-optvn-couchdbvn-data
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
                - metadata:
                    annotations:
                      path: /opt/couchdb/etc/default.d
                      value: '1'
                    name: vn-optvn-couchdbvn-etcvn-defaultvn-d
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-service
              namespace: {{ $ns }}
              name: {{ $appName }}-couchdb-headless

            spec:
              clusterIP: None
              publishNotReadyAddresses: true
              ports:
                - name: couchdb
                  port: 5984
              selector:
                app: {{ $appName }}-couchdb
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-couchdb
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-couchdb
            spec:
              ports:
                - port: 5984
                  name: couchdb
                  protocol: TCP
                  targetPort: 5984
                - name: sqs
                  port: 4984
                  protocol: TCP
                  targetPort: 4984
              type: ClusterIP
              selector:
                app: {{ $appName }}-couchdb
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-deployment
                originImageName: budibase/apps:3.15.0
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: budibase/apps:3.15.0
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: BUDIBASE_ENVIRONMENT
                          value: PRODUCTION
                        - name: DEPLOYMENT_ENVIRONMENT
                          value: kubernetes
                        - name: SELF_HOSTED
                          value: "1"
                        - name: PORT
                          value: "4002"
                        - name: MULTI_TENANCY
                          value: "0"
                        - name: LOG_LEVEL
                          value: info
                        - name: ENABLE_ANALYTICS
                          value: {{ $enableAnalytics }}
                        # CouchDB configuration
                        - name: COUCH_DB_URL
                          value: http://{{ $appName }}-couchdb.{{ $ns }}.svc.cluster.local:5984
                        - name: COUCH_DB_SQL_URL
                          value: http://{{ $appName }}-couchdb.{{ $ns }}.svc.cluster.local:4984
                        - name: COUCH_DB_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-couchdb
                              key: adminUsername
                        - name: COUCH_DB_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-couchdb
                              key: adminPassword
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_URL
                          value: redis://:$(REDIS_PASSWORD)@{{ $appName }}-redis-redis.{{ $ns }}.svc.cluster.local:6379
                        - name: MINIO_ENABLED
                          value: "true"
                        - name: MINIO_ACCESS_KEY
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: accessKey
                        - name: MINIO_SECRET_KEY
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: secretKey
                        - name: BACKEND_STORAGE_MINIO_EXTERNAL_ENDPOINT
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: external
                        - name: MINIO_URL
                          value: https://$(BACKEND_STORAGE_MINIO_EXTERNAL_ENDPOINT)
                        - name: PLUGIN_BUCKET_NAME
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key-{{ $appName }}-sa-{{ $appName }}
                              key: bucket
                        - name: APPS_BUCKET_NAME
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key-{{ $appName }}-sa-{{ $appName }}
                              key: bucket
                        - name: GLOBAL_BUCKET_NAME
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key-{{ $appName }}-sa-{{ $appName }}
                              key: bucket
                        - name: BACKUPS_BUCKET_NAME
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key-{{ $appName }}-sa-{{ $appName }}
                              key: bucket
                        # Application secrets
                        - name: INTERNAL_API_KEY
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: internal_api_key
                        - name: JWT_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: jwt_secret
                        - name: ENCRYPTION_KEY
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: bb_encryption_key
                        - name: API_ENCRYPTION_KEY
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: api_encryption_key
                        - name: WORKER_URL
                          value: http://{{ $appName }}-worker.{{ $ns }}.svc.cluster.local:4003
                        # Admin configuration
                        - name: BB_ADMIN_USER_EMAIL
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: admin_email
                        - name: BB_ADMIN_USER_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}
                              key: admin_password
                        {{- if eq $smtpEnabled "true" }}
                        - name: SMTP_HOST
                          value: {{ $smtpHost }}
                        - name: SMTP_PORT
                          value: {{ $smtpPort }}
                        - name: SMTP_USER
                          value: {{ $smtpUser }}
                        - name: SMTP_PASSWORD
                          value: {{ $smtpPassword }}
                        - name: SMTP_FROM_ADDRESS
                          value: {{ $smtpUser }}
                        ${{ endif() }}
                        - name: APP_FEATURES
                          value: api
                      ports:
                        - containerPort: 4002
                      resources:
                        requests:
                          cpu: 20m
                          memory: 51Mi
                        limits:
                          cpu: 200m
                          memory: 512Mi
                      startupProbe:
                        failureThreshold: 30
                        httpGet:
                          path: /health
                          port: 4002
                          scheme: HTTP
                        periodSeconds: 3
                      livenessProbe:
                        failureThreshold: 3
                        httpGet:
                          path: /health
                          port: 4002
                          scheme: HTTP
                        periodSeconds: 30
                      readinessProbe:
                        failureThreshold: 1
                        httpGet:
                          path: /health
                          port: 4002
                          scheme: HTTP
                        periodSeconds: 3
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-service-3
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 4002
              selector:
                app: {{ $appName }}
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-worker
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: budibase-deployment-2
                originImageName: budibase/worker:3.15.0
                deploy.cloud.sealos.io/minReplicas: '1'
