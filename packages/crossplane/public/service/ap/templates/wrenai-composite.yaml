apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-wrenai-go-templating
  labels:
    template: wrenai
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: WrenAI
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/wrenai/logo.png"
    meta.crossplane.io/description: 🤖 Open-source GenBI AI Agent that empowers data-driven teams to chat with their data to generate Text-to-SQL, charts, spreadsheets, reports, and BI. 📈📊📋🧑‍💻
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/wrenai/README.md"
    meta.crossplane.io/url: "https://github.com/Canner/WrenAI"
    meta.crossplane.io/author: sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: wrenai
        template: wrenai
        # projectName: my-project
        name: {{ name }}
        input:
          # posthogApiKey: auto-generated if omitted
          # userUuid: auto-generated if omitted
          # OpenAI API Key
          openaiApiKey: ""
          # OpenAI API Key for Embedder
          embedderOpenaiApiKey: ""
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-wrenai
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $posthogApiKey := $input.posthogApiKey | default (printf "%s" (randAlphaNum 16)) }}
            {{- $userUuid := $input.userUuid | default (printf "%s" (randAlphaNum 32)) }}
            {{- $openaiApiKey := $input.openaiApiKey | default "" }}
            {{- $embedderOpenaiApiKey := $input.embedderOpenaiApiKey | default "" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}-ai-service
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-ai-service
            data:
              vn-appvn-datavn-configvn-yaml: |
                type: llm
                provider: litellm_llm
                timeout: 120
                models:
                - model: gpt-4o-mini-2024-07-18
                  api_base: https://api.openai.com/v1
                  api_key_name: LLM_OPENAI_API_KEY
                  kwargs:
                    temperature: 0
                    n: 1
                    seed: 0
                    max_tokens: 4096
                - model: gpt-4o-2024-08-06
                  api_base: https://api.openai.com/v1
                  api_key_name: LLM_OPENAI_API_KEY
                  kwargs:
                    temperature: 0
                    n: 1
                    seed: 0
                    max_tokens: 4096
                - model: o3-mini-2025-01-31
                  api_base: https://api.openai.com/v1
                  api_key_name: LLM_OPENAI_API_KEY
                  kwargs:
                    n: 1
                    seed: 0
                    max_completion_tokens: 4096
                    reasoning_effort: low

                ---
                type: embedder
                provider: litellm_embedder
                models:
                - model: text-embedding-3-large
                  api_base: https://api.openai.com/v1
                  api_key_name: EMBEDDER_OPENAI_API_KEY
                  timeout: 120

                ---
                type: engine
                provider: wren_ui
                endpoint: http://{{ $appName }}-ui:3000

                ---
                type: document_store
                provider: qdrant
                location: http://{{ $appName }}-qdrant:6333
                embedding_model_dim: 3072
                timeout: 120
                recreate_index: true

                ---
                type: pipeline
                pipes:
                  - name: db_schema_indexing
                    embedder: litellm_embedder.text-embedding-3-large
                    document_store: qdrant
                  - name: historical_question_indexing
                    embedder: litellm_embedder.text-embedding-3-large
                    document_store: qdrant
                  - name: table_description_indexing
                    embedder: litellm_embedder.text-embedding-3-large
                    document_store: qdrant
                  - name: db_schema_retrieval
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                    embedder: litellm_embedder.text-embedding-3-large
                    document_store: qdrant
                  - name: historical_question_retrieval
                    embedder: litellm_embedder.text-embedding-3-large
                    document_store: qdrant
                  - name: sql_generation
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                    engine: wren_ui
                  - name: sql_correction
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                    engine: wren_ui
                  - name: followup_sql_generation
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                    engine: wren_ui
                  - name: sql_summary
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                  - name: sql_answer
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                  - name: sql_breakdown
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                    engine: wren_ui
                  - name: sql_expansion
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                    engine: wren_ui
                  - name: semantics_description
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                  - name: relationship_recommendation
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                    engine: wren_ui
                  - name: question_recommendation
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                  - name: question_recommendation_db_schema_retrieval
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                    embedder: litellm_embedder.text-embedding-3-large
                    document_store: qdrant
                  - name: question_recommendation_sql_generation
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                    engine: wren_ui
                  - name: intent_classification
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                    embedder: litellm_embedder.text-embedding-3-large
                    document_store: qdrant
                  - name: data_assistance
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                  - name: sql_pairs_indexing
                    document_store: qdrant
                    embedder: litellm_embedder.text-embedding-3-large
                  - name: sql_pairs_retrieval
                    document_store: qdrant
                    embedder: litellm_embedder.text-embedding-3-large
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                  - name: preprocess_sql_data
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                  - name: sql_executor
                    engine: wren_ui
                  - name: chart_generation
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                  - name: chart_adjustment
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                  - name: sql_question_generation
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                  - name: sql_generation_reasoning
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                  - name: sql_regeneration
                    llm: litellm_llm.gpt-4o-mini-2024-07-18
                    engine: wren_ui

                ---
                settings:
                  engine_timeout: 30
                  column_indexing_batch_size: 50
                  table_retrieval_size: 10
                  table_column_retrieval_size: 100
                  allow_using_db_schemas_without_pruning: false
                  query_cache_maxsize: 1000
                  query_cache_ttl: 3600
                  langfuse_host: https://cloud.langfuse.com
                  langfuse_enable: false
                  logging_level: DEBUG
                  development: false
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-ai-service
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: ghcr.io/canner/wren-ai-service:0.15.17
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-ai-service
                app: {{ $appName }}-ai-service
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              selector:
                matchLabels:
                  app: {{ $appName }}-ai-service
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-ai-service
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  containers:
                  - name: {{ $appName }}-ai-service
                    image: ghcr.io/canner/wren-ai-service:0.15.17
                    env:
                      - name: WREN_AI_SERVICE_PORT
                        value: 5555
                      - name: LLM_OPENAI_API_KEY
                        value: {{ $openaiApiKey }}
                      - name: EMBEDDER_OPENAI_API_KEY
                        value: {{ $embedderOpenaiApiKey }}
                      - name: QDRANT_HOST
                        value: {{ $appName }}-qdrant
                      - name: LOGGING_LEVEL
                        value: INFO
                      - name: WREN_UI_ENDPOINT
                        value: http://{{ $appName }}-ui:3000
                      - name: PYTHONUNBUFFERED
                        value: "1"
                      - name: LANGFUSE_PUBLIC_KEY
                        value: ""
                      - name: LANGFUSE_SECRET_KEY
                        value: ""
                      - name: CONFIG_PATH
                        value: /app/data/config.yaml
                    resources:
                      requests:
                        cpu: 200m
                        memory: 200Mi
                      limits:
                        cpu: 2
                        memory: 2Gi
                    ports:
                      - containerPort: 5555
                    imagePullPolicy: IfNotPresent
                    volumeMounts:
                      - name: vn-appvn-datavn-configvn-yaml
                        mountPath: /app/data/config.yaml
                        subPath: ./app/data/config.yaml
                  volumes:
                    - name: vn-appvn-datavn-configvn-yaml
                      configMap:
                        name: {{ $appName }}-ai-service
                        items:
                          - key: vn-appvn-datavn-configvn-yaml
                            path: ./app/data/config.yaml
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-service
              namespace: {{ $ns }}
              name: {{ $appName }}-ai-service
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-ai-service
            spec:
              ports:
                - port: 5555
              selector:
                app: {{ $appName }}-ai-service
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-engine
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-statefulset
                originImageName: ghcr.io/canner/wren-engine:0.14.3
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-engine
                app: {{ $appName }}-engine
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              selector:
                matchLabels:
                  app: {{ $appName }}-engine
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-engine
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  initContainers:
                    - name: bootstrap
                      image: ghcr.io/canner/wren-bootstrap:0.1.5
                      env:
                        - name: DATA_PATH
                          value: /app/data
                      volumeMounts:
                        - name: vn-appvn-data
                          mountPath: /app/data
                      command:
                        - /bin/sh
                        - /app/init.sh
                  containers:
                  - name: {{ $appName }}-engine
                    image: ghcr.io/canner/wren-engine:0.14.3
                    env:
                      - name: LLM_OPENAI_API_KEY
                        value: {{ $openaiApiKey }}
                      - name: EMBEDDER_OPENAI_API_KEY
                        value: {{ $embedderOpenaiApiKey }}
                    resources:
                      requests:
                        cpu: 200m
                        memory: 400Mi
                      limits:
                        cpu: 2000m
                        memory: 4096Mi
                    ports:
                      - name: http-port
                        containerPort: 8080
                      - name: sql-port
                        containerPort: 7432
                    volumeMounts:
                      - name: vn-appvn-data
                        mountPath: /usr/src/app/etc
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /app/data
                      value: '1'
                    name: vn-appvn-data
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-engine
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-engine
            spec:
              ports:
                - port: 8080
                  targetPort: 8080
                  name: http-port
                - port: 7432
                  targetPort: 7432
                  name: sql-port
              selector:
                app: {{ $appName }}-engine
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-ibis-server
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-deployment-2
                originImageName: ghcr.io/canner/wren-engine-ibis:0.14.3
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-ibis-server
                app: {{ $appName }}-ibis-server
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              selector:
                matchLabels:
                  app: {{ $appName }}-ibis-server
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-ibis-server
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  containers:
                  - name: {{ $appName }}-ibis-server
                    image: ghcr.io/canner/wren-engine-ibis:0.14.3
                    env:
                      - name: WREN_ENGINE_ENDPOINT
                        value: http://{{ $appName }}-engine:8080
                      - name: LOGGING_LEVEL
                        value: INFO
                    resources:
                      requests:
                        cpu: 100m
                        memory: 102Mi
                      limits:
                        cpu: 1000m
                        memory: 1024Mi
                    ports:
                      - containerPort: 8000
                    imagePullPolicy: IfNotPresent
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-service-3
              namespace: {{ $ns }}
              name: {{ $appName }}-ibis-server
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-ibis-server
            spec:
              ports:
                - port: 8000
              selector:
                app: {{ $appName }}-ibis-server
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-configmap-2
              namespace: {{ $ns }}
              name: {{ $appName }}-qdrant
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-qdrant
            data:
              vn-qdrantvn-configvn-initializevn-sh: |
                #!/bin/sh
                SET_INDEX=${HOSTNAME##*-}
                echo "Starting initializing for pod $SET_INDEX"
                if [ "$SET_INDEX" = "0" ]; then
                  exec ./entrypoint.sh --uri 'http://{{ $appName }}-qdrant-0.{{ $appName }}-qdrant:6335'
                else
                  exec ./entrypoint.sh --bootstrap 'http://{{ $appName }}-qdrant-0.{{ $appName }}-qdrant:6335' --uri 'http://{{ $appName }}-qdrant-'"$SET_INDEX"'.{{ $appName }}-qdrant:6335'
                fi
              vn-qdrantvn-configvn-productionvn-yaml: |
                cluster:
                  enabled: false
                  p2p:
                    port: 6335
                  consensus:
                    tick_period_ms: 100
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-qdrant
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-statefulset-2
                originImageName: qdrant/qdrant:v1.13.4
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-qdrant
                app: {{ $appName }}-qdrant
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              selector:
                matchLabels:
                  app: {{ $appName }}-qdrant
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-qdrant
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  initContainers:
                    - name: ensure-dir-ownership
                      image: qdrant/qdrant:v1.13.4
                      env:
                        - name: DATA_PATH
                          value: /app/data
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: PG_URL
                          value: postgresql://postgres:$(PG_PASSWORD)@{{ $appName }}-pg-postgresql.{{ $ns }}.svc:$(PG_PORT)/wrenai
                      volumeMounts:
                        - name: vn-qdrantvn-storage
                          mountPath: /qdrant/storage
                        - name: vn-qdrantvn-snapshots
                          mountPath: /qdrant/snapshots
                      command:
                        - /bin/sh
                        - -c
                        - chown -R 1000:3000 /qdrant/storage /qdrant/snapshots
                      imagePullPolicy: IfNotPresent
                  containers:
                    - name: {{ $appName }}-qdrant
                      image: qdrant/qdrant:v1.13.4
                      env: 
                        - name: QDRANT_INIT_FILE_PATH
                          value: /qdrant/init/.qdrant-initialized
                      command: 
                        - /bin/bash
                        - -c
                      args: 
                        - ./config/initialize.sh
                      resources:
                        requests:
                          cpu: 200m
                          memory: 400Mi
                        limits:
                          cpu: 2000m
                          memory: 4096Mi
                      ports:
                        - name: http
                          containerPort: 6333
                        - name: grpc
                          containerPort: 6334
                        - name: p2p
                          containerPort: 6335
                      securityContext:
                        runAsNonRoot: true
                        runAsUser: 1000
                        runAsGroup: 2000
                        allowPrivilegeEscalation: false
                        privileged: false
                        readOnlyRootFilesystem: true
                      volumeMounts:
                        - name: vn-qdrantvn-storage
                          mountPath: /qdrant/storage
                        - name: vn-qdrantvn-snapshots
                          mountPath: /qdrant/snapshots
                        - name: vn-qdrantvn-configvn-initializevn-sh
                          mountPath: /qdrant/config/initialize.sh
                          subPath: ./qdrant/config/initialize.sh
                        - name: vn-qdrantvn-configvn-productionvn-yaml
                          mountPath: /qdrant/config/production.yaml
                          subPath: ./qdrant/config/production.yaml
                        - name: vn-qdrantvn-init
                          mountPath: /qdrant/init
                      imagePullPolicy: IfNotPresent
                  securityContext:
                    fsGroup: 3000
                    fsGroupChangePolicy: Always
                  volumes:
                    - name: vn-qdrantvn-configvn-initializevn-sh
                      configMap:
                        name: {{ $appName }}-qdrant
                        defaultMode: 493 # default 420 means 0644,493 means 0755
                        items:
                          - key: vn-qdrantvn-configvn-initializevn-sh
                            path: ./qdrant/config/initialize.sh
                    - name: vn-qdrantvn-configvn-productionvn-yaml
                      configMap:
                        name: {{ $appName }}-qdrant
                        items:
                          - key: vn-qdrantvn-configvn-productionvn-yaml
                            path: ./qdrant/config/production.yaml
                    - name: vn-qdrantvn-init
                      emptyDir: {}
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /qdrant/storage
                      value: '1'
                    name: vn-qdrantvn-storage
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
                - metadata:
                    annotations:
                      path: /qdrant/snapshots
                      value: '1'
                    name: vn-qdrantvn-snapshots
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
