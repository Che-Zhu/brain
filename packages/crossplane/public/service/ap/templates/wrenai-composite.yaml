                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-pg
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-pg
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: postgresql
                clusterversion.kubeblocks.io/name: postgresql-14.8.0
                sealos-db-provider-cr: {{ $appName }}-pg
              annotations: {}
              name: {{ $appName }}-pg
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-14.8.0
              componentSpecs:
                - componentDefRef: postgresql
                  monitor: true
                  name: postgresql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-pg
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
