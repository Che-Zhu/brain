            spec:
              ports:
                - port: 6333
                  targetPort: 6333
                  name: http
                - port: 6334
                  targetPort: 6334
                  name: grpc
                - port: 6335
                  targetPort: 6335
                  name: p2p
              selector:
                app: {{ $appName }}-qdrant
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-service-5
              namespace: {{ $ns }}
              name: {{ $appName }}-qdrant-headless
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-qdrant
            spec:
              ports:
                - port: 6335
                  targetPort: 6335
                  name: p2p
              selector:
                app: {{ $appName }}-qdrant
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-ui
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: wrenai-deployment-3
                originImageName: ghcr.io/canner/wren-ui:0.20.1
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-ui
                app: {{ $appName }}-ui
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              selector:
                matchLabels:
                  app: {{ $appName }}-ui
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-ui
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  containers:
                  - name: {{ $appName }}-ui
                    image: ghcr.io/canner/wren-ui:0.20.1
                    env:
                      - name: DB_TYPE
                        value: pg
                      - name: WREN_ENGINE_ENDPOINT
                        value: http://{{ $appName }}-engine:8080
                      - name: WREN_AI_ENDPOINT
                        value: http://{{ $appName }}-ai-service:5555
                      - name: GENERATION_MODEL
                        value: gpt-4o-mini-2024-07-18
                      - name: PG_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: {{ $appName }}-pg-conn-credential
                            key: password
                      - name: PG_PORT
                        valueFrom:
                          secretKeyRef:
                            name: {{ $appName }}-pg-conn-credential
                            key: port
                      - name: PG_URL
                        value: postgresql://postgres:$(PG_PASSWORD)@{{ $appName }}-pg-postgresql.{{ $ns }}.svc:$(PG_PORT)/wrenai
                      # telemetry
                      - name: WREN_ENGINE_PORT
                        value: 8080
                      - name: WREN_AI_SERVICE_VERSION
                        value: 0.15.17
                      - name: WREN_UI_VERSION
                        value: 0.15.17
                      - name: WREN_ENGINE_VERSION
                        value: 0.14.3
                      - name: USER_UUID
                        value: {{ $userUuid }}
                      - name: TELEMETRY_ENABLED
                        value: "false"
                      # client side
                      - name: NEXT_PUBLIC_USER_UUID
                        value: $(USER_UUID)
                      - name: NEXT_PUBLIC_TELEMETRY_ENABLED
                        value: "false"
                      # configs
                      - name: WREN_PRODUCT_VERSION
                        value: 0.15.3
                      - name: IBIS_SERVER_ENDPOINT
                        value: http://{{ $appName }}-ibis-server:8000
                    resources:
                      requests:
                        cpu: 100m
                        memory: 100Mi
                      limits:
                        cpu: 1000m
                        memory: 1000Mi
                    ports:
                      - containerPort: 3000
                    imagePullPolicy: IfNotPresent
