apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-crmeb-go-templating
  labels:
    template: crmeb
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: CRMEB
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/crmeb/logo.png"
    meta.crossplane.io/description: CRMEB开源商城系统PHP版
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/crmeb/README.md"
    meta.crossplane.io/url: "https://www.crmeb.com/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: crmeb
        template: crmeb
        # projectName: my-project
        name: {{ name }}
        input:
          {}
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-crmeb
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            rules:
              - apiGroups:
                  - "*"
                resources:
                  - "*"
                verbs:
                  - "*"
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-mysql
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-mysql
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-cluster
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: apecloud-mysql
                clusterversion.kubeblocks.io/name: ac-mysql-8.0.30
              name: {{ $appName }}-mysql
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: apecloud-mysql
              clusterVersionRef: ac-mysql-8.0.30
              componentSpecs:
                - componentDefRef: mysql
                  monitor: true
                  name: mysql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-mysql
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi

              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-job
              namespace: {{ $ns }}
              name: {{ $appName }}-mysql-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: mysql-init
                      image: joseluisq/mysql-client:8.0.30
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: MYSQL_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: username
                        - name: MYSQL_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: password
                        - name: MYSQL_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: host
                        - name: MYSQL_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: port
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until mysql -h $MYSQL_HOST -P $MYSQL_PORT -u $MYSQL_USER -p$MYSQL_PASSWORD -e 'CREATE DATABASE IF NOT EXISTS crmeb;'; do sleep 1; done
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-serviceaccount-2
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-cluster-2
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: redis
                kb.io/database: redis-7.2.7
                app.kubernetes.io/instance: {{ $appName }}
                app.kubernetes.io/version: 7.2.7
                helm.sh/chart: redis-cluster-0.9.0
                sealos-db-provider-cr: {{ $appName }}-redis
            spec:
              clusterDefinitionRef: redis
              affinity:
                podAntiAffinity: Preferred
                topologyKeys:
                  - kubernetes.io/hostname
              tolerations:
                - key: kb-data
                  operator: Equal
                  value: "true"
                  effect: NoSchedule
              componentSpecs:
                - name: redis
                  componentDef: redis-7
                  enabledLogs:
                    - running
                  env:
                    - name: CUSTOM_SENTINEL_MASTER_NAME
                  serviceVersion: 7.2.7
                  serviceAccountName: {{ $appName }}-redis
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                - componentDef: redis-sentinel-7
                  name: redis-sentinel
                  replicas: 1
                  resources:
                    limits:
                      cpu: 100m
                      memory: 100Mi
                    requests:
                      cpu: 10m
                      memory: 10Mi
                  serviceVersion: 7.2.7
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
              terminationPolicy: Delete
              topology: replication
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-role-2
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            rules:
              - apiGroups:
                  - "*"
                resources:
                  - "*"
                verbs:
                  - "*"
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-rolebinding-2
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-redis
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-redis
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-redis
                namespace: {{ $ns }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}
            data:
              vn-etcvn-nginxvn-confvn-dvn-defaultvn-conf: |-
                server {
                    listen 80;
                    index index.php index.html;
                    server_name bz.crmeb.com;

                    root /var/www/public;


                    location / {
                        # try_files $uri /index.php$is_args$args;
                        if (!-e $request_filename){
                            rewrite  ^(.*)$  /index.php?s=$1  last;   break;
                        }
                    }

                    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
                    {
                        expires      30d;
                        error_log off;
                        access_log /dev/null;
                    }

                    location ~ .*\.(js|css)?$
                    {
                        expires      12h;
                        error_log off;
                        access_log /dev/null;
                    }
                    location /notice {
                        proxy_pass http://127.0.0.1:20002;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection "upgrade";
                        proxy_set_header X-real-ip $remote_addr;
                        proxy_set_header X-Forwarded-For $remote_addr;
                    }
                    location /msg {
                        proxy_pass http://127.0.0.1:20003/;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection "upgrade";
                        proxy_set_header X-real-ip $remote_addr;
                        proxy_set_header X-Forwarded-For $remote_addr;
                    }



                    location ~ \.php$ {
                        fastcgi_split_path_info ^(.+\.php)(/.+)$;
                        fastcgi_pass 127.0.0.1:9000;
                        fastcgi_index index.php;
                        include fastcgi_params;
                        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                        fastcgi_param PATH_INFO $fastcgi_path_info;
                    }


                }
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: ghcr.io/yangchuansheng/crmeb:v5.4.0
                deploy.cloud.sealos.io/minReplicas: "1"
                deploy.cloud.sealos.io/maxReplicas: "1"
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  initContainers:
                    - name: take-data-dir-ownership
                      image: ghcr.io/yangchuansheng/crmeb:v5.4.0
                      command: ["/bin/sh", "-c", "if [ ! -f /tmp/index.html ]; then cp -rf /var/www/* /tmp/; cp -rf /var/www/.* /tmp/; mkdir /tmp/backup; chmod a+w /tmp/backup; chmod a+w /tmp/public; chmod a+w /tmp/runtime; chmod a+w /tmp/.env; chmod a+w /tmp/.version; chmod a+w /tmp/.constant; fi"]
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-varvn-www
                          mountPath: /tmp
                  containers:
                    - name: {{ $appName }}
                      image: nginx:alpine3.20
                      env:
                        - name: TZ
                          value: Asia/Shanghai
                      resources:
                        requests:
                          cpu: 10m
                          memory: 12Mi
                        limits:
                          cpu: 100m
                          memory: 128Mi
                      ports:
                        - name: http
                          protocol: TCP
                          containerPort: 80
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-varvn-www
                          mountPath: /var/www
                        - name: vn-etcvn-nginxvn-confvn-dvn-defaultvn-conf
                          mountPath: /etc/nginx/conf.d/default.conf
                          subPath: ./etc/nginx/conf.d/default.conf
                    - name: {{ $appName }}-php
                      image: ghcr.io/yangchuansheng/crmeb:v5.4.0
                      env:
                        - name: TZ
                          value: Asia/Shanghai
                      resources:
                        requests:
                          cpu: 20m
                          memory: 25Mi
                        limits:
                          cpu: 200m
                          memory: 256Mi
                      ports:
                        - name: http
                          protocol: TCP
                          containerPort: 9000
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-varvn-www
                          mountPath: /var/www
                  volumes:
                    - name: vn-etcvn-nginxvn-confvn-dvn-defaultvn-conf
                      configMap:
                        name: {{ $appName }}
                        items:
                          - key: vn-etcvn-nginxvn-confvn-dvn-defaultvn-conf
                            path: ./etc/nginx/conf.d/default.conf
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /var/www
                      value: "1"
                    name: vn-varvn-www
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 80
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: "true"
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
                nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 80
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: crmeb-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/crmeb/logo.png"
              name: "crmeb"
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
