apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-frp-go-templating
  labels:
    template: frp
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: frp
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/frp/logo.svg"
    meta.crossplane.io/description: frp 是一个专注于内网穿透的高性能的反向代理应用
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/frp/README.md"
    meta.crossplane.io/url: "https://github.com/fatedier/frp"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: frp
        template: frp
        # projectName: my-project
        name: {{ name }}
        input:
          # appHostAdmin: auto-generated if omitted
          # appHostHttp: auto-generated if omitted
          # appName1: auto-generated if omitted
          # admin dashboard's username (required)
          adminUser: "admin"
          # admin dashboard's password (required)
          adminPassword: ""
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-frp
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $appHostAdmin := $input.appHostAdmin | default (printf "%s" (randAlphaNum 8)) }}
            {{- $appHostHttp := $input.appHostHttp | default (printf "%s" (randAlphaNum 8)) }}
            {{- $appName1 := $input.appName1 | default (printf "%s" (randAlphaNum 8)) }}
            {{- $adminUser := $input.adminUser | default "admin" }}
            {{- $adminPassword := $input.adminPassword | default "" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frp-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}
            data:
              vn-etcvn-frpvn-frpsvn-toml: |-
                # frps.toml

                bindPort = 7000
                vhostHTTPPort = 80

                # The default value is 127.0.0.1. Change it to 0.0.0.0 when you want to access it from a public network.
                webServer.addr = "0.0.0.0"
                webServer.port = 7500
                # dashboard's username and password are both optional
                webServer.user = "{{ $adminUser }}"
                webServer.password = "{{ $adminPassword }}"

                enablePrometheus = true
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frp-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: snowdreamtech/frps:0.59
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              strategy:
                type: RollingUpdate
                rollingUpdate:
                  maxUnavailable: 1
                  maxSurge: 0
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: snowdreamtech/frps:0.59
                      resources:
                        requests:
                          cpu: 10m
                          memory: 12Mi
                        limits:
                          cpu: 100m
                          memory: 128Mi
                      ports:
                        - containerPort: 7500
                          name: admin
                        - containerPort: 80
                          name: http
                        - containerPort: 7000
                          name: server
                        - containerPort: 22
                          name: ssh
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-etcvn-frpvn-frpsvn-toml
                          mountPath: /etc/frp/frps.toml
                          subPath: ./etc/frp/frps.toml
                  volumes:
                    - name: vn-etcvn-frpvn-frpsvn-toml
                      configMap:
                        name: {{ $appName }}
                        items:
                          - key: vn-etcvn-frpvn-frpsvn-toml
                            path: ./etc/frp/frps.toml
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frp-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 7500
                  targetPort: 7500
                  name: admin
                - port: 80
                  targetPort: 80
                  name: http
              selector:
                app: {{ $appName }}
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frp-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-nodeport
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 7000
                  targetPort: 7000
                  name: server
                - port: 22
                  targetPort: 22
                  name: ssh
              selector:
                app: {{ $appName }}
              type: NodePort
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $appHostAdmin }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frp-ingress
                higress.io/response-header-control-remove: X-Frame-Options
                higress.io/response-header-control-update: |
                  Content-Security-Policy "default-src * blob: data: *.{{ $region }} {{ $region }}; img-src * data: blob: resource: *.{{ $region }} {{ $region }}; connect-src * wss: blob: resource:; style-src 'self' 'unsafe-inline' blob: *.{{ $region }} {{ $region }} resource:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: *.{{ $region }} {{ $region }} resource: *.baidu.com *.bdstatic.com; frame-src 'self' *.{{ $region }} {{ $region }} mailto: tel: weixin: mtt: *.baidu.com; frame-ancestors 'self' https://{{ $region }} https://*.{{ $region }}"
                  X-Xss-Protection "1; mode=block"
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/rewrite-target: /$2
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  more_clear_headers "X-Frame-Options:";
                  more_set_headers "Content-Security-Policy: default-src * blob: data: *.{{ $region }} {{ $region }}; img-src * data: blob: resource: *.{{ $region }} {{ $region }}; connect-src * wss: blob: resource:; style-src 'self' 'unsafe-inline' blob: *.{{ $region }} {{ $region }} resource:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: *.{{ $region }} {{ $region }} resource: *.baidu.com *.bdstatic.com; frame-src 'self' *.{{ $region }} {{ $region }} mailto: tel: weixin: mtt: *.baidu.com; frame-ancestors 'self' https://{{ $region }} https://*.{{ $region }}";
                  more_set_headers "X-Xss-Protection: 1; mode=block";
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $appHostAdmin }}.{{ $region }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /()(.*)
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 7500
              tls:
                - hosts:
                    - {{ $appHostAdmin }}.{{ $region }}
                  secretName: wildcard-cert
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName1 }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $appHostHttp }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frp-ingress-2
                higress.io/response-header-control-remove: X-Frame-Options
                higress.io/response-header-control-update: |
                  Content-Security-Policy "default-src * blob: data: *.{{ $region }} {{ $region }}; img-src * data: blob: resource: *.{{ $region }} {{ $region }}; connect-src * wss: blob: resource:; style-src 'self' 'unsafe-inline' blob: *.{{ $region }} {{ $region }} resource:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: *.{{ $region }} {{ $region }} resource: *.baidu.com *.bdstatic.com; frame-src 'self' *.{{ $region }} {{ $region }} mailto: tel: weixin: mtt: *.baidu.com; frame-ancestors 'self' https://{{ $region }} https://*.{{ $region }}"
                  X-Xss-Protection "1; mode=block"
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/rewrite-target: /$2
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  more_clear_headers "X-Frame-Options:";
                  more_set_headers "Content-Security-Policy: default-src * blob: data: *.{{ $region }} {{ $region }}; img-src * data: blob: resource: *.{{ $region }} {{ $region }}; connect-src * wss: blob: resource:; style-src 'self' 'unsafe-inline' blob: *.{{ $region }} {{ $region }} resource:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: *.{{ $region }} {{ $region }} resource: *.baidu.com *.bdstatic.com; frame-src 'self' *.{{ $region }} {{ $region }} mailto: tel: weixin: mtt: *.baidu.com; frame-ancestors 'self' https://{{ $region }} https://*.{{ $region }}";
                  more_set_headers "X-Xss-Protection: 1; mode=block";
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $appHostHttp }}.{{ $region }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /()(.*)
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 80
              tls:
                - hosts:
                    - {{ $appHostHttp }}.{{ $region }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frp-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $appHostAdmin }}.{{ $region }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/frp/logo.svg"
              name: frp
              type: iframe
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frp-job
              namespace: {{ $ns }}
              name: {{ $appName }}-init
            spec:
              completions: 1
              template:
                spec:
                  serviceAccountName: {{ $appName }}-sa
                  serviceAccount: {{ $appName }}-sa
                  containers:
                    - name: switch-ports
                      image: bitnamilegacy/kubectl:1.28.9
                      command:
                        - /bin/sh
                        - -c
                        - |
                          SSH_PORT=`kubectl get svc {{ $appName }}-nodeport -o=jsonpath='{.spec.ports[?(@.name=="ssh")].nodePort}'`
                          kubectl patch svc {{ $appName }}-nodeport --type='json' -p="[
                            {\"op\": \"replace\", \"path\": \"/spec/ports/1/port\", \"value\": $SSH_PORT},
                            {\"op\": \"replace\", \"path\": \"/spec/ports/1/targetPort\", \"value\": $SSH_PORT}
                          ]"
                          kubectl patch deployment {{ $appName }} --type='json' -p="[
                            {
                              \"op\": \"replace\",
                              \"path\": \"/spec/template/spec/containers/0/ports/3\",
                              \"value\": {
                                \"containerPort\": $SSH_PORT,
                                \"name\": \"ssh\"
                              }
                            }
                          ]"
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
