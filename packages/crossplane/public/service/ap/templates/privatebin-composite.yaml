apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-privatebin-go-templating
  labels:
    template: privatebin
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: PrivateBin
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/privatebin/logo.svg"
    meta.crossplane.io/description: A minimalist, open source online pastebin where the server has zero knowledge of pasted data.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/privatebin/README.md"
    meta.crossplane.io/url: "https://privatebin.info/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: privatebin
        template: privatebin
        # projectName: my-project
        name: {{ name }}
        input:
          {}
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-privatebin
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: privatebin-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}
            data:
              vn-srvvn-cfgvn-confvn-php: |-
                ;<?php http_response_code(403); /*
                ; config file for PrivateBin
                ;
                ; An explanation of each setting can be find online at https://github.com/PrivateBin/    PrivateBin/wiki/    Configuration.
                
                [main]
                ; (optional) set a project name to be displayed on the website
                ; name = "PrivateBin"
                
                ; The full URL, with the domain name and directories that point to the PrivateBin files
                ; This URL is essential to allow Opengraph images to be displayed on social networks
                ; basepath = ""
                
                ; enable or disable the discussion feature, defaults to true
                discussion = true
                
                ; preselect the discussion feature, defaults to false
                opendiscussion = false
                
                ; enable or disable the password feature, defaults to true
                password = true
                
                ; enable or disable the file upload feature, defaults to false
                fileupload = false
                
                ; preselect the burn-after-reading feature, defaults to false
                burnafterreadingselected = false
                
                ; which display mode to preselect by default, defaults to "plaintext"
                ; make sure the value exists in [formatter_options]
                defaultformatter = "plaintext"
                
                ; (optional) set a syntax highlighting theme, as found in css/prettify/
                ; syntaxhighlightingtheme = "sons-of-obsidian"
                
                ; size limit per paste or comment in bytes, defaults to 10 Mebibytes
                sizelimit = 10485760
                
                ; template to include, default is "bootstrap" (tpl/bootstrap.php)
                template = "bootstrap"
                
                ; (optional) info text to display
                ; use single, instead of double quotes for HTML attributes
                info = "Powered by <a href='https://sealos.io/'>Sealos</a>."
                
                ; (optional) notice to display
                ; notice = "Note: This is a test service: Data may be deleted anytime. Kittens will     die if you abuse   this   service."
                
                ; by default PrivateBin will guess the visitors language based on the browsers
                ; settings. Optionally you can enable the language selection menu, which uses
                ; a session cookie to store the choice until the browser is closed.
                languageselection = true
                
                ; set the language your installs defaults to, defaults to English
                ; if this is set and language selection is disabled, this will be the only language
                languagedefault = "en"
                
                ; (optional) URL shortener address to offer after a new paste is created
                ; it is suggested to only use this with self-hosted shorteners as this will leak
                ; the pastes encryption key
                ; urlshortener = ""
                
                ; (optional) Let users create a QR code for sharing the paste URL with one click.
                ; It works both when a new paste is created and when you view a paste.
                qrcode = true
                
                ; (optional) IP based icons are a weak mechanism to detect if a comment was from
                ; a different user when the same username was used in a comment. It might be
                ; used to get the IP of a non anonymous comment poster if the server salt is
                ; leaked and a SHA256 HMAC rainbow table is generated for all (relevant) IPs.
                ; Can be set to one these values: "none" / "vizhash" / "identicon" (default).
                ; icon = "none"
                
                ; Content Security Policy headers allow a website to restrict what sources are
                ; allowed to be accessed in its context. You need to change this if you added
                ; custom scripts from third-party domains to your templates, e.g. tracking
                ; scripts or run your site behind certain DDoS-protection services.
                ; Check the documentation at https://content-security-policy.com/
                ; Notes:
                ; - If you use a bootstrap theme, you can remove the allow-popups from the
                ;   sandbox restrictions.
                ; - By default this disallows to load images from third-party servers, e.g. when
                ;   they are embedded in pastes. If you wish to allow that, you can adjust the
                ;   policy here. See https://github.com/PrivateBin/PrivateBin/wiki/FAQ#why-does-not-it-    load-embedded-  images
                ;   for details.
                ; - The 'unsafe-eval' is used in two cases; to check if the browser supports
                ;   async functions and display an error if not and for Chrome to enable
                ;   webassembly support (used for zlib compression). You can remove it if Chrome
                ;   doesn't need to be supported and old browsers don't need to be warned.
                ; cspheader = "default-src 'none'; base-uri 'self'; form-action 'none'; manifest-src     'self'; connect-src   *   blob:; script-src 'self' 'unsafe-eval'; style-src 'self';     font-src 'self'; frame-ancestors 'none';   img-src   'self' data: blob:; media-src     blob:; object-src blob:; sandbox allow-same-origin allow-scripts   allow-forms   allow-    popups allow-modals allow-downloads"
                
                ; stay compatible with PrivateBin Alpha 0.19, less secure
                ; if enabled will use base64.js version 1.7 instead of 2.1.9 and sha1 instead of
                ; sha256 in HMAC for the deletion token
                ; zerobincompatibility = false
                
                ; Enable or disable the warning message when the site is served over an insecure
                ; connection (insecure HTTP instead of HTTPS), defaults to true.
                ; Secure transport methods like Tor and I2P domains are automatically whitelisted.
                ; It is **strongly discouraged** to disable this.
                ; See https://github.com/PrivateBin/PrivateBin/wiki/FAQ#why-does-it-show-me-an-error-    about-an-insecure-    connection for more information.
                ; httpwarning = true
                
                ; Pick compression algorithm or disable it. Only applies to pastes/comments
                ; created after changing the setting.
                ; Can be set to one these values: "none" / "zlib" (default).
                ; compression = "zlib"
                
                [expire]
                ; expire value that is selected per default
                ; make sure the value exists in [expire_options]
                default = "1week"
                
                [expire_options]
                ; Set each one of these to the number of seconds in the expiration period,
                ; or 0 if it should never expire
                5min = 300
                10min = 600
                1hour = 3600
                1day = 86400
                1week = 604800
                ; Well this is not *exactly* one month, it's 30 days:
                1month = 2592000
                1year = 31536000
                never = 0
                
                [formatter_options]
                ; Set available formatters, their order and their labels
                plaintext = "Plain Text"
                syntaxhighlighting = "Source Code"
                markdown = "Markdown"
                
                [traffic]
                ; time limit between calls from the same IP address in seconds
                ; Set this to 0 to disable rate limiting.
                limit = 10
                
                ; (optional) Set IPs addresses (v4 or v6) or subnets (CIDR) which are exempted
                ; from the rate-limit. Invalid IPs will be ignored. If multiple values are to
                ; be exempted, the list needs to be comma separated. Leave unset to disable
                ; exemptions.
                ; exempted = "1.2.3.4,10.10.10/24"
                
                ; (optional) If you want only some source IP addresses (v4 or v6) or subnets
                ; (CIDR) to be allowed to create pastes, set these here. Invalid IPs will be
                ; ignored. If multiple values are to be exempted, the list needs to be comma
                ; separated. Leave unset to allow anyone to create pastes.
                ; creators = "1.2.3.4,10.10.10/24"
                
                ; (optional) if your website runs behind a reverse proxy or load balancer,
                ; set the HTTP header containing the visitors IP address, i.e. X_FORWARDED_FOR
                ; header = "X_FORWARDED_FOR"
                
                [purge]
                ; minimum time limit between two purgings of expired pastes, it is only
                ; triggered when pastes are created
                ; Set this to 0 to run a purge every time a paste is created.
                limit = 300
                
                ; maximum amount of expired pastes to delete in one purge
                ; Set this to 0 to disable purging. Set it higher, if you are running a large
                ; site
                batchsize = 10
                
                [model]
                ; name of data model class to load and directory for storage
                ; the default model "Filesystem" stores everything in the filesystem
                class = Filesystem
                [model_options]
                dir = PATH "data"
                
                ;[model]
                ; example of a Google Cloud Storage configuration
                ;class = GoogleCloudStorage
                ;[model_options]
                ;bucket = "my-private-bin"
                ;prefix = "pastes"
                
                ;[model]
                ; example of DB configuration for MySQL
                ;class = Database
                ;[model_options]
                ;dsn = "mysql:host=localhost;dbname=privatebin;charset=UTF8"
                ;tbl = "privatebin_"	; table prefix
                ;usr = "privatebin"
                ;pwd = "Z3r0P4ss"
                ;opt[12] = true	  ; PDO::ATTR_PERSISTENT
                
                ;[model]
                ; example of DB configuration for SQLite
                ;class = Database
                ;[model_options]
                ;dsn = "sqlite:" PATH "data/db.sq3"
                ;usr = null
                ;pwd = null
                ;opt[12] = true	; PDO::ATTR_PERSISTENT
                
                ;[model]
                ; example of DB configuration for PostgreSQL
                ;class = Database
                ;[model_options]
                ;dsn = "pgsql:host=localhost;dbname=privatebin"
                ;tbl = "privatebin_"     ; table prefix
                ;usr = "privatebin"
                ;pwd = "Z3r0P4ss"
                ;opt[12] = true    ; PDO::ATTR_PERSISTENT
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: privatebin-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: frooodle/privatebin:0.26.1-fat
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  initContainers:
                    - name: take-data-dir-ownership
                      image: alpine
                      command: ["/bin/sh", "-c", "chown -R 65534:82 /srv/data"]
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-srvvn-data
                          mountPath: /srv/data
                  containers:
                    - name: {{ $appName }}
                      image: ghcr.io/privatebin/fs:1.7.4
                      resources:
                        requests:
                          cpu: 100m
                          memory: 307Mi
                        limits:
                          cpu: 1000m
                          memory: 3072Mi
                      ports:
                        - name: http
                          protocol: TCP
                          containerPort: 8080
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-srvvn-cfgvn-confvn-php
                          mountPath: /srv/cfg/conf.php
                          subPath: ./srv/cfg/conf.php
                        - name: vn-srvvn-data
                          mountPath: /srv/data
                      livenessProbe:
                        httpGet:
                          path: /
                          port: 8080
                        initialDelaySeconds: 20
                      readinessProbe:
                        httpGet:
                          path: /
                          port: 8080
                        initialDelaySeconds: 20
                  volumes:
                    - name: vn-srvvn-cfgvn-confvn-php
                      configMap:
                        name: {{ $appName }}
                        items:
                          - key: vn-srvvn-cfgvn-confvn-php
                            path: ./srv/cfg/conf.php
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /srv/data
                      value: '1'
                    name: vn-srvvn-data
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: privatebin-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 8080
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: privatebin-ingress
                higress.io/response-header-control-remove: X-Frame-Options
                higress.io/response-header-control-update: |
                  Content-Security-Policy "default-src * blob: data: *.{{ $region }} {{ $region }}; img-src * data: blob: resource: *.{{ $region }} {{ $region }}; connect-src * wss: blob: resource:; style-src 'self' 'unsafe-inline' blob: *.{{ $region }} {{ $region }} resource:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: *.{{ $region }} {{ $region }} resource: *.baidu.com *.bdstatic.com; frame-src 'self' *.{{ $region }} {{ $region }} mailto: tel: weixin: mtt: *.baidu.com; frame-ancestors 'self' https://{{ $region }} https://*.{{ $region }}"
                  X-Xss-Protection "1; mode=block"
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/rewrite-target: /$2
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  more_clear_headers "X-Frame-Options:";
                  more_set_headers "Content-Security-Policy: default-src * blob: data: *.{{ $region }} {{ $region }}; img-src * data: blob: resource: *.{{ $region }} {{ $region }}; connect-src * wss: blob: resource:; style-src 'self' 'unsafe-inline' blob: *.{{ $region }} {{ $region }} resource:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: *.{{ $region }} {{ $region }} resource: *.baidu.com *.bdstatic.com; frame-src 'self' *.{{ $region }} {{ $region }} mailto: tel: weixin: mtt: *.baidu.com; frame-ancestors 'self' https://{{ $region }} https://*.{{ $region }}";
                  more_set_headers "X-Xss-Protection: 1; mode=block";
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /()(.*)
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 8080
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: privatebin-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/privatebin/logo.svg"
              name: "PrivateBin"
              type: iframe
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
