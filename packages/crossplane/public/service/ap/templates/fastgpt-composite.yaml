apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-fastgpt-go-templating
  labels:
    template: fastgpt
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: FastGPT
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/fastgpt/logo.png"
    meta.crossplane.io/description: FastGPT is an open-source AI knowledge base and workflow platform with RAG retrieval, model orchestration, MCP access, and plugin extensibility.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/fastgpt/README.md"
    meta.crossplane.io/url: "https://fastgpt.io/"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: fastgpt
        template: fastgpt
        # projectName: my-project
        name: {{ name }}
        input:
          # mcpHost: auto-generated if omitted
          # tokenKey: auto-generated if omitted
          # fileTokenKey: auto-generated if omitted
          # aes256SecretKey: auto-generated if omitted
          # rootKey: auto-generated if omitted
          # pluginToken: auto-generated if omitted
          # aiproxyToken: auto-generated if omitted
          # codeSandboxToken: auto-generated if omitted
          # Root account password (required)
          rootPassword: ""
          # Hosted agent sandbox base URL
          agentSandboxBaseurl: ""
          # Hosted agent sandbox access token
          agentSandboxToken: ""
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-fastgpt
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $mcpHost := $input.mcpHost | default (printf "%s" (randAlphaNum 8)) }}
            {{- $tokenKey := $input.tokenKey | default (printf "%s" (randAlphaNum 32)) }}
            {{- $fileTokenKey := $input.fileTokenKey | default (printf "%s" (randAlphaNum 32)) }}
            {{- $aes256SecretKey := $input.aes256SecretKey | default (printf "%s" (randAlphaNum 32)) }}
            {{- $rootKey := $input.rootKey | default (printf "%s" (randAlphaNum 32)) }}
            {{- $pluginToken := $input.pluginToken | default (printf "%s" (randAlphaNum 32)) }}
            {{- $aiproxyToken := $input.aiproxyToken | default (printf "%s" (randAlphaNum 32)) }}
            {{- $codeSandboxToken := $input.codeSandboxToken | default (printf "%s" (randAlphaNum 32)) }}
            {{- $rootPassword := $input.rootPassword | default "" }}
            {{- $agentSandboxBaseurl := $input.agentSandboxBaseurl | default "" }}
            {{- $agentSandboxToken := $input.agentSandboxToken | default "" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: objectstorage.sealos.io/v1
            kind: ObjectStorageBucket
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-objectstoragebucket
              namespace: {{ $ns }}
              name: {{ $appName }}-public
            spec:
              policy: publicRead
            ---
            apiVersion: objectstorage.sealos.io/v1
            kind: ObjectStorageBucket
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-objectstoragebucket-2
              namespace: {{ $ns }}
              name: {{ $appName }}-private
            spec:
              policy: private
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-serviceaccount
              namespace: {{ $ns }}
              name: {{ $appName }}-mongo
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-role
              namespace: {{ $ns }}
              name: {{ $appName }}-mongo
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-rolebinding
              namespace: {{ $ns }}
              name: {{ $appName }}-mongo
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-mongo
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-mongo
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-cluster
              namespace: {{ $ns }}
              name: {{ $appName }}-mongo
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: mongodb-8.0.4
                app.kubernetes.io/instance: {{ $appName }}-mongo
            spec:
              affinity:
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys:
                  - kubernetes.io/hostname
              componentSpecs:
                - componentDef: mongodb
                  name: mongodb
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-mongo
                  serviceVersion: 8.0.4
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
              terminationPolicy: Delete
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-serviceaccount-2
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-role-2
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-rolebinding-2
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-pg
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-pg
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-cluster-2
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: postgresql-16.4.0
                clusterdefinition.kubeblocks.io/name: postgresql
                clusterversion.kubeblocks.io/name: postgresql-16.4.0
            spec:
              affinity:
                podAntiAffinity: Preferred
                tenancy: SharedNode
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-16.4.0
              componentSpecs:
                - componentDefRef: postgresql
                  disableExporter: true
                  enabledLogs:
                    - running
                  name: postgresql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-pg
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
              terminationPolicy: Delete
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-serviceaccount-3
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-role-3
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-rolebinding-3
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/managed-by: kbcli
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-redis
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-redis
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-cluster-3
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: redis-7.2.7
                app.kubernetes.io/instance: {{ $appName }}-redis
                app.kubernetes.io/version: 7.2.7
                clusterdefinition.kubeblocks.io/name: redis
                clusterversion.kubeblocks.io/name: redis-7.2.7
            spec:
              affinity:
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys:
                  - kubernetes.io/hostname
              clusterDefinitionRef: redis
              componentSpecs:
                - componentDef: redis-7
                  name: redis
                  replicas: 1
                  enabledLogs:
                    - running
                  env:
                    - name: CUSTOM_SENTINEL_MASTER_NAME
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-redis
                  serviceVersion: 7.2.7
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
                - componentDef: redis-sentinel-7
                  name: redis-sentinel
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-redis
                  serviceVersion: 7.2.7
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
              terminationPolicy: Delete
              topology: replication
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-job
              namespace: {{ $ns }}
              name: {{ $appName }}-pg-init
            spec:
              backoffLimit: 3
              ttlSecondsAfterFinished: 300
              template:
                spec:
                  restartPolicy: OnFailure
                  containers:
                    - name: pgsql-init
                      image: postgres:16-alpine
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: PG_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                      command:
                        - /bin/sh
                        - -c
                        - |
                          set -eu
                          for i in $(seq 1 60); do
                            if pg_isready -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d postgres >/dev/null 2>&1; then
                              break
                            fi
                            sleep 2
                          done
                          pg_isready -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d postgres >/dev/null 2>&1
                          if ! psql "postgresql://${PG_USERNAME}:${PG_PASSWORD}@${PG_HOST}:${PG_PORT}/postgres" -tAc "SELECT 1 FROM pg_database WHERE datname='aiproxy'" | grep -q 1; then
                            psql "postgresql://${PG_USERNAME}:${PG_PASSWORD}@${PG_HOST}:${PG_PORT}/postgres" -v ON_ERROR_STOP=1 -c 'CREATE DATABASE "aiproxy";'
                          fi
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                app: {{ $appName }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            data:
              vn-appvn-datavn-configvn-json: |
                {
                  "feConfigs": {
                    "lafEnv": "https://laf.dev",
                    "mcpServerProxyEndpoint": "https://{{ $mcpHost }}.{{ $region }}"
                  },
                  "systemEnv": {
                    "datasetParseMaxProcess": 10,
                    "vectorMaxProcess": 10,
                    "qaMaxProcess": 10,
                    "vlmMaxProcess": 10,
                    "tokenWorkers": 30,
                    "hnswEfSearch": 100,
                    "hnswMaxScanTuples": 100000,
                    "customPdfParse": {
                      "url": "",
                      "key": "",
                      "doc2xKey": "",
                      "textinAppId": "",
                      "textinSecretCode": "",
                      "price": 0
                    }
                  }
                }
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: fastgpt-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: registry.cn-hangzhou.aliyuncs.com/fastgpt/fastgpt:v4.14.10.2
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $appName }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: registry.cn-hangzhou.aliyuncs.com/fastgpt/fastgpt:v4.14.10.2
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: MONGO_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mongo-mongodb-account-root
                              key: username
                        - name: MONGO_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mongo-mongodb-account-root
                              key: password
                        - name: PG_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_HOST
                          value: {{ $appName }}-redis-redis-redis.{{ $ns }}.svc.cluster.local
                        - name: REDIS_PORT
                          value: '6379'
                        - name: S3_ACCESS_KEY_ID
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: accessKey
                        - name: S3_SECRET_ACCESS_KEY
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: secretKey
                        - name: BACKEND_STORAGE_MINIO_EXTERNAL_ENDPOINT
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: external
                        - name: FE_DOMAIN
                          value: https://{{ $host }}
                        - name: ROOT_KEY
                          value: {{ $rootKey }}
                        - name: DEFAULT_ROOT_PSW
                          value: {{ $rootPassword }}
                        - name: DB_MAX_LINK
                          value: '5'
                        - name: SYNC_INDEX
                          value: '1'
                        - name: TOKEN_KEY
                          value: {{ $tokenKey }}
                        - name: FILE_TOKEN_KEY
                          value: {{ $fileTokenKey }}
                        - name: AES256_SECRET_KEY
                          value: {{ $aes256SecretKey }}
                        - name: MULTIPLE_DATA_TO_BASE64
                          value: 'true'
                        - name: MONGODB_URI
                          value: mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@{{ $appName }}-mongo-mongodb.{{ $ns }}.svc:27017/fastgpt?authSource=admin
                        - name: PG_URL
                          value: postgresql://$(PG_USERNAME):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)/postgres
                        - name: REDIS_URL
                          value: redis://default:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)
                        - name: STORAGE_VENDOR
                          value: aws-s3
                        - name: STORAGE_REGION
                          value: us-east-1
                        - name: STORAGE_ACCESS_KEY_ID
                          value: $(S3_ACCESS_KEY_ID)
                        - name: STORAGE_SECRET_ACCESS_KEY
