apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-cap-go-templating
  labels:
    template: cap
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Cap
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/cap/logo.svg"
    meta.crossplane.io/description: Open source alternative to Loom. Record, edit and share videos in seconds.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/cap/README.md"
    meta.crossplane.io/url: "https://github.com/CapSoftware/Cap"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: cap
        template: cap
        # projectName: my-project
        name: {{ name }}
        input:
          # databaseEncryptionKey: auto-generated if omitted
          # nextauthSecret: auto-generated if omitted
          # mediaServerWebhookSecret: auto-generated if omitted
          # Optional Resend API key for sending login emails
          resendApiKey: ""
          # Optional verified Resend sender domain
          resendFromDomain: ""
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-cap
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $databaseEncryptionKey := $input.databaseEncryptionKey | default (printf "%s" (randAlphaNum 64)) }}
            {{- $nextauthSecret := $input.nextauthSecret | default (printf "%s" (randAlphaNum 64)) }}
            {{- $mediaServerWebhookSecret := $input.mediaServerWebhookSecret | default (printf "%s" (randAlphaNum 64)) }}
            {{- $resendApiKey := $input.resendApiKey | default "" }}
            {{- $resendFromDomain := $input.resendFromDomain | default "" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: objectstorage.sealos.io/v1
            kind: ObjectStorageBucket
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cap-objectstoragebucket
              namespace: {{ $ns }}
              name: {{ $appName }}
            spec:
              policy: publicRead
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cap-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cap-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cap-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mysql
                app.kubernetes.io/instance: {{ $appName }}-mysql
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mysql
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-mysql
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-mysql
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: ac-mysql-8.0.30-1
                clusterdefinition.kubeblocks.io/name: apecloud-mysql
                clusterversion.kubeblocks.io/name: ac-mysql-8.0.30-1
                sealos-db-provider-cr: {{ $appName }}-mysql
              annotations: {}
              name: {{ $appName }}-mysql
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys:
                  - kubernetes.io/hostname
              clusterDefinitionRef: apecloud-mysql
              clusterVersionRef: ac-mysql-8.0.30-1
              componentSpecs:
                - componentDefRef: mysql
                  monitor: true
                  name: mysql
                  noCreatePDB: false
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-mysql
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                        storageClassName: openebs-backup
              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cap-job
              namespace: {{ $ns }}
              name: {{ $appName }}-mysql-init
            spec:
              completions: 1
              template:
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: mysql-init
                      image: mysql:8.0.46-debian
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: MYSQL_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: password
                        - name: MYSQL_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: host
                        - name: MYSQL_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: port
                        - name: MYSQL_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: username
                      command:
                        - /bin/bash
                        - -c
                        - |
                          until mysqladmin ping -h "${MYSQL_HOST}" -P "${MYSQL_PORT}" -u "${MYSQL_USER}" -p"${MYSQL_PASSWORD}" --silent; do sleep 2; done
                          mysql -h "${MYSQL_HOST}" -P "${MYSQL_PORT}" -u "${MYSQL_USER}" -p"${MYSQL_PASSWORD}" <<SQL
                          CREATE DATABASE IF NOT EXISTS cap CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
                          ALTER USER '${MYSQL_USER}'@'%' IDENTIFIED WITH mysql_native_password BY '${MYSQL_PASSWORD}';
                          SQL
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cap-deployment
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: ghcr.io/capsoftware/cap-web@sha256:8d2e21251b404e2b15772ded7bbf129cf980e6446102ea9b1326567647891e57
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}
                      image: ghcr.io/capsoftware/cap-web@sha256:8d2e21251b404e2b15772ded7bbf129cf980e6446102ea9b1326567647891e57
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: MYSQL_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: password
                        - name: MYSQL_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: host
                        - name: MYSQL_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: port
                        - name: MYSQL_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mysql-conn-credential
                              key: username
                        - name: S3_ACCESS_KEY_ID
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: accessKey
                        - name: S3_SECRET_ACCESS_KEY
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: secretKey
                        - name: S3_BUCKET
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key-{{ $appName }}-sa-{{ $appName }}
                              key: bucket
                        - name: BACKEND_STORAGE_MINIO_EXTERNAL_ENDPOINT
                          valueFrom:
                            secretKeyRef:
                              name: object-storage-key
                              key: external
                        - name: DATABASE_URL
                          value: 'mysql://$(MYSQL_USER):$(MYSQL_PASSWORD)@$(MYSQL_HOST):$(MYSQL_PORT)/cap?ssl={"rejectUnauthorized":false}'
                        - name: WEB_URL
                          value: https://{{ $host }}
                        - name: NEXTAUTH_URL
                          value: https://{{ $host }}
                        - name: DATABASE_ENCRYPTION_KEY
                          value: {{ $databaseEncryptionKey }}
                        - name: NEXTAUTH_SECRET
                          value: {{ $nextauthSecret }}
                        - name: MEDIA_SERVER_WEBHOOK_SECRET
                          value: {{ $mediaServerWebhookSecret }}
                        - name: CAP_AWS_ACCESS_KEY
                          value: $(S3_ACCESS_KEY_ID)
                        - name: CAP_AWS_SECRET_KEY
                          value: $(S3_SECRET_ACCESS_KEY)
                        - name: CAP_AWS_BUCKET
                          value: $(S3_BUCKET)
                        - name: CAP_AWS_REGION
                          value: us-east-1
                        - name: S3_PUBLIC_ENDPOINT
                          value: https://$(BACKEND_STORAGE_MINIO_EXTERNAL_ENDPOINT)
                        - name: S3_INTERNAL_ENDPOINT
                          value: http://object-storage.objectstorage-system.svc.cluster.local
                        - name: S3_PATH_STYLE
                          value: 'true'
                        - name: RESEND_API_KEY
                          value: {{ $resendApiKey }}
                        - name: RESEND_FROM_DOMAIN
                          value: {{ $resendFromDomain }}
                        - name: MEDIA_SERVER_URL
                          value: http://{{ $appName }}-media-server.{{ $ns }}.svc.cluster.local:3456
                        - name: MEDIA_SERVER_WEBHOOK_URL
                          value: http://{{ $appName }}.{{ $ns }}.svc.cluster.local:3000
                      ports:
                        - containerPort: 3000
                          name: http
                      startupProbe:
                        httpGet:
                          path: /
                          port: 3000
                        periodSeconds: 5
                        timeoutSeconds: 10
                        failureThreshold: 24
                      livenessProbe:
                        httpGet:
                          path: /
                          port: 3000
                        periodSeconds: 30
                        timeoutSeconds: 10
                        failureThreshold: 3
                      readinessProbe:
                        httpGet:
                          path: /
                          port: 3000
                        periodSeconds: 10
                        timeoutSeconds: 5
                        failureThreshold: 3
                      resources:
                        requests:
                          cpu: 100m
                          memory: 256Mi
                        limits:
                          cpu: 1000m
                          memory: 1024Mi
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-media-server
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cap-deployment-2
                originImageName: ghcr.io/capsoftware/cap-media-server@sha256:243b69c5d8b132a425641b6e6ada79c119467cc88a6b9446dd4f8dea6b579fad
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-media-server
                app: {{ $appName }}-media-server
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-media-server
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-media-server
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-media-server
                      image: ghcr.io/capsoftware/cap-media-server@sha256:243b69c5d8b132a425641b6e6ada79c119467cc88a6b9446dd4f8dea6b579fad
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: PORT
                          value: '3456'
                        - name: MEDIA_SERVER_WEBHOOK_SECRET
                          value: {{ $mediaServerWebhookSecret }}
                      ports:
                        - containerPort: 3456
                          name: http
                      startupProbe:
                        httpGet:
                          path: /health
                          port: 3456
                        periodSeconds: 5
                        timeoutSeconds: 5
                        failureThreshold: 12
                      livenessProbe:
                        httpGet:
                          path: /health
                          port: 3456
                        periodSeconds: 30
                        timeoutSeconds: 10
                        failureThreshold: 3
                      readinessProbe:
                        httpGet:
                          path: /health
                          port: 3456
                        periodSeconds: 10
                        timeoutSeconds: 5
                        failureThreshold: 3
                      resources:
                        requests:
                          cpu: 20m
                          memory: 25Mi
                        limits:
                          cpu: 200m
                          memory: 256Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cap-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              ports:
                - name: http
                  port: 3000
                  targetPort: 3000
              selector:
                app: {{ $appName }}
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cap-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-media-server
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-media-server
                app: {{ $appName }}-media-server
            spec:
              ports:
                - name: http
                  port: 3456
                  targetPort: 3456
              selector:
                app: {{ $appName }}-media-server
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cap-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 3000
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cap-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: 'https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/cap/logo.svg'
              name: Cap
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
