                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
                nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: api-{{ $domain }}.{{ $region }}
                  http:
                    paths:
                      - backend:
                          service:
                            name: {{ $appName }}-server
                            port:
                              number: 3000
                        path: /
                        pathType: Prefix
              tls:
                - hosts:
                    - api-{{ $domain }}.{{ $region }}
                  secretName: wildcard-cert
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-minio-console
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-minio
                cloud.sealos.io/app-deploy-manager-domain: minio-{{ $domain }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-ingress-3
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: minio-{{ $domain }}.{{ $region }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}-minio
                            port:
                              number: 9001
              tls:
                - hosts:
                    - minio-{{ $domain }}.{{ $region }}
                  secretName: wildcard-cert
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-minio-api
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-minio
                cloud.sealos.io/app-deploy-manager-domain: oss-{{ $domain }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-ingress-4
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: oss-{{ $domain }}.{{ $region }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}-minio
                            port:
                              number: 9000
              tls:
                - hosts:
                    - oss-{{ $domain }}.{{ $region }}
                  secretName: wildcard-cert
            ---
            # cert issuer
            apiVersion: cert-manager.io/v1
            kind: Issuer
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-issuer
              namespace: {{ $ns }}
              name: laf-issuer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: laf-issuer
            spec:
              acme:
                server: https://acme-v02.api.letsencrypt.org/directory
                email: {{ $appName }}@{{ $domain }}.io
                privateKeySecretRef:
                  name: laf-letsencrypt-prod
                solvers:
                  - http01:
                      ingress:
                        class: nginx
                        serviceType: ClusterIP
            ---
            # shortcut
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $domain }}.{{ $region }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/laf/logo.svg"
              name: {{ $appName }}
              type: iframe
            ---
            # Template usage statistics
            apiVersion: batch/v1
            kind: Job
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-job-3
              namespace: {{ $ns }}
              name: {{ $appName }}-statistics
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                app: {{ $appName }}-statistics
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-statistics
            spec:
              ttlSecondsAfterFinished: 100
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-statistics
                spec:
                  securityContext:
                    runAsNonRoot: false
                    seccompProfile:
                      type: RuntimeDefault
                  restartPolicy: OnFailure
                  volumes: []
                  initContainers:
                    - name: {{ $appName }}-runtime-node
                      image: "docker.io/lafyun/runtime-node:sha-67b3cd6"
                      imagePullPolicy: IfNotPresent
                      securityContext:
                        allowPrivilegeEscalation: false
                        capabilities:
                          drop:
                            - ALL
                      command:
                        - sh
                        - "-c"
                      args:
                        - >-
                          sleep 1
                      volumeMounts: []
                      resources:
                        limits:
                          cpu: 50m
                          memory: 128Mi
                        requests:
                          cpu: 50m
                          memory: 128Mi
                    - name: {{ $appName }}-runtime-node-init
                      image: "docker.io/lafyun/runtime-node-init:sha-67b3cd6"
                      imagePullPolicy: IfNotPresent
                      securityContext:
                        allowPrivilegeEscalation: false
                        capabilities:
                          drop:
                            - ALL
                      command:
                        - sh
                        - "-c"
                      args:
                        - >-
                          sleep 1
                      volumeMounts: []
                      resources:
                        limits:
                          cpu: 50m
                          memory: 128Mi
                        requests:
                          cpu: 50m
                          memory: 128Mi
                  containers:
                    - name: {{ $appName }}-statistics
                      image: "docker.io/library/nginx:latest"
                      imagePullPolicy: IfNotPresent
                      securityContext:
                        allowPrivilegeEscalation: false
                        capabilities:
                          drop:
                            - ALL
                      command:
                        - sh
                        - "-c"
                      args:
                        - >-
                          curl -X POST -H "Content-Type: application/json" -d '{"namespace":
                          "{{ $ns }}", "sealos-domain": "{{ $region }}", "laf-server":"{{ $appName }}-server","laf-domain":"{{ $domain }}"}'
                          https://t0qxj6.laf.run/template-statistics
                      volumeMounts: []
                      resources:
                        limits:
                          cpu: 50m
                          memory: 128Mi
                        requests:
                          cpu: 50m
                          memory: 128Mi
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
