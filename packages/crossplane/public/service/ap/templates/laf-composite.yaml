apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-laf-go-templating
  labels:
    template: laf
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Laf
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/laf/logo.svg"
    meta.crossplane.io/description: Laf 是开源的云开发平台，提供云函数、云数据库、云存储等开箱即用的应用资源。让开发者专注于业务开发，无需折腾服务器，快速释放创意。
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/laf/README.md"
    meta.crossplane.io/url: "https://laf.run/"
    meta.crossplane.io/author: Laf
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: laf
        template: laf
        # projectName: my-project
        name: {{ name }}
        input:
          # exporterJwt: auto-generated if omitted
          # serverJwt: auto-generated if omitted
          # minioPasswd: auto-generated if omitted
          # mongoExpress: auto-generated if omitted
          # Storage size for minio in Gi (required)
          minioStorage: "5"
          # Storage size for Prometheus in Gi (required)
          prometheusStorage: "10"
          # the domain of laf (required)
          domain: "laf-${{ random(8) }}"
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-laf
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $exporterJwt := $input.exporterJwt | default (printf "%s" (randAlphaNum 32)) }}
            {{- $serverJwt := $input.serverJwt | default (printf "%s" (randAlphaNum 32)) }}
            {{- $minioPasswd := $input.minioPasswd | default (printf "%s" (randAlphaNum 24)) }}
            {{- $mongoExpress := $input.mongoExpress | default (printf "%s" (randAlphaNum 24)) }}
            {{- $minioStorage := $input.minioStorage | default "5" }}
            {{- $prometheusStorage := $input.prometheusStorage | default "10" }}
            {{- $domain := $input.domain | default "laf-${{ random(8) }}" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            # mongo sa
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            ---
            # laf sa
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-serviceaccount-2
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-server
              name: {{ $appName }}-sa
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-mongo
                app.kubernetes.io/instance: {{ $appName }}-mongo
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-mongo
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-mongo
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-mongo
            ---
            # laf mongodb
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                kb.io/database: mongodb-8.0.4
                app.kubernetes.io/instance: {{ $appName }}
                helm.sh/chart: mongodb-cluster-0.9.1
                sealos-db-provider-cr: {{ $appName }}-mongo
              annotations: {}
              name: {{ $appName }}-mongo
              generation: 1
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              componentSpecs:
                - componentDef: mongodb
                  serviceVersion: 8.0.4
                  name: mongodb
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 250m
                      memory: 256Mi
                  serviceAccountName: {{ $appName }}-mongo
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 5Gi

              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-role-2
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-server
              name: {{ $appName }}-role
            rules:
              - apiGroups:
                  - "*"
                resources:
                  - "*"
                verbs:
                  - "*"
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-rolebinding-2
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-server
              name: {{ $appName }}-rolebind
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-role
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-sa
            ---
            # laf-server
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-deployment
                gotemplating.fn.crossplane.io/ready: "True"
              namespace: {{ $ns }}
              name: {{ $appName }}-server
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $appName }}-server
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-server
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-server
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-server
                spec:
                  automountServiceAccountToken: true
                  serviceAccountName: {{ $appName }}-sa
                  securityContext: {}
                  containers:
                    - name: {{ $appName }}-server
                      securityContext: {}
                      image: "docker.io/lafyun/laf-server:sha-ef30cd9"
                      imagePullPolicy: IfNotPresent
                      ports:
                        - name: http
                          containerPort: 3000
                          protocol: TCP
                      livenessProbe:
                        httpGet:
                          path: /v1/regions
                          port: http
                      readinessProbe:
                        httpGet:
                          path: /v1/regions
                          port: http
                      resources:
                        limits:
                          cpu: 500m
                          memory: 512Mi
                        requests:
                          cpu: 250m
                          memory: 256Mi
                      env:
                        - name: DISABLED_BILLING_CREATION_TASK
                          value: "true"
                        - name: DISABLED_BILLING_PAYMENT_TASK
                          value: "true"
                        - name: DISABLED_DATABASE_USAGE_CAPTURE_TASK
                          value: "true"
                        - name: DISABLED_DATABASE_USAGE_LIMIT_TASK
                          value: "true"
                        - name: DISABLED_STORAGE_USAGE_CAPTURE_TASK
                          value: "true"
                        - name: DISABLED_STORAGE_USAGE_LIMIT_TASK
                          value: "true"
                        - name: DEFAULT_RUNTIME_IMAGE
                          value: docker.io/lafyun/runtime-node:sha-fbfa762
                        - name: DEFAULT_RUNTIME_INIT_IMAGE
                          value: docker.io/lafyun/runtime-node-init:sha-fbfa762
                        - name: APPID_LENGTH
                          value: 8
                        - name: DEFAULT_REGION_NAMESPACE
                          value: {{ $ns }}
                        - name: DEFAULT_REGION_TLS_ENABLED
                          value: true
                        - name: DEFAULT_REGION_TLS_WILDCARD_CERTIFICATE_SECRET_NAME
                          value: wildcard-cert
                        - name: MONGO_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-mongodb-mongodb-account-root
                              key: password
                        - name: DATABASE_URL
                          value: "mongodb://root:$(MONGO_PASSWORD)@{{ $appName }}-mongo-mongodb.{{ $ns }}.svc:27017/sys_db?authSource=admin&w=majority"
                        - name: JWT_SECRET
                          value: {{ $serverJwt }}
                        - name: API_SERVER_URL
                          value: "https://api-{{ $domain }}.{{ $region }}"
                        - name: JWT_EXPIRES_IN
                          value: "7d"
                        - name: DEFAULT_REGION_DATABASE_URL
                          value: "mongodb://root:$(MONGO_PASSWORD)@{{ $appName }}-mongo-mongodb.{{ $ns }}.svc:27017/sys_db?authSource=admin&w=majority"
                        - name: DEFAULT_REGION_MINIO_DOMAIN
                          value: "oss-{{ $domain }}.{{ $region }}"
                        - name: DEFAULT_REGION_MINIO_EXTERNAL_ENDPOINT
                          value: "https://oss-{{ $domain }}.{{ $region }}"
                        - name: DEFAULT_REGION_MINIO_INTERNAL_ENDPOINT
                          value: "http://{{ $appName }}-minio.{{ $ns }}.svc.cluster.local:9000"
                        - name: DEFAULT_REGION_MINIO_ROOT_ACCESS_KEY
                          value: {{ $minioPasswd }}
                        - name: DEFAULT_REGION_MINIO_ROOT_SECRET_KEY
                          value: {{ $minioPasswd }}
                        - name: DEFAULT_REGION_RUNTIME_DOMAIN
                          value: "{{ $region }}"
                        - name: DEFAULT_REGION_WEBSITE_DOMAIN
                          value: "{{ $region }}"
                        - name: DEFAULT_REGION_PROMETHEUS_URL
                          value: http://prometheus-{{ $appName }}.{{ $ns }}.svc.cluster.local:9090
                        - name: SITE_NAME
                          value: "{{ $domain }}.{{ $region }}"
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-service
              namespace: {{ $ns }}
              name: {{ $appName }}-server
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-server
            spec:
              type: ClusterIP
              ports:
                - port: 3000
                  targetPort: http
                  protocol: TCP
                  name: http
              selector:
                app: {{ $appName }}-server
            ---
            # laf-web
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-deployment-2
              namespace: {{ $ns }}
              name: {{ $appName }}-web
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                app: {{ $appName }}-web
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-web
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-web
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-web
                spec:
                  serviceAccountName: default
                  securityContext: {}
                  containers:
                    - name: {{ $appName }}-web
                      securityContext: {}
                      image: "docker.io/lafyun/laf-web:sha-e9d012d"
                      imagePullPolicy: IfNotPresent
                      ports:
                        - name: http
                          containerPort: 80
                          protocol: TCP
                      livenessProbe:
                        httpGet:
                          path: /
                          port: http
                      readinessProbe:
                        httpGet:
                          path: /
                          port: http
                      resources:
                        limits:
                          cpu: 100m
                          memory: 128Mi
                        requests:
                          cpu: 10m
                          memory: 10Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-service-2
              namespace: {{ $ns }}
              name: {{ $appName }}-web
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-web
            spec:
              type: ClusterIP
              ports:
                - port: 80
                  targetPort: http
                  protocol: TCP
                  name: http
              selector:
                app: {{ $appName }}-web
            ---
            # runtime exporter
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-deployment-3
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-runtime-exporter
                app: {{ $appName }}-runtime-exporter
              name: {{ $appName }}-runtime-exporter
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-runtime-exporter
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-runtime-exporter
                spec:
                  automountServiceAccountToken: true
                  serviceAccountName: {{ $appName }}-sa
                  securityContext: {}
                  containers:
                    - image: docker.io/lafyun/runtime-exporter:sha-2948df9
                      imagePullPolicy: IfNotPresent
                      name: {{ $appName }}-runtime-exporter
                      ports:
                        - name: http
                          containerPort: 2342
                          protocol: TCP
                      livenessProbe:
                        httpGet:
                          path: /healthz
                          port: http
                      readinessProbe:
                        httpGet:
                          path: /healthz
                          port: http
                      resources:
                        limits:
                          cpu: 150m
                          memory: 256Mi
                        requests:
                          cpu: 50m
                          memory: 128Mi
                      env:
                        - name: API_SECRET
                          value: {{ $exporterJwt }}
                        - name: NAMESPACE
                          value: {{ $ns }}
                        - name: DB_NAMESPACE
                          value: {{ $ns }}
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-service-3
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-runtime-exporter
              name: {{ $appName }}-runtime-exporter
            spec:
              ports:
                - name: http
                  port: 2342
                  protocol: TCP
                  targetPort: http
              selector:
                app: {{ $appName }}-runtime-exporter
            ---
            apiVersion: monitoring.coreos.com/v1
            kind: ServiceMonitor
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-servicemonitor
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-runtime-exporter
              name: {{ $appName }}-runtime-exporter
            spec:
              endpoints:
                - interval: 30s
                  path: "/runtime/metrics/{{ $exporterJwt }}"
                  scrapeTimeout: 10s
                  honorLabels: true
                - interval: 30s
                  path: "/database/metrics/{{ $exporterJwt }}"
                  scrapeTimeout: 10s
                  honorLabels: true
              namespaceSelector:
                matchNames:
                  - {{ $ns }}
              selector:
                matchLabels:
                  cloud.sealos.io/app-deploy-manager: {{ $appName }}-runtime-exporter
            ---
            # kubeblock mongodb prometheus
            apiVersion: monitoring.coreos.com/v1
            kind: ServiceMonitor
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-servicemonitor-2
              namespace: {{ $ns }}
              name: {{ $appName }}-laf-mongodb
            spec:
              endpoints:
                - interval: 30s
                  path: /metrics
                  port: http-metrics
              namespaceSelector:
                matchNames:
                  - {{ $ns }}
              selector:
                matchLabels:
                  app.kubernetes.io/name: mongodb
                  apps.kubeblocks.io/component-name: mongodb
            ---
            apiVersion: monitoring.coreos.com/v1
            kind: PrometheusRule
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-prometheusrule
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-runtime-exporter
              name: {{ $appName }}-prometheus-laf-billing.rules
            spec:
              groups:
                - name: {{ $appName }}-prometheus-laf-billing.rules
                  interval: 30s
                  rules:
                    - record: laf:billing:cpu
                      expr: max_over_time(sum by (appid) (laf_runtime_cpu_limit{container!=""})[1h:])
                    - record: laf:billing:memory
                      expr: max_over_time(sum by (appid) (laf_runtime_memory_limit{container!=""})[1h:])
            ---
            ## Prometheus
            apiVersion: monitoring.coreos.com/v1
            kind: Prometheus
            metadata:
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: prometheus-{{ $appName }}
                app: prometheus-{{ $appName }}
              name: {{ $appName }}
            spec:
              podMetadata:
                labels:
                  app: prometheus-{{ $appName }}
              resources:
                limits:
                  cpu: 500m
                  memory: 1024Mi
                requests:
                  cpu: 50m
                  memory: 128Mi
              securityContext:
                fsGroup: 2000
                runAsGroup: 2000
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
              evaluationInterval: 60s
              image: quay.io/prometheus/prometheus:v2.45.0
              serviceMonitorSelector: {}
              probeSelector: {}
              ruleSelector: {}
              portName: http-web
              retention: 5d
              scrapeInterval: 60s
              serviceAccountName: {{ $appName }}-sa
              replicas: 1
              shards: 1
              storage:
                volumeClaimTemplate:
                  metadata:
                    annotations:
                      gotemplating.fn.crossplane.io/composition-resource-name: laf-prometheus
                      path: /prometheus
                      value: " {{ $prometheusStorage }} "
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: {{ $prometheusStorage }}Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-service-4
              namespace: {{ $ns }}
              name: prometheus-{{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: prometheus-{{ $appName }}
            spec:
              ports:
                - port: 9090
                  targetPort: http-web
                  protocol: TCP
                  name: http-web
              selector:
                app: prometheus-{{ $appName }}
              type: ClusterIP
            ---
            # minio prometheus probe
            apiVersion: monitoring.coreos.com/v1
            kind: Probe
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-probe
              namespace: {{ $ns }}
              name: {{ $appName }}-minio
            spec:
              jobName: {{ $appName }}-minio-probe-job
              prober:
                path: /minio/v2/metrics/cluster
                scheme: http
                url: {{ $appName }}-minio.{{ $ns }}:9000
              targets:
                staticConfig:
                  static:
                    - {{ $appName }}-minio.{{ $ns }}
            ---
            #laf minio
            apiVersion: v1
            kind: Secret
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-secret
              namespace: {{ $ns }}
              name: {{ $appName }}-minio-secret
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-minio-secret
            type: Opaque
            stringData:
              rootUser: {{ $minioPasswd }}
              rootPassword: {{ $minioPasswd }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: laf-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}-minio-conf
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-minio-conf
            data:
              initialize: |-
                #!/bin/sh
                set -e ; # Have script exit in the event of a failed command.
                MC_CONFIG_DIR="/etc/minio/mc/"
                MC="/usr/bin/mc --insecure --config-dir ${MC_CONFIG_DIR}"

                # connectToMinio
                # Use a check-sleep-check loop to wait for MinIO service to be available
                connectToMinio() {
                  SCHEME=$1
                  ATTEMPTS=0 ; LIMIT=29 ; # Allow 30 attempts
                  set -e ; # fail if we can't read the keys.
                  ACCESS=$(cat /config/rootUser) ; SECRET=$(cat /config/rootPassword) ;
                  set +e ; # The connections to minio are allowed to fail.
                  echo "Connecting to MinIO server: $SCHEME://$MINIO_ENDPOINT:$MINIO_PORT" ;
                  MC_COMMAND="${MC} alias set myminio $SCHEME://$MINIO_ENDPOINT:$MINIO_PORT $ACCESS $SECRET" ;
                  $MC_COMMAND ;
                  STATUS=$? ;
                  until [ $STATUS = 0 ]
                  do
                    ATTEMPTS=`expr $ATTEMPTS + 1` ;
                    echo \"Failed attempts: $ATTEMPTS\" ;
                    if [ $ATTEMPTS -gt $LIMIT ]; then
                      exit 1 ;
                    fi ;
                    sleep 2 ; # 1 second intervals between attempts
                    $MC_COMMAND ;
                    STATUS=$? ;
                  done ;
                  set -e ; # reset `e` as active
                  return 0
                }

                # checkBucketExists ($bucket)
                # Check if the bucket exists, by using the exit code of `mc ls`
                checkBucketExists() {
                  BUCKET=$1
                  CMD=$(${MC} ls myminio/$BUCKET > /dev/null 2>&1)
                  return $?
                }

                # createBucket ($bucket, $policy, $purge)
                # Ensure bucket exists, purging if asked to
                createBucket() {
                  BUCKET=$1
                  POLICY=$2
                  PURGE=$3
                  VERSIONING=$4
                  OBJECTLOCKING=$5

                  # Purge the bucket, if set & exists
                  # Since PURGE is user input, check explicitly for `true`
                  if [ $PURGE = true ]; then
                    if checkBucketExists $BUCKET ; then
                      echo "Purging bucket '$BUCKET'."
                      set +e ; # don't exit if this fails
                      ${MC} rm -r --force myminio/$BUCKET
                      set -e ; # reset `e` as active
                    else
                      echo "Bucket '$BUCKET' does not exist, skipping purge."
                    fi
                  fi

                # Create the bucket if it does not exist and set objectlocking if enabled (NOTE: versioning will be not changed if OBJECTLOCKING is set because it enables versioning to the Buckets created)
                if ! checkBucketExists $BUCKET ; then
                    if [ ! -z $OBJECTLOCKING ] ; then
                      if [ $OBJECTLOCKING = true ] ; then
                          echo "Creating bucket with OBJECTLOCKING '$BUCKET'"
                          ${MC} mb --with-lock myminio/$BUCKET
                      elif [ $OBJECTLOCKING = false ] ; then
                            echo "Creating bucket '$BUCKET'"
                            ${MC} mb myminio/$BUCKET
                      fi
                  elif [ -z $OBJECTLOCKING ] ; then
                        echo "Creating bucket '$BUCKET'"
                        ${MC} mb myminio/$BUCKET
                  else
                    echo "Bucket '$BUCKET' already exists."
                  fi
                  fi


                  # set versioning for bucket if objectlocking is disabled or not set
                  if [ -z $OBJECTLOCKING ] ; then
                  if [ ! -z $VERSIONING ] ; then
                    if [ $VERSIONING = true ] ; then
                        echo "Enabling versioning for '$BUCKET'"
                        ${MC} version enable myminio/$BUCKET
                    elif [ $VERSIONING = false ] ; then
                        echo "Suspending versioning for '$BUCKET'"
                        ${MC} version suspend myminio/$BUCKET
                    fi
                    fi
                  else
                      echo "Bucket '$BUCKET' versioning unchanged."
                  fi


                  # At this point, the bucket should exist, skip checking for existence
                  # Set policy on the bucket
                  echo "Setting policy of bucket '$BUCKET' to '$POLICY'."
                  ${MC} anonymous set $POLICY myminio/$BUCKET
                }

                # Try connecting to MinIO instance
                scheme=http
                connectToMinio $scheme

              add-user: |-
                #!/bin/sh
                set -e ; # Have script exit in the event of a failed command.
                MC_CONFIG_DIR="/etc/minio/mc/"
                MC="/usr/bin/mc --insecure --config-dir ${MC_CONFIG_DIR}"

                # AccessKey and secretkey credentials file are added to prevent shell execution errors caused by special characters.
                # Special characters for example : ',",<,>,{,}
                MINIO_ACCESSKEY_SECRETKEY_TMP="/tmp/accessKey_and_secretKey_tmp"

                # connectToMinio
                # Use a check-sleep-check loop to wait for MinIO service to be available
                connectToMinio() {
                  SCHEME=$1
                  ATTEMPTS=0 ; LIMIT=29 ; # Allow 30 attempts
                  set -e ; # fail if we can't read the keys.
                  ACCESS=$(cat /config/rootUser) ; SECRET=$(cat /config/rootPassword) ;
                  set +e ; # The connections to minio are allowed to fail.
                  echo "Connecting to MinIO server: $SCHEME://$MINIO_ENDPOINT:$MINIO_PORT" ;
                  MC_COMMAND="${MC} alias set myminio $SCHEME://$MINIO_ENDPOINT:$MINIO_PORT $ACCESS $SECRET" ;
                  $MC_COMMAND ;
                  STATUS=$? ;
                  until [ $STATUS = 0 ]
                  do
                    ATTEMPTS=`expr $ATTEMPTS + 1` ;
                    echo \"Failed attempts: $ATTEMPTS\" ;
                    if [ $ATTEMPTS -gt $LIMIT ]; then
                      exit 1 ;
                    fi ;
                    sleep 2 ; # 1 second intervals between attempts
                    $MC_COMMAND ;
                    STATUS=$? ;
                  done ;
                  set -e ; # reset `e` as active
                  return 0
                }

                # checkUserExists ()
                # Check if the user exists, by using the exit code of `mc admin user info`
                checkUserExists() {
                  CMD=$(${MC} admin user info myminio $(head -1 $MINIO_ACCESSKEY_SECRETKEY_TMP) > /dev/null 2>&1)
                  return $?
                }

                # createUser ($policy)
                createUser() {
                  POLICY=$1
                  #check accessKey_and_secretKey_tmp file
                  if [[ ! -f $MINIO_ACCESSKEY_SECRETKEY_TMP ]];then
                    echo "credentials file does not exist"
                    return 1
                  fi
                  if [[ $(cat $MINIO_ACCESSKEY_SECRETKEY_TMP|wc -l) -ne 2 ]];then
                    echo "credentials file is invalid"
                    rm -f $MINIO_ACCESSKEY_SECRETKEY_TMP
                    return 1
                  fi
                  USER=$(head -1 $MINIO_ACCESSKEY_SECRETKEY_TMP)
                  # Create the user if it does not exist
                  if ! checkUserExists ; then
                    echo "Creating user '$USER'"
                    cat $MINIO_ACCESSKEY_SECRETKEY_TMP | ${MC} admin user add myminio
                  else
                    echo "User '$USER' already exists."
                  fi
                  #clean up credentials files.
                  rm -f $MINIO_ACCESSKEY_SECRETKEY_TMP

                  # set policy for user
                  if [ ! -z $POLICY -a $POLICY != " " ] ; then
                      echo "Adding policy '$POLICY' for '$USER'"
                      ${MC} admin policy set myminio $POLICY user=$USER
                  else
                      echo "User '$USER' has no policy attached."
                  fi
                }

                # Try connecting to MinIO instance
                scheme=http
                connectToMinio $scheme

              add-policy: |-
                #!/bin/sh
                set -e ; # Have script exit in the event of a failed command.
                MC_CONFIG_DIR="/etc/minio/mc/"
                MC="/usr/bin/mc --insecure --config-dir ${MC_CONFIG_DIR}"

                # connectToMinio
                # Use a check-sleep-check loop to wait for MinIO service to be available
                connectToMinio() {
                  SCHEME=$1
                  ATTEMPTS=0 ; LIMIT=29 ; # Allow 30 attempts
                  set -e ; # fail if we can't read the keys.
                  ACCESS=$(cat /config/rootUser) ; SECRET=$(cat /config/rootPassword) ;
                  set +e ; # The connections to minio are allowed to fail.
                  echo "Connecting to MinIO server: $SCHEME://$MINIO_ENDPOINT:$MINIO_PORT" ;
                  MC_COMMAND="${MC} alias set myminio $SCHEME://$MINIO_ENDPOINT:$MINIO_PORT $ACCESS $SECRET" ;
                  $MC_COMMAND ;
                  STATUS=$? ;
                  until [ $STATUS = 0 ]
                  do
                    ATTEMPTS=`expr $ATTEMPTS + 1` ;
                    echo \"Failed attempts: $ATTEMPTS\" ;
                    if [ $ATTEMPTS -gt $LIMIT ]; then
                      exit 1 ;
                    fi ;
                    sleep 2 ; # 1 second intervals between attempts
                    $MC_COMMAND ;
                    STATUS=$? ;
                  done ;
                  set -e ; # reset `e` as active
                  return 0
                }

                # checkPolicyExists ($policy)
                # Check if the policy exists, by using the exit code of `mc admin policy info`
                checkPolicyExists() {
                  POLICY=$1
                  CMD=$(${MC} admin policy info myminio $POLICY > /dev/null 2>&1)
                  return $?
                }

                # createPolicy($name, $filename)
                createPolicy () {
                  NAME=$1
                  FILENAME=$2

                  # Create the name if it does not exist
                  echo "Checking policy: $NAME (in /config/$FILENAME.json)"
                  if ! checkPolicyExists $NAME ; then
                    echo "Creating policy '$NAME'"
                  else
                    echo "Policy '$NAME' already exists."
                  fi
                  ${MC} admin policy add myminio $NAME /config/$FILENAME.json

                }

                # Try connecting to MinIO instance
                scheme=http
                connectToMinio $scheme


                # Create the policies
                createPolicy laf_owner_by_prefix policy_0
                createPolicy laf_owner_readonly_by_prefix policy_1
              # laf_owner_by_prefix
              policy_0.json: |-
                {
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Effect": "Allow",
                      "Action": [
                "s3:GetBucketPolicy",
                "s3:GetObject",
                "s3:ListBucket",
                "s3:ListBucketMultipartUploads",
                "s3:ListMultipartUploadParts",
                "s3:PutObject",
                "s3:DeleteObject",
                "s3:GetBucketLocation"
                      ],
                      "Resource": [
                "arn:aws:s3:::${aws:username}-*"
                      ]
                    }
                  ]
                }

              # laf_owner_readonly_by_prefix
              policy_1.json: |-
                {
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Effect": "Allow",
                      "Action": [
                "s3:GetBucketPolicy",
                "s3:GetObject",
                "s3:ListBucket",
                "s3:ListBucketMultipartUploads",
                "s3:ListMultipartUploadParts",
                "s3:DeleteObject",
                "s3:GetBucketLocation"
                      ],
                      "Resource": [
                "arn:aws:s3:::${aws:username}-*"
                      ]
                    }
                  ]
                }

              custom-command: |-
                #!/bin/sh
                set -e ; # Have script exit in the event of a failed command.
                MC_CONFIG_DIR="/etc/minio/mc/"
                MC="/usr/bin/mc --insecure --config-dir ${MC_CONFIG_DIR}"

                # connectToMinio
                # Use a check-sleep-check loop to wait for MinIO service to be available
                connectToMinio() {
                  SCHEME=$1
                  ATTEMPTS=0 ; LIMIT=29 ; # Allow 30 attempts
                  set -e ; # fail if we can't read the keys.
                  ACCESS=$(cat /config/rootUser) ; SECRET=$(cat /config/rootPassword) ;
                  set +e ; # The connections to minio are allowed to fail.
                  echo "Connecting to MinIO server: $SCHEME://$MINIO_ENDPOINT:$MINIO_PORT" ;
                  MC_COMMAND="${MC} alias set myminio $SCHEME://$MINIO_ENDPOINT:$MINIO_PORT $ACCESS $SECRET" ;
                  $MC_COMMAND ;
                  STATUS=$? ;
                  until [ $STATUS = 0 ]
                  do
                    ATTEMPTS=`expr $ATTEMPTS + 1` ;
                    echo \"Failed attempts: $ATTEMPTS\" ;
                    if [ $ATTEMPTS -gt $LIMIT ]; then
                      exit 1 ;
                    fi ;
                    sleep 2 ; # 1 second intervals between attempts
                    $MC_COMMAND ;
                    STATUS=$? ;
                  done ;
                  set -e ; # reset `e` as active
                  return 0
                }

                # runCommand ($@)
                # Run custom mc command
                runCommand() {
                  ${MC} "$@"
                  return $?
                }

                # Try connecting to MinIO instance
                scheme=http
                connectToMinio $scheme


                # Run custom commands
                runCommand alias ls && ls /config
                runCommand admin user add myminio temp-user abcd123456
                runCommand admin group add myminio laf_owner_by_prefix_group temp-user
                runCommand admin group add myminio laf_owner_readonly_by_prefix_group temp-user
                runCommand admin policy add myminio laf_owner_by_prefix /config/policy_0.json
                runCommand admin policy set myminio laf_owner_by_prefix group=laf_owner_by_prefix_group
                runCommand admin policy add myminio laf_owner_readonly_by_prefix /config/policy_1.json
                runCommand admin policy set myminio laf_owner_readonly_by_prefix group=laf_owner_readonly_by_prefix_group
            ---
