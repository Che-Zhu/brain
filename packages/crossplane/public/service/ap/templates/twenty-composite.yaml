apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-twenty-go-templating
  labels:
    template: twenty
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Twenty
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/twenty/logo.svg"
    meta.crossplane.io/description: Open-source CRM alternative to Salesforce. Customizable views, flexible data management, workflow automation. Built with TypeScript, React, NestJS, PostgreSQL.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/twenty/README.md"
    meta.crossplane.io/url: "https://twenty.com"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: twenty
        template: twenty
        # projectName: my-project
        name: {{ name }}
        input:
          # appSecret: auto-generated if omitted
        resource:
          replicaStrategy:
            type: fixed
            fixed:
              replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-twenty
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $appSecret := $input.appSecret | default (printf "%s" (randAlphaNum 32)) }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-serviceaccount
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-role
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
            rules:
              - apiGroups:
                  - ""
                resources:
                  - events
                verbs:
                  - create
              - apiGroups:
                  - ""
                resources:
                  - configmaps
                verbs:
                  - create
                  - get
                  - list
                  - patch
                  - update
                  - watch
                  - delete
              - apiGroups:
                  - ""
                resources:
                  - endpoints
                verbs:
                  - create
                  - get
                  - list
                  - patch
                  - update
                  - watch
                  - delete
              - apiGroups:
                  - ""
                resources:
                  - pods
                verbs:
                  - get
                  - list
                  - patch
                  - update
                  - watch
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-rolebinding
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-pg
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-pg
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-cluster
              namespace: {{ $ns }}
              name: {{ $appName }}-pg
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-14.8.0
              componentSpecs:
                - componentDefRef: postgresql
                  monitor: true
                  name: postgresql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 1000m
                      memory: 1024Mi
                    requests:
                      cpu: 100m
                      memory: 102Mi
                  serviceAccountName: {{ $appName }}-pg
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 5Gi
              terminationPolicy: Delete
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-job
              namespace: {{ $ns }}
              name: {{ $appName }}-pg-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: pgsql-init
                      image: postgres:14-alpine
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: PG_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: DATABASE_URL
                          value: postgresql://$(PG_USERNAME):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)/postgres
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until psql ${DATABASE_URL} -c 'CREATE DATABASE twenty;' &>/dev/null; do sleep 1; done
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-serviceaccount-2
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-role-2
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
            rules:
              - apiGroups:
                  - ""
                resources:
                  - events
                verbs:
                  - create
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-rolebinding-2
              namespace: {{ $ns }}
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-redis
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-redis
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-redis
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-cluster-2
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              name: {{ $appName }}-redis
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: redis
                kb.io/database: redis-7.2.7
                app.kubernetes.io/instance: {{ $appName }}
                app.kubernetes.io/version: 7.2.7
                helm.sh/chart: redis-cluster-0.9.0
                sealos-db-provider-cr: {{ $appName }}-redis
            spec:
              clusterDefinitionRef: redis
              affinity:
                podAntiAffinity: Preferred
                topologyKeys:
                  - kubernetes.io/hostname
              tolerations:
                - key: kb-data
                  operator: Equal
                  value: "true"
                  effect: NoSchedule
              componentSpecs:
                - name: redis
                  componentDef: redis-7
                  enabledLogs:
                    - running
                  env:
                    - name: CUSTOM_SENTINEL_MASTER_NAME
                  serviceVersion: 7.2.7
                  serviceAccountName: {{ $appName }}-redis
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
                - componentDef: redis-sentinel-7
                  name: redis-sentinel
                  replicas: 1
                  resources:
                    limits:
                      cpu: 100m
                      memory: 100Mi
                    requests:
                      cpu: 10m
                      memory: 10Mi
                  serviceVersion: 7.2.7
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
              terminationPolicy: Delete
              topology: replication
            ---
            apiVersion: v1
            kind: Secret
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-secret
              namespace: {{ $ns }}
              name: {{ $appName }}-secret
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            type: Opaque
            stringData:
              APP_SECRET: {{ $appSecret }}
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: twentycrm/twenty:v1.12.0
                deploy.cloud.sealos.io/minReplicas: "1"
                deploy.cloud.sealos.io/maxReplicas: "1"
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}
              serviceName: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  automountServiceAccountToken: false
                  initContainers:
                    - name: fix-permissions
                      image: busybox:latest
                      imagePullPolicy: IfNotPresent
                      command:
                        - sh
                        - -c
                        - |
                          chown -R 1000:1000 /app/packages/twenty-server/.local-storage
                      volumeMounts:
                        - name: vn-appvn-packagesvn-twentyvn-servervn-vn-localvn-storage
                          mountPath: /app/packages/twenty-server/.local-storage
                  containers:
                    - name: {{ $appName }}
                      image: twentycrm/twenty:v1.12.0
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: PG_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: PG_DATABASE_URL
                          value: postgres://$(PG_USERNAME):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)/twenty
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_HOST
                          value: {{ $appName }}-redis-redis-redis
                        - name: REDIS_PORT
                          value: '6379'
                        - name: REDIS_URL
                          value: redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)
                        - name: NODE_PORT
                          value: "3000"
                        - name: SERVER_URL
                          value: https://{{ $host }}
                        - name: SIGN_IN_PREFILLED
                          value: "false"
                        - name: STORAGE_TYPE
                          value: local
                        - name: ACCESS_TOKEN_EXPIRES_IN
                          value: 7d
                        - name: LOGIN_TOKEN_EXPIRES_IN
                          value: 1h
                        - name: APP_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-secret
                              key: APP_SECRET
                      ports:
                        - containerPort: 3000
                          name: http
                      livenessProbe:
                        httpGet:
                          path: /healthz
                          port: 3000
                          scheme: HTTP
                        initialDelaySeconds: 30
                        periodSeconds: 10
                        timeoutSeconds: 5
                        failureThreshold: 10
                      readinessProbe:
                        httpGet:
                          path: /healthz
                          port: 3000
                          scheme: HTTP
                        initialDelaySeconds: 30
                        periodSeconds: 5
                        timeoutSeconds: 3
                        failureThreshold: 3
                      resources:
                        requests:
                          cpu: 100m
                          memory: 102Mi
                        limits:
                          cpu: 1000m
                          memory: 1024Mi
                      volumeMounts:
                        - name: vn-appvn-packagesvn-twentyvn-servervn-vn-localvn-storage
                          mountPath: /app/packages/twenty-server/.local-storage
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /app/packages/twenty-server/.local-storage
                      value: "0.1"
                    name: vn-appvn-packagesvn-twentyvn-servervn-vn-localvn-storage
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 100Mi
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}-worker
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-deployment
                originImageName: twentycrm/twenty:v1.12.0
                deploy.cloud.sealos.io/minReplicas: "1"
                deploy.cloud.sealos.io/maxReplicas: "1"
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}-worker
                app: {{ $appName }}-worker
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              selector:
                matchLabels:
                  app: {{ $appName }}-worker
              template:
                metadata:
                  labels:
                    app: {{ $appName }}-worker
                spec:
                  automountServiceAccountToken: false
                  containers:
                    - name: {{ $appName }}-worker
                      image: twentycrm/twenty:v1.12.0
                      imagePullPolicy: IfNotPresent
                      command:
                        - yarn
                        - worker:prod
                      env:
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: PG_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: PG_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: PG_USERNAME
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: PG_DATABASE_URL
                          value: postgres://$(PG_USERNAME):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)/twenty
                        - name: REDIS_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-redis-redis-account-default
                              key: password
                        - name: REDIS_HOST
                          value: {{ $appName }}-redis-redis-redis
                        - name: REDIS_PORT
                          value: '6379'
                        - name: REDIS_URL
                          value: redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)
                        - name: SERVER_URL
                          value: https://{{ $host }}
                        - name: DISABLE_DB_MIGRATIONS
                          value: "false"
                        - name: STORAGE_TYPE
                          value: local
                        - name: APP_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-secret
                              key: APP_SECRET
                      resources:
                        requests:
                          cpu: 250m
                          memory: 1024Mi
                        limits:
                          cpu: 1000m
                          memory: 2048Mi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 3000
                  targetPort: 3000
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: "true"
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
                nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
                  more_set_headers "X-Forwarded-For $http_x_forwarded_for";
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 3000
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: twenty-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/twenty/logo.svg"
              name: {{ $appName }}
              type: iframe
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
