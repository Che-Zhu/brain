apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aps-s-pdf-go-templating
  labels:
    template: s-pdf
  annotations:
    meta.crossplane.io/type: template
    meta.crossplane.io/display-name: Stirling-PDF
    meta.crossplane.io/icon-url: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/s-pdf/logo.png"
    meta.crossplane.io/description: 1 Locally hosted web application that allows you to perform various operations on PDF files.
    meta.crossplane.io/readme: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/s-pdf/README.md"
    meta.crossplane.io/url: "https://github.com/Stirling-Tools/Stirling-PDF"
    meta.crossplane.io/author: Sealos
    template/instance: |
      apiVersion: example.crossplane.io/v1
      kind: AP
      metadata:
        name: {{ name }}
        labels:
          region: {{ region }}
      spec:
        crossplane:
          compositionSelector:
            matchLabels:
              template: s-pdf
        template: s-pdf
        # projectName: my-project
        name: {{ name }}
        input:
          # Use PostgreSQL database for production workloads (recommended for better performance and data persistence)
          usePostgresql: "false"
          # download security jar (required as true for auth login)
          dockerEnableSecurity: "false"
          # set to 'true' to enable login
          securityEnablelogin: "false"
          # define custom font libraries to install for use for document conversions
          langs: "en-GB,en-US,zh-CN,zh-TW"
          # download calibre onto stirling-pdf enabling pdf to/from book and advanced html conversion
          installBookAndAdvancedHtmlOps: "true"
          # Set the default language
          systemDefaultlocale: "en-US"
          # Application's visible name
          uiAppname: "Stirling-PDF"
          # Short description or tagline shown on homepage
          uiHomedescription: "Demo site for Stirling-PDF"
          # Name displayed on the navigation bar
          uiAppnamenavbar: "Stirling-PDF"
          # enable Info APIs (`/api/*`) endpoints
          metricsEnabled: "true"
          # allow Google visibility (via robots.txt)
          systemGooglevisibility: "true"
        resource:
          replicas: 1
          requests:
            cpu: "100m"
            memory: "102Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: AP
  mode: Pipeline
  pipeline:
    - step: render-s-pdf
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.spec.name | default .observed.composite.resource.metadata.name }}
            {{- $uid := printf "%s" (index .observed.composite.resource.metadata "uid" | default "") -}}
            {{- $suffix := (replace "-" "" $uid | trunc 4) | default (sha256sum (printf "%s-%s" .observed.composite.resource.metadata.namespace .observed.composite.resource.metadata.name) | trunc 4) }}
            {{- $appName := printf "%s-%s" $name $suffix }}
            {{- $deployId := printf "%s-%s" $name $suffix }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}
            {{- $input := $spec.input | default dict }}
            {{- $resource := $spec.resource | default dict }}
            {{- $apUid := .observed.composite.resource.metadata.uid }}
            {{- $projectName := "" }}
            {{- if hasKey $spec "projectName" }}{{ $projectName = trim (toString $spec.projectName) }}{{ end }}
            {{- $projectObs := getComposedResource . "project-observe" }}
            {{- $projectUid := "" }}
            {{- if and $projectObs $projectObs.status $projectObs.status.atProvider $projectObs.status.atProvider.manifest }}
            {{- $m := $projectObs.status.atProvider.manifest }}
            {{- $meta := index $m "metadata" }}
            {{- if $meta }}
            {{- $uidVal := index $meta "uid" }}
            {{- if $uidVal }}{{ $projectUid = toString $uidVal }}{{ end }}
            {{- end }}
            {{- end }}
            {{- $region := "" }}
            {{- if and .observed.composite.resource.metadata.labels (index .observed.composite.resource.metadata.labels "region") }}
            {{- $region = trim (toString (index .observed.composite.resource.metadata.labels "region")) }}
            {{- end }}
            {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns (default "" $apUid))) | trunc 6 }}
            {{- $computedHost := "" }}
            {{- if ne $region "" }}
            {{- $computedHost = printf "%s-%s.%s" $name $slug $region }}
            {{- end }}
            {{- $host := "" }}
            {{- if ne $region "" }}
            {{- $host = $computedHost }}
            {{- else }}
            {{- if hasKey $input "host" }}{{ $host = trim (toString $input.host) }}{{ end }}
            {{- if eq $host "" }}{{ $host = printf "%s.example.com" $name }}{{ end }}
            {{- end }}
            {{- $appHostSlug := "" }}
            {{- if hasKey $input "appHost" }}{{ $appHostSlug = trim (toString $input.appHost) }}{{ end }}
            {{- if eq $appHostSlug "" }}{{ $appHostSlug = $name }}{{ end }}
            {{- $usePostgresql := $input.usePostgresql | default "false" }}
            {{- $dockerEnableSecurity := $input.dockerEnableSecurity | default "false" }}
            {{- $securityEnablelogin := $input.securityEnablelogin | default "false" }}
            {{- $langs := $input.langs | default "en-GB,en-US,zh-CN,zh-TW" }}
            {{- $installBookAndAdvancedHtmlOps := $input.installBookAndAdvancedHtmlOps | default "true" }}
            {{- $systemDefaultlocale := $input.systemDefaultlocale | default "en-US" }}
            {{- $uiAppname := $input.uiAppname | default "Stirling-PDF" }}
            {{- $uiHomedescription := $input.uiHomedescription | default "Demo site for Stirling-PDF" }}
            {{- $uiAppnamenavbar := $input.uiAppnamenavbar | default "Stirling-PDF" }}
            {{- $metricsEnabled := $input.metricsEnabled | default "true" }}
            {{- $systemGooglevisibility := $input.systemGooglevisibility | default "true" }}
            {{- if ne $projectName "" }}
            ---
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-project-observe" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-observe
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: Project
                  metadata:
                    name: {{ $projectName }}
                    namespace: {{ $ns }}
            {{- end }}
            ---
            {{- if eq $systemDefaultlocale "zh-CN" }}
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: s-pdf-configmap
              namespace: {{ $ns }}
              name: {{ $appName }}
            data:
              vn-etcvn-apkvn-repositories: |-
                https://mirrors.ustc.edu.cn/alpine/v3.20/main
                https://mirrors.ustc.edu.cn/alpine/v3.20/community
                @testing https://mirrors.ustc.edu.cn/alpine/edge/main
                @testing https://mirrors.ustc.edu.cn/alpine/edge/community
                @testing https://mirrors.ustc.edu.cn/alpine/edge/testing
            ${{ endif() }}

            {{- if eq $usePostgresql "true" }}
            ---
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: s-pdf-serviceaccount
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: s-pdf-role
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            rules:
              - apiGroups:
                  - '*'
                resources:
                  - '*'
                verbs:
                  - '*'
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: s-pdf-rolebinding
              namespace: {{ $ns }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                sealos-db-provider-cr: {{ $appName }}-pg
                app.kubernetes.io/instance: {{ $appName }}-pg
                app.kubernetes.io/managed-by: kbcli
              name: {{ $appName }}-pg
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $appName }}-pg
            subjects:
              - kind: ServiceAccount
                name: {{ $appName }}-pg
            ---
            apiVersion: apps.kubeblocks.io/v1alpha1
            kind: Cluster
            metadata:
              namespace: {{ $ns }}
              finalizers:
                - cluster.kubeblocks.io/finalizer
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                clusterdefinition.kubeblocks.io/name: postgresql
                clusterversion.kubeblocks.io/name: postgresql-14.8.0
                sealos-db-provider-cr: {{ $appName }}-pg
              annotations: {}
              name: {{ $appName }}-pg
            spec:
              affinity:
                nodeLabels: {}
                podAntiAffinity: Preferred
                tenancy: SharedNode
                topologyKeys: []
              clusterDefinitionRef: postgresql
              clusterVersionRef: postgresql-14.8.0
              componentSpecs:
                - componentDefRef: postgresql
                  monitor: true
                  name: postgresql
                  replicas: 1
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 50m
                      memory: 51Mi
                  serviceAccountName: {{ $appName }}-pg
                  switchPolicy:
                    type: Noop
                  volumeClaimTemplates:
                    - name: data
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 1Gi
              terminationPolicy: Delete
              tolerations: []
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: s-pdf-job
              namespace: {{ $ns }}
              name: {{ $appName }}-pg-init
            spec:
              completions: 1
              template:
                spec:
                  containers:
                    - name: pgsql-init
                      image: postgres:14-alpine
                      env:
                        - name: PG_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DATABASE_URL
                          value: postgresql://postgres:$(PG_PASSWORD)@{{ $appName }}-pg-postgresql.{{ $ns }}.svc:5432
                      command:
                        - /bin/sh
                        - -c
                        - |
                          until psql ${DATABASE_URL} -c 'CREATE DATABASE stirling_pdf;' &>/dev/null; do sleep 1; done
                  restartPolicy: Never
              backoffLimit: 0
              ttlSecondsAfterFinished: 300
            ${{ endif() }}
            ---
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: s-pdf-statefulset
                gotemplating.fn.crossplane.io/ready: "True"
                originImageName: ghcr.io/stirling-tools/stirling-pdf:1.2.0-fat
                deploy.cloud.sealos.io/minReplicas: '1'
                deploy.cloud.sealos.io/maxReplicas: '1'
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                app: {{ $appName }}
            spec:
              replicas: 1
              revisionHistoryLimit: 1
              minReadySeconds: 10
              serviceName: {{ $appName }}
              selector:
                matchLabels:
                  app: {{ $appName }}
              template:
                metadata:
                  labels:
                    app: {{ $appName }}
                spec:
                  terminationGracePeriodSeconds: 10
                  automountServiceAccountToken: false
                  initContainers:
                    - name: take-data-dir-ownership
                      image: alpine
                      command: ["/bin/sh", "-c", "chown -R 1000:1000 /tmp"]
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-tmp
                          mountPath: /tmp
                  containers:
                    - name: {{ $appName }}
                      image: ghcr.io/stirling-tools/stirling-pdf:1.2.0-fat
                      env:
                        - name: DOCKER_ENABLE_SECURITY
                          value: {{ $dockerEnableSecurity }}
                        - name: SECURITY_ENABLELOGIN
                          value: {{ $securityEnablelogin }}
                        - name: LANGS
                          value: {{ $langs }}
                        - name: INSTALL_BOOK_AND_ADVANCED_HTML_OPS
                          value: {{ $installBookAndAdvancedHtmlOps }}
                        - name: SYSTEM_DEFAULTLOCALE
                          value: {{ $systemDefaultlocale }}
                        - name: UI_APPNAME
                          value: {{ $uiAppname }}
                        - name: UI_HOMEDESCRIPTION
                          value: {{ $uiHomedescription }}
                        - name: UI_APPNAMENAVBAR
                          value: {{ $uiAppnamenavbar }}
                        - name: METRICS_ENABLED
                          value: {{ $metricsEnabled }}
                        - name: SYSTEM_GOOGLEVISIBILITY
                          value: {{ $systemGooglevisibility }}
                        {{- if eq $usePostgresql "true" }}
                        - name: SYSTEM_DATASOURCE_ENABLECUSTOMDATABASE
                          value: 'true'
                        - name: DB_POSTGRESDB_PORT
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: port
                        - name: DB_POSTGRESDB_USER
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: username
                        - name: DB_POSTGRESDB_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: password
                        - name: DB_POSTGRESDB_HOST
                          valueFrom:
                            secretKeyRef:
                              name: {{ $appName }}-pg-conn-credential
                              key: host
                        - name: SYSTEM_DATASOURCE_CUSTOMDATABASEURL
                          value: 'jdbc:postgresql://$(DB_POSTGRESDB_USER):$(DB_POSTGRESDB_PASSWORD)@$(DB_POSTGRESDB_HOST):$(DB_POSTGRESDB_PORT)/stirling_pdf'
                        ${{ endif() }}
                      resources:
                        requests:
                          cpu: 100m
                          memory: 204Mi
                          ephemeral-storage: "200Mi"
                        limits:
                          cpu: 1000m
                          memory: 2048Mi
                          ephemeral-storage: "200Mi"
                      ports:
                        - name: http
                          protocol: TCP
                          containerPort: 8080
                      imagePullPolicy: IfNotPresent
                      volumeMounts:
                        - name: vn-usrvn-sharevn-tessdata
                          mountPath: /usr/share/tessdata
                        - name: vn-configs
                          mountPath: /configs
                        {{- if eq $systemDefaultlocale "zh-CN" }}
                        - name: vn-etcvn-apkvn-repositories
                          mountPath: /etc/apk/repositories
                          subPath: ./etc/apk/repositories
                        ${{ endif() }}
                        - name: vn-customfiles
                          mountPath: /customFiles
                        - name: vn-pipeline
                          mountPath: /pipeline
                        - name: vn-tmp
                          mountPath: /tmp
                      livenessProbe:
                        exec:
                          command:
                          - /bin/sh
                          - -c
                          - curl -f http://localhost:8080/api/v1/info/status | grep -q 'UP'
                        initialDelaySeconds: 20
                        periodSeconds: 10
                        timeoutSeconds: 5
                        failureThreshold: 10
                      readinessProbe:
                        exec:
                          command:
                          - /bin/sh
                          - -c
                          - curl -f http://localhost:8080/api/v1/info/status | grep -q 'UP'
                        initialDelaySeconds: 20
                        periodSeconds: 10
                        timeoutSeconds: 5
                        failureThreshold: 5
                  {{- if eq $systemDefaultlocale "zh-CN" }}
                  volumes:
                    - name: vn-etcvn-apkvn-repositories
                      configMap:
                        name: {{ $appName }}
                        items:
                          - key: vn-etcvn-apkvn-repositories
                            path: ./etc/apk/repositories
                  ${{ endif() }}
              volumeClaimTemplates:
                - metadata:
                    annotations:
                      path: /usr/share/tessdata
                      value: '1'
                    name: vn-usrvn-sharevn-tessdata
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
                - metadata:
                    annotations:
                      path: /configs
                      value: '1'
                    name: vn-configs
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
                - metadata:
                    annotations:
                      path: /customFiles
                      value: '1'
                    name: vn-customfiles
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
                - metadata:
                    annotations:
                      path: /pipeline
                      value: '1'
                    name: vn-pipeline
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
                - metadata:
                    annotations:
                      path: /tmp
                      value: '1'
                    name: vn-tmp
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 1Gi
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: s-pdf-service
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              ports:
                - port: 8080
              selector:
                app: {{ $appName }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                {{ if ne $projectName "" }}
                crossplane.io/project-name: {{ $projectName | quote }}
                {{ end }}
                {{ if and (ne $projectName "") (ne $projectUid "") }}
                crossplane.io/project-uid: {{ $projectUid | quote }}
                {{ end }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
                cloud.sealos.io/app-deploy-manager-domain: {{ $host | replace "." "-" }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: s-pdf-ingress
                kubernetes.io/ingress.class: nginx
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/server-snippet: |
                  client_header_buffer_size 64k;
                  large_client_header_buffers 4 128k;
                nginx.ingress.kubernetes.io/ssl-redirect: 'true'
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/rewrite-target: /$2
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
                nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
                    expires 30d;
                    add_header Cache-Control "public";
                  }
            spec:
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - pathType: Prefix
                        path: /()(.*)
                        backend:
                          service:
                            name: {{ $appName }}
                            port:
                              number: 8080
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: wildcard-cert
            ---
            apiVersion: app.sealos.io/v1
            kind: App
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: s-pdf-app
              namespace: {{ $ns }}
              name: {{ $appName }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $deployId }}
                cloud.sealos.io/app-deploy-manager: {{ $appName }}
            spec:
              data:
                url: https://{{ $host }}
              displayType: normal
              icon: "https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/s-pdf/logo.png"
              name: "Stirling-PDF"
              type: link
            ---
            {{ if and (ne $projectName "") (ne $projectUid "") }}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ printf "%s-ap-project-patch" $name }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ap-project-patch
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              managementPolicies:
                - Observe
                - Create
                - Update
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                manifest:
                  apiVersion: example.crossplane.io/v1
                  kind: AP
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      crossplane.io/project-name: {{ $projectName | quote }}
                      crossplane.io/project-uid: {{ $projectUid | quote }}
                    ownerReferences:
                    - apiVersion: example.crossplane.io/v1
                      kind: Project
                      name: {{ $projectName }}
                      uid: {{ $projectUid }}
            {{ end }}
            {{- if and (ne $projectName "") (ne $projectUid "") }}
            ---
            {{- end }}
            apiVersion: example.crossplane.io/v1
            kind: AP
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
              namespace: {{ $ns }}
            status:
              phase: Ready
              {{ if ne $projectName "" }}
              projectName: {{ $projectName | quote }}
              {{ end }}
              {{ if ne $projectUid "" }}
              projectUid: {{ $projectUid | quote }}
              {{ end }}
