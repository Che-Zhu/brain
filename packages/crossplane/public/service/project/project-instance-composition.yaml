apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: project-instance-go-templating
  annotations:
    meta.crossplane.io/display-name: project → Instance
    meta.crossplane.io/description: >
      Composes one app.sealos.io/v1 Instance from a Project claim: metadata.name and
      metadata.namespace match packages/sealos composeInstanceResource (inline template,
      title, defaults.app_name, cloud.sealos.io/deploy-on-sealos label). Adds labels
      crossplane.io/project-uid and crossplane.io/project-public from the Project composite.
    meta.crossplane.io/template: |
      # Example claim for consumers (UIs, docs) — substitute {{ name }} and {{ namespace }}.
      # Omit spec.crossplane when using the XRD defaultCompositionRef.
      apiVersion: example.crossplane.io/v1
      kind: Project
      metadata:
        name: {{ name }}
        namespace: {{ namespace }}
      spec:
        crossplane:
          compositionRef:
            name: project-instance-go-templating
        public: false
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: Project
  mode: Pipeline
  pipeline:
    - step: render-instance
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $projectUid := .observed.composite.resource.metadata.uid }}
            {{- $spec := default (dict) .observed.composite.resource.spec }}
            {{- $public := false }}
            {{- if hasKey $spec "public" }}
            {{- $public = index $spec "public" }}
            {{- end }}

            ---
            apiVersion: app.sealos.io/v1
            kind: Instance
            metadata:
              name: {{ $name }}
              {{- if ne (trim (toString $ns)) "" }}
              namespace: {{ $ns }}
              {{- end }}
              labels:
                cloud.sealos.io/deploy-on-sealos: {{ $name }}
                {{- if ne (trim (toString $projectUid)) "" }}
                crossplane.io/project-uid: {{ $projectUid }}
                {{- end }}
                crossplane.io/project-public: {{ if $public }}"true"{{ else }}"false"{{ end }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: project-instance
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              templateType: inline
              title: {{ $name | quote }}
              defaults:
                app_name:
                  type: string
                  value: {{ $name | quote }}
