apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: projects.example.crossplane.io
spec:
  scope: Namespaced
  group: example.crossplane.io
  names:
    kind: Project
    plural: projects
  defaultCompositionRef:
    name: project-instance-go-templating
  versions:
    - name: v1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: >
                Instance name is the claim metadata.name (also used for
                cloud.sealos.io/deploy-on-sealos); Instance namespace is metadata.namespace.
                public is copied to the composed Instance as label crossplane.io/project-public.
              properties:
                public:
                  type: boolean
                  default: false
                  description: When true, the project is treated as public (see Instance label crossplane.io/project-public).
              additionalProperties: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
