apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: entrypoints.example.crossplane.io
spec:
  scope: Namespaced
  group: example.crossplane.io
  names:
    kind: EntryPoint
    plural: entrypoints
  defaultCompositionRef:
    name: entrypoints-minimal
  versions:
    - name: v1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                apRef:
                  type: string
                  description: Name of the associated AP resource in the same namespace.
                targets:
                  type: array
                  description: Public endpoints synced from the AP Composition.
                  items:
                    type: object
                    required:
                      - id
                      - port
                      - platformDomain
                    properties:
                      id:
                        type: string
                        description: Stable Platform Address ID.
                      port:
                        type: integer
                        description: Service/container port number.
                      platformDomain:
                        type: string
                        description: Platform-assigned hostname for this public target.
                      status:
                        type: string
                        description: Target status derived from AP phase.
                        enum:
                          - accessible
                          - progressing
                          - inaccessible
                          - unknown
                customDomains:
                  type: array
                  description: Custom Domain Binding tasks derived by the AP Composition.
                  items:
                    type: object
                    required:
                      - id
                      - domain
                      - platformAddressId
                      - targetPort
                      - cnameTarget
                    properties:
                      id:
                        type: string
                        pattern: ^cd_[a-z0-9]{6,32}$
                        description: Stable Custom Domain Binding ID.
                      domain:
                        type: string
                        description: User-owned domain.
                      platformAddressId:
                        type: string
                        pattern: ^pa_[a-z0-9]{6,32}$
                        description: Platform Address ID this Custom Domain binds to.
                      targetPort:
                        type: integer
                        description: Target port this custom domain binds to.
                      cnameTarget:
                        type: string
                        description: Platform Address hostname the Custom Domain CNAME points at.
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: Aggregated public access status.
                  enum:
                    - Accessible
                    - Progressing
                    - Inaccessible
                    - Degraded
                    - Not configured
                targets:
                  type: array
                  description: Observed public targets echoed from spec with resolved status.
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      port:
                        type: integer
                      platformDomain:
                        type: string
                      status:
                        type: string
                customDomains:
                  type: array
                  description: Custom Domain Binding health projected by EntryPoint from DNS submission state, cert-manager, and Ingress configuration.
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        pattern: ^cd_[a-z0-9]{6,32}$
                        description: Stable Custom Domain Binding ID.
                      domain:
                        type: string
                        description: User-owned domain.
                      platformAddressId:
                        type: string
                        pattern: ^pa_[a-z0-9]{6,32}$
                        description: Platform Address ID this Custom Domain binds to.
                      targetPort:
                        type: integer
                        description: Target port this custom domain binds to.
                      cnameTarget:
                        type: string
                        description: Platform Address hostname the Custom Domain CNAME points at.
                      status:
                        type: string
                        description: Top-level Custom Domain Binding health.
                        enum:
                          - pending
                          - verifying
                          - accessible
                          - blocked
                      dns:
                        type: object
                        description: Submit-time DNS verification detail; v1 does not continuously poll DNS after save.
                        properties:
                          status:
                            type: string
                            enum:
                              - pending
                              - verified
                              - unknown
                              - blocked
                          reason:
                            type: string
                          message:
                            type: string
                      certificate:
                        type: object
                        description: Certificate detail projected from cert-manager Certificate Ready conditions.
                        properties:
                          status:
                            type: string
                            enum:
                              - pending
                              - ready
                              - failed
                              - unknown
                          reason:
                            type: string
                          message:
                            type: string
                      routing:
                        type: object
                        description: Routing detail projected from the Custom Domain Ingress configuration.
                        properties:
                          status:
                            type: string
                            enum:
                              - pending
                              - configured
                              - blocked
                          reason:
                            type: string
                          message:
                            type: string
