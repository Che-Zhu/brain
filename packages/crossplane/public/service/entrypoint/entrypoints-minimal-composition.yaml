apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: entrypoints-minimal
  annotations:
    meta.crossplane.io/display-name: entrypoint
    meta.crossplane.io/description: Public access entry point status aggregation for AP targets.
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: EntryPoint
  mode: Pipeline
  pipeline:
    - step: echo-status
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $ns := .observed.composite.resource.metadata.namespace }}
            {{- $entryPointUid := .observed.composite.resource.metadata.uid }}
            {{- $apRef := $name }}
            {{- if hasKey $spec "apRef" }}
            {{- $apRef = trim (toString $spec.apRef) }}
            {{- end }}
            {{- if eq $apRef "" }}{{ $apRef = $name }}{{ end }}
            {{- $serviceName := printf "%s-service" $apRef }}
            {{- $targets := default (list) $spec.targets }}
            {{- $customDomains := list }}
            {{- if hasKey $spec "customDomains" }}
            {{-   range $spec.customDomains }}
            {{-     $id := "" }}
            {{-     if hasKey . "id" }}{{ $id = trim (toString .id) }}{{ end }}
            {{-     $domain := "" }}
            {{-     if hasKey . "domain" }}{{ $domain = lower (trim (toString .domain)) }}{{ end }}
            {{-     $platformAddressID := "" }}
            {{-     if hasKey . "platformAddressId" }}{{ $platformAddressID = trim (toString .platformAddressId) }}{{ end }}
            {{-     $targetPort := 0 }}
            {{-     if hasKey . "targetPort" }}{{ $targetPort = int .targetPort }}{{ end }}
            {{-     $cnameTarget := "" }}
            {{-     if hasKey . "cnameTarget" }}{{ $cnameTarget = lower (trim (toString .cnameTarget)) }}{{ end }}
            {{-     if and (regexMatch "^cd_[a-z0-9]{6,32}$" $id) (ne $domain "") (regexMatch "^pa_[a-z0-9]{6,32}$" $platformAddressID) (gt $targetPort 0) (ne $cnameTarget "") }}
            {{-       $safeID := replace "_" "-" $id }}
            {{-       $resourceName := lower (printf "%s-%s" $name $safeID) }}
            {{-       $resourceName = regexReplaceAll "[^a-z0-9-]+" $resourceName "-" }}
            {{-       $resourceName = trimAll "-" $resourceName }}
            {{-       if eq $resourceName "" }}{{ $resourceName = $safeID }}{{ end }}
            {{-       $resourceName = trunc 59 $resourceName | trimSuffix "-" }}
            {{-       $secretName := printf "%s-tls" $resourceName }}
            {{-       $customDomains = concat $customDomains (list (dict
                        "id" $id
                        "domain" $domain
                        "platformAddressId" $platformAddressID
                        "targetPort" $targetPort
                        "cnameTarget" $cnameTarget
                        "safeID" $safeID
                        "resourceName" $resourceName
                        "secretName" $secretName
                      )) }}
            {{-     end }}
            {{-   end }}
            {{- end }}
            {{- range $customDomains }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: {{ .resourceName }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "custom-domain-ingress-%s" .safeID | quote }}
                gotemplating.fn.crossplane.io/ready: "True"
                nginx.ingress.kubernetes.io/proxy-body-size: 32m
                nginx.ingress.kubernetes.io/ssl-redirect: "true"
                nginx.ingress.kubernetes.io/backend-protocol: HTTP
                nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
                nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
                nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: EntryPoint
                name: {{ $name }}
                uid: {{ $entryPointUid }}
            spec:
              ingressClassName: nginx
              rules:
              - host: {{ .domain }}
                http:
                  paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: {{ $serviceName }}
                        port:
                          number: {{ .targetPort }}
              tls:
              - hosts:
                - {{ .domain }}
                secretName: {{ .secretName }}
            ---
            apiVersion: cert-manager.io/v1
            kind: Issuer
            metadata:
              name: {{ .resourceName }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "custom-domain-issuer-%s" .safeID | quote }}
                gotemplating.fn.crossplane.io/ready: "True"
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: EntryPoint
                name: {{ $name }}
                uid: {{ $entryPointUid }}
            spec:
              acme:
                server: https://acme-v02.api.letsencrypt.org/directory
                email: {{ printf "admin@%s" .domain | quote }}
                privateKeySecretRef:
                  name: {{ printf "%s-issuer-account" .resourceName }}
                solvers:
                - http01:
                    ingress:
                      class: nginx
                      serviceType: ClusterIP
            ---
            apiVersion: cert-manager.io/v1
            kind: Certificate
            metadata:
              name: {{ .resourceName }}
              namespace: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "custom-domain-certificate-%s" .safeID | quote }}
                gotemplating.fn.crossplane.io/ready: "True"
              ownerReferences:
              - apiVersion: example.crossplane.io/v1
                kind: EntryPoint
                name: {{ $name }}
                uid: {{ $entryPointUid }}
            spec:
              secretName: {{ .secretName }}
              dnsNames:
              - {{ .domain }}
              issuerRef:
                name: {{ .resourceName }}
                kind: Issuer
                group: cert-manager.io
            {{- end }}
            {{- $customDomainStatuses := list }}
            {{- range $customDomains }}
            {{-   $binding := . }}
            {{-   $dnsStatus := "verified" }}
            {{-   $dnsReason := "SubmitVerified" }}
            {{-   $dnsMessage := printf "CNAME for %s was verified against %s before save." $binding.domain $binding.cnameTarget }}
            {{-   $certificateStatus := "pending" }}
            {{-   $certificateReason := "CertificatePending" }}
            {{-   $certificateMessage := "Certificate resource has not been observed yet." }}
            {{-   $certObs := getComposedResource $ (printf "custom-domain-certificate-%s" $binding.safeID) }}
            {{-   if $certObs }}
            {{-     $certificateStatus = "unknown" }}
            {{-     $certificateReason = "ReadyConditionMissing" }}
            {{-     $certificateMessage = "cert-manager has not reported a Ready condition yet." }}
            {{-     if and $certObs.status $certObs.status.conditions }}
            {{-       range $condition := $certObs.status.conditions }}
            {{-         if eq $condition.type "Ready" }}
            {{-           $conditionStatus := toString ($condition.status | default "") }}
            {{-           if eq $conditionStatus "True" }}
            {{-             $certificateStatus = "ready" }}
            {{-           else if eq $conditionStatus "False" }}
            {{-             $certificateStatus = "failed" }}
            {{-           else }}
            {{-             $certificateStatus = "pending" }}
            {{-           end }}
            {{-           $certificateReason = default $certificateReason $condition.reason }}
            {{-           $certificateMessage = default $certificateMessage $condition.message }}
            {{-         end }}
            {{-       end }}
            {{-     end }}
            {{-   end }}
            {{-   $routingStatus := "pending" }}
            {{-   $routingReason := "IngressPending" }}
            {{-   $routingMessage := "Custom Domain Ingress has not been observed yet." }}
            {{-   $ingObs := getComposedResource $ (printf "custom-domain-ingress-%s" $binding.safeID) }}
            {{-   if $ingObs }}
            {{-     $ruleConfigured := false }}
            {{-     $tlsConfigured := false }}
            {{-     if and $ingObs.spec $ingObs.spec.rules }}
            {{-       range $rule := $ingObs.spec.rules }}
            {{-         if eq (toString ($rule.host | default "")) $binding.domain }}
            {{-           if and $rule.http $rule.http.paths }}
            {{-             range $path := $rule.http.paths }}
            {{-               if and $path.backend $path.backend.service }}
            {{-                 $backendService := $path.backend.service }}
            {{-                 $backendName := toString ($backendService.name | default "") }}
            {{-                 $backendPort := 0 }}
            {{-                 if and $backendService.port (hasKey $backendService.port "number") }}{{ $backendPort = int $backendService.port.number }}{{ end }}
            {{-                 if and (eq $backendName $serviceName) (eq $backendPort $binding.targetPort) }}
            {{-                   $ruleConfigured = true }}
            {{-                 end }}
            {{-               end }}
            {{-             end }}
            {{-           end }}
            {{-         end }}
            {{-       end }}
            {{-     end }}
            {{-     if and $ingObs.spec $ingObs.spec.tls }}
            {{-       range $tls := $ingObs.spec.tls }}
            {{-         $secretMatches := eq (toString ($tls.secretName | default "")) $binding.secretName }}
            {{-         $hostMatches := false }}
            {{-         if $tls.hosts }}
            {{-           range $host := $tls.hosts }}
            {{-             if eq (toString $host) $binding.domain }}{{ $hostMatches = true }}{{ end }}
            {{-           end }}
            {{-         end }}
            {{-         if and $secretMatches $hostMatches }}{{ $tlsConfigured = true }}{{ end }}
            {{-       end }}
            {{-     end }}
            {{-     if and $ruleConfigured $tlsConfigured }}
            {{-       $routingStatus = "configured" }}
            {{-       $routingReason = "IngressConfigured" }}
            {{-       $routingMessage = "Custom Domain Ingress routes this host to the requested AP service port." }}
            {{-     else }}
            {{-       $routingStatus = "blocked" }}
            {{-       $routingReason = "IngressMisconfigured" }}
            {{-       $routingMessage = "Custom Domain Ingress does not match the binding host, TLS secret, service, or target port." }}
            {{-     end }}
            {{-   end }}
            {{-   $bindingStatus := "pending" }}
            {{-   if or (eq $certificateStatus "failed") (eq $routingStatus "blocked") }}
            {{-     $bindingStatus = "blocked" }}
            {{-   else if and (eq $certificateStatus "ready") (eq $routingStatus "configured") }}
            {{-     $bindingStatus = "accessible" }}
            {{-   else if and (eq $dnsStatus "verified") (eq $routingStatus "configured") }}
            {{-     $bindingStatus = "verifying" }}
            {{-   end }}
            {{-   $customDomainStatuses = concat $customDomainStatuses (list (dict
                    "id" $binding.id
                    "domain" $binding.domain
                    "platformAddressId" $binding.platformAddressId
                    "targetPort" $binding.targetPort
                    "cnameTarget" $binding.cnameTarget
                    "status" $bindingStatus
                    "dnsStatus" $dnsStatus
                    "dnsReason" $dnsReason
                    "dnsMessage" $dnsMessage
                    "certificateStatus" $certificateStatus
                    "certificateReason" $certificateReason
                    "certificateMessage" $certificateMessage
                    "routingStatus" $routingStatus
                    "routingReason" $routingReason
                    "routingMessage" $routingMessage
                  )) }}
            {{- end }}
            {{- $phase := "Not configured" }}
            {{- if or (gt (len $targets) 0) (gt (len $customDomainStatuses) 0) }}
            {{-   $allOk := true }}
            {{-   $anyFail := false }}
            {{-   $anyProg := false }}
            {{-   range $targets }}
            {{-     $s := lower (default "unknown" .status) }}
            {{-     if ne $s "accessible" }}{{ $allOk = false }}{{ end }}
            {{-     if or (eq $s "inaccessible") (eq $s "failed") (eq $s "error") }}{{ $anyFail = true }}{{ end }}
            {{-     if or (eq $s "progressing") (eq $s "creating") (eq $s "pending") }}{{ $anyProg = true }}{{ end }}
            {{-   end }}
            {{-   range $customDomainStatuses }}
            {{-     $s := lower (default "pending" .status) }}
            {{-     if ne $s "accessible" }}{{ $allOk = false }}{{ end }}
            {{-     if eq $s "blocked" }}{{ $anyFail = true }}{{ end }}
            {{-     if or (eq $s "pending") (eq $s "verifying") }}{{ $anyProg = true }}{{ end }}
            {{-   end }}
            {{- if $allOk }}{{ $phase = "Accessible" }}
            {{- else if $anyFail }}{{ $phase = "Inaccessible" }}
            {{- else if $anyProg }}{{ $phase = "Progressing" }}
            {{- else }}{{ $phase = "Degraded" }}
            {{- end }}
            {{- end }}
            ---
            apiVersion: example.crossplane.io/v1
            kind: EntryPoint
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
            status:
              phase: {{ $phase | quote }}
              {{- if gt (len $targets) 0 }}
              targets:
                {{ range $targets }}
                - id: {{ .id | quote }}
                  port: {{ .port }}
                  platformDomain: {{ .platformDomain | quote }}
                  status: {{ default "unknown" .status | quote }}
                {{ end }}
              {{- end }}
              {{- if gt (len $customDomainStatuses) 0 }}
              customDomains:
                {{ range $customDomainStatuses }}
                - id: {{ .id | quote }}
                  domain: {{ .domain | quote }}
                  platformAddressId: {{ .platformAddressId | quote }}
                  targetPort: {{ .targetPort }}
                  cnameTarget: {{ .cnameTarget | quote }}
                  status: {{ .status | quote }}
                  dns:
                    status: {{ .dnsStatus | quote }}
                    reason: {{ .dnsReason | quote }}
                    message: {{ .dnsMessage | quote }}
                  certificate:
                    status: {{ .certificateStatus | quote }}
                    reason: {{ .certificateReason | quote }}
                    message: {{ .certificateMessage | quote }}
                  routing:
                    status: {{ .routingStatus | quote }}
                    reason: {{ .routingReason | quote }}
                    message: {{ .routingMessage | quote }}
                {{ end }}
              {{- end }}
