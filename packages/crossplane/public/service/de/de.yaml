apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: des.example.crossplane.io
spec:
  scope: Namespaced
  group: example.crossplane.io
  names:
    kind: DE
    plural: des
  defaultCompositionRef:
    name: des-nodejs-composition
  versions:
  - name: v1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          metadata:
            type: object
            description: >
              Claim metadata. Set metadata.labels.region to a DNS zone or suffix (e.g. 192.168.12.53.nip.io).
              When spec.endpoints[].host is omitted, the composition generates hostnames from the claim name,
              this label, and a stable slug (see spec.endpoints).
            properties:
              labels:
                type: object
                additionalProperties:
                  type: string
                description: Optional region label for URL composition (see metadata description).
          spec:
            type: object
            properties:
              compositionRef:
                type: object
                description: >
                  Select which Composition to use, e.g. des-nodejs-composition, des-python312-composition,
                  des-go122-composition, des-nextjs142-composition (defaults match runtime images in each Composition).
                properties:
                  name:
                    type: string
              compositionSelector:
                type: object
                description: >
                  Select Composition by labels (e.g. matchLabels.runtime: python-3.12 on Composition
                  des-python312-composition).
                properties:
                  matchLabels:
                    type: object
                    additionalProperties:
                      type: string
              crossplane:
                type: object
                description: Crossplane control fields.
                properties:
                  compositionRef:
                    type: object
                    properties:
                      name:
                        type: string
                  compositionSelector:
                    type: object
                    properties:
                      matchLabels:
                        type: object
                        additionalProperties:
                          type: string
              runtime:
                type: string
                default: node.js
                description: >
                  Hint for clients (node.js, python-3.12, go-1.22.5, next.js-14.2.5). Select the matching
                  Composition via spec.crossplane.compositionRef.name or compositionSelector.
              templateID:
                type: string
                description: Devbox template ID.
              image:
                type: string
                description: Runtime image for the Devbox.
              endpoints:
                type: array
                description: >
                  **All** container ports to expose: one ClusterIP Service per unique port and one Ingress rule
                  per entry when a hostname is available. List ports only, or set host on an entry to override.
                  Empty array means no Service or Ingress; set spec.config.appPorts if the Devbox still needs
                  those ports internally. Omit spec.config.appPorts to derive app ports from this list (unique ports).
                  **Automatic hosts:** when metadata.labels.region is set and an entry omits host, the composition
                  sets host to {metadata.name}-{slug}.{region} for a single endpoint, or
                  {metadata.name}-p{port}-{slug}.{region} when multiple ports are listed (slug is a short hash of
                  name, namespace, uid) so each hostname stays unique. If region is omitted, set host on each
                  entry that should appear on Ingress.
                items:
                  type: object
                  required: [port]
                  properties:
                    port:
                      type: integer
                      description: Service port, Ingress backend port, and Devbox target port for this row.
                    host:
                      type: string
                      description: >
                        Optional Ingress hostname for this row. When omitted and metadata.labels.region is set,
                        host is generated as documented above. When set, this value is used as-is.
              ingressName:
                type: string
                description: Name of composed Ingress. Defaults to {metadata.name}-ingress.
              tlsSecretName:
                type: string
                default: wildcard-cert
                description: TLS secret name used by Ingress.
              ingressAnnotations:
                type: object
                additionalProperties:
                  type: string
                description: Additional ingress annotations merged with defaults.
              network:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                properties:
                  type:
                    type: string
                    default: SSHGate
                  extraPorts:
                    type: array
                    items:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                      properties:
                        containerPort:
                          type: integer
              resource:
                type: object
                properties:
                  cpu:
                    type: string
                    default: "2000m"
                  memory:
                    type: string
                    default: "4096Mi"
              config:
                type: object
                description: Devbox config payload.
                properties:
                  appPorts:
                    type: array
                    description: >
                      Optional override for Devbox listener ports. If omitted, the composition builds appPorts from
                      spec.endpoints (unique ports), or from composition defaults when spec.endpoints is empty.
                      When both are set, keep ports aligned with spec.endpoints.
                    items:
                      type: object
                      properties:
                        port:
                          type: integer
                        name:
                          type: string
                        protocol:
                          type: string
                        targetPort:
                          type: integer
                  ports:
                    type: array
                    items:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  releaseArgs:
                    type: array
                    items:
                      type: string
                  releaseCommand:
                    type: array
                    items:
                      type: string
                  user:
                    type: string
                  workingDir:
                    type: string
              state:
                type: string
                default: Running
              runtimeClassName:
                type: string
                default: devbox-runtime
              storageLimit:
                type: string
                default: 10Gi
              tolerations:
                type: array
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              affinity:
                type: object
                x-kubernetes-preserve-unknown-fields: true
            required:
            - templateID
            - image
            - endpoints
          status:
            type: object
            properties:
              phase:
                type: string
              host:
                type: string
              hosts:
                type: array
                items:
                  type: string
                description: Resolved Ingress hosts (after region substitution when applicable).
              serviceName:
                type: string
                description: First derived backend Service name (same order as spec.endpoints), for convenience.
              serviceNames:
                type: array
                items:
                  type: string
                description: >
                  All ClusterIP Service names derived from spec.endpoints ({metadata.name}-service-port-{port},
                  unique by port).
              ingressName:
                type: string
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type: { type: string }
                    status: { type: string }
                    reason: { type: string }
                    message: { type: string }
                    lastTransitionTime: { type: string }
