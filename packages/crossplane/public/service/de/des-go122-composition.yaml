apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: des-go122-composition
  labels:
    runtime: go-1.22.5
  annotations:
    meta.crossplane.io/display-name: dev env (Go 1.22.5)
    meta.crossplane.io/description: Devbox Go 1.22.5 with Service and optional Ingress (same pipeline as other DE compositions).
    meta.crossplane.io/template: |
      # Example claim — list ports under spec.endpoints; hosts are optional when metadata.labels.region is set.
      # Auto host: one port -> NAME-SLUG.region; multiple ports -> NAME-p<port>-SLUG.region each (SLUG = short hash).
      # Derived: Services NAME-service-port-<port>, Ingress NAME-ingress (rules + TLS for those hosts).
      apiVersion: example.crossplane.io/v1
      kind: DE
      metadata:
        name: de-go122
        namespace: default
        labels:
          region: 192.168.12.53.nip.io
      spec:
        crossplane:
          compositionRef:
            name: des-go122-composition
        runtime: go-1.22.5
        templateID: 13e968c2-886b-42ca-b14c-f3c2b3d0b2da
        image: ghcr.io/labring-actions/devbox/go-1.22.5:v0.2.2
        endpoints:
          - port: 8080
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1
    kind: DE
  mode: Pipeline
  pipeline:
  - step: render-devbox-service-ingress
    functionRef:
      name: crossplane-contrib-function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $spec := .observed.composite.resource.spec }}
          {{- $meta := .observed.composite.resource.metadata }}
          {{- $cfg := $spec.config | default dict }}
          {{- $net := $spec.network | default dict }}
          {{- $res := $spec.resource | default dict }}
          {{- $name := $meta.name }}
          {{- $ns := $meta.namespace }}
          {{- $region := "" }}
          {{- if and $meta.labels (index $meta.labels "region") }}
          {{- $region = trim (toString (index $meta.labels "region")) }}
          {{- end }}
          {{- $uid := default "" $meta.uid }}
          {{- $slug := (sha256sum (printf "%s|%s|%s" $name $ns $uid)) | trunc 6 }}
          {{- $ingressName := $spec.ingressName | default (printf "%s-ingress" $name) }}
          {{- $tlsSecret := $spec.tlsSecretName | default "wildcard-cert" }}
          {{- $devbox := getComposedResource . "de-devbox" }}
          {{- $phase := "Unknown" }}
          {{- if and $devbox $devbox.status $devbox.status.phase }}{{- $phase = $devbox.status.phase }}{{- end }}
          {{- $now := now | date "2006-01-02T15:04:05Z07:00" }}
          {{- $defaultApp := list (dict "port" 8080 "name" "http-8080" "protocol" "TCP" "targetPort" 8080) }}
          {{- $epsRaw := default (list) $spec.endpoints }}
          {{- $epCount := len $epsRaw }}
          {{- $hasEndpoints := gt (len $epsRaw) 0 }}
          {{- $noExpose := not $hasEndpoints }}
          {{- $endpointList := list }}
          {{- if $hasEndpoints }}
          {{- range $epsRaw }}
          {{- $h := "" }}
          {{- if hasKey . "host" }}
          {{- $h = trim (toString .host) }}
          {{- end }}
          {{- if ne $region "" }}
          {{- if eq $h "" }}
          {{- if gt $epCount 1 }}
          {{- $h = printf "%s-p%d-%s.%s" $name .port $slug $region }}
          {{- else }}
          {{- $h = printf "%s-%s.%s" $name $slug $region }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- $endpointList = append $endpointList (dict "port" .port "host" $h) }}
          {{- end }}
          {{- end }}
          {{- $appPorts := $cfg.appPorts }}
          {{- if not $appPorts }}
          {{- if $hasEndpoints }}
          {{- $appPorts = list }}
          {{- $portsSeenAp := dict }}
          {{- range $endpointList }}
          {{- $portKey := printf "p%d" .port }}
          {{- if not (index $portsSeenAp $portKey) }}
          {{- $_ := set $portsSeenAp $portKey 1 }}
          {{- $appPorts = concat $appPorts (list (dict "port" .port "name" (printf "http-%d" .port) "protocol" "TCP" "targetPort" .port)) }}
          {{- end }}
          {{- end }}
          {{- else }}
          {{- $appPorts = $defaultApp }}
          {{- end }}
          {{- end }}
          {{- $extraPortsDefault := list }}
          {{- range $appPorts }}
          {{- $cp := .targetPort | default .port }}
          {{- $extraPortsDefault = append $extraPortsDefault (dict "containerPort" $cp) }}
          {{- end }}
          {{- $hasIngress := false }}
          {{- range $endpointList }}
          {{- if ne (trim (toString .host)) "" }}
          {{- $hasIngress = true }}
          {{- end }}
          {{- end }}
          {{- $statusHosts := list }}
          {{- range $endpointList }}
          {{- if ne (trim (toString .host)) "" }}
          {{- $statusHosts = append $statusHosts .host }}
          {{- end }}
          {{- end }}
          {{- $statusHost := "" }}
          {{- if gt (len $statusHosts) 0 }}
          {{- $statusHost = index $statusHosts 0 }}
          {{- end }}
          {{- $serviceNames := list }}
          {{- $seenSn := dict }}
          {{- range $endpointList }}
          {{- $pk := printf "p%d" .port }}
          {{- if not (index $seenSn $pk) }}
          {{- $_ := set $seenSn $pk 1 }}
          {{- $serviceNames = append $serviceNames (printf "%s-service-port-%d" $name .port) }}
          {{- end }}
          {{- end }}
          {{- $statusServiceName := "" }}
          {{- if gt (len $serviceNames) 0 }}
          {{- $statusServiceName = index $serviceNames 0 }}
          {{- end }}
          ---
          apiVersion: devbox.sealos.io/v1alpha2
          kind: Devbox
          metadata:
            name: {{ $name }}
            namespace: {{ $ns }}
            labels:
              crossplane.io/composite: {{ $name }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: de-devbox
          spec:
            network:
              type: {{ $net.type | default "SSHGate" }}
              extraPorts:
                {{- range ($net.extraPorts | default $extraPortsDefault) }}
                - containerPort: {{ .containerPort }}
                {{- end }}
            resource:
              cpu: {{ $res.cpu | default "2000m" }}
              memory: {{ $res.memory | default "4096Mi" }}
            templateID: {{ $spec.templateID | quote }}
            image: {{ $spec.image | quote }}
            config:
              appPorts:
                {{- range $appPorts }}
                - port: {{ .port }}
                  name: {{ .name | quote }}
                  protocol: {{ .protocol | default "TCP" }}
                  targetPort: {{ .targetPort | default .port }}
                {{- end }}
              ports:
                {{- range ($cfg.ports | default (list (dict "containerPort" 22 "name" "devbox-ssh-port" "protocol" "TCP"))) }}
                - containerPort: {{ .containerPort }}
                  name: {{ .name | quote }}
                  protocol: {{ .protocol | default "TCP" }}
                {{- end }}
              releaseArgs:
                {{- range ($cfg.releaseArgs | default (list "/home/devbox/project/entrypoint.sh prod")) }}
                - {{ . | quote }}
                {{- end }}
              releaseCommand:
                {{- range ($cfg.releaseCommand | default (list "/bin/bash" "-c")) }}
                - {{ . | quote }}
                {{- end }}
              user: {{ $cfg.user | default "devbox" | quote }}
              workingDir: {{ $cfg.workingDir | default "/home/devbox/project" | quote }}
            state: {{ $spec.state | default "Running" }}
            runtimeClassName: {{ $spec.runtimeClassName | default "devbox-runtime" }}
            storageLimit: {{ $spec.storageLimit | default "10Gi" | quote }}
            tolerations:
              {{- range ($spec.tolerations | default (list (dict "key" "devbox.sealos.io/node" "operator" "Exists" "effect" "NoSchedule"))) }}
              - key: {{ .key | quote }}
                operator: {{ .operator | quote }}
                effect: {{ .effect | quote }}
              {{- end }}
            affinity:
              {{- if $spec.affinity }}
          {{ $spec.affinity | toYaml | nindent 6 }}
              {{- else }}
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                  - matchExpressions:
                    - key: devbox.sealos.io/node
                      operator: Exists
              {{- end }}
          {{- if not $noExpose }}
          {{- $portsSeen := dict }}
          {{- range $endpointList }}
          {{- $portKey := printf "p%d" .port }}
          {{- if not (index $portsSeen $portKey) }}
          {{- $_ := set $portsSeen $portKey 1 }}
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: {{ printf "%s-service-port-%d" $name .port }}
            namespace: {{ $ns }}
            labels:
              cloud.sealos.io/devbox-manager: {{ $name }}
              crossplane.io/composite: {{ $name }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: de-service-port-{{ .port }}
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            ports:
            - port: {{ .port }}
              targetPort: {{ .port }}
              name: {{ printf "http-%d" .port }}
              protocol: TCP
            selector:
              app.kubernetes.io/name: devbox
              app.kubernetes.io/part-of: devbox
              app.kubernetes.io/managed-by: sealos
          {{- end }}
          {{- end }}
          {{- if $hasIngress }}
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: {{ $ingressName }}
            namespace: {{ $ns }}
            labels:
              cloud.sealos.io/devbox-manager: {{ $name }}
              cloud.sealos.io/app-deploy-manager-domain: {{ $statusHost | quote }}
              crossplane.io/composite: {{ $name }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: de-ingress
              kubernetes.io/ingress.class: nginx
              nginx.ingress.kubernetes.io/proxy-body-size: 32m
              nginx.ingress.kubernetes.io/ssl-redirect: "false"
              nginx.ingress.kubernetes.io/backend-protocol: HTTP
              nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
              nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
              nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
              nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
              nginx.ingress.kubernetes.io/server-snippet: |
                client_header_buffer_size 64k;
                large_client_header_buffers 4 128k;
              {{- range $k, $v := ($spec.ingressAnnotations | default dict) }}
              {{ $k }}: {{ $v | quote }}
              {{- end }}
          spec:
            rules:
            {{- range $endpointList }}
            {{- if ne (trim (toString .host)) "" }}
            - host: {{ .host }}
              http:
                paths:
                - pathType: Prefix
                  path: /
                  backend:
                    service:
                      name: {{ printf "%s-service-port-%d" $name .port }}
                      port:
                        number: {{ .port }}
            {{- end }}
            {{- end }}
            tls:
            - hosts:
              {{- range $endpointList }}
              {{- if ne (trim (toString .host)) "" }}
              - {{ .host }}
              {{- end }}
              {{- end }}
              secretName: {{ $tlsSecret }}
          {{- end }}
          {{- end }}
          ---
          apiVersion: example.crossplane.io/v1
          kind: DE
          metadata:
            name: {{ $name }}
            namespace: {{ $ns }}
          status:
            phase: {{ $phase | quote }}
            host: {{ $statusHost | quote }}
            {{- if gt (len $statusHosts) 0 }}
            hosts:
            {{- range $statusHosts }}
            - {{ . | quote }}
            {{- end }}
            {{- else }}
            hosts: []
            {{- end }}
            serviceName: {{ $statusServiceName | quote }}
            {{- if gt (len $serviceNames) 0 }}
            serviceNames:
            {{- range $serviceNames }}
            - {{ . | quote }}
            {{- end }}
            {{- else }}
            serviceNames: []
            {{- end }}
            ingressName: {{ $ingressName | quote }}
            conditions:
            - type: Ready
              status: {{ if eq $phase "Running" }} "True" {{ else }} "False" {{ end }}
              reason: {{ $phase | quote }}
              message: 'Devbox phase is {{ $phase }}'
              lastTransitionTime: {{ $now | quote }}
