apiVersion: example.crossplane.io/v1
kind: AP
metadata:
  name: nginx
  namespace: ns-admin
  labels:
    region: 192.168.12.53.nip.io
spec:
  crossplane:
    compositionRef:
      name: aps-deployment-ingress-go-templating
  image: nginx:latest
  # Optional: Project claim name in this namespace (see spec.projectName on AP XRD)
  projectName: demo-project
  replicas: 1
  # One Service per port; Ingress for public ports (default). With metadata.labels.region, host optional.
  endpoints:
    - port: 80
  cpuRequest: 250m
  memoryRequest: 512Mi
  cpuLimit: 500m
  memoryLimit: 1024Mi


