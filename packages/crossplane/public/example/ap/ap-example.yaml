apiVersion: example.crossplane.io/v1
kind: AP
metadata:
  name: sealai-registry
  namespace: brain-system
spec:
  crossplane:
    compositionRef:
      name: aps-deployment-ingress-go-templating
  image: puddlecat/sealai-registry:latest
  # Optional: Project claim name in this namespace (see spec.projectName on AP XRD)
  # projectName: demo-project
  replicas: 1
  # Multiple services and ingress - one per endpoint (legacy port/host still supported)
  endpoints:
    - port: 10000
      host: sealai-registry.192.168.12.53.nip.io
  cpuRequest: 500m
  memoryRequest: 1024Mi
  cpuLimit: 1500m
  memoryLimit: 1536Mi


