apiVersion: example.crossplane.io/v1
kind: AP
metadata:
  name: nginx
  namespace: ns-admin
  labels:
    region: 192.168.12.53.nip.io
spec:
  crossplane:
    compositionRef:
      name: aps-deployment-ingress-go-templating
  # Optional: Project claim name in this namespace (see spec.projectName on AP XRD)
  projectName: demo-project
  input:
    image: nginx:latest
    network:
      privatePort: 80
  resource:
    replicas: 1
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1024Mi

