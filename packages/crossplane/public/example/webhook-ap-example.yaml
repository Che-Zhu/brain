# AP using aps-webhook-go-templating (adnanh/webhook, -template mode).
# Expects POST with JSON like GitHub's release webhook: top-level "action", nested "release" and "repository".
# This hook runs only when action is "released". No HMAC/secret (omit spec.webhookSecret).
apiVersion: example.crossplane.io/v1
kind: AP
metadata:
  name: ap-github-webhook
  namespace: sponge-bob
spec:
  crossplane:
    compositionRef:
      name: aps-webhook-go-templating
  image: almir/webhook:2.8.3
  replicas: 1
  hooksYamlTmpl: |
    # URL: https://<ingress-host>/hooks/github-release-released
    - id: github-release-released
      http-methods: ["POST"]
      execute-command: "/bin/sh"
      pass-arguments-to-command:
        - source: string
          name: "-c"
        - source: string
          name: 'printf "%s\n" "action: released (webhook matched)" "repository: $1" "tag_name: $2" "release_name (title): $3" "target_branch (target_commitish): $4" "draft: $5" "prerelease: $6" "published_at: $7" "html_url: $8" "api_url: $9" >&2'
        - source: string
          name: "_"
        - source: payload
          name: repository.full_name
        - source: payload
          name: release.tag_name
        - source: payload
          name: release.name
        - source: payload
          name: release.target_commitish
        - source: payload
          name: release.draft
        - source: payload
          name: release.prerelease
        - source: payload
          name: release.published_at
        - source: payload
          name: release.html_url
        - source: payload
          name: release.url
      trigger-rule:
        match:
          type: value
          value: released
          parameter:
            source: payload
            name: action
  endpoints:
    - port: 9000
      host: webhook.example.com
  cpuRequest: 50m
  memoryRequest: 64Mi
  cpuLimit: 500m
  memoryLimit: 256Mi
  imagePullPolicy: IfNotPresent