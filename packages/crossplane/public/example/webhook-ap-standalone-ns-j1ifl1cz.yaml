# Expanded from packages/crossplane/example/webhook-ap-example.yaml + aps-webhook-go-templating
# (plain Kubernetes — no Crossplane AP). Namespace: ns-j1ifl1cz
#
# Before apply: ensure TLS secret "wildcard-cert" exists in this namespace (Sealos usually provides it).
# Host must match the public domain Sealos gives this app (pattern: <slug>.usw-1.sealos.app — same style as
# hello-world’s xaiwcdyvwwcy.usw-1.sealos.app). Replace spec.rules[].host / tls.hosts if your slug differs.
# GitHub webhook URL: https://<slug>.usw-1.sealos.app/hooks/github-release-released
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ap-github-webhook-webhook-hooks
  namespace: ns-j1ifl1cz
  labels:
    app: ap-github-webhook
data:
  hooks.yaml.tmpl: |
    # URL: https://github-webhook-j1ifl1cz.usw-1.sealos.app/hooks/github-release-released (edit slug to match Ingress)
    - id: github-release-released
      http-methods: ["POST"]
      execute-command: "/bin/sh"
      pass-arguments-to-command:
        - source: string
          name: "-c"
        - source: string
          name: 'printf "%s\n" "action: released (webhook matched)" "repository: $1" "tag_name: $2" "release_name (title): $3" "target_branch (target_commitish): $4" "draft: $5" "prerelease: $6" "published_at: $7" "html_url: $8" "api_url: $9" >&2'
        - source: string
          name: "_"
        - source: payload
          name: repository.full_name
        - source: payload
          name: release.tag_name
        - source: payload
          name: release.name
        - source: payload
          name: release.target_commitish
        - source: payload
          name: release.draft
        - source: payload
          name: release.prerelease
        - source: payload
          name: release.published_at
        - source: payload
          name: release.html_url
        - source: payload
          name: release.url
      trigger-rule:
        match:
          type: value
          value: released
          parameter:
            source: payload
            name: action
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ap-github-webhook
  namespace: ns-j1ifl1cz
  labels:
    app: ap-github-webhook
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ap-github-webhook
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ap-github-webhook
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook
          image: almir/webhook:2.8.3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - -hooks=/etc/webhook/hooks.yaml.tmpl
            - -template
            - -verbose
            - -ip=0.0.0.0
            - -port=9000
          ports:
            - containerPort: 9000
              name: http-9000
              protocol: TCP
          volumeMounts:
            - name: hooks
              mountPath: /etc/webhook
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          imagePullPolicy: IfNotPresent
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: hooks
          configMap:
            name: ap-github-webhook-webhook-hooks
---
apiVersion: v1
kind: Service
metadata:
  name: ap-github-webhook-service-port-9000
  namespace: ns-j1ifl1cz
  labels:
    app: ap-github-webhook
spec:
  selector:
    app: ap-github-webhook
  ports:
    - name: http-9000
      port: 9000
      targetPort: http-9000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ap-github-webhook-ingress
  namespace: ns-j1ifl1cz
  labels:
    app: ap-github-webhook
    cloud.sealos.io/app-deploy-manager: ap-github-webhook
    cloud.sealos.io/app-deploy-manager-domain: github-webhook-j1ifl1cz
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
spec:
  rules:
    - host: github-webhook-j1ifl1cz.usw-1.sealos.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ap-github-webhook-service-port-9000
                port:
                  number: 9000
  tls:
    - hosts:
        - github-webhook-j1ifl1cz.usw-1.sealos.app
      secretName: wildcard-cert
