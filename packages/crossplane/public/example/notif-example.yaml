# Standalone Notif example — no Composition required.
# Requires: Notif XRD (apps/hub/public/crossplane/service/notif/notif.yaml)
apiVersion: example.crossplane.io/v1
kind: Notif
metadata:
  name: deploy-succeeded-demo
  namespace: sponge-bob
spec:
  title: Deployment finished
  content: |
    Service **app-example** is live. Image was pushed and rollout completed.
  severity: success
  category: deploy
  link: https://example.com/project/app-example
  read: false
  dedupeKey: deploy-app-example-20250325
  sourceRef:
    apiVersion: example.crossplane.io/v1
    kind: Task
    name: app-example-s2i
    namespace: sponge-bob
  data:
    image: ghcr.io/example/app-example:latest
    revision: "42"
