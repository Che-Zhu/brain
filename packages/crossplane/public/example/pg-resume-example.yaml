# Example: Restore a PostgreSQL DB from a KubeBlocks backup
#
# Prerequisites:
# - A full backup exists in the same namespace (kubectl get backup -n <namespace>)
# - Pick a backup whose status is Completed
#
# Apply this DB to create a new PostgreSQL cluster restored from the backup.
# The spec (storageSize, cpu, memory, replicas) should match or exceed the
# original DB that created the backup. If unsure, use the values below.
#
# Replace <BACKUP_NAME> with the backup name, e.g. pg-cluster-pg-basebackup-20250619-101300
---
apiVersion: example.crossplane.io/v1
kind: DB
metadata:
  name: pg-restored
  namespace: ns-admin
spec:
  crossplane:
    compositionRef:
      name: dbs-postgresql-kubeblocks-go-templating
  engine: postgresql
  replicas: 1
  storageSize: 10Gi
  cpuRequest: 500m
  memoryRequest: 1Gi
  terminationPolicy: Delete

  restoreFromBackup:
    backupName: <BACKUP_NAME>
