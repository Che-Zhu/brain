# S2I (Railpack + BuildKit) Task example — Next.js app from:
# https://github.com/Svring/app-example
#
# Requires: Task XRD (task.yaml), Composition tasks-s2i-job, secret `ghcr-cred` (key githubToken),
# and once per cluster — platform BuildKit in build-system:
#
#   kubectl apply -f packages/crossplane/service/task/buildkit-daemon.yaml
#
# Build mode (default) uses tcp://buildkit.build-system.svc.cluster.local:1234 automatically; the Job stays
# baseline-friendly in the tenant namespace (buildctl only, no privileged pod). Override with spec.buildkitHost
# if your daemon DNS differs. Legacy in-pod privileged buildkitd: set buildkitInPod: true (namespace must allow
# privileged pods).
#
# `s2iMode: plan` — clone + railpack prepare only; no BuildKit, no GHCR push, no AP; ConfigMap `<job>-s2i-result`
# still written with plan.json, info.json, metrics.json.
#
# Optional: `projectName` + `projectUid` (Instance metadata.name / uid) — on successful build, composition creates
# an AP from ghcr.io/<owner>/<repo>:latest.
apiVersion: example.crossplane.io/v1
kind: Task
metadata:
  name: app-example-s2i
  namespace: ns-admin
spec:
  crossplane:
    compositionRef:
      name: tasks-s2i-job
  name: app-example-s2i
  repoUrl: https://github.com/Svring/app-example
  # If buildctl/skopeo OOM during OCI export, raise s2iMemoryLimit (default 12Gi in composition).
  # If /workspace fills up, set outputVolumeSize (e.g. 30Gi) when the cluster supports emptyDir quotas.
  # s2iMode: plan
  # buildkitHost: tcp://buildkit.other-ns.svc.cluster.local:1234
  # buildkitInPod: true
  # projectName: my-project
  # projectUid: 00000000-0000-0000-0000-000000000000
