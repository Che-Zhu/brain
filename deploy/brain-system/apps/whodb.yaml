apiVersion: apps/v1
kind: Deployment
metadata:
  name: whodb
  namespace: brain-system
  labels:
    app: whodb
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: whodb
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: whodb
    spec:
      automountServiceAccountToken: false
      containers:
        - name: whodb
          image: docker.io/aimerite/whodb:whodb-integration-2026.509.021621
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "11000"
            - name: WHODB_LOG_LEVEL
              value: warn
            - name: WHODB_LOG_FORMAT
              value: json
            - name: WHODB_DISABLE_UPDATE_CHECK
              value: "true"
          ports:
            - containerPort: 11000
              name: http
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: whodb
  namespace: brain-system
  labels:
    app: whodb
spec:
  type: ClusterIP
  selector:
    app: whodb
  ports:
    - name: http
      port: 11000
      protocol: TCP
      targetPort: http

