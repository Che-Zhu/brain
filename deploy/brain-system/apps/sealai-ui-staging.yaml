apiVersion: example.crossplane.io/v1
kind: AP
metadata:
  name: sealai-ui-staging
  namespace: brain-system
  labels:
    region: 192.168.12.53.nip.io
spec:
  crossplane:
    compositionRef:
      name: aps-deployment-ingress-go-templating
  input:
    image: aimerite/sealai-ui:latest
    imagePullPolicy: Always
    env:
      - name: API_URL
        valueFrom:
          secretKeyRef:
            key: API_URL
            name: sealai-ui-staging-env
      - name: GITHUB_OAUTH_CLIENT_ID
        valueFrom:
          secretKeyRef:
            key: GITHUB_OAUTH_CLIENT_ID
            name: sealai-ui-staging-env
      - name: GITHUB_OAUTH_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            key: GITHUB_OAUTH_CLIENT_SECRET
            name: sealai-ui-staging-env
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            key: DATABASE_URL
            name: sealai-ui-staging-env
      - name: SYSTEM_OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            key: SYSTEM_OPENAI_API_KEY
            name: sealai-ui-staging-env
            optional: true
      - name: SYSTEM_OPENAI_API_BASE_URL
        valueFrom:
          secretKeyRef:
            key: SYSTEM_OPENAI_API_BASE_URL
            name: sealai-ui-staging-env
      - name: FREE_CHAT_TURNS
        valueFrom:
          secretKeyRef:
            key: FREE_CHAT_TURNS
            name: sealai-ui-staging-env
      - name: AI_PROXY_TOKEN_NAME
        valueFrom:
          secretKeyRef:
            key: AI_PROXY_TOKEN_NAME
            name: sealai-ui-staging-env
      - name: SEALOS_HOST
        valueFrom:
          secretKeyRef:
            key: SEALOS_HOST
            name: sealai-ui-staging-env
      - name: DEVBOX_TOKEN
        valueFrom:
          secretKeyRef:
            key: DEVBOX_TOKEN
            name: sealai-ui-staging-env
            optional: true
      - name: DEVBOX_JWT_SIGNING_KEY
        valueFrom:
          secretKeyRef:
            key: DEVBOX_JWT_SIGNING_KEY
            name: sealai-ui-staging-env
            optional: true
      - name: DEVBOX_RUNTIME_IMAGE
        valueFrom:
          secretKeyRef:
            key: DEVBOX_RUNTIME_IMAGE
            name: sealai-ui-staging-env
            optional: true
      - name: DEVBOX_ARCHIVE_AFTER_PAUSE_TIME
        valueFrom:
          secretKeyRef:
            key: DEVBOX_ARCHIVE_AFTER_PAUSE_TIME
            name: sealai-ui-staging-env
      - name: DEVBOX_JWT_TTL_SECONDS
        valueFrom:
          secretKeyRef:
            key: DEVBOX_JWT_TTL_SECONDS
            name: sealai-ui-staging-env
    network:
      privatePort: 3000
      platformAddresses:
        - id: pa_uistaging1
          port: 3000
        - id: pa_uistaging2
          port: 3000
    probes:
      liveness:
        failureThreshold: 3
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 15
        periodSeconds: 15
      readiness:
        failureThreshold: 3
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 5
        periodSeconds: 10
      startup:
        failureThreshold: 30
        httpGet:
          path: /
          port: 3000
        periodSeconds: 5
  paused: false
  resource:
    limits:
      cpu: 2000m
      memory: 2048Mi
    replicas: 1
    requests:
      cpu: 500m
      memory: 1024Mi
