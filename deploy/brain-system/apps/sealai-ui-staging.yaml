apiVersion: example.crossplane.io/v1
kind: AP
metadata:
  name: sealai-ui-staging
  namespace: brain-system
  labels:
    region: 192.168.12.53.nip.io
spec:
  crossplane:
    compositionRef:
      name: aps-deployment-ingress-go-templating
  input:
    image: aimerite/sealai-ui:latest
    imagePullPolicy: Always
    env:
      - name: API_URL
        valueFrom:
          secretKeyRef:
            key: API_URL
            name: sealai-ui-staging-env
      - name: GITHUB_OAUTH_CLIENT_ID
        valueFrom:
          secretKeyRef:
            key: GITHUB_OAUTH_CLIENT_ID
            name: sealai-ui-staging-env
      - name: GITHUB_OAUTH_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            key: GITHUB_OAUTH_CLIENT_SECRET
            name: sealai-ui-staging-env
      - name: VERCEL_TEAM_ID
        valueFrom:
          secretKeyRef:
            key: VERCEL_TEAM_ID
            name: sealai-ui-staging-env
      - name: VERCEL_PROJECT_ID
        valueFrom:
          secretKeyRef:
            key: VERCEL_PROJECT_ID
            name: sealai-ui-staging-env
      - name: VERCEL_TOKEN
        valueFrom:
          secretKeyRef:
            key: VERCEL_TOKEN
            name: sealai-ui-staging-env
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            key: DATABASE_URL
            name: sealai-ui-staging-env
      - name: SANDBOX_PROXY
        valueFrom:
          secretKeyRef:
            key: SANDBOX_PROXY
            name: sealai-ui-staging-env
            optional: true
      - name: NODE_TLS_REJECT_UNAUTHORIZED
        valueFrom:
          secretKeyRef:
            key: NODE_TLS_REJECT_UNAUTHORIZED
            name: sealai-ui-staging-env
    network:
      privatePort: 3000
      platformAddresses:
        - id: pa_uistaging1
          port: 3000
        - id: pa_uistaging2
          port: 3000
    probes:
      liveness:
        failureThreshold: 3
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 15
        periodSeconds: 15
      readiness:
        failureThreshold: 3
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 5
        periodSeconds: 10
      startup:
        failureThreshold: 30
        httpGet:
          path: /
          port: 3000
        periodSeconds: 5
  paused: false
  resource:
    limits:
      cpu: 2000m
      memory: 2048Mi
    replicas: 1
    requests:
      cpu: 500m
      memory: 1024Mi

