apiVersion: example.crossplane.io/v1
kind: AP
metadata:
  name: sealai-registry
  namespace: brain-system
  labels:
    region: 192.168.12.53.nip.io
spec:
  crossplane:
    compositionRef:
      name: aps-deployment-ingress-go-templating
  input:
    image: puddlecat/sealai-registry:latest
    imagePullPolicy: Always
    network:
      privatePort: 10000
      platformAddresses:
        - id: pa_registry1
          port: 10000
  paused: false
  resource:
    limits:
      cpu: 1500m
      memory: 1536Mi
    replicas: 1
    requests:
      cpu: 500m
      memory: 1024Mi

