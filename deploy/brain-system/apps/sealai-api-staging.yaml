apiVersion: example.crossplane.io/v1
kind: AP
metadata:
  name: sealai-api-staging
  namespace: brain-system
  labels:
    region: 192.168.12.53.nip.io
spec:
  crossplane:
    compositionRef:
      name: aps-deployment-ingress-go-templating
  input:
    image: aimerite/sealai-api:latest
    imagePullPolicy: Always
    env:
      - name: VMSELECT_URL
        valueFrom:
          secretKeyRef:
            key: VMSELECT_URL
            name: sealai-api-staging-env
      - name: VLSELECT_URL
        valueFrom:
          secretKeyRef:
            key: VLSELECT_URL
            name: sealai-api-staging-env
      - name: ENCODED_ADMIN_KUBECONFIG
        valueFrom:
          secretKeyRef:
            key: ENCODED_ADMIN_KUBECONFIG
            name: sealai-api-staging-env
      - name: WHODB_URL
        valueFrom:
          secretKeyRef:
            key: WHODB_URL
            name: sealai-api-staging-env
      - name: SEALOS_DESKTOP_SKIP_TLS_VERIFY
        value: "1"
    network:
      privatePort: 9000
      platformAddresses:
        - id: pa_stagingapi1
          port: 9000
        - id: pa_stagingapi2
          port: 9000
    probes:
      liveness:
        failureThreshold: 3
        httpGet:
          path: /health
          port: 9000
        initialDelaySeconds: 15
        periodSeconds: 10
      readiness:
        failureThreshold: 3
        httpGet:
          path: /health
          port: 9000
        initialDelaySeconds: 5
        periodSeconds: 5
      startup:
        failureThreshold: 30
        httpGet:
          path: /health
          port: 9000
        periodSeconds: 5
  paused: false
  resource:
    limits:
      cpu: 1000m
      memory: 1024Mi
    replicas: 1
    requests:
      cpu: 250m
      memory: 512Mi

